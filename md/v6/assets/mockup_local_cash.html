<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地安全開洗分介面 - 遊戲平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&family=IBM+Plex+Mono:wght@500;700&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        success: '#10B981',
                        warning: '#F59E0B',
                        dark: '#0f172a',
                    },
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                        heading: ['"DM Sans"', 'sans-serif'],
                        mono: ['"IBM Plex Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        .keypad-btn {
            @apply flex items-center justify-center h-16 bg-gray-100 hover:bg-gray-200 active:bg-gray-300 rounded-xl text-2xl font-mono font-bold text-gray-800 transition-colors shadow-sm cursor-pointer;
        }
    </style>
</head>
<!-- Kiosk mode representation (dark borders to simulate a local screen) -->

<body class="bg-dark flex items-center justify-center min-h-screen p-4">

    <!-- Actual App Screen -->
    <div class="bg-gray-50 w-full max-w-5xl h-[800px] rounded-2xl overflow-hidden shadow-2xl flex flex-col relative">

        <!-- Header -->
        <header class="bg-white px-6 py-4 flex justify-between items-center shadow-sm z-10">
            <div class="flex items-center space-x-6">
                <div class="flex items-center">
                    <span class="text-sm text-gray-500 mr-2">機台名稱:</span>
                    <span class="font-mono font-bold text-lg text-gray-900">A-01</span>
                </div>
                <div class="flex items-center px-3 py-1 bg-green-50 text-success rounded-full border border-green-100">
                    <div class="w-2.5 h-2.5 rounded-full bg-success mr-2 animate-pulse"></div>
                    <span class="text-sm font-bold">已連線至中央</span>
                </div>
            </div>

            <div class="flex items-center space-x-4">
                <div class="text-sm font-mono text-gray-500 hidden sm:block">14:35:22</div>
                <button
                    class="px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-100 flex items-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                        </path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                    本機設定
                </button>
            </div>
        </header>

        <!-- Main Content (Scrollable if needed) -->
        <main class="flex-1 p-8 overflow-y-auto">

            <!-- Revenue Summary (Large numbers for kiosk) -->
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 mb-8 flex justify-between">
                <div>
                    <div class="text-sm font-medium text-gray-500 mb-1">今日總淨收</div>
                    <div class="text-4xl font-mono font-bold text-gray-900">$12,500</div>
                </div>
                <div class="text-right">
                    <div class="text-sm font-medium text-gray-500 mb-1">今日下注總額</div>
                    <div class="text-2xl font-mono font-bold text-gray-500">$45,000</div>
                </div>
                <div class="text-right">
                    <div class="text-sm font-medium text-gray-500 mb-1">今日派彩總額</div>
                    <div class="text-2xl font-mono font-bold text-gray-500">$32,500</div>
                </div>
            </div>

            <!-- Operations Row -->
            <div class="grid grid-cols-2 gap-8">

                <!-- Deposit (Cash In) Panel -->
                <div class="bg-white rounded-2xl shadow-lg border border-primary/20 p-8 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-2 bg-primary"></div>
                    <h3 class="text-2xl font-heading font-bold text-gray-900 mb-6 flex items-center">
                        <svg class="w-8 h-8 mr-3 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M18 12H6m6-6l-6 6 6 6"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        開分 (注資)
                    </h3>

                    <div class="space-y-6">
                        <!-- PIN Input -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">安全 PIN 碼</label>
                            <div class="flex gap-4">
                                <input type="password" maxlength="1" value="•" readonly
                                    class="w-16 h-16 text-center text-3xl rounded-xl border-2 border-primary bg-indigo-50 focus:outline-none focus:ring-0">
                                <input type="password" maxlength="1" value="•" readonly
                                    class="w-16 h-16 text-center text-3xl rounded-xl border-2 border-primary bg-indigo-50 focus:outline-none focus:ring-0">
                                <input type="password" maxlength="1" value="•" readonly
                                    class="w-16 h-16 text-center text-3xl rounded-xl border-2 border-primary bg-indigo-50 focus:outline-none focus:ring-0">
                                <input type="password" maxlength="1" placeholder=""
                                    class="w-16 h-16 text-center text-3xl border-2 border-gray-300 rounded-xl focus:border-primary focus:outline-none">
                            </div>
                        </div>

                        <!-- Amount Display -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">開分金額</label>
                            <div class="relative">
                                <span
                                    class="absolute left-4 top-1/2 -translate-y-1/2 text-2xl text-gray-400 font-mono">$</span>
                                <input type="text" value="1000" readonly
                                    class="w-full h-20 pl-10 pr-6 text-right text-4xl font-mono font-bold rounded-xl border-2 border-gray-300 bg-gray-50 focus:outline-none text-gray-800">
                            </div>
                        </div>

                        <!-- Keypad Simulator for Mockup -->
                        <div class="grid grid-cols-3 gap-3">
                            <div class="keypad-btn">1</div>
                            <div class="keypad-btn">2</div>
                            <div class="keypad-btn">3</div>
                            <div class="keypad-btn">4</div>
                            <div class="keypad-btn">5</div>
                            <div class="keypad-btn">6</div>
                            <div class="keypad-btn">7</div>
                            <div class="keypad-btn">8</div>
                            <div class="keypad-btn">9</div>
                            <div class="keypad-btn text-lg bg-gray-50">清除</div>
                            <div class="keypad-btn">0</div>
                            <div class="keypad-btn text-lg bg-gray-50">←</div>
                        </div>

                        <!-- Action Button -->
                        <button
                            class="w-full py-5 bg-primary hover:bg-indigo-700 text-white rounded-xl text-xl font-bold shadow-lg shadow-indigo-200 transition-all flex justify-center items-center">
                            確認開分
                        </button>
                    </div>
                </div>

                <!-- Withdrawal (Cash Out) Panel -->
                <div
                    class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8 relative overflow-hidden opacity-80 pointer-events-none filter grayscale">
                    <div class="absolute top-0 left-0 w-full h-2 bg-gray-400"></div>
                    <div class="absolute inset-0 bg-white/50 z-10 flex flex-col items-center justify-center">
                        <svg class="w-12 h-12 text-gray-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                            </path>
                        </svg>
                        <span class="text-lg font-bold text-gray-600">目前為開分模式，洗分已鎖定</span>
                    </div>

                    <h3 class="text-2xl font-heading font-bold text-gray-900 mb-6 flex items-center">
                        <svg class="w-8 h-8 mr-3 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z">
                            </path>
                        </svg>
                        洗分 (結算歸零)
                    </h3>

                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">機台目前點數</label>
                            <div class="relative">
                                <span
                                    class="absolute left-4 top-1/2 -translate-y-1/2 text-2xl text-gray-400 font-mono">$</span>
                                <input type="text" value="3,500" readonly
                                    class="w-full h-20 pl-10 pr-6 text-right text-4xl font-mono font-bold rounded-xl border border-gray-300 bg-gray-50 focus:outline-none text-gray-800">
                            </div>
                        </div>

                        <!-- Action Button -->
                        <button
                            class="w-full py-5 bg-gray-800 text-white rounded-xl text-xl font-bold shadow-lg mt-auto">
                            全部洗分並結帳
                        </button>
                    </div>
                </div>

            </div>

        </main>

        <!-- Footer / Status Bar -->
        <footer class="bg-indigo-50 border-t border-indigo-100 flex items-center justify-between p-4 px-6 text-sm">
            <div class="flex items-center text-primary font-medium">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
                <span>離線同步佇列 (Queue):</span>
                <span class="ml-2 bg-primary text-white px-2 py-0.5 rounded text-xs font-bold">0 筆待傳</span>
                <button class="ml-4 text-xs underline hover:text-indigo-800">手動觸發同步</button>
            </div>
            <div class="text-gray-400">
                操作員: 現場經理 #002
            </div>
        </footer>

    </div>
</body>

</html>
