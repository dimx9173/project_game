  # Monitor (旗艦版)
  /monitor/system:
    get:
      tags: [監控中心 (Monitor)]
      summary: "[C79] 取得系統監控數據"
      security: [{ BearerAuth: [] }]
      responses:
        "200": { description: 成功 }

  # RBAC (Roles & Permissions)
  /roles:
    get:
      tags: [使用者權限 (RBAC)]
      summary: "[C71] 取得角色列表"
      security: [{ BearerAuth: [] }]
      responses:
        "200": { description: 成功 }
    post:
      tags: [使用者權限 (RBAC)]
      summary: "[C71] 新增角色"
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, permissions]
              properties:
                name: { type: string }
                description: { type: string }
                permissions: { type: array, items: { type: string } }
      responses:
        "201": { description: 建立成功 }

  /roles/{id}:
    parameters:
      - {
          name: id,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
    get:
      tags: [使用者權限 (RBAC)]
      summary: "[C71] 取得角色詳情"
      security: [{ BearerAuth: [] }]
      parameters:
        - {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      responses:
        "200": { description: 成功 }
        "404": { description: 不存在 }
    put:
      tags: [使用者權限 (RBAC)]
      summary: "[C71] 更新角色"
      security: [{ BearerAuth: [] }]
      responses:
        "200": { description: 更新成功 }
    delete:
      tags: [使用者權限 (RBAC)]
      summary: "[C71] 刪除角色"
      security: [{ BearerAuth: [] }]
      responses:
        "204": { description: 刪除成功 }

  /permissions:
    get:
      tags: [使用者權限 (RBAC)]
      summary: "[C71] 取得權限列表"
      security: [{ BearerAuth: [] }]
      responses:
        "200": { description: 成功 }
    post:
      tags: [使用者權限 (RBAC)]
      summary: "[C71] 新增權限"
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, resource, action]
              properties:
                name: { type: string }
                resource: { type: string }
                action: { type: string }
      responses:
        "201": { description: 建立成功 }

  /permissions/{id}:
    parameters:
      - {
          name: id,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
    get:
      tags: [使用者權限 (RBAC)]
      summary: "[C71] 取得權限詳情"
      security: [{ BearerAuth: [] }]
      parameters:
        - {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      responses:
        "200": { description: 成功 }
    put:
      tags: [使用者權限 (RBAC)]
      summary: "[C71] 更新權限"
      security: [{ BearerAuth: [] }]
      responses:
        "200": { description: 更新成功 }
    delete:
      tags: [使用者權限 (RBAC)]
      summary: "[C71] 刪除權限"
      security: [{ BearerAuth: [] }]
      responses:
        "204": { description: 刪除成功 }

  /users/{id}/roles:
    parameters:
      - {
          name: id,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
    put:
      tags: [使用者權限 (RBAC)]
      summary: "[C70] 分配角色給使用者"
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roleIds]
              properties:
                roleIds: { type: array, items: { type: string, format: uuid } }
      responses:
        "200": { description: 分配成功 }

  /users/{id}/pin:
    parameters:
      - {
          name: id,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
    put:
      tags: [使用者權限 (RBAC)]
      summary: "[C70] 設定或重置使用者的本地端 PIN 碼"
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pinCode]
              properties:
                pinCode: { type: string, minLength: 4, maxLength: 6 }
      responses:
        "200": { description: 設定成功 }

  /users/{id}/pin/unlock:
    parameters:
      - {
          name: id,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
    post:
      tags: [使用者權限 (RBAC)]
      summary: "[C70] 解鎖被鎖定的 PIN 碼"
      description: 當使用者 PIN 錯誤 5 次被鎖定後，由管理員執行解鎖
      security: [{ BearerAuth: [] }]
      parameters:
        - {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resetPin:
                  type: boolean
                  description: 是否同時重設 PIN 碼
                newPin:
                  type: string
                  minLength: 4
                  maxLength: 6
                  description: 新 PIN 碼（若 resetPin 為 true 則必填）
      responses:
        "200": { description: 解鎖成功 }
        "400": { description: 使用者未被鎖定 }

  # Discrepancies (旗艦版)
  /discrepancies:
    get:
      tags: [錯帳管理 (Discrepancies)]
      summary: "[C45] 取得錯帳列表"
      security: [{ BearerAuth: [] }]
      responses:
        "200": { description: 成功 }

  /discrepancies/{id}/resolve:
    parameters:
      - {
          name: id,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
    post:
      tags: [錯帳管理 (Discrepancies)]
      summary: "[C45] 處理錯帳"
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resolution: { type: string }
                action: { type: string }
      responses:
        "200": { description: 處理成功 }

  # Disputes (旗艦版)
  /disputes:
    get:
      tags: [爭議處理 (Disputes)]
      summary: "[L20] 取得爭議單列表"
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: status, in: query, schema: { type: string } }
        - { name: playerId, in: query, schema: { type: string } }
      responses:
        "200": { description: 成功 }
    post:
      tags: [爭議處理 (Disputes)]
      summary: "[L20] 建立爭議單"
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [machineId, type, transactionId, description]
              properties:
                machineId: { type: string }
                type:
                  {
                    type: string,
                    enum:
                      [
                        deposit_not_arrived,
                        duplicate_charge,
                        payout_error,
                        withdrawal_failed,
                        balance_discrepancy,
                        system_error,
                        fraud_suspicion,
                      ],
                  }
                transactionId: { type: string }
                description: { type: string }
                expectedAction: { type: string }
                priority: { type: string, enum: [low, medium, high, urgent] }
      responses:
        "201": { description: 建立成功 }

  /disputes/{id}:
    parameters:
      - {
          name: id,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
    get:
      tags: [爭議處理 (Disputes)]
      summary: "[L20] 取得爭議單詳情"
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: 成功 }
    patch:
      tags: [爭議處理 (Disputes)]
      summary: "[L20] 更新爭議單狀態/裁決"
      description: 用於調查進度更新、裁決、結案
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  {
                    type: string,
                    enum:
                      [
                        investigating,
                        pending_review,
                        deliberating,
                        processing,
                        closed,
                        rejected,
                      ],
                  }
                verdict: { type: string }
                verdictReason: { type: string }
                remedyType:
                  {
                    type: string,
                    enum: [refund, compensation, partial_refund, none],
                  }
                remedyAmount: { type: number }
                authCode: { type: string, description: "主管授權碼" }
      responses:
        "200": { description: 更新成功 }

  # Sync
  /sync/upload:
    post:
      tags: [同步管理 (Sync)]
      summary: "[L35] 上傳本地資料"
