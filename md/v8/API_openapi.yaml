openapi: 3.0.3
info:
  title: 遊戲平台管理系統 API
  description: |
    遊戲平台管理系統 V8.1 API 文檔
    - 支援 MVP / 標準版 / 旗艦版
    - Version: 1.2.0
    
    ## 功能代碼索引
    
    本 API 文檔中的每個端點都標註了對應的功能代碼，方便追蹤與文件對照。
    
    ### 集中式後台功能碼 (Cxx)
    
    | 功能碼 | 功能名稱 | 主要端點 |
    |--------|---------|---------|
    | [C11] | 開分/洗分 | POST /machines/{id}/cash-in, /cash-out |
    | [C12] | 遠端指令 | POST /machines/{id}/command |
    | [C14] | 機台設定 | PUT /machines/{id}/config |
    | [C16] | 遊戲新增/編輯/刪除 | POST/PUT/DELETE /games |
    | [C45] | 交易對帳 | GET /discrepancies, POST /discrepancies/{id}/resolve |
    | [C47] | 營收報表 | GET /reports/revenue |
    | [C53] | 遊戲商列表檢視 | GET /providers |
    | [C54] | API 連線狀態監控 | GET /providers/{id}/status |
    | [C55] | 遊戲同步管理 | POST /providers/{id}/sync |
    | [C57] | 牌桌列表檢視 | GET /multiplayer/rooms |
    | [C59] | 牌桌配置管理 | POST /multiplayer/rooms |
    | [C60] | 牌局歷史查詢 | GET /multiplayer/games |
    | [C70] | 帳號新增/編輯/刪除 | POST/PUT/DELETE /users, /users/{id}/pin |
    | [C71] | 角色權限設定 | POST/PUT/DELETE /roles, /permissions |
    | [C73] | 版本列表管理 | GET /ota/versions |
    | [C74] | 更新任務下發 | POST /ota/tasks |
    | [C75] | 更新進度監控 | GET /ota/tasks/{id}/status |
    | [C90] | 系統參數設定 | GET/PUT /system/config |
    | [C101] | 機台新增/編輯/刪除 | POST/PUT/DELETE /machines |
    | [C103] | 遊戲商新增/編輯/刪除 | POST/PUT/DELETE /providers |
    | [C104] | 遊戲商餘額歸集與轉帳 | GET /wallet/balances, POST /wallet/transfer |
    | [C105] | 版本包上傳/控制 | POST /ota/versions |
    | [C107] | 機台標籤管理 | PUT /machines/{id} (tags 屬性) |
    
    ### 本地後台功能碼 (Lxx)
    
    | 功能碼 | 功能名稱 | 主要端點 |
    |--------|---------|---------|
    | [L05] | 機台列表檢視 | GET /machines |
    | [L07] | 機台配置接收 | POST /machines/{id}/config/status |
    | [L11] | 遊戲列表檢視 | GET /games |
    | [L14] | 遊戲詳情 | GET /games/{id} |
    | [L15] | 交易紀錄 | GET /transactions |
    | [L17] | 日/週/月/年報表 | GET /reports/revenue |
    | [L20] | 爭議對帳處理專區 | GET/POST /disputes |
    | [L34] | 同步狀態檢視 | GET /machines/{id}/config/status |
    | [L35] | 雙向佇列與交易補償 | POST /sync/upload, GET /sync/download |
    | [L38] | 心跳檢測與離線告警 | POST /machines/{id}/heartbeat |
    | [L43] | 虛擬下注 | POST /games/{id}/test/* |
    | [L47] | 基本設定 | GET/PUT /machines/{id}/config |
    
    ### 不適用 API 端點的功能
    
    以下功能為前端計算、UI 元件或 WebSocket 推播，無對應 REST API：
    
    | 功能碼 | 功能名稱 | 說明 |
    |--------|---------|------|
    | [C01] | KPI 監控 | 前端計算，資料來自多個 API |
    | [C05] | 系統通知 | WebSocket 推播 |
    | [C79] | 系統監控 | 前端儀表板 |
    | [L01-L04] | 儀表板相關 | 前端視覺化 |
    | [L36] | 指數退避重試機制 | 客戶端邏輯 |
    
  version: 1.2.0

servers:
  - url: https://api.gameplatform.com/api/v1
  - url: http://localhost:3000/api/v1

security:
  - BearerAuth: []
  - PinAuth: []

tags:
  - name: 認證 (Auth)
  - name: 機台管理 (Machines)
  - name: 遊戲管理 (Games)
  - name: 遊戲測試 (Game Test)
  - name: 交易管理 (Transactions)
  - name: 遊戲商管理 (Providers)
  - name: 錢包管理 (Wallet)
  - name: 多人遊戲 (Multiplayer)
  - name: 使用者權限 (RBAC)
  - name: OTA 更新 (OTA)
  - name: 監控中心 (Monitor)
  - name: 爭議處理 (Disputes)
  - name: 錯帳管理 (Discrepancies)
  - name: 同步管理 (Sync)
  - name: 報表管理 (Reports)
  - name: 系統設定 (System Configs)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    PinAuth:
      type: apiKey
      in: header
      name: X-PIN-Code

paths:
  # Auth
  /auth/login:
    post:
      tags: [認證 (Auth)]
      summary: "[C70] 使用者登入"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        "200": { description: 登入成功 }
        "401": { description: 登入失敗 }

  /auth/logout:
    post:
      tags: [認證 (Auth)]
      summary: "[C70] 登出"
      security: [{ BearerAuth: [] }]
      responses:
        "200": { description: 登出成功 }

  /auth/verify:
    get:
      tags: [認證 (Auth)]
      summary: "[C70] 驗證 Token"
      security: [{ BearerAuth: [] }]
      responses:
        "200": { description: Token 有效 }

  /auth/refresh:
    post:
      tags: [認證 (Auth)]
      summary: "[C70] 刷新 Token"
      responses:
        "200": { description: 刷新成功 }

  /auth/forgot-password:
    post:
      tags: [認證 (Auth)]
      summary: "[C70] 忘記密碼 - 發送重設連結"
      description: 系統使用者透過 Email 重設密碼
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200": { description: 重設連結已發送 }
        "404": { description: Email 不存在 }

  /auth/reset-password:
    post:
      tags: [認證 (Auth)]
      summary: "[C70] 重設密碼"
      description: 使用重設 Token 設定新密碼
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token: { type: string, description: 重設 Token }
                newPassword: { type: string, minLength: 8 }
      responses:
        "200": { description: 密碼重設成功 }
        "400": { description: Token 無效或過期 }

  # Machines
  /machines:
    get:
      tags: [機台管理 (Machines)]
      summary: "[L05] 取得機台列表"
      description: |
        取得機台列表，支援多維度篩選。
        - 支援依標籤（tags）篩選，可多選
        - 支援依狀態、IP、名稱篩選
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: pageSize, in: query, schema: { type: integer, default: 20 } }
        - {
            name: status,
            in: query,
            schema: { type: string, enum: [online, offline, maintenance] },
          }
        - {
            name: tags,
            in: query,
            schema: { type: array, items: { type: string } },
            description: 標籤篩選（可多選，AND 邏輯）,
          }
        - {
            name: name,
            in: query,
            schema: { type: string },
            description: 機台名稱（模糊搜尋）,
          }
        - {
            name: ip,
            in: query,
            schema: { type: string },
            description: IP 位址,
          }
      responses:
        "200": { description: 成功 }
    post:
      tags: [機台管理 (Machines)]
      summary: "[C101] 新增機台"
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, mac]
              properties:
                name: { type: string }
                ip: { type: string }
                mac: { type: string }
                tags:
                  type: array
                  items: { type: string }
                  description: 機台標籤
                hostName: { type: string }
      responses:
        "201": { description: 建立成功 }

  /machines/{id}:
    parameters:
      - {
          name: id,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
    get:
      tags: [機台管理 (Machines)]
      summary: "[L05] 取得機台詳情"
      security: [{ BearerAuth: [] }]
      parameters:
        - {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      responses:
        "200": { description: 成功 }
        "404": { description: 不存在 }
    put:
      tags: [機台管理 (Machines)]
      summary: "[C101] 更新機台"
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                tags:
                  type: array
                  items: { type: string }
                  description: 機台標籤
                status: { type: string }
      responses:
        "200": { description: 更新成功 }
    delete:
      tags: [機台管理 (Machines)]
      summary: "[C101] 刪除機台"
      security: [{ BearerAuth: [] }]
      responses:
        "204": { description: 刪除成功 }

  /machines/{id}/command:
    parameters:
      - {
          name: id,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
    post:
      tags: [機台管理 (Machines)]
      summary: "[C12] 發送遠端指令"
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                command: { type: string, enum: [restart, shutdown, force_sync] }
                params: { type: object }
      responses:
        "200": { description: 指令已發送 }

  /machines/{id}/heartbeat:
    parameters:
      - {
          name: id,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
    post:
      tags: [機台管理 (Machines)]
      summary: "[L33] 機台心跳"
      description: 機台定期發送心跳以報告狀態
      security: [{ BearerAuth: [] }, { PinAuth: [] }]
      parameters:
        - {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cpuUsage: { type: number }
                memoryUsage: { type: number }
                status: { type: string, enum: [online, offline, maintenance] }
      responses:
        "200": { description: 心跳收到 }

  /machines/{id}/config:
    parameters:
      - {
          name: id,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
    get:
      tags: [機台管理 (Machines)]
      summary: "[L05] 取得機台配置"
      security: [{ BearerAuth: [] }]
      responses:
        "200": { description: 成功 }
    put:
      tags: [機台管理 (Machines)]
      summary: "[C101] 更新機台配置"
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                config: { type: object }
      responses:
        "200": { description: 更新成功 }

  /machines/{id}/config/status:
    parameters:
      - {
          name: id,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
    get:
      tags: [機台管理 (Machines)]
      summary: "[L34] 取得機台配置同步狀態"
      security: [{ BearerAuth: [] }]
      responses:
        "200": { description: 成功 }
    post:
      tags: [機台管理 (Machines)]
      summary: "[L07] 回報機台配置套用結果"
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                config_id: { type: string }
                applied_version: { type: integer }
                status: { type: string, enum: [APPLIED, FAILED] }
                result_message: { type: string }
      responses:
        "200": { description: 回報成功 }

  # Games
  /games:
    get:
      tags: [遊戲管理 (Games)]
      summary: "[L11] 取得遊戲列表"
      security: [{ BearerAuth: [] }]
      responses:
        "200": { description: 成功 }
    post:
      tags: [遊戲管理 (Games)]
      summary: "[C16] 新增遊戲"
      security: [{ BearerAuth: [] }]
      responses:
        "201": { description: 建立成功 }

  /games/{id}:
    parameters:
      - {
          name: id,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
    get:
      tags: [遊戲管理 (Games)]
      summary: "[L14] 取得遊戲詳情"
      security: [{ BearerAuth: [] }]
      responses:
        "200": { description: 成功 }
    put:
      tags: [遊戲管理 (Games)]
      summary: "[C16] 更新遊戲"
      security: [{ BearerAuth: [] }]
      responses:
        "200": { description: 更新成功 }
    delete:
      tags: [遊戲管理 (Games)]
      summary: "[C16] 刪除遊戲"
      security: [{ BearerAuth: [] }]
      responses:
        "204": { description: 刪除成功 }

  # Game Test (旗艦版)
  /games/{id}/test/start:
    parameters:
      - {
          name: id,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
    post:
      tags: [遊戲測試 (Game Test)]
      summary: "[L43] 啟動遊戲測試模式"
      description: 允許管理員在正式環境中進行虛擬下注以驗證遊戲邏輯
      security: [{ BearerAuth: [] }]
      parameters:
        - {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                machineId: { type: string, format: uuid }
      responses:
        "200": { description: 測試模式已啟動 }
        "403": { description: 權限不足 }

  /games/{id}/test/bet:
    parameters:
      - {
          name: id,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
    post:
      tags: [遊戲測試 (Game Test)]
      summary: "[L43] 執行虛擬下注"
      description: 在測試模式下進行虛擬下注，不扣除真實餘額
      security: [{ BearerAuth: [] }]
      parameters:
        - {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                testSessionId: { type: string }
                amount: { type: number }
      responses:
        "200": { description: 虛擬下注成功 }

  /games/{id}/test/end:
    parameters:
      - {
          name: id,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
    post:
      tags: [遊戲測試 (Game Test)]
      summary: "[L43] 結束測試模式"
      security: [{ BearerAuth: [] }]
      parameters:
        - {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                testSessionId: { type: string }
      responses:
        "200": { description: 測試模式已結束 }

  /games/{id}/test/report:
    parameters:
      - {
          name: id,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
    get:
      tags: [遊戲測試 (Game Test)]
      summary: "[L43] 取得測試報告"
      security: [{ BearerAuth: [] }]
      parameters:
        - {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
        - { name: testSessionId, in: query, schema: { type: string } }
      responses:
        "200": { description: 取得測試報告成功 }

  # Transactions
  /transactions:
    get:
      tags: [交易管理 (Transactions)]
      summary: "[L04] 取得交易列表"
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: page, in: query, schema: { type: integer } }
        - { name: pageSize, in: query, schema: { type: integer } }
        - { name: machineId, in: query, schema: { type: string, format: uuid } }
        - { name: type, in: query, schema: { type: string } }
        - { name: operatorId, in: query, schema: { type: string } }
      responses:
        "200": { description: 成功 }

  /transactions/{id}/reverse:
    parameters:
      - {
          name: id,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
    post:
      tags: [交易管理 (Transactions)]
      summary: "[C38] 沖銷交易"
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200": { description: 沖銷成功 }

  # Providers (標準版/旗艦版)
  /providers:
    get:
      tags: [遊戲商管理 (Providers)]
      summary: "[C53] 取得遊戲商列表"
      security: [{ BearerAuth: [] }]
      responses:
        "200": { description: 成功 }
    post:
      tags: [遊戲商管理 (Providers)]
      summary: "[C103] 新增遊戲商"
      security: [{ BearerAuth: [] }]
      responses:
        "201": { description: 建立成功 }

  /providers/{id}/balance:
    parameters:
      - {
          name: id,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
    get:
      tags: [遊戲商管理 (Providers)]
      summary: "[C104] 取得遊戲商餘額"
      security: [{ BearerAuth: [] }]
      responses:
        "200": { description: 成功 }

  # Wallet Management (旗艦版)
  /wallet/balances:
    get:
      tags: [錢包管理 (Wallet)]
      summary: "[C104] 取得所有錢包餘額"
      description: 包含中央錢包與各串接遊戲商錢包餘額
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  centralWallet: { type: number }
                  providerWallets:
                    type: array
                    items:
                      type: object
                      properties:
                        providerId: { type: string }
                        providerName: { type: string }
                        balance: { type: number }

  /wallet/transfer:
    post:
      tags: [錢包管理 (Wallet)]
      summary: "[C104] 執行錢包轉帳"
      description: 執行中央錢包與遊戲商錢包之間的資金劃轉
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fromWallet, toWallet, amount]
              properties:
                fromWallet:
                  {
                    type: string,
                    description: "來源錢包ID (central 或 providerId)",
                  }
                toWallet:
                  {
                    type: string,
                    description: "目標錢包ID (central 或 providerId)",
                  }
                amount: { type: number, minimum: 0 }
                remark: { type: string }
      responses:
        "200": { description: 轉帳成功 }
        "400": { description: 餘額不足或參數錯誤 }

  # Multiplayer (旗艦版)
  /multiplayer/rooms:
    get:
      tags: [多人遊戲 (Multiplayer)]
      summary: "[C57] 取得遊戲房間列表"
      security: [{ BearerAuth: [] }]
      parameters:
        - {
            name: status,
            in: query,
            schema: { type: string, enum: [waiting, playing, closed] },
          }
      responses:
        "200": { description: 成功 }
    post:
      tags: [多人遊戲 (Multiplayer)]
      summary: "[C59] 建立遊戲房間"
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                gameId: { type: string, format: uuid }
                minMachines: { type: integer }
                maxMachines: { type: integer }
      responses:
        "201": { description: 建立成功 }

  /multiplayer/rooms/{id}:
    parameters:
      - {
          name: id,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
    get:
      tags: [多人遊戲 (Multiplayer)]
