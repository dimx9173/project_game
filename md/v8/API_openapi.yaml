  # Reports (旗艦版)
  /reports/revenue:
    get:
      tags: [報表管理 (Reports)]
      summary: "[C47] 營收報表"
      description: |
        取得營收報表資料
        - 支援多維度篩選：門市、機台、遊戲、遊戲商、標籤
        - 支援日期範圍：日/週/月/年
        - 支援多選篩選條件
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: startDate, in: query, schema: { type: string, format: date } }
        - { name: endDate, in: query, schema: { type: string, format: date } }
        - {
            name: reportType,
            in: query,
            schema: { type: string, enum: [daily, weekly, monthly, yearly] },
          }
        - {
            name: stores,
            in: query,
            schema: { type: array, items: { type: string } },
            description: 門市ID列表（可多選）,
          }
        - {
            name: machines,
            in: query,
            schema: { type: array, items: { type: string } },
            description: 機台ID列表（可多選）,
          }
        - {
            name: tags,
            in: query,
            schema: { type: array, items: { type: string } },
            description: 機台標籤列表（可多選，AND 邏輯）,
          }
        - {
            name: games,
            in: query,
            schema: { type: array, items: { type: string } },
            description: 遊戲ID列表（可多選）,
          }
        - {
            name: providers,
            in: query,
            schema: { type: array, items: { type: string } },
            description: 遊戲商ID列表（可多選）,
          }
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        date: { type: string }
                        store: { type: string }
                        machine: { type: string }
                        tags:
                          type: array
                          items: { type: string }
                        game: { type: string }
                        provider: { type: string }
                        totalBet: { type: number }
                        totalPayout: { type: number }
                        revenue: { type: number }
                        rtp: { type: number }
                        gameCount: { type: integer }

  /reports/revenue/export:
    get:
      tags: [報表管理 (Reports)]
      summary: "[C47] 匯出營收報表"
      description: 匯出營收報表為 CSV 或 Excel
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: startDate, in: query, schema: { type: string, format: date } }
        - { name: endDate, in: query, schema: { type: string, format: date } }
        - {
            name: reportType,
            in: query,
            schema: { type: string, enum: [daily, weekly, monthly, yearly] },
          }
        - {
            name: stores,
            in: query,
            schema: { type: array, items: { type: string } },
          }
        - {
            name: machines,
            in: query,
            schema: { type: array, items: { type: string } },
          }
        - {
            name: tags,
            in: query,
            schema: { type: array, items: { type: string } },
            description: 機台標籤列表（可多選）,
          }
        - {
            name: games,
            in: query,
            schema: { type: array, items: { type: string } },
          }
        - {
            name: providers,
            in: query,
            schema: { type: array, items: { type: string } },
          }
        - {
            name: format,
            in: query,
            schema: { type: string, enum: [csv, excel], default: csv },
          }
      responses:
        "200":
          description: 成功匯出
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  # System Configs (旗艦版)
  /system/config:
    get:
      tags: [系統設定 (System Configs)]
      summary: "[C90] 取得系統設定"
      description: 取得全站營運參數與管理員後台設定
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  defaultRtp: { type: number }
                  autoSyncInterval: { type: integer }
                  maintenanceMode: { type: boolean }
                  frontendConfig: { type: object }
    put:
      tags: [系統設定 (System Configs)]
      summary: "[C90] 更新系統設定"
      description: 包含前端遊系大廳外觀與系統基礎配置
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                defaultRtp: { type: number }
                autoSyncInterval: { type: integer }
                maintenanceMode: { type: boolean }
                frontendConfig: { type: object }
      responses:
        "200": { description: 更新成功 }

  /system/config/frontend:
    get:
      tags: [系統設定 (System Configs)]
      summary: "[C78] 取得前端大廳 UI 設定"
      description: 公開介面，供機台端設備載入預設的視覺、Theme、熱門遊戲推薦等
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  theme: { type: string }
                  lobbyTitle: { type: string }
                  marqueeText: { type: string }
                  bannerUrls: { type: array, items: { type: string } }
                  featuredGameIds: { type: array, items: { type: string } }

  /system/backup:
    post:
      tags: [系統設定 (System Configs)]
      summary: "[C69] 執行系統備份"
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  {
                    type: string,
                    enum: [full, incremental, config_only],
                    default: full,
                  }
      responses:
        "200": { description: 備份工作已啟動 }

  /system/restore:
    post:
      tags: [系統設定 (System Configs)]
      summary: "[C69] 執行系統恢復"
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                backupFileId: { type: string }
      responses:
        "200": { description: 恢復工作已啟動 }
