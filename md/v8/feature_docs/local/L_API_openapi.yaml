  /api/local/dashboard/summary:
    get:
      tags: [儀表板 (Dashboard)]
      summary: "[L04] 獲取今日營收概況"
      description: 獲取今日總下注、總派彩與淨流水（快取數據）
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalBet: { type: number }
                  totalPayout: { type: number }
                  netRevenue: { type: number }
                  growthRate: { type: number }

  # Sync
  /sync/upload:
    post:
      tags: [同步管理 (Sync)]
      summary: "[L35] 上傳本地資料"
      security: [{ BearerAuth: [] }, { PinAuth: [] }]
