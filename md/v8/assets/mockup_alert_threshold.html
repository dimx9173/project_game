<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>告警閾值設定 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .glass-card:hover { border-color: rgba(168, 85, 247, 0.4); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 30px rgba(168, 85, 247, 0.2); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3), 0 0 20px rgba(168, 85, 247, 0.2); }
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <h2 class="text-lg font-semibold text-white">告警閾值設定</h2>
            <div class="flex items-center space-x-4">
                <button class="flex items-center px-3 py-2 bg-purple-500/20 text-purple-400 rounded-lg hover:bg-purple-500/30">
                    <i data-lucide="save" class="w-4 h-4 mr-2"></i>
                    <span>儲存設定</span>
                </button>
            </div>
        </header>
        <div class="flex-1 overflow-y-auto p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div class="glass-card rounded-2xl p-6">
                    <div class="flex items-center mb-4">
                        <div class="p-2 bg-red-500/20 rounded-lg mr-3">
                            <i data-lucide="server" class="w-5 h-5 text-red-400"></i>
                        </div>
                        <h3 class="text-white font-semibold">系統資源</h3>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-gray-400 text-sm mb-2">CPU 使用率閾值 (%)</label>
                            <div class="flex items-center space-x-2">
                                <input type="number" value="80" class="w-20 bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-center input-focus">
                                <span class="text-gray-500">%</span>
                            </div>
                        </div>
                        <div>
                            <label class="block text-gray-400 text-sm mb-2">記憶體使用率閾值 (%)</label>
                            <div class="flex items-center space-x-2">
                                <input type="number" value="85" class="w-20 bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-center input-focus">
                                <span class="text-gray-500">%</span>
                            </div>
                        </div>
                        <div>
                            <label class="block text-gray-400 text-sm mb-2">硬碟使用率閾值 (%)</label>
                            <div class="flex items-center space-x-2">
                                <input type="number" value="90" class="w-20 bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-center input-focus">
                                <span class="text-gray-500">%</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="glass-card rounded-2xl p-6">
                    <div class="flex items-center mb-4">
                        <div class="p-2 bg-orange-500/20 rounded-lg mr-3">
                            <i data-lucide="network" class="w-5 h-5 text-orange-400"></i>
                        </div>
                        <h3 class="text-white font-semibold">網路連線</h3>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-gray-400 text-sm mb-2">API 延遲閾值 (ms)</label>
                            <div class="flex items-center space-x-2">
                                <input type="number" value="500" class="w-20 bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-center input-focus">
                                <span class="text-gray-500">ms</span>
                            </div>
                        </div>
                        <div>
                            <label class="block text-gray-400 text-sm mb-2">離線機台數閾值</label>
                            <div class="flex items-center space-x-2">
                                <input type="number" value="3" class="w-20 bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-center input-focus">
                                <span class="text-gray-500">台</span>
                            </div>
                        </div>
                        <div>
                            <label class="block text-gray-400 text-sm mb-2">心跳超時閾值 (秒)</label>
                            <div class="flex items-center space-x-2">
                                <input type="number" value="30" class="w-20 bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-center input-focus">
                                <span class="text-gray-500">秒</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="glass-card rounded-2xl p-6">
                    <div class="flex items-center mb-4">
                        <div class="p-2 bg-yellow-500/20 rounded-lg mr-3">
                            <i data-lucide="wallet" class="w-5 h-5 text-yellow-400"></i>
                        </div>
                        <h3 class="text-white font-semibold">交易監控</h3>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-gray-400 text-sm mb-2">異常交易閾值 ($)</label>
                            <div class="flex items-center space-x-2">
                                <span class="text-gray-500">$</span>
                                <input type="number" value="10000" class="w-24 bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-center input-focus">
                            </div>
                        </div>
                        <div>
                            <label class="block text-gray-400 text-sm mb-2">單日充值上限 ($)</label>
                            <div class="flex items-center space-x-2">
                                <span class="text-gray-500">$</span>
                                <input type="number" value="50000" class="w-24 bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-center input-focus">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="glass-card rounded-2xl p-6">
                    <div class="flex items-center mb-4">
                        <div class="p-2 bg-purple-500/20 rounded-lg mr-3">
                            <i data-lucide="gamepad-2" class="w-5 h-5 text-purple-400"></i>
                        </div>
                        <h3 class="text-white font-semibold">遊戲異常</h3>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-gray-400 text-sm mb-2">派彩異常閾值 (%)</label>
                            <div class="flex items-center space-x-2">
                                <input type="number" value="5" class="w-20 bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-center input-focus">
                                <span class="text-gray-500">%</span>
                            </div>
                        </div>
                        <div>
                            <label class="block text-gray-400 text-sm mb-2">API 失敗率閾值 (%)</label>
                            <div class="flex items-center space-x-2">
                                <input type="number" value="10" class="w-20 bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-center input-focus">
                                <span class="text-gray-500">%</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="glass-card rounded-2xl p-6">
                <h3 class="text-white font-semibold mb-4">通知設定</h3>
                <div class="space-y-4">
                    <div class="flex items-center justify-between p-4 bg-dark-bg rounded-xl">
                        <div>
                            <p class="text-white font-medium">啟用 Email 通知</p>
                            <p class="text-gray-500 text-sm">當觸發告警時發送 Email</p>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" class="sr-only peer" checked>
                            <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-purple-600"></div>
                        </label>
                    </div>
                    <div class="flex items-center justify-between p-4 bg-dark-bg rounded-xl">
                        <div>
                            <p class="text-white font-medium">啟用系統推播</p>
                            <p class="text-gray-500 text-sm">在系統內顯示告警通知</p>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" class="sr-only peer" checked>
                            <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-purple-600"></div>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_alert_threshold.html');
        lucide.createIcons();
    </script>
</body>
</html>
