<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多人遊戲異常告警 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .glass-card:hover { border-color: rgba(168, 85, 247, 0.4); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 30px rgba(168, 85, 247, 0.2); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        
        
        
        
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3), 0 0 20px rgba(168, 85, 247, 0.2); }
        .pulse-dot { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .table-row-hover:hover { background: linear-gradient(90deg, rgba(124, 58, 237, 0.1), transparent); }
        
        
        
        
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <div class="flex items-center">
                <h2 class="text-lg font-semibold text-white">多人遊戲異常告警</h2>
                <span class="ml-3 px-2 py-1 bg-red-600/20 text-red-400 text-xs rounded-full flex items-center">
                    <span class="w-2 h-2 bg-red-500 rounded-full mr-1 pulse-dot"></span>12 筆未處理
                </span>
            </div>
            <div class="flex items-center space-x-3">
                <select class="bg-dark-bg border border-dark-border rounded-lg py-2 px-4 text-sm text-white">
                    <option>所有異常</option>
                    <option>連線異常</option>
                    <option>派彩異常</option>
                    <option>超時異常</option>
                </select>
                <button class="px-4 py-2 bg-green-600/20 border border-green-600/50 text-green-400 rounded-lg flex items-center">
                    <i data-lucide="check-circle" class="w-4 h-4 mr-2"></i>全部已讀
                </button>
            </div>
        </header>
        <div class="flex-1 overflow-y-auto p-6">
            <div class="grid grid-cols-4 gap-4 mb-6">
                <div class="glass-card rounded-xl p-4 border-l-4 border-red-500">
                    <div class="flex items-center justify-between"><span class="text-gray-400 text-sm">連線異常</span><i data-lucide="wifi-off" class="w-5 h-5 text-red-400"></i></div>
                    <p class="font-mono text-2xl text-white mt-2">5</p>
                </div>
                <div class="glass-card rounded-xl p-4 border-l-4 border-yellow-500">
                    <div class="flex items-center justify-between"><span class="text-gray-400 text-sm">派彩異常</span><i data-lucide="alert-triangle" class="w-5 h-5 text-yellow-400"></i></div>
                    <p class="font-mono text-2xl text-white mt-2">4</p>
                </div>
                <div class="glass-card rounded-xl p-4 border-l-4 border-orange-500">
                    <div class="flex items-center justify-between"><span class="text-gray-400 text-sm">超時異常</span><i data-lucide="clock" class="w-5 h-5 text-orange-400"></i></div>
                    <p class="font-mono text-2xl text-white mt-2">2</p>
                </div>
                <div class="glass-card rounded-xl p-4 border-l-4 border-blue-500">
                    <div class="flex items-center justify-between"><span class="text-gray-400 text-sm">荷官異常</span><i data-lucide="user-x" class="w-5 h-5 text-blue-400"></i></div>
                    <p class="font-mono text-2xl text-white mt-2">1</p>
                </div>
            </div>
            <div class="glass-card rounded-2xl overflow-hidden">
                <table class="w-full">
                    <thead class="bg-dark-bg">
                        <tr>
                            <th class="text-left py-3 px-4 text-xs text-gray-400 font-medium">時間</th>
                            <th class="text-left py-3 px-4 text-xs text-gray-400 font-medium">牌桌</th>
                            <th class="text-left py-3 px-4 text-xs text-gray-400 font-medium">類型</th>
                            <th class="text-left py-3 px-4 text-xs text-gray-400 font-medium">描述</th>
                            <th class="text-left py-3 px-4 text-xs text-gray-400 font-medium">狀態</th>
                            <th class="text-left py-3 px-4 text-xs text-gray-400 font-medium">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="border-t border-dark-border table-row-hover">
                            <td class="py-3 px-4 font-mono text-sm text-gray-400">14:32:15</td>
                            <td class="py-3 px-4 text-white">BACCARAT-007</td>
                            <td class="py-3 px-4"><span class="px-2 py-1 bg-red-600/20 text-red-400 text-xs rounded">連線異常</span></td>
                            <td class="py-3 px-4 text-gray-300">與 SDK 通訊逾時 &gt; 30秒</td>
                            <td class="py-3 px-4"><span class="px-2 py-1 bg-yellow-600/20 text-yellow-400 text-xs rounded">處理中</span></td>
                            <td class="py-3 px-4"><button class="text-cyber-400 hover:text-white text-sm">查看</button></td>
                        </tr>
                        <tr class="border-t border-dark-border table-row-hover">
                            <td class="py-3 px-4 font-mono text-sm text-gray-400">14:28:42</td>
                            <td class="py-3 px-4 text-white">DRAGON_TIGER-012</td>
                            <td class="py-3 px-4"><span class="px-2 py-1 bg-yellow-600/20 text-yellow-400 text-xs rounded">派彩異常</span></td>
                            <td class="py-3 px-4 text-gray-300">派彩金額與結果不符</td>
                            <td class="py-3 px-4"><span class="px-2 py-1 bg-gray-600/20 text-gray-400 text-xs rounded">待處理</span></td>
                            <td class="py-3 px-4"><button class="text-cyber-400 hover:text-white text-sm">查看</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <script>
        lucide.createIcons();

        function toggleSidebarGroup(header) {
            const group = header.parentElement;
            const submenu = group.querySelector('.sidebar-submenu');
            if (group.classList.contains('open')) {
                group.classList.remove('open');
                submenu.classList.remove('open');
            } else {
                group.classList.add('open');
                submenu.classList.add('open');
            }
        }
    </script>
<script src="js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_multiplayer_alerts.html');
    </script>
</body>
</html>
