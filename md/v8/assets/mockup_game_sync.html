<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲同步管理 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .glass-card:hover { border-color: rgba(168, 85, 247, 0.4); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 30px rgba(168, 85, 247, 0.2); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        
        
        
        
        .table-row-hover:hover { background: linear-gradient(90deg, rgba(124, 58, 237, 0.1), transparent); }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3), 0 0 20px rgba(168, 85, 247, 0.2); }
        
        
        
        
        
        
        /* 側邊欄折疊樣式 */
        
        .sidebar-collapsed .sidebar-text,
        .sidebar-collapsed .sidebar-group-header span { display: none; }
        .sidebar-collapsed 
        .sidebar-collapsed .sidebar-link i { margin-right: 0; }
        
        
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <h2 class="text-lg font-semibold text-white">遊戲同步管理</h2>
            <div class="flex items-center space-x-4">
                <button class="flex items-center px-3 py-2 bg-purple-500/20 text-purple-400 rounded-lg hover:bg-purple-500/30">
                    <i data-lucide="refresh-cw" class="w-4 h-4 mr-2"></i>
                    <span>手動同步</span>
                </button>
            </div>
        </header>
        <div class="flex-1 overflow-y-auto p-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
                <div class="glass-card rounded-2xl p-5">
                    <h3 class="text-gray-400 text-base mb-2">待同步遊戲</h3>
                    <p class="text-2xl font-bold text-white font-mono">15</p>
                </div>
                <div class="glass-card rounded-2xl p-5">
                    <h3 class="text-gray-400 text-base mb-2">同步中</h3>
                    <p class="text-2xl font-bold text-blue-400 font-mono">3</p>
                </div>
                <div class="glass-card rounded-2xl p-5">
                    <h3 class="text-gray-400 text-base mb-2">同步完成</h3>
                    <p class="text-2xl font-bold text-green-400 font-mono">287</p>
                </div>
                <div class="glass-card rounded-2xl p-5">
                    <h3 class="text-gray-400 text-base mb-2">同步失敗</h3>
                    <p class="text-2xl font-bold text-red-400 font-mono">2</p>
                </div>
            </div>
            <div class="glass-card rounded-2xl p-6 mb-6">
                <h3 class="text-white font-semibold mb-4">同步任務列表</h3>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="text-left text-base text-gray-400 border-b border-dark-border">
                                <th class="pb-3 font-medium">遊戲商</th>
                                <th class="pb-3 font-medium">遊戲名稱</th>
                                <th class="pb-3 font-medium">遊戲ID</th>
                                <th class="pb-3 font-medium">狀態</th>
                                <th class="pb-3 font-medium">進度</th>
                                <th class="pb-3 font-medium">建立時間</th>
                                <th class="pb-3 font-medium">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr class="table-row-hover border-b border-dark-border/50">
                                <td class="py-4 text-gray-300">PT 電子</td>
                                <td class="py-4 text-white">黃金時代</td>
                                <td class="py-4 text-gray-400 font-mono">PT-001</td>
                                <td class="py-4"><span class="bg-blue-500/20 text-blue-400 text-xs px-2 py-1 rounded-full">同步中</span></td>
                                <td class="py-4"><div class="w-24 bg-gray-700 rounded-full h-2"><div class="bg-blue-500 h-2 rounded-full" style="width: 65%"></div></div><span class="text-xs text-gray-400">65%</span></td>
                                <td class="py-4 text-gray-400 text-base">2026-03-04 08:15</td>
                                <td class="py-4"><button class="p-2 text-gray-400 hover:text-white"><i data-lucide="x" class="w-4 h-4"></i></button></td>
                            </tr>
                            <tr class="table-row-hover border-b border-dark-border/50">
                                <td class="py-4 text-gray-300">MG 電子</td>
                                <td class="py-4 text-white">超市大亨</td>
                                <td class="py-4 text-gray-400 font-mono">MG-023</td>
                                <td class="py-4"><span class="bg-green-500/20 text-green-400 text-xs px-2 py-1 rounded-full">完成</span></td>
                                <td class="py-4"><div class="w-24 bg-gray-700 rounded-full h-2"><div class="bg-green-500 h-2 rounded-full" style="width: 100%"></div></div><span class="text-xs text-gray-400">100%</span></td>
                                <td class="py-4 text-gray-400 text-base">2026-03-04 08:10</td>
                                <td class="py-4"><button class="p-2 text-gray-400 hover:text-white"><i data-lucide="eye" class="w-4 h-4"></i></button></td>
                            </tr>
                            <tr class="table-row-hover border-b border-dark-border/50">
                                <td class="py-4 text-gray-300">PP 電子</td>
                                <td class="py-4 text-white">糖果派對</td>
                                <td class="py-4 text-gray-400 font-mono">PP-045</td>
                                <td class="py-4"><span class="bg-red-500/20 text-red-400 text-xs px-2 py-1 rounded-full">失敗</span></td>
                                <td class="py-4"><div class="w-24 bg-gray-700 rounded-full h-2"><div class="bg-red-500 h-2 rounded-full" style="width: 30%"></div></div><span class="text-xs text-gray-400">30%</span></td>
                                <td class="py-4 text-gray-400 text-base">2026-03-04 08:05</td>
                                <td class="py-4"><button class="p-2 text-blue-400 hover:text-blue-300"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="glass-card rounded-2xl p-6">
                <h3 class="text-white font-semibold mb-4">同步設定</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-gray-400 text-base mb-2">自動同步間隔</label>
                        <select class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2 text-white input-focus">
                            <option>每小時</option>
                            <option selected>每6小時</option>
                            <option>每日</option>
                            <option>關閉</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-400 text-base mb-2">同步失敗重試次數</label>
                        <select class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2 text-white input-focus">
                            <option>1次</option>
                            <option selected>3次</option>
                            <option>5次</option>
                        </select>
                    </div>
                    <div class="md:col-span-2 flex items-center justify-between">
                        <div>
                            <p class="text-white font-medium">自動同步遊戲餘額</p>
                            <p class="text-gray-500 text-base">當玩家餘額變化時自動同步</p>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" class="sr-only peer" checked>
                            <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-purple-600"></div>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        function toggleSidebarGroup(header) {
            const group = header.parentElement;
            const submenu = group.querySelector('.sidebar-submenu');
            group.classList.toggle('open');
            submenu.classList.toggle('open');
        }
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const btn = document.querySelector('.sidebar-toggle-btn');
            sidebar.classList.toggle('sidebar-collapsed');
            btn.classList.toggle('collapsed');
            const icon = btn.querySelector('i');
            if (sidebar.classList.contains('sidebar-collapsed')) {
                icon.setAttribute('data-lucide', 'panel-left-open');
            } else {
                icon.setAttribute('data-lucide', 'panel-left-close');
            }
            lucide.createIcons();
        }
        lucide.createIcons();
    </script>
    <script src="js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_game_sync.html');
    </script>
</body>
</html>
