<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTA 遠端版本派送</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        body { font-family: 'Roboto', 'Noto Sans TC', sans-serif; background-color: #F4F7F6; }
    </style>
</head>

<body class="bg-slate-50 flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-gradient-to-b from-slate-900 to-indigo-950 text-white flex flex-col border-r border-slate-800 shadow-2xl relative h-full">
        <div class="h-16 flex items-center justify-center border-b border-[#303F9F]">
            <h1 class="text-xl font-bold tracking-wider">GAME PLATFORM</h1>
            <span class="ml-2 text-xs bg-yellow-500 text-yellow-900 px-1 py-0.5 rounded font-bold">PRO</span>
        </div>
        <nav class="flex-1 py-4 space-y-1">
            <a href="#"
                class="block px-6 py-3 text-indigo-200 hover:bg-white/10 hover:text-white transition-all duration-300">儀表板</a>
            <a href="#" class="block px-6 py-3 bg-white/10 backdrop-blur-md text-white border-l-4 border-cyan-400 font-bold shadow-inner relative overflow-hidden">OTA
                版本更新</a>
            <a href="#"
                class="block px-6 py-3 text-indigo-200 hover:bg-white/10 hover:text-white transition-all duration-300">硬體監控中心</a>
            <a href="#"
                class="block px-6 py-3 text-indigo-200 hover:bg-white/10 hover:text-white transition-all duration-300">爭議帳單管理</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <header class="h-16 bg-white/80 backdrop-blur-xl border-b border-white/20 sticky top-0 z-50 shadow-sm flex items-center justify-between px-8">
            <h2 class="text-xl font-bold text-slate-800">OTA 遠端版本派送</h2>
        </header>

        <div class="flex-1 p-8 overflow-hidden flex flex-col">
            <div class="bg-white rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100/60 transition-all duration-300 hover:shadow-[0_8px_30px_rgb(0,0,0,0.08)] flex-1 flex flex-col overflow-hidden p-6">
                <!-- Action Bar -->
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-bold text-slate-800 flex items-center">
                        <span class="w-2 h-6 bg-[#5C6BC0] rounded-sm mr-2"></span> 版本列表
                    </h3>
                    <button
                        class="px-5 py-2.5 bg-gradient-to-r from-indigo-600 to-cyan-500 text-white rounded-xl text-sm font-medium shadow-lg shadow-indigo-500/30 hover:shadow-cyan-500/40 hover:-translate-y-0.5 transition-all duration-300 flex items-center">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                        </svg>
                        上傳新版本
                    </button>
                </div>

                <div class="flex-1 overflow-auto border border-slate-200 rounded-lg">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50 border-b border-slate-200">
                            <tr>
                                <th class="py-3 px-6 text-sm font-semibold text-slate-600 tracking-wider">版本號</th>
                                <th class="py-3 px-6 text-sm font-semibold text-slate-600 tracking-wider">上傳時間</th>
                                <th class="py-3 px-6 text-sm font-semibold text-slate-600 tracking-wider">MD5校驗碼</th>
                                <th class="py-3 px-6 text-sm font-semibold text-slate-600 tracking-wider text-center">狀態
                                </th>
                                <th class="py-3 px-6 text-sm font-semibold text-slate-600 tracking-wider text-center">
                                    機台覆蓋率</th>
                                <th class="py-3 px-6 text-sm font-semibold text-slate-600 tracking-wider text-right">操作
                                </th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 bg-white">
                            <tr class="hover:bg-slate-50">
                                <td class="py-4 px-6 text-sm font-bold text-[#3949AB]">v2.1.0</td>
                                <td class="py-4 px-6 text-sm text-slate-600">2026/02/20 14:00</td>
                                <td class="py-4 px-6 text-xs text-slate-400 font-mono hidden md:table-cell">
                                    d41d8cd98f00b204e98...</td>
                                <td class="py-4 px-6 text-sm text-center"><span
                                        class="px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full text-xs font-bold">已發佈</span>
                                </td>
                                <td class="py-4 px-6 text-sm text-center">
                                    <div class="flex items-center justify-center">
                                        <div class="w-24 bg-gray-200 rounded-full h-2.5 mr-2">
                                            <div class="bg-[#3F51B5] h-2.5 rounded-full" style="width: 90%"></div>
                                        </div>
                                        <span class="text-sm font-medium text-gray-700">45/50</span>
                                    </div>
                                </td>
                                <td class="py-4 px-6 text-right">
                                    <button
                                        class="text-white bg-[#3F51B5] hover:bg-[#3949AB] px-3 py-1.5 rounded text-sm font-medium mr-2">強制推送</button>
                                    <button
                                        class="text-slate-600 hover:text-slate-900 border border-slate-300 px-3 py-1.5 rounded text-sm font-medium">查看</button>
                                </td>
                            </tr>
                            <tr class="hover:bg-slate-50">
                                <td class="py-4 px-6 text-sm font-bold text-gray-700">v2.0.5</td>
                                <td class="py-4 px-6 text-sm text-slate-600">2026/02/15 09:30</td>
                                <td class="py-4 px-6 text-xs text-slate-400 font-mono hidden md:table-cell">
                                    e0d123e5f316bef78...</td>
                                <td class="py-4 px-6 text-sm text-center"><span
                                        class="px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full text-xs font-bold">已發佈</span>
                                </td>
                                <td class="py-4 px-6 text-sm text-center">
                                    <div class="flex items-center justify-center">
                                        <div class="w-24 bg-gray-200 rounded-full h-2.5 mr-2">
                                            <div class="bg-emerald-500 h-2.5 rounded-full" style="width: 100%"></div>
                                        </div>
                                        <span class="text-sm font-medium text-gray-700">50/50</span>
                                    </div>
                                </td>
                                <td class="py-4 px-6 text-right">
                                    <button
                                        class="text-slate-600 hover:text-slate-900 border border-slate-300 px-3 py-1.5 rounded text-sm font-medium">查看</button>
                                </td>
                            </tr>
                            <tr class="hover:bg-slate-50">
                                <td class="py-4 px-6 text-sm font-bold text-slate-400 line-through">v2.0.4</td>
                                <td class="py-4 px-6 text-sm text-slate-400">2026/02/10 11:20</td>
                                <td class="py-4 px-6 text-xs text-slate-400 font-mono hidden md:table-cell">
                                    b89d5f78c4331...</td>
                                <td class="py-4 px-6 text-sm text-center"><span
                                        class="px-3 py-1 bg-red-100 text-red-700 rounded-full text-xs font-bold">已撤回</span>
                                </td>
                                <td class="py-4 px-6 text-sm text-center text-slate-400">-</td>
                                <td class="py-4 px-6 text-right">
                                    <button
                                        class="text-indigo-600 hover:text-[#283593] font-medium text-sm border-b border-[#3F51B5]">重新發布</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
