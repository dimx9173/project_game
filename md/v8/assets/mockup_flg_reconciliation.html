<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爭議帳單與沖銷</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        body { font-family: 'Roboto', 'Noto Sans TC', sans-serif; background-color: #F4F7F6; }
    </style>
</head>

<body class="bg-[#F4F7F6] flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-[#283593] text-white flex flex-col h-full">
        <div class="h-16 flex items-center justify-center border-b border-[#303F9F]">
            <h1 class="text-xl font-bold tracking-wider">GAME PLATFORM</h1>
            <span class="ml-2 text-xs bg-yellow-500 text-yellow-900 px-1 py-0.5 rounded font-bold">PRO</span>
        </div>
        <nav class="flex-1 py-4 space-y-1">
            <a href="#"
                class="block px-6 py-3 text-[#C5CAE9] hover:bg-[#303F9F] hover:text-white transition-colors">儀表板</a>
            <a href="#"
                class="block px-6 py-3 text-[#C5CAE9] hover:bg-[#303F9F] hover:text-white transition-colors">硬體監控中心</a>
            <a href="#" class="block px-6 py-3 bg-[#303F9F] text-white border-l-4 border-white font-medium">對帳與爭議處理</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8">
            <h2 class="text-xl font-bold text-gray-800">爭議款追蹤專區 (Audit & Reconciliation)</h2>
        </header>

        <div class="flex-1 p-8 overflow-hidden flex flex-col">
            <div class="flex space-x-6 mb-6">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex-1">
                    <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                        <span class="w-2 h-6 bg-red-500 rounded-sm mr-2"></span> 待處理爭議單
                    </h3>
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-[#F4F7F6] border-b border-gray-200">
                            <tr>
                                <th class="py-2 px-4 text-xs font-semibold text-gray-600">機台</th>
                                <th class="py-2 px-4 text-xs font-semibold text-gray-600 text-right">金額</th>
                                <th class="py-2 px-4 text-xs font-semibold text-gray-600">異常原因</th>
                                <th class="py-2 px-4 text-xs font-semibold text-gray-600 text-center">狀態</th>
                                <th class="py-2 px-4 text-xs font-semibold text-gray-600 text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">
                            <tr>
                                <td class="py-3 px-4 font-bold">A-01</td>
                                <td class="py-3 px-4 text-right font-bold text-red-600">$500</td>
                                <td class="py-3 px-4 text-sm">網路中斷掉單</td>
                                <td class="py-3 px-4 text-center"><span
                                        class="px-2 py-1 bg-red-100 text-red-700 text-xs font-bold rounded">待處理</span>
                                </td>
                                <td class="py-3 px-4 text-right">
                                    <button
                                        class="bg-[#3F51B5] text-white px-3 py-1 rounded text-sm hover:bg-[#3949AB]">沖銷重作</button>
                                </td>
                            </tr>
                            <tr>
                                <td class="py-3 px-4 font-bold">A-03</td>
                                <td class="py-3 px-4 text-right font-bold text-orange-600">$200</td>
                                <td class="py-3 px-4 text-sm">玩家客訴未進分</td>
                                <td class="py-3 px-4 text-center"><span
                                        class="px-2 py-1 bg-orange-100 text-orange-700 text-xs font-bold rounded">調查中</span>
                                </td>
                                <td class="py-3 px-4 text-right">
                                    <button
                                        class="bg-white border border-gray-300 px-3 py-1 rounded text-sm">查看</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Action Panel -->
                <div
                    class="bg-white p-6 rounded-xl shadow border border-[#C5CAE9] w-1/3 bg-gradient-to-br from-white to-indigo-50 flex flex-col">
                    <h3
                        class="text-lg font-bold text-[#283593] mb-4 flex items-center border-b border-indigo-100 pb-2">
                        產生沖銷會計憑證
                    </h3>
                    <div class="space-y-4 flex-1">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">對應問題帳單 ID</label>
                            <input type="text" value="TRX-20260225-8842"
                                class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none font-mono text-sm"
                                readonly>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">沖銷金額 (退回玩家)</label>
                            <input type="text" value="$500"
                                class="w-full p-2 border border-red-300 text-red-700 font-bold rounded focus:ring-2 focus:ring-red-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">沖銷原因註記</label>
                            <textarea
                                class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none text-sm"
                                rows="3">經查核監視器，玩家確實投入$500，因當下斷網導致單機資料庫未正確上傳，原廠已核准進行手動沖銷補分。</textarea>
                        </div>
                    </div>
                    <button
                        class="w-full py-3 mt-4 bg-[#3F51B5] text-white rounded-lg font-bold shadow-md hover:bg-[#3949AB]">產生沖銷紀錄並結案</button>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
