<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 連線監控 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="css/mockup-common.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .glass-card:hover { border-color: rgba(168, 85, 247, 0.4); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 30px rgba(168, 85, 247, 0.2); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        .table-row-hover:hover { background: linear-gradient(90deg, rgba(124, 58, 237, 0.1), transparent); }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3), 0 0 20px rgba(168, 85, 247, 0.2); }
        .badge-local { background: #10b981; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
        .badge-central { background: #8b5cf6; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <h2 class="text-lg font-semibold text-white">API 連線狀態監控</h2>
            <div class="flex items-center space-x-4">
                <button class="flex items-center px-3 py-2 bg-purple-500/20 text-purple-400 rounded-lg hover:bg-purple-500/30">
                    <i data-lucide="refresh-cw" class="w-4 h-4 mr-2"></i>
                    <span>重新整理</span>
                </button>
                <button class="relative text-gray-400 hover:text-white"><i data-lucide="bell" class="w-5 h-5"></i><span class="absolute -top-1 -right-1 w-2 h-2 bg-purple-500 rounded-full"></span></button>
            </div>
        </header>
        <div class="flex-1 overflow-y-auto p-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
                <div class="glass-card rounded-2xl p-5">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-white font-semibold">正常</h3>
                        <span class="bg-green-500/20 text-green-400 text-xs px-2 py-1 rounded-full">8</span>
                    </div>
                    <p class="text-3xl font-bold text-green-400 font-mono">8</p>
                </div>
                <div class="glass-card rounded-2xl p-5">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-white font-semibold">延遲</h3>
                        <span class="bg-yellow-500/20 text-yellow-400 text-xs px-2 py-1 rounded-full">2</span>
                    </div>
                    <p class="text-3xl font-bold text-yellow-400 font-mono">2</p>
                </div>
                <div class="glass-card rounded-2xl p-5">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-white font-semibold">離線</h3>
                        <span class="bg-red-500/20 text-red-400 text-xs px-2 py-1 rounded-full">1</span>
                    </div>
                    <p class="text-3xl font-bold text-red-400 font-mono">1</p>
                </div>
                <div class="glass-card rounded-2xl p-5">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-white font-semibold">API 延遲</h3>
                        <span class="text-gray-400 text-xs">平均</span>
                    </div>
                    <p class="text-3xl font-bold text-white font-mono">45ms</p>
                </div>
            </div>
            <div class="glass-card rounded-2xl p-6 mb-6">
                <h3 class="text-white font-semibold mb-4">遊戲商 API 狀態</h3>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="text-left text-sm text-gray-400 border-b border-dark-border">
                                <th class="pb-3 font-medium">遊戲商</th>
                                <th class="pb-3 font-medium">狀態</th>
                                <th class="pb-3 font-medium">回應時間</th>
                                <th class="pb-3 font-medium">成功率</th>
                                <th class="pb-3 font-medium">最後連線</th>
                                <th class="pb-3 font-medium">遊戲數</th>
                                <th class="pb-3 font-medium">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr class="table-row-hover border-b border-dark-border/50">
                                <td class="py-4">
                                    <div class="flex items-center">
                                        <div class="w-8 h-8 rounded-lg bg-blue-500/20 flex items-center justify-center mr-3">
                                            <i data-lucide="gamepad-2" class="w-4 h-4 text-blue-400"></i>
                                        </div>
                                        <span class="text-white font-medium">PT 電子</span>
                                    </div>
                                </td>
                                <td class="py-4"><span class="bg-green-500/20 text-green-400 text-xs px-2 py-1 rounded-full">正常</span></td>
                                <td class="py-4 text-gray-300 font-mono">32ms</td>
                                <td class="py-4"><div class="flex items-center"><div class="w-16 bg-gray-700 rounded-full h-2 mr-2"><div class="bg-green-500 h-2 rounded-full" style="width: 99.8%"></div></div><span class="text-green-400 text-sm">99.8%</span></div></td>
                                <td class="py-4 text-gray-400 text-sm">2秒前</td>
                                <td class="py-4 text-gray-300">45</td>
                                <td class="py-4">
                                    <div class="flex space-x-2">
                                        <button class="p-2 bg-blue-500/20 text-blue-400 rounded-lg hover:bg-blue-500/30" title="測試連線"><i data-lucide="wifi" class="w-4 h-4"></i></button>
                                        <button class="p-2 bg-gray-500/20 text-gray-400 rounded-lg hover:bg-gray-500/30" title="設定"><i data-lucide="settings" class="w-4 h-4"></i></button>
                                    </div>
                                </td>
                            </tr>
                            <tr class="table-row-hover border-b border-dark-border/50">
                                <td class="py-4">
                                    <div class="flex items-center">
                                        <div class="w-8 h-8 rounded-lg bg-purple-500/20 flex items-center justify-center mr-3">
                                            <i data-lucide="gamepad-2" class="w-4 h-4 text-purple-400"></i>
                                        </div>
                                        <span class="text-white font-medium">MG 電子</span>
                                    </div>
                                </td>
                                <td class="py-4"><span class="bg-green-500/20 text-green-400 text-xs px-2 py-1 rounded-full">正常</span></td>
                                <td class="py-4 text-gray-300 font-mono">45ms</td>
                                <td class="py-4"><div class="flex items-center"><div class="w-16 bg-gray-700 rounded-full h-2 mr-2"><div class="bg-green-500 h-2 rounded-full" style="width: 99.5%"></div></div><span class="text-green-400 text-sm">99.5%</span></div></td>
                                <td class="py-4 text-gray-400 text-sm">5秒前</td>
                                <td class="py-4 text-gray-300">120</td>
                                <td class="py-4">
                                    <div class="flex space-x-2">
                                        <button class="p-2 bg-blue-500/20 text-blue-400 rounded-lg hover:bg-blue-500/30" title="測試連線"><i data-lucide="wifi" class="w-4 h-4"></i></button>
                                        <button class="p-2 bg-gray-500/20 text-gray-400 rounded-lg hover:bg-gray-500/30" title="設定"><i data-lucide="settings" class="w-4 h-4"></i></button>
                                    </div>
                                </td>
                            </tr>
                            <tr class="table-row-hover border-b border-dark-border/50">
                                <td class="py-4">
                                    <div class="flex items-center">
                                        <div class="w-8 h-8 rounded-lg bg-orange-500/20 flex items-center justify-center mr-3">
                                            <i data-lucide="gamepad-2" class="w-4 h-4 text-orange-400"></i>
                                        </div>
                                        <span class="text-white font-medium">PP 電子</span>
                                    </div>
                                </td>
                                <td class="py-4"><span class="bg-yellow-500/20 text-yellow-400 text-xs px-2 py-1 rounded-full">延遲</span></td>
                                <td class="py-4 text-orange-400 font-mono">850ms</td>
                                <td class="py-4"><div class="flex items-center"><div class="w-16 bg-gray-700 rounded-full h-2 mr-2"><div class="bg-yellow-500 h-2 rounded-full" style="width: 95%"></div></div><span class="text-sm">95%-yellow-400 text</span></div></td>
                                <td class="py-4 text-gray-400 text-sm">12秒前</td>
                                <td class="py-4 text-gray-300">200</td>
                                <td class="py-4">
                                    <div class="flex space-x-2">
                                        <button class="p-2 bg-blue-500/20 text-blue-400 rounded-lg hover:bg-blue-500/30" title="測試連線"><i data-lucide="wifi" class="w-4 h-4"></i></button>
                                        <button class="p-2 bg-gray-500/20 text-gray-400 rounded-lg hover:bg-gray-500/30" title="設定"><i data-lucide="settings" class="w-4 h-4"></i></button>
                                    </div>
                                </td>
                            </tr>
                            <tr class="table-row-hover border-b border-dark-border/50">
                                <td class="py-4">
                                    <div class="flex items-center">
                                        <div class="w-8 h-8 rounded-lg bg-red-500/20 flex items-center justify-center mr-3">
                                            <i data-lucide="gamepad-2" class="w-4 h-4 text-red-400"></i>
                                        </div>
                                        <span class="text-white font-medium">真人百家</span>
                                    </div>
                                </td>
                                <td class="py-4"><span class="bg-red-500/20 text-red-400 text-xs px-2 py-1 rounded-full">離線</span></td>
                                <td class="py-4 text-red-400 font-mono">--</td>
                                <td class="py-4"><div class="flex items-center"><div class="w-16 bg-gray-700 rounded-full h-2 mr-2"><div class="bg-red-500 h-2 rounded-full" style="width: 0%"></div></div><span class="text-red-400 text-sm">0%</span></div></td>
                                <td class="py-4 text-gray-400 text-sm">2小時前</td>
                                <td class="py-4 text-gray-300">25</td>
                                <td class="py-4">
                                    <div class="flex space-x-2">
                                        <button class="p-2 bg-green-500/20 text-green-400 rounded-lg hover:bg-green-500/30" title="重新連線"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
                                        <button class="p-2 bg-gray-500/20 text-gray-400 rounded-lg hover:bg-gray-500/30" title="設定"><i data-lucide="settings" class="w-4 h-4"></i></button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="glass-card rounded-2xl p-6">
                <h3 class="text-white font-semibold mb-4">API 效能趨勢 (24小時)</h3>
                <div class="h-48 flex items-end space-x-2">
                    <div class="flex-1 bg-green-500/30 rounded-t hover:bg-green-500/50 transition" style="height: 80%"></div>
                    <div class="flex-1 bg-green-500/30 rounded-t500/50 transition hover:bg-green-" style="height: 75%"></div>
                    <div class="flex-1 bg-green-500/30 rounded-t hover:bg-green-500/50 transition" style="height: 85%"></div>
                    <div class="flex-1 bg-yellow-500/30 rounded-t hover:bg-yellow-500/50 transition" style="height: 60%"></div>
                    <div class="flex-1 bg-green-500/30 rounded-t hover:bg-green-500/50 transition" style="height: 90%"></div>
                    <div class="flex-1 bg-green-500/30 rounded-t hover:bg-green-500/50 transition" style="height: 88%"></div>
                    <div class="flex-1 bg-green-500/30 rounded-t hover:bg-green-500/50 transition" style="height: 92%"></div>
                    <div class="flex-1 bg-green-500/30 rounded-t hover:bg-green-500/50 transition" style="height: 78%"></div>
                </div>
                <div class="flex justify-between mt-2 text-xs text-gray-500">
                    <span>00:00</span><span>04:00</span>00</span><span>08:<span>12:00</span><span>16:00</span><span>20:00</span><span>24:00</span>
                </div>
            </div>
        </div>
    </main>
    <script src="js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_api_status_monitor.html');
        lucide.createIcons();
    </script>
</body>
</html>
