<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>備份與恢復 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        
        
        
        
        .table-row-hover:hover { background: linear-gradient(90deg, rgba(124, 58, 237, 0.1), transparent); }
        
        
        
        
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <h2 class="text-lg font-semibold text-white">系統設定 - 備份與恢復</h2>
        </header>
        <div class="flex-1 overflow-y-auto p-6">
            <div class="grid grid-cols-2 gap-6 mb-6">
                <div class="glass-card rounded-xl p-6">
                    <div class="flex items-center mb-4">
                        <div class="w-12 h-12 rounded-xl bg-purple-500/20 flex items-center justify-center mr-4">
                            <i data-lucide="upload-cloud" class="w-6 h-6 text-purple-400"></i>
                        </div>
                        <div>
                            <h3 class="font-semibold text-white">手動備份</h3>
                            <p class="text-xs text-gray-500">立即建立系統備份</p>
                        </div>
                    </div>
                    <button class="w-full py-3 gradient-purple text-white rounded-lg font-medium hover:opacity-90">
                        <i data-lucide="plus" class="w-4 h-4 inline mr-2"></i>建立備份
                    </button>
                </div>
                <div class="glass-card rounded-xl p-6">
                    <div class="flex items-center mb-4">
                        <div class="w-12 h-12 rounded-xl bg-emerald-500/20 flex items-center justify-center mr-4">
                            <i data-lucide="calendar" class="w-6 h-6 text-emerald-400"></i>
                        </div>
                        <div>
                            <h3 class="font-semibold text-white">自動排程</h3>
                            <p class="text-xs text-gray-500">每日凌晨 03:00 自動備份</p>
                        </div>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-sm text-gray-300">自動備份</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" checked class="sr-only peer">
                            <div class="w-11 h-6 bg-dark-bg rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-purple-600"></div>
                        </label>
                    </div>
                </div>
            </div>
            <div class="glass-card rounded-xl overflow-hidden">
                <div class="px-6 py-4 border-b border-dark-border">
                    <h3 class="font-semibold text-white">備份歷史</h3>
                </div>
                <table class="min-w-full">
                    <thead class="bg-dark-bg">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">備份名稱</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">類型</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">大小</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">建立時間</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-400 uppercase">操作</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-dark-border">
                        <tr class="table-row-hover">
                            <td class="px-6 py-4 text-white font-mono">backup_20260225_030000</td>
                            <td class="px-6 py-4"><span class="px-2 py-1 rounded text-xs bg-purple-500/20 text-purple-400">自動</span></td>
                            <td class="px-6 py-4 text-gray-300">2.4 GB</td>
                            <td class="px-6 py-4 text-gray-300">2026-02-25 03:00</td>
                            <td class="px-6 py-4 text-right">
                                <button class="text-purple-400 hover:text-white mr-3"><i data-lucide="download" class="w-4 h-4"></i></button>
                                <button class="text-gray-400 hover:text-white"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </td>
                        </tr>
                        <tr class="table-row-hover">
                            <td class="px-6 py-4 text-white font-mono">backup_20260224_030000</td>
                            <td class="px-6 py-4"><span class="px-2 py-1 rounded text-xs bg-purple-500/20 text-purple-400">自動</span></td>
                            <td class="px-6 py-4 text-gray-300">2.3 GB</td>
                            <td class="px-6 py-4 text-gray-300">2026-02-24 03:00</td>
                            <td class="px-6 py-4 text-right">
                                <button class="text-purple-400 hover:text-white mr-3"><i data-lucide="download" class="w-4 h-4"></i></button>
                                <button class="text-gray-400 hover:text-white"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </td>
                        </tr>
                        <tr class="table-row-hover">
                            <td class="px-6 py-4 text-white font-mono">backup_manual_20260223</td>
                            <td class="px-6 py-4"><span class="px-2 py-1 rounded text-xs bg-emerald-500/20 text-emerald-400">手動</span></td>
                            <td class="px-6 py-4 text-gray-300">2.5 GB</td>
                            <td class="px-6 py-4 text-gray-300">2026-02-23 15:30</td>
                            <td class="px-6 py-4 text-right">
                                <button class="text-purple-400 hover:text-white mr-3"><i data-lucide="download" class="w-4 h-4"></i></button>
                                <button class="text-gray-400 hover:text-white"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="glass-card rounded-xl p-6 mt-6">
                <h3 class="font-semibold text-white mb-4">恢復系統</h3>
                <p class="text-sm text-gray-400 mb-4">從備份檔案恢復系統資料。此操作會覆蓋目前資料。</p>
                <div class="flex space-x-4">
                    <button class="px-4 py-2 glass border border-dark-border rounded-lg text-sm text-gray-300 hover:text-white">
                        <i data-lucide="upload" class="w-4 h-4 inline mr-2"></i>上傳備份檔
                    </button>
                    <button class="px-4 py-2 bg-red-600/20 border border-red-500/30 rounded-lg text-sm text-red-400 hover:bg-red-600/30">
                        <i data-lucide="alert-triangle" class="w-4 h-4 inline mr-2"></i>重置系統
                    </button>
                </div>
            </div>
        </div>
    </main>
    <script>
        lucide.createIcons();

        function toggleSidebarGroup(header) {
            const group = header.parentElement;
            const submenu = group.querySelector('.sidebar-submenu');
            if (group.classList.contains('open')) {
                group.classList.remove('open');
                submenu.classList.remove('open');
            } else {
                group.classList.add('open');
                submenu.classList.add('open');
            }
        }
    </script>
<script src="js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_std_backup.html');
    </script>
</body>
</html>
