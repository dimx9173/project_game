<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>本地後台 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' },
                        local: { 50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7', 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857', 800: '#065f46', 900: '#064e3b' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(16, 185, 129, 0.3)', 'glow-sm': '0 0 15px rgba(16, 185, 129, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #059669 #0a0a0f; -webkit-tap-highlight-color: transparent; }
        *::-webkit-scrollbar { width: 4px; height: 4px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #10b981, #34d399); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; touch-action: manipulation; }
        .glass { background: rgba(18, 18, 26, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.95) 0%, rgba(30, 30, 46, 0.7) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.2); box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5); }
        .glass-card:active { transform: scale(0.98); border-color: rgba(16, 185, 129, 0.5); }
        .gradient-bg { background: linear-gradient(180deg, #0a0a0f 0%, #0a1a14 50%, #0a0a0f 100%); }
        .gradient-local { background: linear-gradient(135deg, #10b981 0%, #34d399 50%, #6ee7b7 100%); }
        .btn-touch { min-height: 56px; min-width: 56px; touch-action: manipulation; }
        .btn-touch:active { transform: scale(0.95); opacity: 0.9; }
        .badge-local { background: #10b981; color: white; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
        .badge-central { background: #8b5cf6; color: white; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.3), 0 0 20px rgba(16, 185, 129, 0.2); }
        .menu-slide { transform: translateX(-100%); transition: transform 0.3s ease; }
        .menu-slide.active { transform: translateX(0); }
        .overlay { opacity: 0; visibility: hidden; transition: opacity 0.3s ease; }
        .overlay.active { opacity: 1; visibility: visible; }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); } 50% { box-shadow: 0 0 25px rgba(16, 185, 129, 0.5); } }
        .status-online { animation: pulse-glow 2s infinite; }
    </style>
</head>
<body class="gradient-bg min-h-screen pb-24">
    <!-- 漢堡選單遮罩 -->
    <div id="overlay" class="overlay fixed inset-0 bg-black/60 z-40" onclick="toggleMenu()"></div>

    <!-- 側邊選單 -->
    <aside id="sidebar" class="menu-slide fixed left-0 top-0 bottom-0 w-72 bg-dark-sidebar border-r border-dark-border z-50 flex flex-col">
        <div class="h-16 flex items-center px-4 border-b border-dark-border">
            <div class="w-10 h-10 rounded-xl gradient-local flex items-center justify-center shadow-glow-sm mr-3 flex-shrink-0">
                <i data-lucide="laptop" class="w-5 h-5 text-white"></i>
            </div>
            <div>
                <span class="font-bold text-white">本地後台</span>
                <span class="text-xs text-gray-500 block">本地模式</span>
            </div>
        </div>
        <nav class="flex-1 py-4 px-3 space-y-1 overflow-y-auto">
    <!-- 儀表板 -->
    <a href="mockup_dashboard.html" class="sidebar-link flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="layout-dashboard" class="w-5 h-5 mr-3"></i><span>儀表板</span></a>

    <!-- 本地後台 -->
    <div class="sidebar-group">
        <div class="sidebar-group-header sidebar-has-submenu" onclick="toggleSidebarGroup(this)">
            <span><i data-lucide="monitor-play" class="w-4 h-4 inline mr-2"></i>本地後台</span>
        </div>
        <div class="sidebar-submenu">
            <a href="mockup_local_dashboard.html" class="sidebar-link flex items-center px-3 py-2 text-gray-400 hover:text-white rounded-lg text-sm"><span>本地儀表板</span></a>
            <a href="mockup_local_machine.html" class="sidebar-link flex items-center px-3 py-2 text-gray-400 hover:text-white rounded-lg text-sm"><span>機台管理</span></a>
            <a href="mockup_local_cash.html" class="sidebar-link flex items-center px-3 py-2 text-gray-400 hover:text-white rounded-lg text-sm"><span>現金交易</span></a>
            <a href="mockup_local_sync.html" class="sidebar-link flex items-center px-3 py-2 text-gray-400 hover:text-white rounded-lg text-sm"><span>資料同步</span></a>
        </div>
    </div>
</nav><div class="p-4 border-t border-dark-border">
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <div class="w-10 h-10 rounded-full gradient-local flex items-center justify-center flex-shrink-0">
                        <span class="text-sm font-bold text-white">L</span>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm font-medium text-white">單機本地後台</p>
                        <p class="text-xs text-gray-500">本地模式</p>
                    </div>
                </div>
                <a href="mockup_login.html" class="text-gray-400 hover:text-white p-2 touch-manipulation">
                    <i data-lucide="log-out" class="w-6 h-6"></i>
                </a>
            </div>
        </div>
    </aside>

    <!-- 主內容區 -->
    <main class="flex flex-col min-h-screen" id="main-content">
        <!-- 頂部 Header -->
        <header class="glass sticky top-0 z-30 border-b border-dark-border">
            <div class="flex items-center justify-between px-4 py-3">
                <div class="flex items-center">
                    <button onclick="toggleMenu()" class="btn-touch p-3 rounded-xl bg-dark-bg/50 text-white mr-3">
                        <i data-lucide="menu" class="w-7 h-7"></i>
                    </button>
                    <div>
                        <h1 class="text-lg font-bold text-white">本地後台</h1>
                        <div class="flex items-center text-xs text-emerald-400">
                            <span class="w-2 h-2 rounded-full bg-emerald-400 mr-1.5 animate-pulse"></span>
                            已連線
                        </div>
                    </div>
                </div>
                <button class="btn-touch p-3 rounded-xl bg-dark-bg/50 text-white relative">
                    <i data-lucide="bell" class="w-6 h-6"></i>
                    <span class="absolute top-1 right-1 w-2.5 h-2.5 bg-emerald-500 rounded-full border-2 border-dark-bg"></span>
                </button>
            </div>
        </header>

        <!-- 內容區 -->
        <div class="flex-1 p-4 space-y-4">
            <!-- 狀態卡片網格 -->
            <div class="grid grid-cols-2 gap-3">
                <div class="glass-card rounded-2xl p-4 cursor-pointer btn-touch active:scale-95">
                    <div class="flex justify-between items-start mb-3">
                        <div class="p-2 rounded-xl bg-emerald-500/20">
                            <i data-lucide="monitor" class="w-5 h-5 text-emerald-400"></i>
                        </div>
                        <span class="badge-local">本地</span>
                    </div>
                    <p class="text-xs text-gray-400">機台狀態</p>
                    <p class="text-xl font-bold text-white font-mono mt-1">45/50</p>
                    <p class="text-xs text-emerald-400 mt-1">90% 在線</p>
                </div>
                <div class="glass-card rounded-2xl p-4 cursor-pointer btn-touch active:scale-95">
                    <div class="flex justify-between items-start mb-3">
                        <div class="p-2 rounded-xl bg-emerald-500/20">
                            <i data-lucide="dollar-sign" class="w-5 h-5 text-emerald-400"></i>
                        </div>
                    </div>
                    <p class="text-xs text-gray-400">今日營收</p>
                    <p class="text-xl font-bold text-white font-mono mt-1">$45K</p>
                    <p class="text-xs text-green-400 mt-1">+8.5%</p>
                </div>
                <div class="glass-card rounded-2xl p-4 cursor-pointer btn-touch active:scale-95">
                    <div class="flex justify-between items-start mb-3">
                        <div class="p-2 rounded-xl bg-emerald-500/20">
                            <i data-lucide="wallet" class="w-5 h-5 text-emerald-400"></i>
                        </div>
                    </div>
                    <p class="text-xs text-gray-400">錢包餘額</p>
                    <p class="text-xl font-bold text-white font-mono mt-1">$128K</p>
                    <p class="text-xs text-emerald-400 mt-1">即時同步</p>
                </div>
                <div class="glass-card rounded-2xl p-4 cursor-pointer btn-touch active:scale-95 status-online">
                    <div class="flex justify-between items-start mb-3">
                        <div class="p-2 rounded-xl bg-emerald-500/20">
                            <i data-lucide="cloud" class="w-5 h-5 text-emerald-400"></i>
                        </div>
                    </div>
                    <p class="text-xs text-gray-400">同步狀態</p>
                    <p class="text-xl font-bold text-emerald-400 font-mono mt-1">正常</p>
                    <p class="text-xs text-gray-400 mt-1">30秒前</p>
                </div>
            </div>

            <!-- 開分/洗分 - 大按鈕區域 -->
            <div class="glass-card rounded-2xl p-5">
                <h3 class="font-semibold text-white flex items-center mb-4">
                    <i data-lucide="plus-circle" class="w-5 h-5 mr-2 text-emerald-400"></i>
                    開分/洗分
                    <span class="badge-local ml-2">本地</span>
                </h3>
                <div class="space-y-4">
                    <select class="w-full px-4 py-4 bg-dark-bg border border-dark-border rounded-xl text-white text-lg input-focus touch-manipulation">
                        <option>A-001 - 經典拉霸王</option>
                        <option>A-002 - 幸運水果</option>
                        <option>A-003 - 黃金礦工</option>
                    </select>
                    <div class="grid grid-cols-2 gap-3">
                        <button class="btn-touch py-5 bg-emerald-500/20 text-emerald-400 rounded-xl font-semibold text-lg flex items-center justify-center active:scale-95">
                            <i data-lucide="plus" class="w-6 h-6 mr-2"></i>
                            開分
                        </button>
                        <button class="btn-touch py-5 bg-red-500/20 text-red-400 rounded-xl font-semibold text-lg flex items-center justify-center active:scale-95">
                            <i data-lucide="minus" class="w-6 h-6 mr-2"></i>
                            洗分
                        </button>
                    </div>
                    <input type="number" placeholder="輸入金額" class="w-full px-4 py-4 bg-dark-bg border border-dark-border rounded-xl text-white text-lg font-mono input-focus touch-manipulation">
                    <button class="btn-touch w-full py-5 gradient-local text-white rounded-xl font-semibold text-lg flex items-center justify-center active:scale-95">
                        <i data-lucide="check-circle" class="w-6 h-6 mr-2"></i>
                        執行操作
                    </button>
                </div>
            </div>

            <!-- 機台狀態列表 -->
            <div class="glass-card rounded-2xl overflow-hidden">
                <div class="px-4 py-4 border-b border-dark-border flex justify-between items-center">
                    <h3 class="font-semibold text-white flex items-center">
                        <i data-lucide="monitor" class="w-5 h-5 mr-2 text-emerald-400"></i>
                        機台狀態
                        <span class="badge-local ml-2">50</span>
                    </h3>
                </div>
                <div class="divide-y divide-dark-border">
                    <!-- 機台項目 -->
                    <div class="p-4 flex items-center justify-between active:bg-emerald-500/10">
                        <div class="flex items-center">
                            <div class="w-12 h-12 rounded-xl bg-emerald-500/20 flex items-center justify-center mr-3">
                                <span class="text-emerald-400 font-mono font-bold">A-001</span>
                            </div>
                            <div>
                                <p class="text-white font-medium">經典拉霸王</p>
                                <p class="text-xs text-gray-400">餘額: $15,000</p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <span class="px-2 py-1 rounded-full text-xs bg-emerald-500/20 text-emerald-400">營運中</span>
                            <button class="btn-touch p-2 rounded-lg bg-emerald-500/20 text-emerald-400">
                                <i data-lucide="plus-circle" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                    <div class="p-4 flex items-center justify-between active:bg-emerald-500/10">
                        <div class="flex items-center">
                            <div class="w-12 h-12 rounded-xl bg-emerald-500/20 flex items-center justify-center mr-3">
                                <span class="text-emerald-400 font-mono font-bold">A-002</span>
                            </div>
                            <div>
                                <p class="text-white font-medium">幸運水果</p>
                                <p class="text-xs text-gray-400">餘額: $8,500</p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <span class="px-2 py-1 rounded-full text-xs bg-emerald-500/20 text-emerald-400">營運中</span>
                            <button class="btn-touch p-2 rounded-lg bg-emerald-500/20 text-emerald-400">
                                <i data-lucide="plus-circle" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                    <div class="p-4 flex items-center justify-between active:bg-emerald-500/10">
                        <div class="flex items-center">
                            <div class="w-12 h-12 rounded-xl bg-gray-500/20 flex items-center justify-center mr-3">
                                <span class="text-gray-400 font-mono font-bold">A-003</span>
                            </div>
                            <div>
                                <p class="text-gray-400 font-medium">離線</p>
                                <p class="text-xs text-gray-500">維護中</p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <span class="px-2 py-1 rounded-full text-xs bg-red-500/20 text-red-400">離線</span>
                            <button class="btn-touch p-2 rounded-lg bg-gray-500/20 text-gray-500" disabled>
                                <i data-lucide="plus-circle" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 底部導航欄 -->
    <nav class="fixed bottom-0 left-0 right-0 glass border-t border-dark-border z-40 pb-safe">
        <div class="flex justify-around items-center py-2 px-2">
            <a href="mockup_local_dashboard.html" class="flex flex-col items-center px-4 py-2 text-emerald-400 touch-manipulation">
                <i data-lucide="layout-dashboard" class="w-7 h-7"></i>
                <span class="text-xs mt-1">儀表板</span>
            </a>
            <a href="mockup_local_machine.html" class="flex flex-col items-center px-4 py-2 text-gray-400 touch-manipulation">
                <i data-lucide="monitor" class="w-7 h-7"></i>
                <span class="text-xs mt-1">機台</span>
            </a>
            <a href="mockup_local_cash.html" class="flex flex-col items-center px-4 py-2 text-gray-400 touch-manipulation">
                <i data-lucide="plus-circle" class="w-7 h-7"></i>
                <span class="text-xs mt-1">開分</span>
            </a>
            <a href="mockup_local_sync.html" class="flex flex-col items-center px-4 py-2 text-gray-400 touch-manipulation">
                <i data-lucide="refresh-cw" class="w-7 h-7"></i>
                <span class="text-xs mt-1">同步</span>
            </a>
            <a href="mockup_mvp_local_setup.html" class="flex flex-col items-center px-4 py-2 text-gray-400 touch-manipulation">
                <i data-lucide="settings" class="w-7 h-7"></i>
                <span class="text-xs mt-1">設定</span>
            </a>
        </div>
    </nav>

    <script>
        lucide.createIcons();

        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            const mainContent = document.getElementById('main-content');

            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            mainContent.classList.toggle('translate-x-72');
        }

        // 監聽螢幕旋轉
        window.addEventListener('orientationchange', function() {
            setTimeout(function() {
                window.scrollTo(0, 1);
            }, 100);
        });

        // 防止雙擊縮放
        document.addEventListener('dblclick', function(event) {
            event.preventDefault();
        }, { passive: false });
    </script>
    <style>
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0); }
    </style>
</body>
</html>
