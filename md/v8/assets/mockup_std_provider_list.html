<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲商串接管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        body { font-family: 'Roboto', 'Noto Sans TC', sans-serif; background-color: #F4F7F6; }
    </style>
</head>

<body class="bg-slate-50 flex h-screen overflow-hidden">
    <aside class="w-64 bg-gradient-to-b from-slate-900 to-indigo-950 text-white flex flex-col border-r border-slate-800 shadow-2xl relative h-full">
        <div class="h-16 flex items-center justify-center border-b border-[#303F9F]">
            <h1 class="text-xl font-bold tracking-wider">GAME PLATFORM</h1>
        </div>
        <nav class="flex-1 py-4 space-y-1">
            <a href="#"
                class="block px-6 py-3 text-indigo-200 hover:bg-white/10 hover:text-white transition-all duration-300">儀表板</a>
            <a href="#" class="block px-6 py-3 bg-white/10 backdrop-blur-md text-white border-l-4 border-cyan-400 font-bold shadow-inner relative overflow-hidden">遊戲商串接管理</a>
            <a href="#"
                class="block px-6 py-3 text-indigo-200 hover:bg-white/10 hover:text-white transition-all duration-300">多帳號管理</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <header class="h-16 bg-white/80 backdrop-blur-xl border-b border-white/20 sticky top-0 z-50 shadow-sm flex items-center justify-between px-8">
            <h2 class="text-xl font-bold text-slate-800">遊戲商串接管理</h2>
            <button
                class="px-4 py-2 bg-gradient-to-r from-indigo-600 to-cyan-500 text-white rounded-xl text-sm font-medium shadow-lg shadow-indigo-500/30 hover:shadow-cyan-500/40 hover:-translate-y-0.5 transition-all duration-300 flex items-center">新增遊戲商</button>
        </header>

        <div class="flex-1 p-8 overflow-hidden flex flex-col">
            <div class="bg-white rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100/60 transition-all duration-300 hover:shadow-[0_8px_30px_rgb(0,0,0,0.08)] flex-1 flex flex-col overflow-hidden">
                <div class="flex-1 overflow-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50 sticky top-0 z-10 border-b border-slate-200">
                            <tr>
                                <th class="py-3 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">遊戲商
                                </th>
                                <th class="py-3 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">API狀態
                                </th>
                                <th
                                    class="py-3 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider text-right">
                                    連線數</th>
                                <th
                                    class="py-3 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider text-right">
                                    今日轉入</th>
                                <th
                                    class="py-3 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider text-right">
                                    今日轉出</th>
                                <th
                                    class="py-3 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider text-right">
                                    操作</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 bg-white">
                            <tr class="hover:bg-slate-50">
                                <td class="py-3 px-4 text-sm font-bold text-slate-800">PT平台</td>
                                <td class="py-3 px-4 text-sm"><span
                                        class="flex items-center text-emerald-600 font-medium"><span
                                            class="w-2 h-2 rounded-full bg-emerald-500 mr-2"></span>🟢 正常</span></td>
                                <td class="py-3 px-4 text-sm font-medium text-slate-800 text-right">45</td>
                                <td class="py-3 px-4 text-sm text-green-600 font-medium text-right">$120,000</td>
                                <td class="py-3 px-4 text-sm text-red-500 font-medium text-right">-$95,000</td>
                                <td class="py-3 px-4 text-right"><button
                                        class="text-indigo-600 font-medium text-sm">詳情</button></td>
                            </tr>
                            <tr class="hover:bg-slate-50">
                                <td class="py-3 px-4 text-sm font-bold text-slate-800">MG遊戲</td>
                                <td class="py-3 px-4 text-sm"><span
                                        class="flex items-center text-emerald-600 font-medium"><span
                                            class="w-2 h-2 rounded-full bg-emerald-500 mr-2"></span>🟢 正常</span></td>
                                <td class="py-3 px-4 text-sm font-medium text-slate-800 text-right">28</td>
                                <td class="py-3 px-4 text-sm text-green-600 font-medium text-right">$68,000</td>
                                <td class="py-3 px-4 text-sm text-red-500 font-medium text-right">-$52,000</td>
                                <td class="py-3 px-4 text-right"><button
                                        class="text-indigo-600 font-medium text-sm">詳情</button></td>
                            </tr>
                            <tr class="hover:bg-red-50 bg-red-50/50">
                                <td class="py-3 px-4 text-sm font-bold text-slate-800">PP遊戲</td>
                                <td class="py-3 px-4 text-sm"><span
                                        class="flex items-center text-red-600 font-medium"><span
                                            class="w-2 h-2 rounded-full bg-red-500 mr-2"></span>🔴 異常</span></td>
                                <td class="py-3 px-4 text-sm font-medium text-slate-800 text-right">0</td>
                                <td class="py-3 px-4 text-sm text-slate-400 font-medium text-right">$0</td>
                                <td class="py-3 px-4 text-sm text-slate-400 font-medium text-right">$0</td>
                                <td class="py-3 px-4 text-right"><button
                                        class="text-indigo-600 font-medium text-sm">設定</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
