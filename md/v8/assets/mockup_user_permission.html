    <script>
        const users = [
            { id: 1, username: 'admin001', name: '系統管理員', role: 'admin', agent: '-', status: 'active', lastLogin: '2024-01-15 09:30' },
            { id: 2, username: 'admin002', name: '營運主管', role: 'admin', agent: '-', status: 'active', lastLogin: '2024-01-15 08:45' },
        ];

        const permissions = [
            { id: 'dashboard', name: '儀表板', category: '系統' },
            { id: 'machine', name: '機台管理', category: '系統' },
            { id: 'game', name: '遊戲管理', category: '系統' },
            { id: 'player', name: '玩家管理', category: '系統' },
            { id: 'transaction', name: '交易紀錄', category: '系統' },
            { id: 'provider', name: '遊戲商管理', category: '系統' },
            { id: 'wallet', name: '錢包管理', category: '系統' },
            { id: 'reports', name: '報表', category: '系統' },
            { id: 'backup', name: '備份', category: '系統' },
            { id: 'settings', name: '系統設定', category: '系統' },
        ];

        let currentPage = 1;
        const pageSize = 5;
        let sortColumn = '';
        let sortDirection = 'asc';

        function renderTable() {
            const tbody = document.getElementById('userTableBody');
            let filteredUsers = [...users];
            const roleFilter = document.getElementById('roleFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;
            const searchInput = document.getElementById('searchInput').value.toLowerCase();

            if (roleFilter) filteredUsers = filteredUsers.filter(u => u.role === roleFilter);
            if (statusFilter) filteredUsers = filteredUsers.filter(u => u.status === statusFilter);
            if (searchInput) filteredUsers = filteredUsers.filter(u => u.username.toLowerCase().includes(searchInput) || u.name.toLowerCase().includes(searchInput));

            if (sortColumn) {
                filteredUsers.sort((a, b) => {
                    const aVal = a[sortColumn];
                    const bVal = b[sortColumn];
                    if (aVal < bVal) return sortDirection === 'asc' ? -1 : 1;
                    if (aVal > bVal) return sortDirection === 'asc' ? 1 : -1;
                    return 0;
                });
            }

            const totalPages = Math.ceil(filteredUsers.length / pageSize);
            const start = (currentPage - 1) * pageSize;
            const pagedUsers = filteredUsers.slice(start, start + pageSize);

            tbody.innerHTML = pagedUsers.map(user => `
                <tr class="table-row-hover transition-colors">
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center">
                            <div class="w-8 h-8 rounded-full bg-purple-600/30 flex items-center justify-center text-purple-400 text-sm font-bold">${user.username[0].toUpperCase()}</div>
                            <span class="ml-3 text-white font-medium">${user.username}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-300">${user.name}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-300">${user.agent}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <button onclick="toggleStatus(${user.id})" class="flex items-center ${user.status === 'active' ? 'text-green-400' : 'text-gray-500'}">
                            <div class="w-8 h-5 rounded-full relative ${user.status === 'active' ? 'bg-green-500/30' : 'bg-gray-500/30'}">
                                <div class="absolute w-3 h-3 rounded-full top-1 ${user.status === 'active' ? 'right-1 bg-green-400' : 'left-1 bg-gray-400'} transition-all"></div>
                            </div>
                            <span class="ml-2 text-xs">${user.status === 'active' ? '啟用' : '停用'}</span>
                        </button>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-400 text-sm">${user.lastLogin}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-right">
                        <button onclick="editPermissions(${user.id}, '${user.username}')" class="text-purple-400 hover:text-purple-300 mx-1" title="權限設定"><i data-lucide="shield" class="w-4 h-4 inline"></i></button>
                        <button onclick="alert('編輯使用者: ${user.username}')" class="text-cyan-400 hover:text-cyan-300 mx-1" title="編輯"><i data-lucide="edit-2" class="w-4 h-4 inline"></i></button>
                        <button onclick="deleteUser(${user.id})" class="text-red-400 hover:text-red-300 mx-1" title="刪除"><i data-lucide="trash-2" class="w-4 h-4 inline"></i></button>
                    </td>
                </tr>
            `).join('');

            document.getElementById('showingCount').textContent = filteredUsers.length;
            document.getElementById('pageInfo').textContent = currentPage + ' / ' + totalPages;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
            lucide.createIcons();
        }

        function sortTable(column) {
            if (sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = 'asc';
            }
            renderTable();
        }

        function changePage(delta) { currentPage += delta; renderTable(); }
        function applyFilters() { currentPage = 1; renderTable(); }
        function resetFilters() { document.getElementById('roleFilter').value = ''; document.getElementById('statusFilter').value = ''; document.getElementById('searchInput').value = ''; currentPage = 1; renderTable(); }

        function toggleStatus(userId) {
            const user = users.find(u => u.id === userId);
            if (user) { user.status = user.status === 'active' ? 'inactive' : 'active'; renderTable(); }
        }

        let editingUserId = null;
        function editPermissions(userId, username) {
            editingUserId = userId;
            document.getElementById('editUserName').textContent = username;
            const grouped = permissions.reduce((acc, p) => { if (!acc[p.category]) acc[p.category] = []; acc[p.category].push(p); return acc; }, {});
            const container = document.getElementById('permissionList');
            container.innerHTML = Object.entries(grouped).map(([category, perms]) => `
                <div class="mb-4">
                    <h4 class="text-sm font-medium text-purple-400 mb-2">${category}</h4>
                    <div class="grid grid-cols-2 gap-2">
                        ${perms.map(p => '<label class="flex items-center space-x-2 cursor-pointer"><input type="checkbox" class="w-4 h-4 rounded border-dark-border bg-dark-bg text-purple-600 focus:ring-purple-600 permission-checkbox" data-permission="' + p.id + '" checked><span class="text-sm text-gray-300">' + p.name + '</span></label>').join('')}
                    </div>
                </div>
            `).join('');
            openModal('editPermissionModal');
        }

        function savePermissions() {
            const checkboxes = document.querySelectorAll('.permission-checkbox:checked');
            const selected = Array.from(checkboxes).map(c => c.dataset.permission);
            alert('已儲存權限 (' + selected.length + ' 項)');
            closeModal('editPermissionModal');
        }

        function deleteUser(userId) {
            if (confirm('確定要刪除此使用者嗎？')) {
                const index = users.findIndex(u => u.id === userId);
                if (index > -1) { users.splice(index, 1); renderTable(); }
            }
        }

        function submitUserForm() {
            const form = document.getElementById('addUserForm');
            alert('使用者建立成功！');
            form.reset();
            closeModal('addUserModal');
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); lucide.createIcons(); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        document.getElementById('searchInput').addEventListener('input', renderTable);

        // Initialize table on page load
        document.addEventListener('DOMContentLoaded', () => {
            renderTable();
        });
    </script>
