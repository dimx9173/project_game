<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玩家詳情 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .glass-card:hover { border-color: rgba(168, 85, 247, 0.4); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 30px rgba(168, 85, 247, 0.2); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3), 0 0 20px rgba(168, 85, 247, 0.2); }
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <div class="flex items-center">
                <a href="mockup_mvp_player_list.html" class="text-gray-400 hover:text-white mr-4"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
                <h2 class="text-lg font-semibold text-white">玩家詳情</h2>
            </div>
            <div class="flex items-center space-x-3">
                <button class="px-4 py-2 bg-red-600/20 border border-red-600/50 text-red-400 rounded-lg flex items-center">
                    <i data-lucide="ban" class="w-4 h-4 mr-2"></i>停權
                </button>
                <button class="px-4 py-2 gradient-purple rounded-lg text-white font-medium shadow-glow-sm flex items-center">
                    <i data-lucide="save" class="w-4 h-4 mr-2"></i>儲存
                </button>
            </div>
        </header>
        <div class="flex-1 overflow-y-auto p-6">
            <!-- 玩家基本資訊 -->
            <div class="grid grid-cols-3 gap-6 mb-6">
                <div class="glass-card rounded-2xl p-6">
                    <div class="flex items-center mb-4">
                        <div class="w-16 h-16 rounded-full gradient-purple flex items-center justify-center mr-4">
                            <span class="text-2xl font-bold text-white">J</span>
                        </div>
                        <div>
                            <h3 class="font-semibold text-white text-lg">john_player</h3>
                            <p class="text-gray-400 text-sm">john@example.com</p>
                            <span class="mt-2 inline-block px-2 py-1 bg-green-600/20 text-green-400 text-xs rounded">正常</span>
                        </div>
                    </div>
                    <div class="space-y-3 pt-4 border-t border-dark-border">
                        <div class="flex justify-between"><span class="text-gray-400 text-sm">玩家 ID</span><span class="font-mono text-white">P20250304001</span></div>
                        <div class="flex justify-between"><span class="text-gray-400 text-sm">註冊日期</span><span class="text-white">2025-03-04</span></div>
                        <div class="flex justify-between"><span class="text-gray-400 text-sm">最後登入</span><span class="text-white">2026-03-04 14:32</span></div>
                        <div class="flex justify-between"><span class="text-gray-400 text-sm">VIP 等級</span><span class="text-yellow-400">⭐⭐⭐⭐</span></div>
                    </div>
                </div>
                <div class="glass-card col-span-2 rounded-2xl p-6">
                    <h3 class="font-semibold text-white mb-4 flex items-center"><i data-lucide="wallet" class="w-5 h-5 mr-2 text-cyber-400"></i>錢包餘額</h3>
                    <div class="grid grid-cols-3 gap-4 mb-4">
                        <div class="bg-dark-bg rounded-lg p-4"><p class="text-xs text-gray-500 mb-1">主帳戶</p><p class="font-mono text-xl text-white">$12,345.67</p></div>
                        <div class="bg-dark-bg rounded-lg p-4"><p class="text-xs text-gray-500 mb-1"> bonus</p><p class="font-mono text-xl text-green-400">$500.00</p></div>
                        <div class="bg-dark-bg rounded-lg p-4"><p class="text-xs text-gray-500 mb-1">總額</p><p class="font-mono text-xl text-cyber-400">$12,845.67</p></div>
                    </div>
                    <div class="flex space-x-3">
                        <button class="px-4 py-2 bg-green-600/20 border border-green-600/50 text-green-400 rounded-lg flex items-center"><i data-lucide="plus" class="w-4 h-4 mr-2"></i>儲值</button>
                        <button class="px-4 py-2 bg-red-600/20 border border-red-600/50 text-red-400 rounded-lg flex items-center"><i data-lucide="minus" class="w-4 h-4 mr-2"></i>扣點</button>
                        <button class="px-4 py-2 bg-dark-hover border border-dark-border text-gray-300 rounded-lg flex items-center"><i data-lucide="key" class="w-4 h-4 mr-2"></i>重設密碼</button>
                    </div>
                </div>
            </div>
            <!-- 標籤與備註 -->
            <div class="glass-card rounded-2xl p-6 mb-6">
                <h3 class="font-semibold text-white mb-4 flex items-center"><i data-lucide="tags" class="w-5 h-5 mr-2 text-cyber-400"></i>玩家標籤</h3>
                <div class="flex flex-wrap gap-2 mb-4">
                    <span class="px-3 py-1 bg-cyber-600/20 text-cyber-400 text-sm rounded-full">高價值</span>
                    <span class="px-3 py-1 bg-blue-600/20 text-blue-400 text-sm rounded-full">活躍用戶</span>
                    <span class="px-3 py-1 bg-yellow-600/20 text-yellow-400 text-sm rounded-full">VIP</span>
                    <button class="px-3 py-1 border border-dashed border-gray-600 text-gray-400 text-sm rounded-full hover:border-cyber-500 hover:text-cyber-400">+ 新增標籤</button>
                </div>
                <h4 class="text-sm text-gray-400 mb-2">備註</h4>
                <textarea class="w-full bg-dark-bg border border-dark-border rounded-lg p-3 text-white placeholder-gray-500 focus:outline-none input-focus" rows="3" placeholder="輸入玩家備註...">優質客戶，經常性存款，無不良紀錄。</textarea>
            </div>
            <!-- 統計數據 -->
            <div class="glass-card rounded-2xl p-6">
                <h3 class="font-semibold text-white mb-4 flex items-center"><i data-lucide="bar-chart-3" class="w-5 h-5 mr-2 text-cyber-400"></i>30日統計</h3>
                <div class="grid grid-cols-4 gap-4">
                    <div class="bg-dark-bg rounded-lg p-4"><p class="text-xs text-gray-500 mb-1">總投注</p><p class="font-mono text-lg text-white">$45,678</p></div>
                    <div class="bg-dark-bg rounded-lg p-4"><p class="text-xs text-gray-500 mb-1">總派彩</p><p class="font-mono text-lg text-green-400">$38,234</p></div>
                    <div class="bg-dark-bg rounded-lg p-4"><p class="text-xs text-gray-500 mb-1">淨營收</p><p class="font-mono text-lg text-cyber-400">$7,444</p></div>
                    <div class="bg-dark-bg rounded-lg p-4"><p class="text-xs text-gray-500 mb-1">遊戲次數</p><p class="font-mono text-lg text-white">1,234</p></div>
                </div>
            </div>
        </div>
    </main>
    <script src="js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_player_detail.html');
        lucide.createIcons();
    </script>
</body>
</html>
