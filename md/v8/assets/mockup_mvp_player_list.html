<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玩家管理列表</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        body { font-family: 'Roboto', 'Noto Sans TC', sans-serif; background-color: #F4F7F6; }
    </style>
</head>

<body class="bg-[#F4F7F6] flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-[#283593] text-white flex flex-col h-full">
        <div class="h-16 flex items-center justify-center border-b border-[#303F9F]">
            <h1 class="text-xl font-bold tracking-wider">GAME PLATFORM</h1>
        </div>
        <nav class="flex-1 py-4 space-y-1">
            <a href="#"
                class="block px-6 py-3 text-[#C5CAE9] hover:bg-[#303F9F] hover:text-white transition-colors">儀表板</a>
            <a href="#"
                class="block px-6 py-3 text-[#C5CAE9] hover:bg-[#303F9F] hover:text-white transition-colors">機台管理</a>
            <a href="#"
                class="block px-6 py-3 text-[#C5CAE9] hover:bg-[#303F9F] hover:text-white transition-colors">遊戲管理</a>
            <a href="#" class="block px-6 py-3 bg-[#303F9F] text-white border-l-4 border-white font-medium">玩家管理</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8">
            <h2 class="text-xl font-bold text-gray-800">玩家管理</h2>
            <button
                class="px-4 py-2 bg-[#3F51B5] text-white rounded-lg text-sm font-medium hover:bg-[#3949AB] flex items-center shadow-sm">
                新增玩家
            </button>
        </header>

        <div class="flex-1 p-8 overflow-hidden flex flex-col">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 flex-1 flex flex-col overflow-hidden">
                <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-[#F4F7F6]">
                    <div class="flex space-x-3">
                        <input type="text" placeholder="🔍 搜尋玩家帳號/暱稱..."
                            class="px-3 py-2 border border-gray-300 rounded-lg text-sm w-64 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <select class="px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white focus:outline-none">
                            <option>所有狀態</option>
                            <option>正常</option>
                            <option>停權</option>
                        </select>
                    </div>
                    <button
                        class="px-4 py-2 bg-white border border-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:bg-[#F4F7F6]">匯出</button>
                </div>

                <div class="flex-1 overflow-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-[#F4F7F6] sticky top-0 z-10 border-b border-gray-200">
                            <tr>
                                <th class="py-3 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">#
                                </th>
                                <th class="py-3 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">帳號
                                </th>
                                <th class="py-3 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">暱稱
                                </th>
                                <th
                                    class="py-3 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-right">
                                    餘額</th>
                                <th
                                    class="py-3 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-center">
                                    狀態</th>
                                <th class="py-3 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">註冊時間
                                </th>
                                <th
                                    class="py-3 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-right">
                                    操作</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 bg-white">
                            <tr class="hover:bg-[#F4F7F6]">
                                <td class="py-3 px-4 text-sm text-gray-500">1</td>
                                <td class="py-3 px-4 text-sm font-bold text-gray-800">user01</td>
                                <td class="py-3 px-4 text-sm text-gray-600">玩家小明</td>
                                <td class="py-3 px-4 text-sm font-medium text-gray-800 text-right">$5,000</td>
                                <td class="py-3 px-4 text-sm text-center"><span
                                        class="px-2 py-1 bg-emerald-100 text-emerald-700 rounded text-xs font-medium">正常</span>
                                </td>
                                <td class="py-3 px-4 text-sm text-gray-500">2026/01/15</td>
                                <td class="py-3 px-4 text-right"><button
                                        class="text-[#3F51B5] font-medium text-sm">詳情</button></td>
                            </tr>
                            <tr class="hover:bg-[#F4F7F6]">
                                <td class="py-3 px-4 text-sm text-gray-500">2</td>
                                <td class="py-3 px-4 text-sm font-bold text-gray-800">user02</td>
                                <td class="py-3 px-4 text-sm text-gray-600">玩家大華</td>
                                <td class="py-3 px-4 text-sm font-medium text-gray-800 text-right">$12,500</td>
                                <td class="py-3 px-4 text-sm text-center"><span
                                        class="px-2 py-1 bg-emerald-100 text-emerald-700 rounded text-xs font-medium">正常</span>
                                </td>
                                <td class="py-3 px-4 text-sm text-gray-500">2026/01/20</td>
                                <td class="py-3 px-4 text-right"><button
                                        class="text-[#3F51B5] font-medium text-sm">詳情</button></td>
                            </tr>
                            <tr class="hover:bg-[#F4F7F6]">
                                <td class="py-3 px-4 text-sm text-gray-500">3</td>
                                <td class="py-3 px-4 text-sm font-bold text-gray-800">user03</td>
                                <td class="py-3 px-4 text-sm text-gray-600">玩家小美</td>
                                <td class="py-3 px-4 text-sm font-medium text-gray-800 text-right">$0</td>
                                <td class="py-3 px-4 text-sm text-center"><span
                                        class="px-2 py-1 bg-red-100 text-red-700 rounded text-xs font-medium">停權</span>
                                </td>
                                <td class="py-3 px-4 text-sm text-gray-500">2026/02/01</td>
                                <td class="py-3 px-4 text-right"><button
                                        class="text-[#3F51B5] font-medium text-sm">詳情</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
