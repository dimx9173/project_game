<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>牌靴管理 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .glass-card:hover { border-color: rgba(168, 85, 247, 0.4); }
        .sidebar-link { position: relative; transition: all 0.3s ease; }
        .sidebar-link::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 0; background: linear-gradient(180deg, #7c3aed, #c084fc); border-radius: 0 2px 2px 0; transition: height 0.3s ease; }
        .sidebar-link:hover::before, .sidebar-link.active::before { height: 60%; }
        .sidebar-link.active { background: linear-gradient(90deg, rgba(124, 58, 237, 0.2), transparent); }
        .table-row-hover:hover { background: linear-gradient(90deg, rgba(124, 58, 237, 0.1), transparent); }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3), 0 0 20px rgba(168, 85, 247, 0.2); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        .badge-local { background: #10b981; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <aside class="w-64 bg-dark-sidebar border-r border-dark-border flex flex-col">
        <div class="h-16 flex items-center px-4 border-b border-dark-border">
            <div class="w-10 h-10 rounded-xl gradient-purple flex items-center justify-center shadow-glow-sm mr-3">
                <i data-lucide="gamepad-2" class="w-5 h-5 text-white"></i>
            </div>
            <div><span class="font-bold text-white">遊戲平台</span><span class="text-xs text-gray-500 block">管理中心</span></div>
        </div>
        <nav class="flex-1 py-4 px-3 space-y-1 overflow-y-auto">
            <a href="mockup_dashboard.html" class="sidebar-link flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="layout-dashboard" class="w-5 h-5 mr-3"></i><span>儀表板</span></a>
            <a href="mockup_mvp_machine_list.html" class="sidebar-link flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="monitor" class="w-5 h-5 mr-3"></i><span>機台管理</span></a>
            <a href="mockup_mvp_data_list.html" class="sidebar-link flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="gamepad-2" class="w-5 h-5 mr-3"></i><span>遊戲管理</span></a>
            <a href="mockup_mvp_player_list.html" class="sidebar-link flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="users" class="w-5 h-5 mr-3"></i><span>玩家管理</span></a>
            <a href="mockup_std_wallet.html" class="sidebar-link flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="wallet" class="w-5 h-5 mr-3"></i><span>錢包交易</span></a>
            <a href="mockup_std_provider_list.html" class="sidebar-link flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="plug" class="w-5 h-5 mr-3"></i><span>串接遊戲商</span></a>
            <a href="mockup_std_multiplayer.html" class="sidebar-link active flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="users" class="w-5 h-5 mr-3"></i><span>多人遊戲</span></a>
            <a href="mockup_user_permission.html" class="sidebar-link flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="shield-user" class="w-5 h-5 mr-3"></i><span>使用者權限</span></a>
            <a href="mockup_flg_ota.html" class="sidebar-link flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="download" class="w-5 h-5 mr-3"></i><span>版本更新 OTA</span></a>
            <a href="mockup_flg_monitor.html" class="sidebar-link flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="activity" class="w-5 h-5 mr-3"></i><span>監控中心</span></a>
            <a href="mockup_flg_reconciliation.html" class="sidebar-link flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="file-check" class="w-5 h-5 mr-3"></i><span>錯帳對帳</span></a>
            <a href="mockup_flg_dispute.html" class="sidebar-link flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="alert-circle" class="w-5 h-5 mr-3"></i><span>爭議處理</span></a>
            <a href="mockup_std_system_settings.html" class="sidebar-link flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="settings" class="w-5 h-5 mr-3"></i><span>系統設定</span></a>
            <a href="mockup_std_backup.html" class="sidebar-link flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="database" class="w-5 h-5 mr-3"></i><span>備份</span></a>
            <a href="mockup_std_reports.html" class="sidebar-link flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="file-text" class="w-5 h-5 mr-3"></i><span>報表</span></a>
            <div class="my-3 border-t border-dark-border"></div>
            <a href="mockup_local_dashboard.html" class="sidebar-link flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="laptop" class="w-5 h-5 mr-3"></i><span>本地後台</span><span class="badge-local ml-auto">本地</span></a>
        </nav>
    </aside>
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <h2 class="text-lg font-semibold text-white">牌靴管理</h2>
            <button class="px-4 py-2 gradient-purple rounded-lg text-sm text-white font-medium shadow-glow-sm">
                <i data-lucide="plus" class="w-4 h-4 mr-2"></i>新增牌靴
            </button>
        </header>
        <div class="flex-1 overflow-y-auto p-6">
            <div class="grid grid-cols-4 gap-4 mb-6">
                <div class="glass-card rounded-xl p-4">
                    <p class="text-xs text-gray-500">使用中牌靴</p>
                    <p class="text-2xl font-bold text-white mt-1">8</p>
                </div>
                <div class="glass-card rounded-xl p-4">
                    <p class="text-xs text-gray-500">備用牌靴</p>
                    <p class="text-2xl font-bold text-white mt-1">4</p>
                </div>
                <div class="glass-card rounded-xl p-4">
                    <p class="text-xs text-gray-500">需更換提醒</p>
                    <p class="text-2xl font-bold text-amber-400 mt-1">2</p>
                </div>
                <div class="glass-card rounded-xl p-4">
                    <p class="text-xs text-gray-500">今日消耗牌靴</p>
                    <p class="text-2xl font-bold text-white mt-1">3</p>
                </div>
            </div>
            <div class="glass-card rounded-xl overflow-hidden">
                <div class="px-6 py-4 border-b border-dark-border flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <select class="px-4 py-2 bg-dark-bg border border-dark-border rounded-lg text-sm text-white">
                            <option>全部狀態</option>
                            <option>使用中</option>
                            <option>備用</option>
                            <option>已損耗</option>
                        </select>
                        <select class="px-4 py-2 bg-dark-bg border border-dark-border rounded-lg text-sm text-white">
                            <option>全部遊戲</option>
                            <option>百家樂</option>
                            <option>21點</option>
                            <option>德州撲克</option>
                        </select>
                    </div>
                    <input type="text" placeholder="搜尋牌靴 ID..." class="bg-dark-bg border border-dark-border rounded-lg px-4 py-2 text-sm text-white placeholder-gray-500 focus:outline-none input-focus">
                </div>
                <table class="min-w-full">
                    <thead class="bg-dark-bg">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">牌靴 ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">遊戲類型</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">剩餘牌數</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">已使用局數</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">狀態</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">建立時間</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-400 uppercase">操作</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-dark-border">
                        <tr class="table-row-hover">
                            <td class="px-6 py-4 text-white font-mono font-bold">SHOE-001</td>
                            <td class="px-6 py-4 text-gray-300">百家樂</td>
                            <td class="px-6 py-4 text-white">124</td>
                            <td class="px-6 py-4 text-gray-300">376</td>
                            <td class="px-6 py-4"><span class="px-2 py-1 rounded text-xs bg-emerald-500/20 text-emerald-400">使用中</span></td>
                            <td class="px-6 py-4 text-gray-400">2024-01-15 08:00</td>
                            <td class="px-6 py-4 text-right">
                                <button class="text-gray-400 hover:text-white mr-3"><i data-lucide="rotate-ccw" class="w-4 h-4"></i></button>
                                <button class="text-gray-400 hover:text-white"><i data-lucide="eye" class="w-4 h-4"></i></button>
                            </td>
                        </tr>
                        <tr class="table-row-hover">
                            <td class="px-6 py-4 text-white font-mono font-bold">SHOE-002</td>
                            <td class="px-6 py-4 text-gray-300">百家樂</td>
                            <td class="px-6 py-4 text-amber-400">28</td>
                            <td class="px-6 py-4 text-gray-300">472</td>
                            <td class="px-6 py-4"><span class="px-2 py-1 rounded text-xs bg-amber-500/20 text-amber-400">即將更換</span></td>
                            <td class="px-6 py-4 text-gray-400">2024-01-10 14:30</td>
                            <td class="px-6 py-4 text-right">
                                <button class="text-gray-400 hover:text-white mr-3"><i data-lucide="rotate-ccw" class="w-4 h-4"></i></button>
                                <button class="text-gray-400 hover:text-white"><i data-lucide="eye" class="w-4 h-4"></i></button>
                            </td>
                        </tr>
                        <tr class="table-row-hover">
                            <td class="px-6 py-4 text-white font-mono font-bold">SHOE-003</td>
                            <td class="px-6 py-4 text-gray-300">21點</td>
                            <td class="px-6 py-4 text-white">312</td>
                            <td class="px-6 py-4 text-gray-300">188</td>
                            <td class="px-6 py-4"><span class="px-2 py-1 rounded text-xs bg-emerald-500/20 text-emerald-400">使用中</span></td>
                            <td class="px-6 py-4 text-gray-400">2024-01-18 10:15</td>
                            <td class="px-6 py-4 text-right">
                                <button class="text-gray-400 hover:text-white mr-3"><i data-lucide="rotate-ccw" class="w-4 h-4"></i></button>
                                <button class="text-gray-400 hover:text-white"><i data-lucide="eye" class="w-4 h-4"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <script> lucide.createIcons(); </script>
</body>
</html>
