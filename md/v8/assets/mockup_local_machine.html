<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>機台狀態 - 本地後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' },
                        local: { 50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7', 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857', 800: '#065f46', 900: '#064e3b' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(16, 185, 129, 0.3)', 'glow-sm': '0 0 15px rgba(16, 185, 129, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #059669 #0a0a0f; -webkit-tap-highlight-color: transparent; }
        *::-webkit-scrollbar { width: 4px; height: 4px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #10b981, #34d399); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; touch-action: manipulation; }
        .glass { background: rgba(18, 18, 26, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.95) 0%, rgba(30, 30, 46, 0.7) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.2); box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5); }
        .gradient-bg { background: linear-gradient(180deg, #0a0a0f 0%, #0a1a14 50%, #0a0a0f 100%); }
        .gradient-local { background: linear-gradient(135deg, #10b981 0%, #34d399 50%, #6ee7b7 100%); }
        .btn-touch { min-height: 56px; min-width: 56px; touch-action: manipulation; }
        .btn-touch:active { transform: scale(0.95); opacity: 0.9; }
        .badge-local { background: #10b981; color: white; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
        .menu-slide { transform: translateX(-100%); transition: transform 0.3s ease; }
        .menu-slide.active { transform: translateX(0); }
        .overlay { opacity: 0; visibility: hidden; transition: opacity 0.3s ease; }
        .overlay.active { opacity: 1; visibility: visible; }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); } 50% { box-shadow: 0 0 25px rgba(16, 185, 129, 0.5); } }
        .status-online { animation: pulse-glow 2s infinite; }
    </style>
</head>
<body class="gradient-bg min-h-screen pb-24">
    <!-- 漢堡選單遮罩 -->
    <div id="overlay" class="overlay fixed inset-0 bg-black/60 z-40" onclick="toggleMenu()"></div>

    <!-- 側邊選單 -->
    <aside id="sidebar" class="menu-slide fixed left-0 top-0 bottom-0 w-72 bg-dark-sidebar border-r border-dark-border z-50 flex flex-col">
        <div class="h-16 flex items-center px-4 border-b border-dark-border">
            <div class="w-10 h-10 rounded-xl gradient-local flex items-center justify-center shadow-glow-sm mr-3 flex-shrink-0">
                <i data-lucide="laptop" class="w-5 h-5 text-white"></i>
            </div>
            <div>
                <span class="font-bold text-white">本地後台</span>
                <span class="text-xs text-gray-500 block">本地模式</span>
            </div>
        </div>
        <nav class="flex-1 py-4 px-3 space-y-1 overflow-y-auto">
            <a href="mockup_local_dashboard.html" class="sidebar-link flex items-center px-4 py-3.5 text-gray-300 hover:text-white rounded-xl touch-manipulation">
                <i data-lucide="layout-dashboard" class="w-6 h-6 mr-3"></i>
                <span class="text-base">本地儀表板</span>
            </a>
            <a href="#" class="sidebar-link active flex items-center px-4 py-3.5 text-gray-300 hover:text-white rounded-xl touch-manipulation">
                <i data-lucide="monitor" class="w-6 h-6 mr-3"></i>
                <span class="text-base">機台狀態</span>
                <span class="badge-local ml-auto">本地</span>
            </a>
            <a href="mockup_local_cash.html" class="sidebar-link flex items-center px-4 py-3.5 text-gray-300 hover:text-white rounded-xl touch-manipulation">
                <i data-lucide="plus-circle" class="w-6 h-6 mr-3"></i>
                <span class="text-base">開分/洗分</span>
                <span class="badge-local ml-auto">本地</span>
            </a>
            <a href="mockup_local_sync.html" class="sidebar-link flex items-center px-4 py-3.5 text-gray-300 hover:text-white rounded-xl touch-manipulation">
                <i data-lucide="refresh-cw" class="w-6 h-6 mr-3"></i>
                <span class="text-base">同步狀態</span>
                <span class="badge-local ml-auto">本地</span>
            </a>
            <a href="mockup_mvp_local_setup.html" class="sidebar-link flex items-center px-4 py-3.5 text-gray-300 hover:text-white rounded-xl touch-manipulation">
                <i data-lucide="settings" class="w-6 h-6 mr-3"></i>
                <span class="text-base">本機設定</span>
                <span class="badge-local ml-auto">本地</span>
            </a>
        </nav>
    </aside>

    <!-- 頂部導航 -->
    <header class="glass fixed top-0 left-0 right-0 z-30 h-16 flex items-center justify-between px-4 border-b border-dark-border">
        <button onclick="toggleMenu()" class="btn-touch p-3 rounded-xl hover:bg-dark-hover">
            <i data-lucide="menu" class="w-7 h-7 text-white"></i>
        </button>
        <div class="flex items-center space-x-3">
            <div class="flex items-center px-3 py-1.5 bg-emerald-500/20 text-emerald-400 rounded-full border border-emerald-500/30">
                <div class="w-2 h-2 rounded-full bg-emerald-400 mr-2 animate-pulse"></div>
                <span class="text-xs font-medium">已連線</span>
            </div>
            <div class="text-sm font-mono text-gray-400">A-01</div>
        </div>
        <div class="w-12"></div>
    </header>

    <!-- 主要內容 -->
    <main class="pt-20 pb-4 px-4 space-y-4">
        <!-- 頁面標題 -->
        <div class="text-center">
            <h1 class="text-xl font-bold text-white">機台狀態</h1>
            <p class="text-xs text-gray-500">本機硬體監控</p>
        </div>

        <!-- 機台資訊 -->
        <div class="glass-card rounded-2xl p-4">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center">
                    <div class="w-12 h-12 rounded-xl gradient-local flex items-center justify-center mr-3">
                        <i data-lucide="monitor" class="w-6 h-6 text-white"></i>
                    </div>
                    <div>
                        <div class="text-lg font-bold text-white">旗艦店 A-01</div>
                        <div class="text-xs text-gray-500 font-mono">MCH-0001</div>
                    </div>
                </div>
                <div class="px-3 py-1.5 bg-emerald-500/20 text-emerald-400 rounded-full border border-emerald-500/30 text-xs font-medium">
                    正常運作
                </div>
            </div>
        </div>

        <!-- 硬體狀態 -->
        <div class="glass-card rounded-2xl p-4">
            <h2 class="text-base font-semibold text-white mb-4 pb-2 border-b border-dark-border flex items-center">
                <i data-lucide="cpu" class="w-5 h-5 mr-2 text-emerald-400"></i>硬體狀態
            </h2>
            <div class="space-y-4">
                <!-- CPU -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm text-gray-400">CPU 使用率</span>
                        <span class="text-sm font-mono text-emerald-400">45%</span>
                    </div>
                    <div class="h-2 bg-dark-bg rounded-full overflow-hidden">
                        <div class="h-full bg-gradient-to-r from-emerald-500 to-emerald-400 rounded-full" style="width: 45%"></div>
                    </div>
                </div>
                <!-- 記憶體 -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm text-gray-400">記憶體使用</span>
                        <span class="text-sm font-mono text-emerald-400">62%</span>
                    </div>
                    <div class="h-2 bg-dark-bg rounded-full overflow-hidden">
                        <div class="h-full bg-gradient-to-r from-emerald-500 to-emerald-400 rounded-full" style="width: 62%"></div>
                    </div>
                </div>
                <!-- 硬碟 -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm text-gray-400">硬碟空間</span>
                        <span class="text-sm font-mono text-yellow-400">78%</span>
                    </div>
                    <div class="h-2 bg-dark-bg rounded-full overflow-hidden">
                        <div class="h-full bg-gradient-to-r from-yellow-500 to-yellow-400 rounded-full" style="width: 78%"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 網路狀態 -->
        <div class="glass-card rounded-2xl p-4">
            <h2 class="text-base font-semibold text-white mb-4 pb-2 border-b border-dark-border flex items-center">
                <i data-lucide="wifi" class="w-5 h-5 mr-2 text-emerald-400"></i>網路狀態
            </h2>
            <div class="space-y-3">
                <div class="flex justify-between items-center">
                    <span class="text-sm text-gray-400">連線狀態</span>
                    <div class="flex items-center text-emerald-400">
                        <div class="w-2 h-2 rounded-full bg-emerald-400 mr-2 animate-pulse"></div>
                        <span class="text-sm font-medium">已連線</span>
                    </div>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-sm text-gray-400">延遲</span>
                    <span class="text-sm font-mono text-white">12 ms</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-sm text-gray-400">IP 位址</span>
                    <span class="text-sm font-mono text-gray-500">192.168.1.100</span>
                </div>
            </div>
        </div>

        <!-- 遊戲狀態 -->
        <div class="glass-card rounded-2xl p-4">
            <h2 class="text-base font-semibold text-white mb-4 pb-2 border-b border-dark-border flex items-center">
                <i data-lucide="gamepad-2" class="w-5 h-5 mr-2 text-emerald-400"></i>遊戲狀態
            </h2>
            <div class="space-y-3">
                <div class="flex justify-between items-center">
                    <span class="text-sm text-gray-400">目前遊戲</span>
                    <span class="text-sm font-medium text-white">幸運拉霸</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-sm text-gray-400">遊戲版本</span>
                    <span class="text-sm font-mono text-gray-500">v2.5.1</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-sm text-gray-400">機台餘額</span>
                    <span class="text-sm font-mono text-white">$3,500</span>
                </div>
            </div>
        </div>

        <!-- 系統資訊 -->
        <div class="glass-card rounded-2xl p-4">
            <h2 class="text-base font-semibold text-white mb-4 pb-2 border-b border-dark-border flex items-center">
                <i data-lucide="info" class="w-5 h-5 mr-2 text-emerald-400"></i>系統資訊
            </h2>
            <div class="space-y-3">
                <div class="flex justify-between items-center">
                    <span class="text-sm text-gray-400">系統版本</span>
                    <span class="text-sm font-mono text-white">v8.0.1</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-sm text-gray-400">運行時間</span>
                    <span class="text-sm font-mono text-white">7 天 3 小時</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-sm text-gray-400">最後同步</span>
                    <span class="text-sm font-mono text-white">2 分鐘前</span>
                </div>
            </div>
        </div>
    </main>

    <!-- 底部導航 -->
    <nav class="glass fixed bottom-0 left-0 right-0 z-30 h-20 flex items-center justify-around border-t border-dark-border px-2 pb-2">
        <a href="mockup_local_dashboard.html" class="flex flex-col items-center justify-center flex-1 py-2">
            <i data-lucide="layout-dashboard" class="w-6 h-6 mb-1 text-gray-500"></i>
            <span class="text-xs text-gray-500">儀表板</span>
        </a>
        <a href="#" class="flex flex-col items-center justify-center flex-1 py-2">
            <div class="w-12 h-12 -mt-6 rounded-full gradient-local flex items-center justify-center shadow-glow">
                <i data-lucide="monitor" class="w-6 h-6 text-white"></i>
            </div>
            <span class="text-xs text-emerald-500 mt-1 font-medium">機台</span>
        </a>
        <a href="mockup_local_cash.html" class="flex flex-col items-center justify-center flex-1 py-2">
            <i data-lucide="plus-circle" class="w-6 h-6 mb-1 text-gray-500"></i>
            <span class="text-xs text-gray-500">開洗分</span>
        </a>
        <a href="mockup_local_sync.html" class="flex flex-col items-center justify-center flex-1 py-2">
            <i data-lucide="refresh-cw" class="w-6 h-6 mb-1 text-gray-500"></i>
            <span class="text-xs text-gray-500">同步</span>
        </a>
        <a href="mockup_mvp_local_setup.html" class="flex flex-col items-center justify-center flex-1 py-2">
            <i data-lucide="settings" class="w-6 h-6 mb-1 text-gray-500"></i>
            <span class="text-xs text-gray-500">設定</span>
        </a>
    </nav>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
        lucide.createIcons();
    </script>
</body>
</html>
