<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>監控中心 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .glass-card:hover { border-color: rgba(168, 85, 247, 0.4); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 30px rgba(168, 85, 247, 0.2); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        .table-row-hover:hover { background: linear-gradient(90deg, rgba(124, 58, 237, 0.1), transparent); }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3), 0 0 20px rgba(168, 85, 247, 0.2); }
        .badge-local { background: #10b981; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
        .badge-central { background: #8b5cf6; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <h2 class="text-lg font-semibold text-white">設備健康度監控中心 <span class="badge-local ml-2">本地</span> <span class="badge-central ml-1">集中</span></h2>
            <div class="flex items-center space-x-4 text-base">
                <span class="flex items-center"><span class="w-2 h-2 rounded-full bg-emerald-500 mr-2"></span><span class="text-gray-400">正常:</span><span class="text-emerald-400 font-medium ml-1">47</span></span>
                <span class="flex items-center"><span class="w-2 h-2 rounded-full bg-amber-500 mr-2"></span><span class="text-gray-400">警告:</span><span class="text-amber-400 font-medium ml-1">2</span></span>
                <span class="flex items-center"><span class="w-2 h-2 rounded-full bg-red-500 mr-2"></span><span class="text-gray-400">異常:</span><span class="text-red-400 font-medium ml-1">1</span></span>
            </div>
        </header>
        <div class="flex-1 overflow-y-auto p-6">
            <div class="glass rounded-xl p-4 mb-6 border border-dark-border">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <span class="text-gray-400 text-base">目前告警規則:</span>
                        <span class="px-3 py-1 rounded-lg text-xs bg-purple-500/20 text-purple-400 border border-purple-500/30">CPU > 80%</span>
                        <span class="px-3 py-1 rounded-lg text-xs bg-purple-500/20 text-purple-400 border border-purple-500/30">RAM > 6GB</span>
                        <span class="px-3 py-1 rounded-lg text-xs bg-purple-500/20 text-purple-400 border border-purple-500/30">網路延遲 > 100ms</span>
                    </div>
                    <button class="px-4 py-2 glass rounded-lg text-base text-purple-400 hover:text-white transition-colors">
                        <i data-lucide="settings" class="w-4 h-4 inline mr-2"></i>設定告警參數
                    </button>
                </div>
            </div>
            <div class="glass-card rounded-2xl overflow-hidden">
                <table class="min-w-full">
                    <thead class="bg-dark-bg">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">機台編號</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">CPU 負載</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">記憶體</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">網路延遲</th>
                            <th class="px-6 py-3 text-center text-xs font-medium text-gray-400 uppercase">綜合狀態</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-400 uppercase">最後回報時間</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-dark-border">
                        <tr class="table-row-hover border-l-2 border-l-emerald-500">
                            <td class="px-6 py-4 whitespace-nowrap text-white font-mono font-bold">A-01</td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex items-center">
                                    <div class="w-16 bg-dark-bg rounded-full h-2 mr-2">
                                        <div class="bg-emerald-500 h-2 rounded-full" style="width: 45%"></div>
                                    </div>
                                    <span class="text-emerald-400 font-mono">45%</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-400 font-mono">2.1 GB</td>
                            <td class="px-6 py-4 whitespace-nowrap text-emerald-400 font-mono font-bold">12 ms</td>
                            <td class="px-6 py-4 whitespace-nowrap text-center"><i data-lucide="check-circle" class="w-6 h-6 text-emerald-400 inline"></i></td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-500 text-right font-mono">14:30:12</td>
                        </tr>
                        <tr class="table-row-hover border-l-2 border-l-amber-500 bg-amber-500/5">
                            <td class="px-6 py-4 whitespace-nowrap text-white font-mono font-bold">A-02</td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex items-center">
                                    <div class="w-16 bg-dark-bg rounded-full h-2 mr-2">
                                        <div class="bg-amber-500 h-2 rounded-full" style="width: 78%"></div>
                                    </div>
                                    <span class="text-amber-400 font-mono">78%</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-400 font-mono">3.8 GB</td>
                            <td class="px-6 py-4 whitespace-nowrap text-emerald-400 font-mono font-bold">45 ms</td>
                            <td class="px-6 py-4 whitespace-nowrap text-center"><i data-lucide="alert-triangle" class="w-6 h-6 text-amber-400 inline"></i></td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-500 text-right font-mono">14:30:05</td>
                        </tr>
                        <tr class="table-row-hover border-l-2 border-l-red-500 bg-red-500/5">
                            <td class="px-6 py-4 whitespace-nowrap text-white font-mono font-bold">A-03</td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex items-center">
                                    <div class="w-16 bg-red-900/50 rounded-full h-2 mr-2">
                                        <div class="bg-red-500 h-2 rounded-full" style="width: 92%"></div>
                                    </div>
                                    <span class="text-red-400 font-mono">92%</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-red-400 font-mono">7.2 GB !</td>
                            <td class="px-6 py-4 whitespace-nowrap text-red-400 font-mono font-bold">120 ms !</td>
                            <td class="px-6 py-4 whitespace-nowrap text-center"><i data-lucide="x-circle" class="w-6 h-6 text-red-400 inline"></i></td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-500 text-right font-mono">14:29:45</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <script src="js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_flg_monitor.html');
        lucide.createIcons();
    </script>
</body>
</html>
