<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多帳號管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #F3F4F6;
        }
    </style>
</head>

<body class="bg-gray-50 flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-indigo-900 text-white flex flex-col h-full">
        <div class="h-16 flex items-center justify-center border-b border-indigo-800">
            <h1 class="text-xl font-bold tracking-wider">GAME PLATFORM</h1>
        </div>
        <nav class="flex-1 py-4 space-y-1">
            <a href="#"
                class="block px-6 py-3 text-indigo-200 hover:bg-indigo-800 hover:text-white transition-colors">儀表板</a>
            <a href="#"
                class="block px-6 py-3 text-indigo-200 hover:bg-indigo-800 hover:text-white transition-colors">機台管理</a>
            <a href="#"
                class="block px-6 py-3 text-indigo-200 hover:bg-indigo-800 hover:text-white transition-colors">遊戲管理</a>
            <a href="#" class="block px-6 py-3 bg-indigo-800 text-white border-l-4 border-white font-medium">多帳號管理</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8">
            <h2 class="text-xl font-bold text-gray-800">多帳號管理</h2>
            <button
                class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 flex items-center shadow-sm">
                新增多帳號
            </button>
        </header>

        <div class="flex-1 p-8 overflow-hidden flex flex-col">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 flex-1 flex flex-col overflow-hidden">
                <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                    <div class="flex space-x-3">
                        <input type="text" placeholder="🔍 搜尋多帳號名稱..."
                            class="px-3 py-2 border border-gray-300 rounded-lg text-sm w-64 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <button
                        class="px-4 py-2 bg-white border border-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-50">匯出</button>
                </div>

                <div class="flex-1 overflow-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-50 sticky top-0 z-10 border-b border-gray-200">
                            <tr>
                                <th class="py-3 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">#
                                </th>
                                <th class="py-3 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">多帳號名稱
                                </th>
                                <th class="py-3 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">代表人
                                </th>
                                <th
                                    class="py-3 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-right">
                                    機台數</th>
                                <th
                                    class="py-3 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-right">
                                    今日營收</th>
                                <th
                                    class="py-3 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-center">
                                    狀態</th>
                                <th
                                    class="py-3 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-right">
                                    操作</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 bg-white">
                            <tr class="hover:bg-gray-50">
                                <td class="py-3 px-4 text-sm text-gray-500">1</td>
                                <td class="py-3 px-4 text-sm font-medium text-gray-800">北部多帳號</td>
                                <td class="py-3 px-4 text-sm text-gray-600">張小明</td>
                                <td class="py-3 px-4 text-sm font-medium text-gray-800 text-right">15台</td>
                                <td class="py-3 px-4 text-sm font-medium text-gray-800 text-right">$45,000</td>
                                <td class="py-3 px-4 text-sm text-center"><span
                                        class="px-2 py-1 bg-emerald-100 text-emerald-700 rounded text-xs font-medium">正常</span>
                                </td>
                                <td class="py-3 px-4 text-right"><button
                                        class="text-indigo-600 font-medium text-sm">詳情</button></td>
                            </tr>
                            <tr class="hover:bg-gray-50">
                                <td class="py-3 px-4 text-sm text-gray-500">2</td>
                                <td class="py-3 px-4 text-sm font-medium text-gray-800">南部多帳號</td>
                                <td class="py-3 px-4 text-sm text-gray-600">李小華</td>
                                <td class="py-3 px-4 text-sm font-medium text-gray-800 text-right">20台</td>
                                <td class="py-3 px-4 text-sm font-medium text-gray-800 text-right">$62,000</td>
                                <td class="py-3 px-4 text-sm text-center"><span
                                        class="px-2 py-1 bg-emerald-100 text-emerald-700 rounded text-xs font-medium">正常</span>
                                </td>
                                <td class="py-3 px-4 text-right"><button
                                        class="text-indigo-600 font-medium text-sm">詳情</button></td>
                            </tr>
                            <tr class="hover:bg-gray-50 text-gray-400">
                                <td class="py-3 px-4 text-sm text-gray-400">3</td>
                                <td class="py-3 px-4 text-sm font-medium text-gray-500">中部多帳號</td>
                                <td class="py-3 px-4 text-sm text-gray-400">王小明</td>
                                <td class="py-3 px-4 text-sm font-medium text-gray-500 text-right">10台</td>
                                <td class="py-3 px-4 text-sm font-medium text-gray-500 text-right">$28,000</td>
                                <td class="py-3 px-4 text-sm text-center"><span
                                        class="px-2 py-1 bg-red-100 text-red-700 rounded text-xs font-medium">停權</span>
                                </td>
                                <td class="py-3 px-4 text-right"><button
                                        class="text-indigo-400 font-medium text-sm">詳情</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
