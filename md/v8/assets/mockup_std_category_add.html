<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增分類 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        
        
        
        
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3), 0 0 20px rgba(168, 85, 247, 0.2); }
        
        
        
        
    </style>
</head>
<body class="min-h-screen flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div class="flex-1 overflow-y-auto p-6">
            <div class="max-w-2xl mx-auto">
                <div class="glass-card rounded-2xl p-8">
                    <div class="text-center mb-8">
                        <div class="w-16 h-16 mx-auto rounded-2xl bg-gradient-to-br from-purple-600 to-indigo-600 flex items-center justify-center mb-4">
                            <i data-lucide="folder-plus" class="w-8 h-8 text-white"></i>
                        </div>
                        <h1 class="text-2xl font-bold text-white">新增分類</h1>
                        <p class="text-gray-400 mt-2">建立新的遊戲分類</p>
                    </div>
                    <form class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">分類名稱 *</label>
                            <input type="text" placeholder="例如: 老虎機" class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none input-focus">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">分類圖示</label>
                            <div class="flex items-center space-x-4">
                                <div class="w-16 h-16 rounded-xl bg-dark-bg border border-dark-border flex items-center justify-center text-3xl">
                                    🎰
                                </div>
                                <div class="flex flex-wrap gap-2">
                                    <button type="button" class="w-10 h-10 rounded-lg bg-dark-bg border border-dark-border hover:border-purple-500 flex items-center justify-center text-xl">🎰</button>
                                    <button type="button" class="w-10 h-10 rounded-lg bg-dark-bg border border-dark-border hover:border-purple-500 flex items-center justify-center text-xl">🐟</button>
                                    <button type="button" class="w-10 h-10 rounded-lg bg-dark-bg border border-dark-border hover:border-purple-500 flex items-center justify-center text-xl">♠️</button>
                                    <button type="button" class="w-10 h-10 rounded-lg bg-dark-bg border border-dark-border hover:border-purple-500 flex items-center justify-center text-xl">🎥</button>
                                    <button type="button" class="w-10 h-10 rounded-lg bg-dark-bg border border-dark-border hover:border-purple-500 flex items-center justify-center text-xl">🎯</button>
                                </div>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">排序</label>
                            <input type="number" placeholder="0" class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none input-focus">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">分類說明</label>
                            <textarea rows="2" placeholder="選填分類描述..." class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none input-focus"></textarea>
                        </div>
                        <div>
                            <label class="flex items-center space-x-3 cursor-pointer">
                                <input type="checkbox" checked class="w-5 h-5 rounded bg-dark-bg border-dark-border text-purple-600 focus:ring-purple-500">
                                <span class="text-gray-300">立即啟用</span>
                            </label>
                        </div>
                        <div class="flex justify-end space-x-4 pt-4 border-t border-dark-border">
                            <a href="mockup_std_game_category.html" class="px-6 py-3 glass border border-dark-border text-gray-400 rounded-lg font-medium hover:text-white">取消</a>
                            <button type="button" class="px-6 py-3 bg-gradient-to-r from-purple-600 to-indigo-600 text-white rounded-lg font-medium shadow-glow-sm hover:opacity-90 flex items-center">
                                <i data-lucide="plus" class="w-4 h-4 mr-2"></i>建立分類
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <script>
        lucide.createIcons();

        function toggleSidebarGroup(header) {
            const group = header.parentElement;
            const submenu = group.querySelector('.sidebar-submenu');
            if (group.classList.contains('open')) {
                group.classList.remove('open');
                submenu.classList.remove('open');
            } else {
                group.classList.add('open');
                submenu.classList.add('open');
            }
        }
    </script>
<script src="js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_std_category_add.html');
    </script>
</body>
</html>
