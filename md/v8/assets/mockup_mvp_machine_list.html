<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機台管理列表</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        body { font-family: 'Roboto', 'Noto Sans TC', sans-serif; background-color: #F4F7F6; }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'DM Sans', 'Noto Sans TC', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-gradient-to-b from-slate-900 to-indigo-950 text-white flex flex-col border-r border-slate-800 shadow-2xl relative h-full">
        <div class="h-16 flex items-center justify-center border-b border-[#303F9F]">
            <h1 class="text-xl font-bold tracking-wider">GAME PLATFORM</h1>
        </div>
        <nav class="flex-1 py-4 space-y-1">
            <a href="#"
                class="block px-6 py-3 text-indigo-200 hover:bg-white/10 hover:text-white transition-all duration-300">儀表板</a>
            <a href="#" class="block px-6 py-3 bg-white/10 backdrop-blur-md text-white border-l-4 border-cyan-400 font-bold shadow-inner relative overflow-hidden">機台管理</a>
            <a href="#"
                class="block px-6 py-3 text-indigo-200 hover:bg-white/10 hover:text-white transition-all duration-300">遊戲管理</a>
            <a href="#"
                class="block px-6 py-3 text-indigo-200 hover:bg-white/10 hover:text-white transition-all duration-300">玩家管理</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <!-- Header -->
        <header class="h-16 bg-white/80 backdrop-blur-xl border-b border-white/20 sticky top-0 z-50 shadow-sm flex items-center justify-between px-8">
            <h2 class="text-xl font-bold text-slate-800">機台管理</h2>
            <div class="flex items-center space-x-4">
                <button
                    class="px-4 py-2 bg-gradient-to-r from-indigo-600 to-cyan-500 text-white rounded-xl text-sm font-medium shadow-lg shadow-indigo-500/30 hover:shadow-cyan-500/40 hover:-translate-y-0.5 transition-all duration-300 flex items-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    新增機台
                </button>
            </div>
        </header>

        <!-- Data Table Section -->
        <div class="flex-1 p-8 overflow-hidden flex flex-col">
            <div class="bg-white rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100/60 transition-all duration-300 hover:shadow-[0_8px_30px_rgb(0,0,0,0.08)] flex-1 flex flex-col overflow-hidden">
                <!-- Toolbar -->
                <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                    <div class="flex space-x-3">
                        <input type="text" placeholder="🔍 搜尋機台編號/名稱..."
                            class="px-3 py-2 border border-slate-300 rounded-lg text-sm w-64 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <select class="px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white focus:outline-none">
                            <option>所有狀態</option>
                            <option>🟢 連線中</option>
                            <option>🔴 離線</option>
                        </select>
                    </div>
                    <button
                        class="px-4 py-2 bg-white border border-slate-300 text-gray-700 rounded-lg text-sm font-medium hover:bg-slate-50">匯出清單</button>
                </div>

                <!-- Table -->
                <div class="flex-1 overflow-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50 sticky top-0 z-10 border-b border-slate-200">
                            <tr>
                                <th class="py-3 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">#
                                </th>
                                <th class="py-3 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">機台編號
                                </th>
                                <th class="py-3 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">機台名稱
                                </th>
                                <th class="py-3 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">位置
                                </th>
                                <th class="py-3 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">狀態
                                </th>
                                <th class="py-3 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">最後同步
                                </th>
                                <th
                                    class="py-3 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider text-right">
                                    操作</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 bg-white">
                            <tr class="hover:bg-slate-50">
                                <td class="py-3 px-4 text-sm text-slate-500">1</td>
                                <td class="py-3 px-4 text-sm font-bold text-indigo-600">A-001</td>
                                <td class="py-3 px-4 text-sm font-medium text-slate-800">旗艦1號</td>
                                <td class="py-3 px-4 text-sm text-slate-600">門市A (1F)</td>
                                <td class="py-3 px-4 text-sm"><span
                                        class="flex items-center text-emerald-600 font-medium"><span
                                            class="w-2 h-2 rounded-full bg-emerald-500 mr-2"></span>連線中</span></td>
                                <td class="py-3 px-4 text-sm text-slate-500">14:30:12</td>
                                <td class="py-3 px-4 text-right">
                                    <button
                                        class="text-indigo-600 hover:text-[#283593] font-medium text-sm">詳情</button>
                                </td>
                            </tr>
                            <tr class="hover:bg-slate-50">
                                <td class="py-3 px-4 text-sm text-slate-500">2</td>
                                <td class="py-3 px-4 text-sm font-bold text-indigo-600">A-002</td>
                                <td class="py-3 px-4 text-sm font-medium text-slate-800">旗艦2號</td>
                                <td class="py-3 px-4 text-sm text-slate-600">門市B (VIP室)</td>
                                <td class="py-3 px-4 text-sm"><span
                                        class="flex items-center text-red-600 font-medium"><span
                                            class="w-2 h-2 rounded-full bg-red-500 mr-2"></span>離線</span></td>
                                <td class="py-3 px-4 text-sm text-slate-500">10:15:00</td>
                                <td class="py-3 px-4 text-right">
                                    <button
                                        class="text-indigo-600 hover:text-[#283593] font-medium text-sm">詳情</button>
                                </td>
                            </tr>
                            <tr class="hover:bg-slate-50">
                                <td class="py-3 px-4 text-sm text-slate-500">3</td>
                                <td class="py-3 px-4 text-sm font-bold text-indigo-600">A-003</td>
                                <td class="py-3 px-4 text-sm font-medium text-slate-800">標準1號</td>
                                <td class="py-3 px-4 text-sm text-slate-600">門市C</td>
                                <td class="py-3 px-4 text-sm"><span
                                        class="flex items-center text-emerald-600 font-medium"><span
                                            class="w-2 h-2 rounded-full bg-emerald-500 mr-2"></span>連線中</span></td>
                                <td class="py-3 px-4 text-sm text-slate-500">14:28:44</td>
                                <td class="py-3 px-4 text-right">
                                    <button
                                        class="text-indigo-600 hover:text-[#283593] font-medium text-sm">詳情</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
