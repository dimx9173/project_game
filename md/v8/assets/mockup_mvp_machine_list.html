<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機台管理列表</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        body { font-family: 'Roboto', 'Noto Sans TC', sans-serif; background-color: #F4F7F6; }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'DM Sans', 'Noto Sans TC', sans-serif;
        }
    </style>
</head>

<body class="bg-[#F4F7F6] flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-[#283593] text-white flex flex-col h-full">
        <div class="h-16 flex items-center justify-center border-b border-[#303F9F]">
            <h1 class="text-xl font-bold tracking-wider">GAME PLATFORM</h1>
        </div>
        <nav class="flex-1 py-4 space-y-1">
            <a href="#"
                class="block px-6 py-3 text-[#C5CAE9] hover:bg-[#303F9F] hover:text-white transition-colors">儀表板</a>
            <a href="#" class="block px-6 py-3 bg-[#303F9F] text-white border-l-4 border-white font-medium">機台管理</a>
            <a href="#"
                class="block px-6 py-3 text-[#C5CAE9] hover:bg-[#303F9F] hover:text-white transition-colors">遊戲管理</a>
            <a href="#"
                class="block px-6 py-3 text-[#C5CAE9] hover:bg-[#303F9F] hover:text-white transition-colors">玩家管理</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <!-- Header -->
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8">
            <h2 class="text-xl font-bold text-gray-800">機台管理</h2>
            <div class="flex items-center space-x-4">
                <button
                    class="px-4 py-2 bg-[#3F51B5] text-white rounded-lg text-sm font-medium hover:bg-[#3949AB] flex items-center shadow-sm">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    新增機台
                </button>
            </div>
        </header>

        <!-- Data Table Section -->
        <div class="flex-1 p-8 overflow-hidden flex flex-col">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 flex-1 flex flex-col overflow-hidden">
                <!-- Toolbar -->
                <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-[#F4F7F6]">
                    <div class="flex space-x-3">
                        <input type="text" placeholder="🔍 搜尋機台編號/名稱..."
                            class="px-3 py-2 border border-gray-300 rounded-lg text-sm w-64 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <select class="px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white focus:outline-none">
                            <option>所有狀態</option>
                            <option>🟢 連線中</option>
                            <option>🔴 離線</option>
                        </select>
                    </div>
                    <button
                        class="px-4 py-2 bg-white border border-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:bg-[#F4F7F6]">匯出清單</button>
                </div>

                <!-- Table -->
                <div class="flex-1 overflow-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-[#F4F7F6] sticky top-0 z-10 border-b border-gray-200">
                            <tr>
                                <th class="py-3 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">#
                                </th>
                                <th class="py-3 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">機台編號
                                </th>
                                <th class="py-3 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">機台名稱
                                </th>
                                <th class="py-3 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">位置
                                </th>
                                <th class="py-3 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">狀態
                                </th>
                                <th class="py-3 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">最後同步
                                </th>
                                <th
                                    class="py-3 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-right">
                                    操作</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 bg-white">
                            <tr class="hover:bg-[#F4F7F6]">
                                <td class="py-3 px-4 text-sm text-gray-500">1</td>
                                <td class="py-3 px-4 text-sm font-bold text-[#3F51B5]">A-001</td>
                                <td class="py-3 px-4 text-sm font-medium text-gray-800">旗艦1號</td>
                                <td class="py-3 px-4 text-sm text-gray-600">門市A (1F)</td>
                                <td class="py-3 px-4 text-sm"><span
                                        class="flex items-center text-emerald-600 font-medium"><span
                                            class="w-2 h-2 rounded-full bg-emerald-500 mr-2"></span>連線中</span></td>
                                <td class="py-3 px-4 text-sm text-gray-500">14:30:12</td>
                                <td class="py-3 px-4 text-right">
                                    <button
                                        class="text-[#3F51B5] hover:text-[#283593] font-medium text-sm">詳情</button>
                                </td>
                            </tr>
                            <tr class="hover:bg-[#F4F7F6]">
                                <td class="py-3 px-4 text-sm text-gray-500">2</td>
                                <td class="py-3 px-4 text-sm font-bold text-[#3F51B5]">A-002</td>
                                <td class="py-3 px-4 text-sm font-medium text-gray-800">旗艦2號</td>
                                <td class="py-3 px-4 text-sm text-gray-600">門市B (VIP室)</td>
                                <td class="py-3 px-4 text-sm"><span
                                        class="flex items-center text-red-600 font-medium"><span
                                            class="w-2 h-2 rounded-full bg-red-500 mr-2"></span>離線</span></td>
                                <td class="py-3 px-4 text-sm text-gray-500">10:15:00</td>
                                <td class="py-3 px-4 text-right">
                                    <button
                                        class="text-[#3F51B5] hover:text-[#283593] font-medium text-sm">詳情</button>
                                </td>
                            </tr>
                            <tr class="hover:bg-[#F4F7F6]">
                                <td class="py-3 px-4 text-sm text-gray-500">3</td>
                                <td class="py-3 px-4 text-sm font-bold text-[#3F51B5]">A-003</td>
                                <td class="py-3 px-4 text-sm font-medium text-gray-800">標準1號</td>
                                <td class="py-3 px-4 text-sm text-gray-600">門市C</td>
                                <td class="py-3 px-4 text-sm"><span
                                        class="flex items-center text-emerald-600 font-medium"><span
                                            class="w-2 h-2 rounded-full bg-emerald-500 mr-2"></span>連線中</span></td>
                                <td class="py-3 px-4 text-sm text-gray-500">14:28:44</td>
                                <td class="py-3 px-4 text-right">
                                    <button
                                        class="text-[#3F51B5] hover:text-[#283593] font-medium text-sm">詳情</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
