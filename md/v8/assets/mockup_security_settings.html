<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全設定 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .glass-card:hover { border-color: rgba(168, 85, 247, 0.4); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        .table-row-hover:hover { background: linear-gradient(90deg, rgba(124, 58, 237, 0.1), transparent); }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3); outline: none; }
        .badge-local { background: #10b981; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <div class="flex items-center">
                <h2 class="text-lg font-semibold text-white">安全設定</h2>
            </div>
            <button class="px-4 py-2 gradient-purple rounded-lg text-sm text-white font-medium shadow-glow-sm">
                <i data-lucide="save" class="w-4 h-4 mr-2"></i>儲存設定
            </button>
        </header>
        <div class="flex-1 overflow-y-auto p-6">
            <div class="grid grid-cols-2 gap-6">
                <!-- 登入安全 -->
                <div class="glass-card rounded-xl p-6">
                    <h3 class="text-lg font-semibold text-white mb-6 flex items-center">
                        <i data-lucide="log-in" class="w-5 h-5 mr-2 text-purple-400"></i>登入安全
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">密碼最小長度</label>
                            <input type="number" value="8" class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">密碼複雜度要求</label>
                            <div class="space-y-2">
                                <label class="flex items-center">
                                    <input type="checkbox" checked class="rounded border-dark-border mr-3">
                                    <span class="text-sm text-gray-300">需包含大寫字母</span>
                                </label>
                                <label class="flex items-center">
                                    <input type="checkbox" checked class="rounded border-dark-border mr-3">
                                    <span class="text-sm text-gray-300">需包含小寫字母</span>
                                </label>
                                <label class="flex items-center">
                                    <input type="checkbox" checked class="rounded border-dark-border mr-3">
                                    <span class="text-sm text-gray-300">需包含數字</span>
                                </label>
                                <label class="flex items-center">
                                    <input type="checkbox" class="rounded border-dark-border mr-3">
                                    <span class="text-sm text-gray-300">需包含特殊符號</span>
                                </label>
                            </div>
                        </div>
                        <div class="pt-2">
                            <label class="flex items-center">
                                <input type="checkbox" checked class="rounded border-dark-border mr-3">
                                <span class="text-sm text-gray-300">啟用兩步驟驗證 (2FA)</span>
                            </label>
                        </div>
                        <div class="pt-2">
                            <label class="flex items-center">
                                <input type="checkbox" checked class="rounded border-dark-border mr-3">
                                <span class="text-sm text-gray-300">登入失敗 5 次鎖定帳號</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- 會員安全 -->
                <div class="glass-card rounded-xl p-6">
                    <h3 class="text-lg font-semibold text-white mb-6 flex items-center">
                        <i data-lucide="user-check" class="w-5 h-5 mr-2 text-purple-400"></i>會員安全
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">新會員 Email 驗證</label>
                            <select class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                                <option selected>強制驗證</option>
                                <option>可選驗證</option>
                                <option>不需驗證</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">手機號碼驗證</label>
                            <select class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                                <option selected>強制驗證</option>
                                <option>可選驗證</option>
                                <option>不需驗證</option>
                            </select>
                        </div>
                        <div class="pt-2">
                            <label class="flex items-center">
                                <input type="checkbox" checked class="rounded border-dark-border mr-3">
                                <span class="text-sm text-gray-300">提款需進行 OTP 驗證</span>
                            </label>
                        </div>
                        <div class="pt-2">
                            <label class="flex items-center">
                                <input type="checkbox" class="rounded border-dark-border mr-3">
                                <span class="text-sm text-gray-300">啟用裝置綁定</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- IP 限制 -->
                <div class="glass-card rounded-xl p-6">
                    <h3 class="text-lg font-semibold text-white mb-6 flex items-center">
                        <i data-lucide="globe" class="w-5 h-5 mr-2 text-purple-400"></i>IP 限制
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">允許的 IP 範圍</label>
                            <textarea class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus h-24" placeholder="一行一個 IP 或 CIDR"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">封鎖的 IP 範圍</label>
                            <textarea class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus h-24" placeholder="一行一個 IP 或 CIDR"></textarea>
                        </div>
                        <div class="pt-2">
                            <label class="flex items-center">
                                <input type="checkbox" checked class="rounded border-dark-border mr-3">
                                <span class="text-sm text-gray-300">啟用 VPN/Proxy 偵測</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- 風控規則 -->
                <div class="glass-card rounded-xl p-6">
                    <h3 class="text-lg font-semibold text-white mb-6 flex items-center">
                        <i data-lucide="shield-alert" class="w-5 h-5 mr-2 text-purple-400"></i>風控規則
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">單筆最高存款</label>
                            <input type="number" value="100000" class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">單筆最高提款</label>
                            <input type="number" value="50000" class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">單日最高提款次數</label>
                            <input type="number" value="5" class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                        </div>
                        <div class="pt-2">
                            <label class="flex items-center">
                                <input type="checkbox" checked class="rounded border-dark-border mr-3">
                                <span class="text-sm text-gray-300">啟用異常行為偵測</span>
                            </label>
                        </div>
                        <div class="pt-2">
                            <label class="flex items-center">
                                <input type="checkbox" checked class="rounded border-dark-border mr-3">
                                <span class="text-sm text-gray-300">大額交易自動審核</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- API 安全 -->
                <div class="glass-card rounded-xl p-6 col-span-2">
                    <h3 class="text-lg font-semibold text-white mb-6 flex items-center">
                        <i data-lucide="key" class="w-5 h-5 mr-2 text-purple-400"></i>API 安全
                    </h3>
                    <div class="grid grid-cols-2 gap-6">
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">API Key 前綴</label>
                                <input type="text" value="pk_live_" class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">API 請求速率限制</label>
                                <div class="flex items-center gap-2">
                                    <input type="number" value="100" class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                                    <span class="text-gray-400 text-sm">次/分鐘</span>
                                </div>
                            </div>
                            <div class="pt-2">
                                <label class="flex items-center">
                                    <input type="checkbox" checked class="rounded border-dark-border mr-3">
                                    <span class="text-sm text-gray-300">啟用 API 請求日誌</span>
                                </label>
                            </div>
                            <div class="pt-2">
                                <label class="flex items-center">
                                    <input type="checkbox" checked class="rounded border-dark-border mr-3">
                                    <span class="text-sm text-gray-300">啟用 IP 白名單</span>
                                </label>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">允許的 HTTP 方法</label>
                                <div class="grid grid-cols-3 gap-2">
                                    <label class="flex items-center justify-center p-2 border border-purple-500 bg-purple-500/20 rounded">
                                        <input type="checkbox" checked class="hidden mr-2">
                                        <span class="text-sm text-white">GET</span>
                                    </label>
                                    <label class="flex items-center justify-center p-2 border border-dark-border rounded">
                                        <input type="checkbox" checked class="hidden mr-2">
                                        <span class="text-sm text-gray-400">POST</span>
                                    </label>
                                    <label class="flex items-center justify-center p-2 border border-dark-border rounded">
                                        <input type="checkbox" class="hidden mr-2">
                                        <span class="text-sm text-gray-400">PUT</span>
                                    </label>
                                    <label class="flex items-center justify-center p-2 border border-dark-border rounded">
                                        <input type="checkbox" class="hidden mr-2">
                                        <span class="text-sm text-gray-400">DELETE</span>
                                    </label>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">CORS 允許來源</label>
                                <input type="text" value="https://example.com, https://admin.example.com" class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                                <p class="text-xs text-gray-500 mt-1">多個網域用逗號分隔</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_security_settings.html');
        lucide.createIcons();
    </script>
</body>
</html>
