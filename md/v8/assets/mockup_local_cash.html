<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>開分/洗分 - 本地後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' },
                        local: { 50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7', 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857', 800: '#065f46', 900: '#064e3b' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(16, 185, 129, 0.3)', 'glow-sm': '0 0 15px rgba(16, 185, 129, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #059669 #0a0a0f; -webkit-tap-highlight-color: transparent; }
        *::-webkit-scrollbar { width: 4px; height: 4px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #10b981, #34d399); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; touch-action: manipulation; }
        .glass { background: rgba(18, 18, 26, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.95) 0%, rgba(30, 30, 46, 0.7) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.2); box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5); }
        .glass-card:active { transform: scale(0.98); border-color: rgba(16, 185, 129, 0.5); }
        .gradient-bg { background: linear-gradient(180deg, #0a0a0f 0%, #0a1a14 50%, #0a0a0f 100%); }
        .gradient-local { background: linear-gradient(135deg, #10b981 0%, #34d399 50%, #6ee7b7 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        .btn-touch { min-height: 56px; min-width: 56px; touch-action: manipulation; }
        .btn-touch:active { transform: scale(0.95); opacity: 0.9; }
        .badge-local { background: #10b981; color: white; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
        .badge-central { background: #8b5cf6; color: white; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.3), 0 0 20px rgba(16, 185, 129, 0.2); }
        .menu-slide { transform: translateX(-100%); transition: transform 0.3s ease; }
        .menu-slide.active { transform: translateX(0); }
        .overlay { opacity: 0; visibility: hidden; transition: opacity 0.3s ease; }
        .overlay.active { opacity: 1; visibility: visible; }
        .keypad-btn { display: flex; align-items: center; justify-content: center; min-height: 72px; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 12px; text-2xl font-mono font-bold; text-white; transition-all cursor-pointer; }
        .keypad-btn:active { background: rgba(16, 185, 129, 0.3); transform: scale(0.95); }
        .keypad-btn.danger { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3); }
        .keypad-btn.danger:active { background: rgba(239, 68, 68, 0.3); }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); } 50% { box-shadow: 0 0 25px rgba(16, 185, 129, 0.5); } }
        .status-online { animation: pulse-glow 2s infinite; }
    </style>
</head>
<body class="gradient-bg min-h-screen pb-24">
    <!-- 漢堡選單遮罩 -->
    <div id="overlay" class="overlay fixed inset-0 bg-black/60 z-40" onclick="toggleMenu()"></div>

    <!-- 側邊選單 -->
    <aside id="sidebar" class="menu-slide fixed left-0 top-0 bottom-0 w-72 bg-dark-sidebar border-r border-dark-border z-50 flex flex-col">
        <div class="h-16 flex items-center px-4 border-b border-dark-border">
            <div class="w-10 h-10 rounded-xl gradient-local flex items-center justify-center shadow-glow-sm mr-3 flex-shrink-0">
                <i data-lucide="laptop" class="w-5 h-5 text-white"></i>
            </div>
            <div>
                <span class="font-bold text-white">本地後台</span>
                <span class="text-xs text-gray-500 block">本地模式</span>
            </div>
        </div>
        <nav class="flex-1 py-4 px-3 space-y-1 overflow-y-auto">
            <a href="mockup_local_dashboard.html" class="sidebar-link flex items-center px-4 py-3.5 text-gray-300 hover:text-white rounded-xl touch-manipulation">
                <i data-lucide="layout-dashboard" class="w-6 h-6 mr-3"></i>
                <span class="text-base">本地儀表板</span>
            </a>
            <a href="mockup_local_machine.html" class="sidebar-link flex items-center px-4 py-3.5 text-gray-300 hover:text-white rounded-xl touch-manipulation">
                <i data-lucide="monitor" class="w-6 h-6 mr-3"></i>
                <span class="text-base">機台狀態</span>
                <span class="badge-local ml-auto">本地</span>
            </a>
            <a href="mockup_local_cash.html" class="sidebar-link active flex items-center px-4 py-3.5 text-gray-300 hover:text-white rounded-xl touch-manipulation">
                <i data-lucide="plus-circle" class="w-6 h-6 mr-3"></i>
                <span class="text-base">開分/洗分</span>
                <span class="badge-local ml-auto">本地</span>
            </a>
            <a href="mockup_local_sync.html" class="sidebar-link flex items-center px-4 py-3.5 text-gray-300 hover:text-white rounded-xl touch-manipulation">
                <i data-lucide="refresh-cw" class="w-6 h-6 mr-3"></i>
                <span class="text-base">同步狀態</span>
                <span class="badge-local ml-auto">本地</span>
            </a>
            <a href="mockup_mvp_local_setup.html" class="sidebar-link flex items-center px-4 py-3.5 text-gray-300 hover:text-white rounded-xl touch-manipulation">
                <i data-lucide="settings" class="w-6 h-6 mr-3"></i>
                <span class="text-base">本機設定</span>
                <span class="badge-local ml-auto">本地</span>
            </a>
        </nav>
    </aside>

    <!-- 頂部導航 -->
    <header class="glass fixed top-0 left-0 right-0 z-30 h-16 flex items-center justify-between px-4 border-b border-dark-border">
        <button onclick="toggleMenu()" class="btn-touch p-3 rounded-xl hover:bg-dark-hover">
            <i data-lucide="menu" class="w-7 h-7 text-white"></i>
        </button>
        <div class="flex items-center space-x-3">
            <div class="flex items-center px-3 py-1.5 bg-emerald-500/20 text-emerald-400 rounded-full border border-emerald-500/30">
                <div class="w-2 h-2 rounded-full bg-emerald-400 mr-2 animate-pulse"></div>
                <span class="text-xs font-medium">已連線</span>
            </div>
            <div class="text-sm font-mono text-gray-400">A-01</div>
        </div>
        <div class="w-12"></div>
    </header>

    <!-- 主要內容 -->
    <main class="pt-20 pb-4 px-4 space-y-4">
        <!-- 今日營收摘要 -->
        <div class="glass-card rounded-2xl p-4 flex justify-between items-center">
            <div>
                <div class="text-xs font-medium text-gray-500 mb-1">今日總淨收</div>
                <div class="text-2xl font-mono font-bold text-white">$12,500</div>
            </div>
            <div class="text-right">
                <div class="text-xs font-medium text-gray-500 mb-1">今日下注</div>
                <div class="text-lg font-mono font-bold text-gray-400">$45,000</div>
            </div>
            <div class="text-right">
                <div class="text-xs font-medium text-gray-500 mb-1">今日派彩</div>
                <div class="text-lg font-mono font-bold text-gray-400">$32,500</div>
            </div>
        </div>

        <!-- 模式切換標籤 -->
        <div class="flex space-x-2 bg-dark-bg rounded-xl p-1 border border-dark-border">
            <button id="tab-in" class="flex-1 py-3 rounded-lg text-base font-medium bg-local-500 text-white" onclick="switchTab('in')">
                開分 (注資)
            </button>
            <button id="tab-out" class="flex-1 py-3 rounded-lg text-base font-medium text-gray-400 hover:text-white" onclick="switchTab('out')">
                洗分 (結算)
            </button>
        </div>

        <!-- 開分面板 -->
        <div id="panel-in" class="glass-card rounded-2xl p-4 space-y-4">
            <!-- PIN 碼輸入 -->
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">安全 PIN 碼</label>
                <div class="flex gap-3 justify-center">
                    <div id="pin-1" class="w-14 h-14 text-center text-2xl rounded-xl border-2 border-local-500 bg-local-500/10 flex items-center justify-center text-local-500 font-bold">●</div>
                    <div id="pin-2" class="w-14 h-14 text-center text-2xl rounded-xl border-2 border-local-500 bg-local-500/10 flex items-center justify-center text-local-500 font-bold">●</div>
                    <div id="pin-3" class="w-14 h-14 text-center text-2xl rounded-xl border-2 border-local-500 bg-local-500/10 flex items-center justify-center text-local-500 font-bold">●</div>
                    <div id="pin-4" class="w-14 h-14 text-center text-2xl border-2 border-dark-border rounded-xl bg-dark-bg"></div>
                </div>
            </div>

            <!-- 金額輸入 -->
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">開分金額</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-2xl text-gray-500 font-mono">$</span>
                    <input type="text" id="amount-display" value="1,000" readonly class="w-full h-16 pl-10 pr-4 text-right text-3xl font-mono font-bold rounded-xl border border-local-500 bg-dark-bg text-white focus:outline-none input-focus">
                </div>
            </div>

            <!-- 數字鍵盤 -->
            <div class="grid grid-cols-3 gap-3">
                <div class="keypad-btn" onclick="inputDigit('1')">1</div>
                <div class="keypad-btn" onclick="inputDigit('2')">2</div>
                <div class="keypad-btn" onclick="inputDigit('3')">3</div>
                <div class="keypad-btn" onclick="inputDigit('4')">4</div>
                <div class="keypad-btn" onclick="inputDigit('5')">5</div>
                <div class="keypad-btn" onclick="inputDigit('6')">6</div>
                <div class="keypad-btn" onclick="inputDigit('7')">7</div>
                <div class="keypad-btn" onclick="inputDigit('8')">8</div>
                <div class="keypad-btn" onclick="inputDigit('9')">9</div>
                <div class="keypad-btn danger" onclick="clearAmount()">清除</div>
                <div class="keypad-btn" onclick="inputDigit('0')">0</div>
                <div class="keypad-btn" onclick="backspace()">←</div>
            </div>

            <!-- 快捷金額 -->
            <div class="flex gap-2">
                <button onclick="setQuickAmount(100)" class="flex-1 btn-touch py-3 glass rounded-xl text-sm font-medium text-gray-300">+$100</button>
                <button onclick="setQuickAmount(500)" class="flex-1 btn-touch py-3 glass rounded-xl text-sm font-medium text-gray-300">+$500</button>
                <button onclick="setQuickAmount(1000)" class="flex-1 btn-touch py-3 glass rounded-xl text-sm font-medium text-gray-300">+$1,000</button>
                <button onclick="setQuickAmount(5000)" class="flex-1 btn-touch py-3 glass rounded-xl text-sm font-medium text-gray-300">+$5,000</button>
            </div>

            <!-- 確認按鈕 -->
            <button class="w-full btn-touch py-4 gradient-local text-white rounded-xl text-xl font-bold shadow-glow transition-all flex justify-center items-center">
                <i data-lucide="check-circle" class="w-6 h-6 mr-2"></i>
                確認開分
            </button>
        </div>

        <!-- 洗分面板 (默認隱藏) -->
        <div id="panel-out" class="hidden glass-card rounded-2xl p-4 space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">機台目前點數</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-2xl text-gray-500 font-mono">$</span>
                    <input type="text" value="3,500" readonly class="w-full h-16 pl-10 pr-4 text-right text-3xl font-mono font-bold rounded-xl border border-dark-border bg-dark-bg text-white focus:outline-none">
                </div>
            </div>

            <button class="w-full btn-touch py-4 bg-red-600 hover:bg-red-700 text-white rounded-xl text-xl font-bold transition-all flex justify-center items-center">
                <i data-lucide="rotate-ccw" class="w-6 h-6 mr-2"></i>
                全部洗分並結帳
            </button>
        </div>

        <!-- 離線同步狀態 -->
        <div class="glass rounded-xl p-4 flex items-center justify-between">
            <div class="flex items-center text-gray-400">
                <i data-lucide="wifi-off" class="w-5 h-5 mr-2"></i>
                <span class="text-sm">離線同步佇列:</span>
                <span class="ml-2 gradient-local text-white px-2 py-0.5 rounded text-xs font-bold">0 筆待傳</span>
            </div>
            <button class="btn-touch px-4 py-2 glass rounded-lg text-sm font-medium text-gray-300 border border-dark-border">
                同步
            </button>
        </div>
    </main>

    <!-- 底部導航 -->
    <nav class="glass fixed bottom-0 left-0 right-0 z-30 h-20 flex items-center justify-around border-t border-dark-border px-2 pb-2">
        <a href="mockup_local_dashboard.html" class="flex flex-col items-center justify-center flex-1 py-2">
            <i data-lucide="layout-dashboard" class="w-6 h-6 mb-1 text-gray-500"></i>
            <span class="text-xs text-gray-500">儀表板</span>
        </a>
        <a href="mockup_local_machine.html" class="flex flex-col items-center justify-center flex-1 py-2">
            <i data-lucide="monitor" class="w-6 h-6 mb-1 text-gray-500"></i>
            <span class="text-xs text-gray-500">機台</span>
        </a>
        <a href="mockup_local_cash.html" class="flex flex-col items-center justify-center flex-1 py-2">
            <div class="w-12 h-12 -mt-6 rounded-full gradient-local flex items-center justify-center shadow-glow">
                <i data-lucide="plus-circle" class="w-6 h-6 text-white"></i>
            </div>
            <span class="text-xs text-local-500 mt-1 font-medium">開洗分</span>
        </a>
        <a href="mockup_local_sync.html" class="flex flex-col items-center justify-center flex-1 py-2">
            <i data-lucide="refresh-cw" class="w-6 h-6 mb-1 text-gray-500"></i>
            <span class="text-xs text-gray-500">同步</span>
        </a>
        <a href="mockup_mvp_local_setup.html" class="flex flex-col items-center justify-center flex-1 py-2">
            <i data-lucide="settings" class="w-6 h-6 mb-1 text-gray-500"></i>
            <span class="text-xs text-gray-500">設定</span>
        </a>
    </nav>

    <script>
        // 選單切換
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        // 模式切換
        function switchTab(mode) {
            const tabIn = document.getElementById('tab-in');
            const tabOut = document.getElementById('tab-out');
            const panelIn = document.getElementById('panel-in');
            const panelOut = document.getElementById('panel-out');

            if (mode === 'in') {
                tabIn.classList.add('bg-emerald-600', 'text-white');
                tabIn.classList.remove('text-gray-400');
                tabOut.classList.remove('bg-emerald-600', 'text-white');
                tabOut.classList.add('text-gray-400');
                panelIn.classList.remove('hidden');
                panelOut.classList.add('hidden');
            } else {
                tabOut.classList.add('bg-emerald-600', 'text-white');
                tabOut.classList.remove('text-gray-400');
                tabIn.classList.remove('bg-emerald-600', 'text-white');
                tabIn.classList.add('text-gray-400');
                panelOut.classList.remove('hidden');
                panelIn.classList.add('hidden');
            }
        }

        // 金額輸入
        let currentAmount = '1000';

        function updateDisplay() {
            const display = document.getElementById('amount-display');
            const num = parseInt(currentAmount) || 0;
            display.value = num.toLocaleString();
        }

        function inputDigit(digit) {
            if (currentAmount.length >= 6) return;
            currentAmount += digit;
            updateDisplay();
        }

        function clearAmount() {
            currentAmount = '';
            updateDisplay();
        }

        function backspace() {
            currentAmount = currentAmount.slice(0, -1);
            updateDisplay();
        }

        function setQuickAmount(amount) {
            currentAmount = amount.toString();
            updateDisplay();
        }

        // PIN 碼顯示
        let pinDigits = ['', '', '', ''];
        let pinInput = 0;

        function inputPin(digit) {
            if (pinInput < 4) {
                pinDigits[pinInput] = digit;
                document.getElementById('pin-' + (pinInput + 1)).textContent = '●';
                pinInput++;
            }
        }

        lucide.createIcons();
    </script>
</body>
</html>
