<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地安全開洗分介面 - 遊戲平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .glass-card:hover { border-color: rgba(168, 85, 247, 0.4); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 30px rgba(168, 85, 247, 0.2); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        .keypad-btn { display: flex; align-items: center; justify-content: center; height: 4rem; bg-dark-bg; hover:bg-purple-500/20; active:bg-purple-500/40; rounded-xl; text-2xl; font-mono; font-bold; text-white; transition-all cursor-pointer border border-dark-border; }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3), 0 0 20px rgba(168, 85, 247, 0.2); }
    </style>
</head>
<body class="gradient-bg flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-5xl h-[800px] rounded-2xl overflow-hidden shadow-2xl flex flex-col relative border border-dark-border">
        <header class="glass px-6 py-4 flex justify-between items-center border-b border-dark-border">
            <div class="flex items-center space-x-6">
                <div class="flex items-center">
                    <span class="text-sm text-gray-500 mr-2">機台名稱:</span>
                    <span class="font-mono font-bold text-lg text-white">A-01</span>
                </div>
                <div class="flex items-center px-3 py-1 bg-emerald-500/20 text-emerald-400 rounded-full border border-emerald-500/30">
                    <div class="w-2.5 h-2.5 rounded-full bg-emerald-400 mr-2 animate-pulse"></div>
                    <span class="text-sm font-medium">已連線至中央</span>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <div class="text-sm font-mono text-gray-500 hidden sm:block">14:35:22</div>
                <a href="mockup_mvp_local_setup.html" class="px-4 py-2 glass rounded-lg text-sm font-medium text-gray-300 hover:text-white flex items-center border border-dark-border">
                    <i data-lucide="settings" class="w-4 h-4 mr-2"></i>本機設定
                </a>
            </div>
        </header>
        <main class="flex-1 p-8 overflow-y-auto">
            <div class="glass-card rounded-2xl p-6 mb-8 flex justify-between">
                <div>
                    <div class="text-sm font-medium text-gray-500 mb-1">今日總淨收</div>
                    <div class="text-4xl font-mono font-bold text-white">$12,500</div>
                </div>
                <div class="text-right">
                    <div class="text-sm font-medium text-gray-500 mb-1">今日下注總額</div>
                    <div class="text-2xl font-mono font-bold text-gray-400">$45,000</div>
                </div>
                <div class="text-right">
                    <div class="text-sm font-medium text-gray-500 mb-1">今日派彩總額</div>
                    <div class="text-2xl font-mono font-bold text-gray-400">$32,500</div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-8">
                <div class="glass-card rounded-2xl p-8 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 gradient-purple"></div>
                    <h3 class="text-2xl font-bold text-white mb-6 flex items-center">
                        <i data-lucide="arrow-down-left" class="w-8 h-8 mr-3 text-purple-400"></i>開分 (注資)
                    </h3>
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-2">安全 PIN 碼</label>
                            <div class="flex gap-4">
                                <div class="w-16 h-16 text-center text-3xl rounded-xl border-2 border-purple-500 bg-purple-500/10 flex items-center justify-center text-purple-400">●</div>
                                <div class="w-16 h-16 text-center text-3xl rounded-xl border-2 border-purple-500 bg-purple-500/10 flex items-center justify-center text-purple-400">●</div>
                                <div class="w-16 h-16 text-center text-3xl rounded-xl border-2 border-purple-500 bg-purple-500/10 flex items-center justify-center text-purple-400">●</div>
                                <div class="w-16 h-16 text-center text-3xl border-2 border-dark-border rounded-xl bg-dark-bg"></div>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-2">開分金額</label>
                            <div class="relative">
                                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-2xl text-gray-500 font-mono">$</span>
                                <input type="text" value="1000" readonly class="w-full h-20 pl-10 pr-6 text-right text-4xl font-mono font-bold rounded-xl border border-dark-border bg-dark-bg text-white focus:outline-none">
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            <div class="keypad-btn">1</div>
                            <div class="keypad-btn">2</div>
                            <div class="keypad-btn">3</div>
                            <div class="keypad-btn">4</div>
                            <div class="keypad-btn">5</div>
                            <div class="keypad-btn">6</div>
                            <div class="keypad-btn">7</div>
                            <div class="keypad-btn">8</div>
                            <div class="keypad-btn">9</div>
                            <div class="keypad-btn text-lg bg-dark-bg text-gray-500">清除</div>
                            <div class="keypad-btn">0</div>
                            <div class="keypad-btn text-lg bg-dark-bg text-gray-500">←</div>
                        </div>
                        <button class="w-full py-5 gradient-purple hover:opacity-90 text-white rounded-xl text-xl font-bold shadow-glow transition-all flex justify-center items-center">
                            確認開分
                        </button>
                    </div>
                </div>
                <div class="glass-card rounded-2xl p-8 relative overflow-hidden opacity-60 pointer-events-none">
                    <div class="absolute inset-0 bg-dark-bg/80 z-10 flex flex-col items-center justify-center rounded-2xl">
                        <i data-lucide="lock" class="w-12 h-12 text-gray-500 mb-2"></i>
                        <span class="text-lg font-bold text-gray-500">目前為開分模式，洗分已鎖定</span>
                    </div>
                    <div class="absolute top-0 left-0 w-full h-1 bg-gray-500"></div>
                    <h3 class="text-2xl font-bold text-white mb-6 flex items-center">
                        <i data-lucide="arrow-up-right" class="w-8 h-8 mr-3 text-gray-500"></i>洗分 (結算歸零)
                    </h3>
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-2">機台目前點數</label>
                            <div class="relative">
                                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-2xl text-gray-500 font-mono">$</span>
                                <input type="text" value="3,500" readonly class="w-full h-20 pl-10 pr-6 text-right text-4xl font-mono font-bold rounded-xl border border-dark-border bg-dark-bg text-white focus:outline-none">
                            </div>
                        </div>
                        <button class="w-full py-5 bg-gray-700 text-white rounded-xl text-xl font-bold mt-auto">
                            全部洗分並結帳
                        </button>
                    </div>
                </div>
            </div>
        </main>
        <footer class="glass border-t border-dark-border flex items-center justify-between p-4 px-6 text-sm">
            <div class="flex items-center text-purple-400 font-medium">
                <i data-lucide="wifi-off" class="w-5 h-5 mr-2"></i>
                <span>離線同步佇列 (Queue):</span>
                <span class="ml-2 gradient-purple text-white px-2 py-0.5 rounded text-xs font-bold">0 筆待傳</span>
                <button class="ml-4 text-xs text-gray-500 hover:text-white underline">手動觸發同步</button>
            </div>
            <div class="text-gray-500">操作員: 現場經理 #002</div>
        </footer>
    </div>
    <script> lucide.createIcons(); </script>
</body>
</html>
