<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機台遠端控制 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="css/mockup-common.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .glass-card:hover { border-color: rgba(168, 85, 247, 0.4); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 30px rgba(168, 85, 247, 0.2); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        
        
        
        
        .table-row-hover:hover { background: linear-gradient(90deg, rgba(124, 58, 237, 0.1), transparent); }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3), 0 0 20px rgba(168, 85, 247, 0.2); }
        .badge-local { background: #10b981; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
        .badge-central { background: #8b5cf6; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
        
        
        
        
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <h2 class="text-lg font-semibold text-white">機台遠端控制</h2>
            <div class="flex items-center space-x-4">
                <div class="relative">
                    <input type="text" placeholder="搜尋機台..." class="bg-dark-bg border border-dark-border rounded-lg py-2 px-4 pl-10 text-sm text-white placeholder-gray-500 focus:outline-none input-focus w-64">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
                </div>
                <button class="relative text-gray-400 hover:text-white"><i data-lucide="bell" class="w-5 h-5"></i><span class="absolute -top-1 -right-1 w-2 h-2 bg-purple-500 rounded-full"></span></button>
            </div>
        </header>
        <div class="flex-1 overflow-y-auto p-6">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
                <div class="glass-card rounded-2xl p-5">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-white font-semibold">線上機台</h3>
                        <span class="bg-green-500/20 text-green-400 text-xs px-2 py-1 rounded-full">38 台</span>
                    </div>
                    <p class="text-3xl font-bold text-white font-mono">38 <span class="text-sm text-gray-400 font-normal">/ 45</span></p>
                </div>
                <div class="glass-card rounded-2xl p-5">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-white font-semibold">離線機台</h3>
                        <span class="bg-red-500/20 text-red-400 text-xs px-2 py-1 rounded-full">5 台</span>
                    </div>
                    <p class="text-3xl font-bold text-red-400 font-mono">5 <span class="text-sm text-gray-400 font-normal">/ 45</span></p>
                </div>
                <div class="glass-card rounded-2xl p-5">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-white font-semibold">維護中</h3>
                        <span class="bg-yellow-500/20 text-yellow-400 text-xs px-2 py-1 rounded-full">2 台</span>
                    </div>
                    <p class="text-3xl font-bold text-yellow-400 font-mono">2 <span class="text-sm text-gray-400 font-normal">/ 45</span></p>
                </div>
            </div>
            <div class="glass-card rounded-2xl p-6 mb-6">
                <h3 class="text-white font-semibold mb-4">選擇機台進行控制</h3>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="text-left text-sm text-gray-400 border-b border-dark-border">
                                <th class="pb-3 font-medium">機台編號</th>
                                <th class="pb-3 font-medium">名稱</th>
                                <th class="pb-3 font-medium">狀態</th>
                                <th class="pb-3 font-medium">遊戲</th>
                                <th class="pb-3 font-medium">當前餘額</th>
                                <th class="pb-3 font-medium">連線</th>
                                <th class="pb-3 font-medium">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr class="table-row-hover border-b border-dark-border/50">
                                <td class="py-4 text-white font-mono">M001</td>
                                <td class="py-4 text-gray-300">黃金幸運輪</td>
                                <td class="py-4"><span class="bg-green-500/20 text-green-400 text-xs px-2 py-1 rounded-full">遊戲中</span></td>
                                <td class="py-4 text-gray-300">幸運輪盤</td>
                                <td class="py-4 text-white font-mono">$12,500</td>
                                <td class="py-4"><span class="text-green-400"><i data-lucide="wifi" class="w-4 h-4"></i></span></td>
                                <td class="py-4">
                                    <div class="flex space-x-2">
                                        <button class="p-2 bg-blue-500/20 text-blue-400 rounded-lg hover:bg-blue-500/30" title="開分"><i data-lucide="plus-circle" class="w-4 h-4"></i></button>
                                        <button class="p-2 bg-orange-500/20 text-orange-400 rounded-lg hover:bg-orange-500/30" title="洗分"><i data-lucide="minus-circle" class="w-4 h-4"></i></button>
                                        <button class="p-2 bg-purple-500/20 text-purple-400 rounded-lg hover:bg-purple-500/30" title="遠端重啟"><i data-lucide="rotate-cw" class="w-4 h-4"></i></button>
                                    </div>
                                </td>
                            </tr>
                            <tr class="table-row-hover border-b border-dark-border/50">
                                <td class="py-4 text-white font-mono">M002</td>
                                <td class="py-4 text-gray-300">幸運777</td>
                                <td class="py-4"><span class="bg-green-500/20 text-green-400 text-xs px-2 py-1 rounded-full">遊戲中</span></td>
                                <td class="py-4 text-gray-300">拉霸機</td>
                                <td class="py-4 text-white font-mono">$8,200</td>
                                <td class="py-4"><span class="text-green-400"><i data-lucide="wifi" class="w-4 h-4"></i></span></td>
                                <td class="py-4">
                                    <div class="flex space-x-2">
                                        <button class="p-2 bg-blue-500/20 text-blue-400 rounded-lg hover:bg-blue-500/30" title="開分"><i data-lucide="plus-circle" class="w-4 h-4"></i></button>
                                        <button class="p-2 bg-orange-500/20 text-orange-400 rounded-lg hover:bg-orange-500/30" title="洗分"><i data-lucide="minus-circle" class="w-4 h-4"></i></button>
                                        <button class="p-2 bg-purple-500/20 text-purple-400 rounded-lg hover:bg-purple-500/30" title="遠端重啟"><i data-lucide="rotate-cw" class="w-4 h-4"></i></button>
                                    </div>
                                </td>
                            </tr>
                            <tr class="table-row-hover border-b border-dark-border/50">
                                <td class="py-4 text-white font-mono">M003</td>
                                <td class="py-4 text-gray-300">皇家百家樂</td>
                                <td class="py-4"><span class="bg-red-500/20 text-red-400 text-xs px-2 py-1 rounded-full">離線</span></td>
                                <td class="py-4 text-gray-300">百家樂</td>
                                <td class="py-4 text-gray-500 font-mono">--</td>
                                <td class="py-4"><span class="text-red-400"><i data-lucide="wifi-off" class="w-4 h-4"></i></span></td>
                                <td class="py-4">
                                    <button class="p-2 bg-purple-500/20 text-purple-400 rounded-lg hover:bg-purple-500/30" title="遠端重啟"><i data-lucide="rotate-cw" class="w-4 h-4"></i></button>
                                </td>
                            </tr>
                            <tr class="table-row-hover border-b border-dark-border/50">
                                <td class="py-4 text-white font-mono">M004</td>
                                <td class="py-4 text-gray-300">龍虎鬥</td>
                                <td class="py-4"><span class="bg-yellow-500/20 text-yellow-400 text-xs px-2 py-1 rounded-full">維護中</span></td>
                                <td class="py-4 text-gray-300">龍虎</td>
                                <td class="py-4 text-white font-mono">$0</td>
                                <td class="py-4"><span class="text-green-400"><i data-lucide="wifi" class="w-4 h-4"></i></span></td>
                                <td class="py-4">
                                    <button class="p-2 bg-green-500/20 text-green-400 rounded-lg hover:bg-green-500/30" title="結束維護"><i data-lucide="play" class="w-4 h-4"></i></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="glass-card rounded-2xl p-6">
                <h3 class="text-white font-semibold mb-4">批量操作</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <button class="flex items-center justify-center p-4 bg-blue-500/20 border border-blue-500/30 rounded-xl text-blue-400 hover:bg-blue-500/30 transition">
                        <i data-lucide="plus-circle" class="w-5 h-5 mr-2"></i>
                        <span>批量開分</span>
                    </button>
                    <button class="flex items-center justify-center p-4 bg-orange-500/20 border border-orange-500/30 rounded-xl text-orange-400 hover:bg-orange-500/30 transition">
                        <i data-lucide="minus-circle" class="w-5 h-5 mr-2"></i>
                        <span>批量洗分</span>
                    </button>
                    <button class="flex items-center justify-center p-4 bg-purple-500/20 border border-purple-500/30 rounded-xl text-purple-400 hover:bg-purple-500/30 transition">
                        <i data-lucide="rotate-cw" class="w-5 h-5 mr-2"></i>
                        <span>批量重啟</span>
                    </button>
                    <button class="flex items-center justify-center p-4 bg-red-500/20 border border-red-500/30 rounded-xl text-red-400 hover:bg-red-500/30 transition">
                        <i data-lucide="power" class="w-5 h-5 mr-2"></i>
                        <span>緊急關機</span>
                    </button>
                </div>
            </div>
        </div>
    </main>
    <script>
        lucide.createIcons();

        function toggleSidebarGroup(header) {
            const group = header.parentElement;
            const submenu = group.querySelector('.sidebar-submenu');
            if (group.classList.contains('open')) {
                group.classList.remove('open');
                submenu.classList.remove('open');
            } else {
                group.classList.add('open');
                submenu.classList.add('open');
            }
        }
    </script>
<script src="js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_machine_remote_control.html');
    </script>
</body>
</html>
