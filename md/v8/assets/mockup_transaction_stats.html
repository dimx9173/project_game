<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交易統計 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .glass-card:hover { border-color: rgba(168, 85, 247, 0.4); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 30px rgba(168, 85, 247, 0.2); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        
        
        
        
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3), 0 0 20px rgba(168, 85, 247, 0.2); }
        
        
        
        
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <h2 class="text-lg font-semibold text-white">交易統計</h2>
            <div class="flex items-center space-x-4">
                <select class="bg-dark-bg border border-dark-border rounded-lg py-2 px-4 text-sm text-white">
                    <option>最近 7 天</option>
                    <option selected>最近 30 天</option>
                    <option>最近 90 天</option>
                    <option>自訂範圍</option>
                </select>
                <button class="px-4 py-2 gradient-purple rounded-lg text-white font-medium shadow-glow-sm flex items-center">
                    <i data-lucide="download" class="w-4 h-4 mr-2"></i>匯出
                </button>
            </div>
        </header>
        <div class="flex-1 overflow-y-auto p-6">
            <!-- KPI 卡片 -->
            <div class="grid grid-cols-4 gap-4 mb-6">
                <div class="glass-card rounded-xl p-5">
                    <div class="flex items-center justify-between mb-3">
                        <span class="text-gray-400 text-sm">總交易筆數</span>
                        <span class="text-green-400 text-xs flex items-center"><i data-lucide="trending-up" class="w-3 h-3 mr-1"></i>+12.5%</span>
                    </div>
                    <p class="font-mono text-2xl text-white">1,234,567</p>
                </div>
                <div class="glass-card rounded-xl p-5">
                    <div class="flex items-center justify-between mb-3">
                        <span class="text-gray-400 text-sm">總交易金額</span>
                        <span class="text-green-400 text-xs flex items-center"><i data-lucide="trending-up" class="w-3 h-3 mr-1"></i>+8.3%</span>
                    </div>
                    <p class="font-mono text-2xl text-white">$45,678,901</p>
                </div>
                <div class="glass-card rounded-xl p-5">
                    <div class="flex items-center justify-between mb-3">
                        <span class="text-gray-400 text-sm">平均交易金額</span>
                        <span class="text-red-400 text-xs flex items-center"><i data-lucide="trending-down" class="w-3 h-3 mr-1"></i>-2.1%</span>
                    </div>
                    <p class="font-mono text-2xl text-white">$37.00</p>
                </div>
                <div class="glass-card rounded-xl p-5">
                    <div class="flex items-center justify-between mb-3">
                        <span class="text-gray-400 text-sm">異常交易比例</span>
                        <span class="text-yellow-400 text-xs flex items-center"><i data-lucide="alert-triangle" class="w-3 h-3 mr-1"></i>0.8%</span>
                    </div>
                    <p class="font-mono text-2xl text-yellow-400">0.8%</p>
                </div>
            </div>
            <!-- 圖表區域 -->
            <div class="grid grid-cols-2 gap-6 mb-6">
                <div class="glass-card rounded-2xl p-6">
                    <h3 class="font-semibold text-white mb-4">每日交易趨勢</h3>
                    <div class="h-48 flex items-end justify-between space-x-2">
                        <div class="flex-1 bg-cyber-600/30 rounded-t hover:bg-cyber-600/50 transition-colors" style="height: 60%"></div>
                        <div class="flex-1 bg-cyber-600/30 rounded-t hover:bg-cyber-600/50 transition-colors" style="height: 80%"></div>
                        <div class="flex-1 bg-cyber-600/30 rounded-t hover:bg-cyber-600/50 transition-colors" style="height: 45%"></div>
                        <div class="flex-1 bg-cyber-600/30 rounded-t hover:bg-cyber-600/50 transition-colors" style="height: 90%"></div>
                        <div class="flex-1 bg-cyber-600/30 rounded-t hover:bg-cyber-600/50 transition-colors" style="height: 70%"></div>
                        <div class="flex-1 bg-cyber-600/30 rounded-t hover:bg-cyber-600/50 transition-colors" style="height: 55%"></div>
                        <div class="flex-1 bg-cyber-600/30 rounded-t hover:bg-cyber-600/50 transition-colors" style="height: 85%"></div>
                    </div>
                    <div class="flex justify-between mt-2 text-xs text-gray-500">
                        <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span>
                    </div>
                </div>
                <div class="glass-card rounded-2xl p-6">
                    <h3 class="font-semibold text-white mb-4">交易類型分布</h3>
                    <div class="space-y-4">
                        <div><div class="flex justify-between text-sm mb-1"><span class="text-gray-400">儲值</span><span class="text-white font-mono">45%</span></div><div class="h-2 bg-dark-bg rounded-full overflow-hidden"><div class="h-full gradient-purple" style="width: 45%"></div></div></div>
                        <div><div class="flex justify-between text-sm mb-1"><span class="text-gray-400">投注</span><span class="text-white font-mono">30%</span></div><div class="h-2 bg-dark-bg rounded-full overflow-hidden"><div class="h-full bg-green-500" style="width: 30%"></div></div></div>
                        <div><div class="flex justify-between text-sm mb-1"><span class="text-gray-400">派彩</span><span class="text-white font-mono">20%</span></div><div class="h-2 bg-dark-bg rounded-full overflow-hidden"><div class="h-full bg-blue-500" style="width: 20%"></div></div></div>
                        <div><div class="flex justify-between text-sm mb-1"><span class="text-gray-400">其他</span><span class="text-white font-mono">5%</span></div><div class="h-2 bg-dark-bg rounded-full overflow-hidden"><div class="h-full bg-gray-500" style="width: 5%"></div></div></div>
                    </div>
                </div>
            </div>
            <!-- 異常統計 -->
            <div class="glass-card rounded-2xl p-6">
                <h3 class="font-semibold text-white mb-4 flex items-center"><i data-lucide="alert-triangle" class="w-5 h-5 mr-2 text-yellow-400"></i>異常交易分析</h3>
                <div class="grid grid-cols-3 gap-4">
                    <div class="bg-dark-bg rounded-lg p-4"><p class="text-xs text-gray-500 mb-1">超額交易</p><p class="font-mono text-xl text-red-400">234</p></div>
                    <div class="bg-dark-bg rounded-lg p-4"><p class="text-xs text-gray-500 mb-1">頻繁交易</p><p class="font-mono text-xl text-yellow-400">567</p></div>
                    <div class="bg-dark-bg rounded-lg p-4"><p class="text-xs text-gray-500 mb-1">異常IP</p><p class="font-mono text-xl text-orange-400">89</p></div>
                </div>
            </div>
        </div>
    </main>
    <script>
        lucide.createIcons();

        function toggleSidebarGroup(header) {
            const group = header.parentElement;
            const submenu = group.querySelector('.sidebar-submenu');
            if (group.classList.contains('open')) {
                group.classList.remove('open');
                submenu.classList.remove('open');
            } else {
                group.classList.add('open');
                submenu.classList.add('open');
            }
        }
    </script>
<script src="js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_transaction_stats.html');
    </script>
</body>
</html>
