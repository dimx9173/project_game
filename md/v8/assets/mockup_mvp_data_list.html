<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲管理 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .glass-card:hover { border-color: rgba(168, 85, 247, 0.4); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 30px rgba(168, 85, 247, 0.2); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        .sidebar-link { position: relative; transition: all 0.3s ease; }
        .sidebar-link::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 0; background: linear-gradient(180deg, #7c3aed, #c084fc); border-radius: 0 2px 2px 0; transition: height 0.3s ease; }
        .sidebar-link:hover::before, .sidebar-link.active::before { height: 60%; }
        .sidebar-link.active { background: linear-gradient(90deg, rgba(124, 58, 237, 0.2), transparent); }
        .table-row-hover:hover { background: linear-gradient(90deg, rgba(124, 58, 237, 0.1), transparent); }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3), 0 0 20px rgba(168, 85, 247, 0.2); }
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <aside class="w-64 bg-dark-sidebar border-r border-dark-border flex flex-col">
        <div class="h-16 flex items-center px-4 border-b border-dark-border">
            <div class="w-10 h-10 rounded-xl gradient-purple flex items-center justify-center shadow-glow-sm mr-3">
                <i data-lucide="gamepad-2" class="w-5 h-5 text-white"></i>
            </div>
            <div><span class="font-bold text-white">遊戲平台</span><span class="text-xs text-gray-500 block">管理中心</span></div>
        </div>
        <nav class="flex-1 py-4 px-3 space-y-1 overflow-y-auto">
            <a href="mockup_dashboard.html" class="sidebar-link flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="layout-dashboard" class="w-5 h-5 mr-3"></i><span>儀表板</span></a>
            <a href="mockup_mvp_machine_list.html" class="sidebar-link flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="monitor" class="w-5 h-5 mr-3"></i><span>機台管理</span></a>
            <a href="mockup_mvp_data_list.html" class="sidebar-link active flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="gamepad-2" class="w-5 h-5 mr-3"></i><span>遊戲管理</span></a>
            <a href="mockup_mvp_player_list.html" class="sidebar-link flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="users" class="w-5 h-5 mr-3"></i><span>玩家管理</span></a>
            <a href="mockup_std_wallet.html" class="sidebar-link flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="wallet" class="w-5 h-5 mr-3"></i><span>錢包交易</span></a>
            <a href="mockup_std_provider_list.html" class="sidebar-link flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="plug" class="w-5 h-5 mr-3"></i><span>串接遊戲商</span></a>
            <a href="mockup_std_agent_list.html" class="sidebar-link flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="shield-user" class="w-5 h-5 mr-3"></i><span>使用者權限</span></a>
            <a href="mockup_flg_ota.html" class="sidebar-link flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="download" class="w-5 h-5 mr-3"></i><span>版本更新 OTA</span></a>
            <a href="mockup_flg_monitor.html" class="sidebar-link flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="activity" class="w-5 h-5 mr-3"></i><span>監控中心</span></a>
            <a href="mockup_flg_reconciliation.html" class="sidebar-link flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="file-check" class="w-5 h-5 mr-3"></i><span>對帳專區</span></a>
        </nav>
        <div class="p-4 border-t border-dark-border">
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <div class="w-8 h-8 rounded-full gradient-purple flex items-center justify-center"><span class="text-sm font-bold text-white">A</span></div>
                    <div class="ml-3"><p class="text-sm font-medium text-white">admin</p><p class="text-xs text-gray-500">系統管理員</p></div>
                </div>
                <a href="mockup_login.html" class="text-gray-400 hover:text-white"><i data-lucide="log-out" class="w-5 h-5"></i></a>
            </div>
        </div>
    </aside>
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <h2 class="text-lg font-semibold text-white">遊戲管理</h2>
            <button class="px-4 py-2 gradient-purple rounded-lg text-white font-medium shadow-glow-sm flex items-center">
                <i data-lucide="plus" class="w-4 h-4 mr-2"></i>新增遊戲
            </button>
        </header>
        <div class="flex-1 overflow-y-auto p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="glass-card rounded-2xl overflow-hidden group cursor-pointer transition-all hover:scale-[1.02]">
                    <div class="h-40 bg-gradient-to-br from-purple-900 to-indigo-900 relative">
                        <div class="absolute inset-0 flex items-center justify-center">
                            <i data-lucide="gamepad-2" class="w-16 h-16 text-purple-500/50"></i>
                        </div>
                        <div class="absolute top-3 right-3">
                            <span class="px-2 py-1 rounded text-xs bg-emerald-500/20 text-emerald-400">啟用中</span>
                        </div>
                    </div>
                    <div class="p-4">
                        <h4 class="font-semibold text-white">經典拉霸王</h4>
                        <p class="text-sm text-gray-400 mt-1">ProSlot Inc.</p>
                        <div class="flex justify-between items-center mt-3 pt-3 border-t border-dark-border">
                            <span class="text-sm text-gray-400">RTP: <span class="text-emerald-400">96.5%</span></span>
                            <button class="text-purple-400 hover:text-purple-300 text-sm">編輯</button>
                        </div>
                    </div>
                </div>
                <div class="glass-card rounded-2xl overflow-hidden group cursor-pointer transition-all hover:scale-[1.02]">
                    <div class="h-40 bg-gradient-to-br from-cyan-900 to-blue-900 relative">
                        <div class="absolute inset-0 flex items-center justify-center">
                            <i data-lucide="gamepad-2" class="w-16 h-16 text-cyan-500/50"></i>
                        </div>
                        <div class="absolute top-3 right-3">
                            <span class="px-2 py-1 rounded text-xs bg-emerald-500/20 text-emerald-400">啟用中</span>
                        </div>
                    </div>
                    <div class="p-4">
                        <h4 class="font-semibold text-white">決戰百家樂</h4>
                        <p class="text-sm text-gray-400 mt-1">LiveCasino Co.</p>
                        <div class="flex justify-between items-center mt-3 pt-3 border-t border-dark-border">
                            <span class="text-sm text-gray-400">RTP: <span class="text-emerald-400">98.2%</span></span>
                            <button class="text-purple-400 hover:text-purple-300 text-sm">編輯</button>
                        </div>
                    </div>
                </div>
                <div class="glass-card rounded-2xl overflow-hidden group cursor-pointer transition-all hover:scale-[1.02]">
                    <div class="h-40 bg-gradient-to-br from-amber-900 to-orange-900 relative">
                        <div class="absolute inset-0 flex items-center justify-center">
                            <i data-lucide="gamepad-2" class="w-16 h-16 text-amber-500/50"></i>
                        </div>
                        <div class="absolute top-3 right-3">
                            <span class="px-2 py-1 rounded text-xs bg-gray-500/20 text-gray-400">停用</span>
                        </div>
                    </div>
                    <div class="p-4">
                        <h4 class="font-semibold text-white">幸運拉霸</h4>
                        <p class="text-sm text-gray-400 mt-1">SlotMaster</p>
                        <div class="flex justify-between items-center mt-3 pt-3 border-t border-dark-border">
                            <span class="text-sm text-gray-400">RTP: <span class="text-gray-500">95.0%</span></span>
                            <button class="text-purple-400 hover:text-purple-300 text-sm">編輯</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script> lucide.createIcons(); </script>
</body>
</html>
