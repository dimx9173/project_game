                <button onclick="closeModal('addRuleModal')" class="text-gray-400 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <form id="addRuleForm" class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">規則名稱</label>
                        <input type="text" name="name" required class="w-full bg-dark-bg border border-dark-border rounded-lg py-2 px-4 text-white focus:outline-none input-focus">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">優先權</label>
                        <input type="number" name="priority" value="0" class="w-full bg-dark-bg border border-dark-border rounded-lg py-2 px-4 text-white focus:outline-none input-focus">
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">支付渠道</label>
                    <select name="channel" required class="w-full bg-dark-bg border border-dark-border rounded-lg py-2 px-4 text-white focus:outline-none input-focus">
                        <option value="credit_card">信用卡</option>
                        <option value="bank_transfer">銀行轉帳</option>
                        <option value="crypto">加密貨幣</option>
                        <option value="e_wallet">電子錢包</option>

                    <label class="block text-sm text-gray-400 mb-2">路由條件</label>

                                <option>幣別</option>
                            </select>
                            <input type="text" placeholder="條件值" class="flex-1 bg-dark-bg border border-dark-border rounded-lg py-2 px-4 text-white focus:outline-none input-focus">
                        </div>
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">備註</label>
                    <textarea name="remark" rows="2" class="w-full bg-dark-bg border border-dark-border rounded-lg py-2 px-4 text-white focus:outline-none input-focus"></textarea>
                </div>
                <div class="flex items-center">
                    <input type="checkbox" name="enabled" id="ruleEnabled" checked class="w-4 h-4 rounded border-dark-border bg-dark-bg text-purple-600">
                    <label for="ruleEnabled" class="ml-2 text-sm text-gray-400">啟用此規則</label>
                </div>
            </form>
            <div class="px-6 py-4 border-t border-dark-border flex justify-end space-x-3">
                <button onclick="closeModal('addRuleModal')" class="px-4 py-2 bg-dark-bg border border-dark-border rounded-lg text-gray-300 hover:bg-dark-hover">取消</button>
                <button onclick="submitRuleForm()" class="px-4 py-2 gradient-purple rounded-lg text-white font-medium">建立規則</button>
            </div>
        </div>

    <script>
        const routes = [
            { id: 1, name: '信用卡-高金額', channel: 'credit_card', priority: 1, condition: '金額 > $10,000', status: 'active', successRate: '98.5%' },
            { id: 2, name: '信用卡-一般', channel: 'credit_card', priority: 2, condition: '金額 $100-$10,000', status: 'active', successRate: '99.1%' },
            { id: 3, name: '銀行轉帳-大額', channel: 'bank_transfer', priority: 1, condition: '金額 > $50,000', status: 'active', successRate: '99.8%' },
            { id: 4, name: '加密貨幣-USDT', channel: 'crypto', priority: 3, condition: '幣別 = USDT', status: 'active', successRate: '99.5%' },
            { id: 5, name: '電子錢包-快速', channel: 'e_wallet', priority: 2, condition: '金額 < $500', status: 'active', successRate: '98.9%' },
            { id: 6, name: '銀行轉帳-一般', channel: 'bank_transfer', priority: 4, condition: '金額 $500-$50,000', status: 'inactive', successRate: '99.3%' },
            { id: 7, name: '信用卡-新戶', channel: 'credit_card', priority: 1, condition: '新客戶', status: 'active', successRate: '97.2%' },
            { id: 8, name: '備用渠道-01', channel: 'bank_transfer', priority: 99, condition: '其他渠道失敗', status: 'active', successRate: '95.0%' },
        ];

        const channelNames = { credit_card: '信用卡', bank_transfer: '銀行轉帳', crypto: '加密貨幣', e_wallet: '電子錢包' };
        const channelIcons = { credit_card: 'credit-card', bank_transfer: 'building-2', crypto: 'bitcoin', e_wallet: 'wallet' };

        let sortColumn = '';
        let sortDirection = 'asc';

        function renderTable() {
            const tbody = document.getElementById('routeTableBody');
            let filteredRoutes = [...routes];
            const channelFilter = document.getElementById('channelFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;
            const searchInput = document.getElementById('searchInput').value.toLowerCase();

            if (channelFilter) filteredRoutes = filteredRoutes.filter(r => r.channel === channelFilter);
            if (statusFilter) filteredRoutes = filteredRoutes.filter(r => r.status === statusFilter);
            if (searchInput) filteredRoutes = filteredRoutes.filter(r => r.name.toLowerCase().includes(searchInput) || r.condition.toLowerCase().includes(searchInput));

            if (sortColumn) {
                filteredRoutes.sort((a, b) => {
                    const aVal = a[sortColumn];
                    const bVal = b[sortColumn];
                    if (aVal < bVal) return sortDirection === 'asc' ? -1 : 1;
                    if (aVal > bVal) return sortDirection === 'asc' ? 1 : -1;
                    return 0;
                });
            }

            tbody.innerHTML = filteredRoutes.map(route => `
                <tr class="table-row-hover transition-colors">
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center">
                            <div class="w-8 h-8 rounded-lg bg-purple-600/20 flex items-center justify-center text-purple-400">
                                <i data-lucide="${channelIcons[route.channel]}" class="w-4 h-4"></i>
                            </div>
                            <span class="ml-3 text-white font-medium">${route.name}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-300">${channelNames[route.channel]}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-300 font-mono">#${route.priority}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-400 text-sm">${route.condition}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <button onclick="toggleStatus(${route.id})" class="flex items-center ${route.status === 'active' ? 'text-green-400' : 'text-gray-500'}">
                            <div class="w-8 h-5 rounded-full relative ${route.status === 'active' ? 'bg-green-500/30' : 'bg-gray-500/30'}">
                                <div class="absolute w-3 h-3 rounded-full top-1 ${route.status === 'active' ? 'right-1 bg-green-400' : 'left-1 bg-gray-400'} transition-all"></div>
                            </div>
                            <span class="ml-2 text-xs">${route.status === 'active' ? '啟用' : '停用'}</span>
                        </button>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center">
                            <div class="w-16 h-1.5 bg-dark-bg rounded-full overflow-hidden">
                                <div class="h-full ${parseFloat(route.successRate) >= 98 ? 'bg-green-500' : parseFloat(route.successRate) >= 95 ? 'bg-yellow-500' : 'bg-red-500'}" style="width: ${route.successRate}"></div>
                            </div>
                            <span class="ml-2 text-sm text-gray-400">${route.successRate}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right">
                        <button onclick="editRule(${route.id})" class="text-cyan-400 hover:text-cyan-300 mx-1"><i data-lucide="edit-2" class="w-4 h-4 inline"></i></button>
                        <button onclick="duplicateRule(${route.id})" class="text-yellow-400 hover:text-yellow-300 mx-1"><i data-lucide="copy" class="w-4 h-4 inline"></i></button>
                        <button onclick="deleteRule(${route.id})" class="text-red-400 hover:text-red-300 mx-1"><i data-lucide="trash-2" class="w-4 h-4 inline"></i></button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function sortTable(column) {
            if (sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = 'asc';
            }
            renderTable();
        }

        function applyFilters() { renderTable(); }
        function resetFilters() { document.getElementById('channelFilter').value = ''; document.getElementById('statusFilter').value = ''; document.getElementById('searchInput').value = ''; renderTable(); }

        function toggleStatus(routeId) {
            const route = routes.find(r => r.id === routeId);
            if (route) { route.status = route.status === 'active' ? 'inactive' : 'active'; renderTable(); }
        }

        function editRule(routeId) { alert('編輯路由規則 #' + routeId); }
        function duplicateRule(routeId) { alert('複製路由規則 #' + routeId); }
        
        function deleteRule(routeId) {
            if (confirm('確定要刪除此路由規則嗎？')) {
                const index = routes.findIndex(r => r.id === routeId);
                if (index > -1) { routes.splice(index, 1); renderTable(); }
            }
        }

        function submitRuleForm() {
            alert('路由規則建立成功！');
            document.getElementById('addRuleForm').reset();
            closeModal('addRuleModal');
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); lucide.createIcons(); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        document.getElementById('searchInput').addEventListener('input', renderTable);
        document.addEventListener('DOMContentLoaded', () => { lucide.createIcons(); renderTable(); });
    </script>
</body>
</html>
