<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲供應商管理 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="../css/mockup-common.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .glass-card:hover { border-color: rgba(168, 85, 247, 0.4); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    
    <main class="flex-1 flex flex-col overflow-hidden">
        <!-- Header -->
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <div class="flex items-center">
                <h2 class="text-lg font-semibold text-white">遊戲供應商管理</h2>
            </div>
            <div class="flex items-center space-x-3">
                <button class="px-4 py-2 gradient-purple rounded-lg text-white font-medium text-sm">
                    <i data-lucide="plus" class="w-4 h-4 inline mr-1"></i>新增供應商
                </button>
            </div>
        </header>

        <!-- Stats -->
        <div class="px-6 py-4 border-b border-dark-border">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="glass-card rounded-xl p-4">
                    <div class="text-sm text-gray-400 mb-1">合作供應商</div>
                    <div class="text-2xl font-bold text-white">12</div>
                </div>
                
                <div class="glass-card rounded-xl p-4">
                    <div class="text-sm text-gray-400 mb-1">總遊戲數</div>
                    <div class="text-2xl font-bold text-white">156</div>
                </div>
                
                <div class="glass-card rounded-xl p-4">
                    <div class="text-sm text-gray-400 mb-1">今日營收占比</div>
                    <div class="text-2xl font-bold text-cyber-400">45%</div>
                </div>
                
                <div class="glass-card rounded-xl p-4">
                    <div class="text-sm text-gray-400 mb-1">API 連線狀態</div>
                    <div class="flex items-center">
                        <div class="text-2xl font-bold text-emerald-400">正常</div>
                        <span class="w-2 h-2 rounded-full bg-emerald-400 ml-2"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Supplier Grid -->
        <div class="flex-1 overflow-y-auto p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">

                <!-- Supplier 1 -->
                <div class="glass-card rounded-xl p-5">
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex items-center">
                            <div class="w-12 h-12 rounded-xl bg-purple-500/20 flex items-center justify-center mr-3">
                                <i data-lucide="building-2" class="w-6 h-6 text-purple-400"></i>
                            </div>
                            <div>
                                <div class="font-semibold text-white">ProSlot Inc.</div>
                                <div class="text-xs text-gray-500">拉霸遊戲專家</div>
                            </div>
                        </div>
                        
                        <span class="px-2 py-1 bg-emerald-500/20 text-emerald-400 text-xs rounded">合作中</span>
                    </div>

                    <div class="space-y-2 text-sm mb-4">
                        <div class="flex justify-between">
                            <span class="text-gray-500">遊戲數量</span>
                            <span class="text-white">24 款</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-500">API 狀態</span>
                            <span class="text-emerald-400 flex items-center">
                                <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 mr-1"></span>正常
                            </span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-500">今日營收</span>
                            <span class="text-white font-mono">$45,230</span>
                        </div>
                    </div>

                    <div class="flex space-x-2">
                        <button class="flex-1 py-2 bg-dark-bg border border-dark-border rounded-lg text-gray-300 text-sm hover:bg-dark-hover">
                            詳情
                        </button>
                        <button class="flex-1 py-2 bg-dark-bg border border-dark-border rounded-lg text-gray-300 text-sm hover:bg-dark-hover">
                            編輯
                        </button>
                    </div>
                </div>

                <!-- Supplier 2 -->
                <div class="glass-card rounded-xl p-5">
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex items-center">
                            <div class="w-12 h-12 rounded-xl bg-cyan-500/20 flex items-center justify-center mr-3">
                                <i data-lucide="users" class="w-6 h-6 text-cyan-400"></i>
                            </div>
                            <div>
                                <div class="font-semibold text-white">LiveCasino Co.</div>
                                <div class="text-xs text-gray-500">真人視訊遊戲</div>
                            </div>
                        </div>
                        
                        <span class="px-2 py-1 bg-emerald-500/20 text-emerald-400 text-xs rounded">合作中</span>
                    </div>

                    <div class="space-y-2 text-sm mb-4">
                        <div class="flex justify-between">
                            <span class="text-gray-500">遊戲數量</span>
                            <span class="text-white">18 款</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-500">API 狀態</span>
                            <span class="text-emerald-400 flex items-center">
                                <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 mr-1"></span>正常
                            </span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-500">今日營收</span>
                            <span class="text-white font-mono">$67,890</span>
                        </div>
                    </div>

                    <div class="flex space-x-2">
                        <button class="flex-1 py-2 bg-dark-bg border border-dark-border rounded-lg text-gray-300 text-sm hover:bg-dark-hover">
                            詳情
                        </button>
                        <button class="flex-1 py-2 bg-dark-bg border border-dark-border rounded-lg text-gray-300 text-sm hover:bg-dark-hover">
                            編輯
                        </button>
                    </div>
                </div>

                <!-- Supplier 3 -->
                <div class="glass-card rounded-xl p-5">
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex items-center">
                            <div class="w-12 h-12 rounded-xl bg-amber-500/20 flex items-center justify-center mr-3">
                                <i data-lucide="dices" class="w-6 h-6 text-amber-400"></i>
                            </div>
                            <div>
                                <div class="font-semibold text-white">DiceMaster</div>
                                <div class="text-xs text-gray-500">骰子/棋牌遊戲</div>
                            </div>
                        </div>
                        
                        <span class="px-2 py-1 bg-amber-500/20 text-amber-400 text-xs rounded">合約即將到期</span>
                    </div>

                    <div class="space-y-2 text-sm mb-4">
                        <div class="flex justify-between">
                            <span class="text-gray-500">遊戲數量</span>
                            <span class="text-white">32 款</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-500">API 狀態</span>
                            <span class="text-emerald-400 flex items-center">
                                <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 mr-1"></span>正常
                            </span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-500">合約到期</span>
                            <span class="text-amber-400">30 天後</span>
                        </div>
                    </div>

                    <div class="flex space-x-2">
                        <button class="flex-1 py-2 bg-dark-bg border border-dark-border rounded-lg text-gray-300 text-sm hover:bg-dark-hover">
                            詳情
                        </button>
                        <button class="flex-1 py-2 bg-amber-500/20 text-amber-400 rounded-lg text-sm border border-amber-500/30 hover:bg-amber-500/30">
                            續約
                        </button>
                    </div>
                </div>

                <!-- Add New Supplier Card -->
                <button class="glass-card rounded-xl p-5 border-dashed border-2 border-dark-border hover:border-cyber-500/50 flex flex-col items-center justify-center min-h-[280px] transition-colors">
                    <div class="w-16 h-16 rounded-full bg-cyber-500/20 flex items-center justify-center mb-4">
                        <i data-lucide="plus" class="w-8 h-8 text-cyber-400"></i>
                    </div>
                    <div class="text-white font-medium">新增供應商</div>
                    <div class="text-sm text-gray-500 mt-1">連接新的遊戲供應商</div>
                </button>

            </div>
        </div>
    </main>

    <script src="../js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_game_supplier.html');
        lucide.createIcons();
    </script>
</body>
</html>
