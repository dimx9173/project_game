<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統監控 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="../css/mockup-common.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        .metric-value { font-family: 'JetBrains Mono', monospace; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .pulse-dot { animation: pulse-dot 2s infinite; }
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    
    <main class="flex-1 flex flex-col overflow-hidden">
        <!-- Header -->
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <div class="flex items-center">
                <h2 class="text-lg font-semibold text-white">系統監控</h2>
                <span class="ml-3 px-2 py-0.5 bg-emerald-500/20 text-emerald-400 text-xs rounded-full flex items-center">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 mr-1.5 pulse-dot"></span>
                    運作正常
                </span>
            </div>
            <div class="flex items-center space-x-3">
                <span class="text-sm text-gray-400">自動重新整理: 30秒</span>
                <button class="p-2 text-gray-400 hover:text-white">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6">
            <div class="max-w-7xl mx-auto space-y-6">

                <!-- Overview Stats -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div class="glass-card rounded-xl p-5">
                        <div class="flex items-center justify-between mb-3">
                            <span class="text-sm text-gray-400">線上機台</span>
                            <div class="w-8 h-8 rounded-lg bg-emerald-500/20 flex items-center justify-center">
                                <i data-lucide="monitor" class="w-4 h-4 text-emerald-400"></i>
                            </div>
                        </div>
                        <div class="text-3xl font-bold text-white metric-value">45/50</div>
                        <div class="text-sm text-emerald-400 mt-1">90% 在線率</div>
                    </div>

                    <div class="glass-card rounded-xl p-5">
                        <div class="flex items-center justify-between mb-3">
                            <span class="text-sm text-gray-400">今日交易</span>
                            <div class="w-8 h-8 rounded-lg bg-cyber-500/20 flex items-center justify-center">
                                <i data-lucide="dollar-sign" class="w-4 h-4 text-cyber-400"></i>
                            </div>
                        </div>
                        <div class="text-3xl font-bold text-white metric-value">12.5K</div>
                        <div class="text-sm text-cyber-400 mt-1">+8.5% 較昨日</div>
                    </div>

                    <div class="glass-card rounded-xl p-5">
                        <div class="flex items-center justify-between mb-3">
                            <span class="text-sm text-gray-400">API 請求/分鐘</span>
                            <div class="w-8 h-8 rounded-lg bg-blue-500/20 flex items-center justify-center">
                                <i data-lucide="activity" class="w-4 h-4 text-blue-400"></i>
                            </div>
                        </div>
                        <div class="text-3xl font-bold text-white metric-value">2,450</div>
                        <div class="text-sm text-gray-400 mt-1">平均延遲 12ms</div>
                    </div>

                    <div class="glass-card rounded-xl p-5">
                        <div class="flex items-center justify-between mb-3">
                            <span class="text-sm text-gray-400">異常告警</span>
                            <div class="w-8 h-8 rounded-lg bg-red-500/20 flex items-center justify-center">
                                <i data-lucide="alert-triangle" class="w-4 h-4 text-red-400"></i>
                            </div>
                        </div>
                        <div class="text-3xl font-bold text-white metric-value">2</div>
                        <div class="text-sm text-red-400 mt-1">需立即處理</div>
                    </div>
                </div>

                <!-- Charts Section -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    
                    <!-- Traffic Chart -->
                    <div class="glass-card rounded-2xl p-6">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="font-semibold text-white">交易流量趨勢</h3>
                            <select class="bg-dark-bg border border-dark-border rounded-lg py-1 px-3 text-sm text-white">
                                <option>最近1小時</option>
                                <option>最近6小時</option>
                                <option>最近24小時</option>
                            </select>
                        </div>

                        <div class="h-64 bg-dark-bg/50 rounded-xl flex items-end p-4 space-x-2">
                            <!-- Mock bar chart -->
                            <div class="flex-1 bg-cyber-500/30 rounded-t" style="height: 40%"></div>
                            <div class="flex-1 bg-cyber-500/30 rounded-t" style="height: 65%"></div>
                            <div class="flex-1 bg-cyber-500/30 rounded-t" style="height: 45%"></div>
                            <div class="flex-1 bg-cyber-500/30 rounded-t" style="height: 80%"></div>
                            <div class="flex-1 bg-cyber-500/30 rounded-t" style="height: 55%"></div>
                            <div class="flex-1 bg-cyber-500/30 rounded-t" style="height: 70%"></div>
                            <div class="flex-1 bg-cyber-500/30 rounded-t" style="height: 90%"></div>
                            <div class="flex-1 bg-cyber-500 rounded-t" style="height: 100%"></div>
                            <div class="flex-1 bg-cyber-500/30 rounded-t" style="height: 75%"></div>
                            <div class="flex-1 bg-cyber-500/30 rounded-t" style="height: 60%"></div>
                        </div>

                        <div class="flex justify-between text-xs text-gray-500 mt-2">
                            <span>10:00</span>
                            <span>11:00</span>
                            <span>12:00</span>
                            <span>13:00</span>
                            <span>14:00</span>
                        </div>
                    </div>

                    <!-- System Resources -->
                    <div class="glass-card rounded-2xl p-6">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="font-semibold text-white">系統資源使用</h3>
                            <span class="text-sm text-gray-400">即時</span>
                        </div>

                        <div class="space-y-4">
                            <div>
                                <div class="flex justify-between text-sm mb-2">
                                    <span class="text-gray-400">CPU 使用率</span>
                                    <span class="text-emerald-400 metric-value">42%</span>
                                </div>
                                <div class="w-full bg-dark-bg rounded-full h-2">
                                    <div class="bg-emerald-500 h-2 rounded-full" style="width: 42%"></div>
                                </div>
                            </div>

                            <div>
                                <div class="flex justify-between text-sm mb-2">
                                    <span class="text-gray-400">記憶體使用率</span>
                                    <span class="text-amber-400 metric-value">68%</span>
                                </div>
                                <div class="w-full bg-dark-bg rounded-full h-2">
                                    <div class="bg-amber-500 h-2 rounded-full" style="width: 68%"></div>
                                </div>
                            </div>

                            <div>
                                <div class="flex justify-between text-sm mb-2">
                                    <span class="text-gray-400">磁碟使用率</span>
                                    <span class="text-emerald-400 metric-value">35%</span>
                                </div>
                                <div class="w-full bg-dark-bg rounded-full h-2">
                                    <div class="bg-emerald-500 h-2 rounded-full" style="width: 35%"></div>
                                </div>
                            </div>

                            <div>
                                <div class="flex justify-between text-sm mb-2">
                                    <span class="text-gray-400">網路頻寬</span>
                                    <span class="text-cyber-400 metric-value">45%</span>
                                </div>
                                <div class="w-full bg-dark-bg rounded-full h-2">
                                    <div class="bg-cyber-500 h-2 rounded-full" style="width: 45%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Recent Alerts -->
                <div class="glass-card rounded-2xl p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="font-semibold text-white">最近告警</h3>
                        <a href="#" class="text-sm text-cyber-400 hover:text-cyber-300">查看全部 →</a>
                    </div>

                    <div class="space-y-3">
                        <div class="flex items-center p-3 bg-red-500/10 border border-red-500/20 rounded-lg">
                            <div class="w-10 h-10 rounded-lg bg-red-500/20 flex items-center justify-center mr-4">
                                <i data-lucide="alert-triangle" class="w-5 h-5 text-red-400"></i>
                            </div>
                            <div class="flex-1">
                                <div class="text-white">機台 A-003 離線超過 10 分鐘</div>
                                <div class="text-sm text-gray-500">2024-03-06 14:32:18</div>
                            </div>
                            <button class="px-3 py-1 bg-red-500/20 text-red-400 text-sm rounded border border-red-500/30">處理</button>
                        </div>

                        <div class="flex items-center p-3 bg-amber-500/10 border border-amber-500/20 rounded-lg">
                            <div class="w-10 h-10 rounded-lg bg-amber-500/20 flex items-center justify-center mr-4">
                                <i data-lucide="alert-circle" class="w-5 h-5 text-amber-400"></i>
                            </div>
                            <div class="flex-1">
                                <div class="text-white">API 回應時間超過閾值 (2.5s)</div>
                                <div class="text-sm text-gray-500">2024-03-06 14:28:45</div>
                            </div>
                            <span class="text-sm text-gray-400">已自動恢復</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="../js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_system_monitor.html');
        lucide.createIcons();
    </script>
</body>
</html>
