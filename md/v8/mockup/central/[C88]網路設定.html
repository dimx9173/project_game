<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網路設定 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link href="../css/mockup-common.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 600: '#7c3aed', 400: '#a78bfa', 500: '#8b5cf6' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3), 0 0 20px rgba(168, 85, 247, 0.2); }
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    
    <main class="flex-1 p-6">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold">網路設定</h1>
                <p class="text-gray-400">本地網路參數設定</p>
            </div>
            <button class="px-4 py-2 gradient-purple rounded-lg font-medium flex items-center">
                <i data-lucide="save" class="w-4 h-4 mr-2"></i>儲存設定
            </button>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Wi-Fi 設定 -->
            <div class="glass-card rounded-2xl p-6">
                <h3 class="font-semibold mb-4 flex items-center">
                    <i data-lucide="wifi" class="w-5 h-5 mr-2 text-cyber-400"></i>Wi-Fi 設定
                </h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-300 mb-2">SSID（網路名稱）</label>
                        <input type="text" value="GameCenter_5G" class="w-full bg-dark-bg border border-dark-border rounded-lg py-2.5 px-4 input-focus text-white">
                    </div>
                    
                    <div>
                        <label class="block text-sm text-gray-300 mb-2">密碼</label>
                        <input type="password" value="********" class="w-full bg-dark-bg border border-dark-border rounded-lg py-2.5 px-4 input-focus text-white">
                    </div>
                    
                    <div class="flex items-center justify-between py-2">
                        <span class="text-sm text-gray-300">自動連線</span>
                        <button class="w-12 h-6 rounded-full bg-cyber-500 relative">
                            <span class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full"></span>
                        </button>
                    </div>
                    
                    <div>
                        <label class="block text-sm text-gray-300 mb-2">頻段</label>
                        <select class="w-full bg-dark-bg border border-dark-border rounded-lg py-2.5 px-4 text-white">
                            <option>5 GHz</option>
                            <option>2.4 GHz</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <!-- 有線網路設定 -->
            <div class="glass-card rounded-2xl p-6">
                <h3 class="font-semibold mb-4 flex items-center">
                    <i data-lucide="network" class="w-5 h-5 mr-2 text-cyber-400"></i>有線網路設定
                </h3>
                <div class="space-y-4">
                    <div class="flex items-center justify-between py-2">
                        <span class="text-sm text-gray-300">啟用有線網路</span>
                        <button class="w-12 h-6 rounded-full bg-dark-bg border border-dark-border relative">
                            <span class="absolute left-1 top-1 w-4 h-4 bg-gray-400 rounded-full"></span>
                        </button>
                    </div>
                    
                    <div>
                        <label class="block text-sm text-gray-300 mb-2">IP 位址取得方式</label>
                        <select class="w-full bg-dark-bg border border-dark-border rounded-lg py-2.5 px-4 text-white">
                            <option>DHCP 自動取得</option>
                            <option>手動指定 IP</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <!-- IP 設定 -->
            <div class="glass-card rounded-2xl p-6">
                <h3 class="font-semibold mb-4 flex items-center">
                    <i data-lucide="ip" class="w-5 h-5 mr-2 text-cyber-400"></i>IP 設定
                </h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-300 mb-2">IP 位址</label>
                        <input type="text" value="192.168.1.100" class="w-full bg-dark-bg border border-dark-border rounded-lg py-2.5 px-4 input-focus text-white font-mono">
                    </div>
                    
                    <div>
                        <label class="block text-sm text-gray-300 mb-2">子網路遮罩</label>
                        <input type="text" value="255.255.255.0" class="w-full bg-dark-bg border border-dark-border rounded-lg py-2.5 px-4 input-focus text-white font-mono">
                    </div>
                    
                    <div>
                        <label class="block text-sm text-gray-300 mb-2">預設閘道</label>
                        <input type="text" value="192.168.1.1" class="w-full bg-dark-bg border border-dark-border rounded-lg py-2.5 px-4 input-focus text-white font-mono">
                    </div>
                    
                    <div>
                        <label class="block text-sm text-gray-300 mb-2">DNS 伺服器</label>
                        <input type="text" value="8.8.8.8, 8.8.4.4" class="w-full bg-dark-bg border border-dark-border rounded-lg py-2.5 px-4 input-focus text-white font-mono">
                    </div>
                </div>
            </div>
            
            <!-- 進階設定 -->
            <div class="glass-card rounded-2xl p-6">
                <h3 class="font-semibold mb-4 flex items-center">
                    <i data-lucide="settings" class="w-5 h-5 mr-2 text-cyber-400"></i>進階設定
                </h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-300 mb-2">MTU 大小</label>
                        <input type="number" value="1500" class="w-full bg-dark-bg border border-dark-border rounded-lg py-2.5 px-4 input-focus text-white font-mono">
                    </div>
                    
                    <div>
                        <label class="block text-sm text-gray-300 mb-2">連線逾時（秒）</label>
                        <input type="number" value="30" class="w-full bg-dark-bg border border-dark-border rounded-lg py-2.5 px-4 input-focus text-white font-mono">
                    </div>
                    
                    <div class="flex items-center justify-between py-2">
                        <span class="text-sm text-gray-300">啟用 QoS</span>
                        <button class="w-12 h-6 rounded-full bg-dark-bg border border-dark-border relative">
                            <span class="absolute left-1 top-1 w-4 h-4 bg-gray-400 rounded-full"></span>
                        </button>
                    </div>
                    
                    <div class="flex items-center justify-between py-2">
                        <span class="text-sm text-gray-300">啟用 NAT</span>
                        <button class="w-12 h-6 rounded-full bg-cyber-500 relative">
                            <span class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full"></span>
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- 雲端連線設定 -->
            <div class="glass-card rounded-2xl p-6 lg:col-span-2">
                <h3 class="font-semibold mb-4 flex items-center">
                    <i data-lucide="cloud" class="w-5 h-5 mr-2 text-cyber-400"></i>雲端連線設定
                </h3>
                <div class="grid grid-cols-2 gap-6">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-300 mb-2">雲端 API 網址</label>
                            <input type="text" value="https://api.gameplatform.com" class="w-full bg-dark-bg border border-dark-border rounded-lg py-2.5 px-4 input-focus text-white">
                        </div>
                        
                        <div>
                            <label class="block text-sm text-gray-300 mb-2">API Key</label>
                            <input type="password" value="sk-xxxx-xxxx-xxxx" class="w-full bg-dark-bg border border-dark-border rounded-lg py-2.5 px-4 input-focus text-white font-mono">
                        </div>
                    </div>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-300 mb-2">連線逾時（秒）</label>
                            <input type="number" value="60" class="w-full bg-dark-bg border border-dark-border rounded-lg py-2.5 px-4 input-focus text-white font-mono">
                        </div>
                        
                        <div>
                            <label class="block text-sm text-gray-300 mb-2">重試次數</label>
                            <input type="number" value="3" class="w-full bg-dark-bg border border-dark-border rounded-lg py-2.5 px-4 input-focus text-white font-mono">
                        </div>
                    </div>
                </div>
                
                <div class="mt-6 pt-4 border-t border-dark-border flex justify-between">
                    <button class="px-4 py-2 bg-cyber-500/20 text-cyber-400 rounded-lg flex items-center">
                        <i data-lucide="wifi-off" class="w-4 h-4 mr-2"></i>測試連線
                    </button>
                    
                    <div class="flex items-center space-x-2 text-sm">
                        <span class="w-2 h-2 bg-emerald-400 rounded-full"></span>
                        <span class="text-emerald-400">已連線</span>
                        <span class="text-gray-400">|</span>
                        <span class="text-gray-400">延遲: 45ms</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <script src="../js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_network_settings.html');
        lucide.createIcons();
    </script>
</body>
</html>
