<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05); }
        .glass-card:hover { border-color: rgba(168, 85, 247, 0.4); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 30px rgba(168, 85, 247, 0.2); }
        .neon-text { text-shadow: 0 0 10px rgba(168, 85, 247, 0.5); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3), 0 0 20px rgba(168, 85, 247, 0.2); }
        .orb { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.5; }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="gradient-bg min-h-screen">
    <div class="min-h-screen flex items-center justify-center login-gradient relative overflow-hidden">
        <div class="orb w-96 h-96 bg-purple-600 top-0 left-0 -translate-x-1/2 -translate-y-1/2"></div>
        <div class="orb w-80 h-80 bg-indigo-600 bottom-0 right-0 translate-x-1/3 translate-y-1/3"></div>
        <div class="orb w-64 h-64 bg-violet-500 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>

        <div class="glass-card rounded-3xl p-8 w-full max-w-md relative z-10">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl gradient-purple mb-4 shadow-glow">
                    <i data-lucide="gamepad-2" class="w-8 h-8 text-white"></i>
                </div>
                <h1 class="text-2xl font-bold text-white neon-text">遊戲平台管理中心</h1>
                <p class="text-gray-400 mt-2">Game Platform Admin</p>
            </div>
            <form class="space-y-6" onsubmit="event.preventDefault(); window.location.href='mockup_dashboard.html';">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">帳號</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500"></i>
                        <input type="text" class="w-full bg-dark-bg border border-dark-border rounded-xl py-3 pl-12 pr-4 text-white placeholder-gray-500 focus:outline-none input-focus transition-all" placeholder="請輸入帳號">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">密碼</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500"></i>
                        <input type="password" class="w-full bg-dark-bg border border-dark-border rounded-xl py-3 pl-12 pr-4 text-white placeholder-gray-500 focus:outline-none input-focus transition-all" placeholder="請輸入密碼">
                    </div>
                </div>
                <div class="flex items-center justify-between">
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" class="w-4 h-4 rounded border-dark-border bg-dark-bg text-purple-500">
                        <span class="ml-2 text-sm text-gray-400">記住我</span>
                    </label>
                    <a href="#" class="text-sm text-purple-400 hover:text-purple-300">忘記密碼？</a>
                </div>
                <button type="submit" class="w-full gradient-purple rounded-xl py-3 font-semibold text-white shadow-glow hover:shadow-lg transition-all">
                    登入系統
                </button>
            </form>
            <div class="mt-8 pt-6 border-t border-dark-border text-center">
                <a href="mockup_local_cash.html" class="text-sm text-gray-500 hover:text-purple-400 transition-all">
                    <i data-lucide="monitor" class="w-4 h-4 inline mr-1"></i>
                    單機本地後台登入
                </a>
            </div>
        </div>
    </div>
    <script> lucide.createIcons(); </script>
</body>
</html>
