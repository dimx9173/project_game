<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心跳檢測 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link href="../css/mockup-common.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 600: '#7c3aed', 400: '#a78bfa', 500: '#8b5cf6' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3), 0 0 20px rgba(168, 85, 247, 0.2); }
        .pulse-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    
    <main class="flex-1 p-6">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold">心跳檢測</h1>
                <p class="text-gray-400">機台連線狀態與離線告警監控</p>
            </div>
            <div class="flex items-center space-x-2 text-sm text-gray-400">
                <span class="w-2 h-2 bg-emerald-400 rounded-full pulse-dot"></span>
                <span>即時監控中</span>
            </div>
        </div>
        
        <!-- 統計卡片 -->
        <div class="grid grid-cols-4 gap-4 mb-6">
            <div class="glass-card rounded-xl p-4">
                <p class="text-sm text-gray-400">在線機台</p>
                <p class="text-2xl font-bold text-emerald-400 font-mono">45</p>
                <p class="text-xs text-gray-500">90%</p>
            </div>
            <div class="glass-card rounded-xl p-4">
                <p class="text-sm text-gray-400">離線機台</p>
                <p class="text-2xl font-bold text-red-400 font-mono">5</p>
                <p class="text-xs text-gray-500">10%</p>
            </div>
            <div class="glass-card rounded-xl p-4">
                <p class="text-sm text-gray-400">平均心跳延遲</p>
                <p class="text-2xl font-bold text-cyber-400 font-mono">45ms</p>
                <p class="text-xs text-emerald-400">✓ 正常</p>
            </div>
            <div class="glass-card rounded-xl p-4">
                <p class="text-sm text-gray-400">今日斷線次數</p>
                <p class="text-2xl font-bold text-amber-400 font-mono">12</p>
                <p class="text-xs text-gray-500">已自動重連</p>
            </div>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 心跳趨勢圖 -->
            <div class="lg:col-span-2 glass-card rounded-2xl p-6">
                <h3 class="font-semibold mb-4">心跳趨勢（24小時）</h3>
                <div class="h-64">
                    <canvas id="heartbeatChart"></canvas>
                </div>
            </div>
            
            <!-- 離線告警 -->
            <div class="glass-card rounded-2xl p-6">
                <h3 class="font-semibold mb-4 flex items-center">
                    <i data-lucide="alert-triangle" class="w-5 h-5 mr-2 text-red-400"></i>
                    離線告警
                </h3>
                <div class="space-y-3">
                    <div class="glass rounded-xl p-4 border-l-4 border-red-400">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="text-sm font-medium">A-003</span>
                                <p class="text-xs text-gray-400 mt-1">離線 15 分鐘</p>
                            </div>
                            <span class="px-2 py-1 bg-red-500/20 text-red-400 text-xs rounded">離線</span>
                        </div>
                    </div>
                    
                    <div class="glass rounded-xl p-4 border-l-4 border-amber-400">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="text-sm font-medium">A-012</span>
                                <p class="text-xs text-gray-400 mt-1">延遲過高（300ms）</p>
                            </div>
                            <span class="px-2 py-1 bg-amber-500/20 text-amber-400 text-xs rounded">警告</span>
                        </div>
                    </div>
                    
                    <div class="glass rounded-xl p-4 border-l-4 border-gray-500">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="text-sm font-medium">A-007</span>
                                <p class="text-xs text-gray-400 mt-1">已於 5 分鐘前恢復</p>
                            </div>
                            <span class="px-2 py-1 bg-gray-500/20 text-gray-400 text-xs rounded">已恢復</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 機台心跳列表 -->
        <div class="glass-card rounded-2xl p-6 mt-6">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-semibold">機台心跳狀態</h3>
                <div class="flex space-x-2">
                    <select class="bg-dark-bg border border-dark-border rounded-lg py-1.5 px-3 text-sm text-white">
                        <option>全部狀態</option>
                        <option>在線</option>
                        <option>離線</option>
                        <option>告警</option>
                    </select>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-dark-bg">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-400 uppercase">機台編號</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-400 uppercase">狀態</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-400 uppercase">心跳延遲</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-400 uppercase">最後心跳</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-400 uppercase">上線時間</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-400 uppercase">操作</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-dark-border">
                        <tr class="hover:bg-dark-hover">
                            <td class="px-4 py-4"><span class="font-mono">A-001</span></td>
                            <td class="px-4 py-4"><span class="px-2 py-1 bg-emerald-500/20 text-emerald-400 text-xs rounded">在線</span></td>
                            <td class="px-4 py-4"><span class="font-mono">32ms</span></td>
                            <td class="px-4 py-4 text-gray-400">幾秒前</td>
                            <td class="px-4 py-4 text-gray-400">2小時</td>
                            <td class="px-4 py-4"><button class="text-cyber-400 hover:text-cyber-300"><i data-lucide="activity" class="w-4 h-4"></i></button></td>
                        </tr>
                        <tr class="hover:bg-dark-hover">
                            <td class="px-4 py-4"><span class="font-mono">A-003</span></td>
                            <td class="px-4 py-4"><span class="px-2 py-1 bg-red-500/20 text-red-400 text-xs rounded">離線</span></td>
                            <td class="px-4 py-4"><span class="font-mono text-gray-500">--</span></td>
                            <td class="px-4 py-4 text-red-400">15分鐘前</td>
                            <td class="px-4 py-4 text-gray-400">--</td>
                            <td class="px-4 py-4"><button class="text-cyber-400 hover:text-cyber-300"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button></td>
                        </tr>
                        <tr class="hover:bg-dark-hover">
                            <td class="px-4 py-4"><span class="font-mono">A-012</span></td>
                            <td class="px-4 py-4"><span class="px-2 py-1 bg-amber-500/20 text-amber-400 text-xs rounded">告警</span></td>
                            <td class="px-4 py-4"><span class="font-mono text-amber-400">300ms</span></td>
                            <td class="px-4 py-4 text-gray-400">10秒前</td>
                            <td class="px-4 py-4 text-gray-400">30分鐘</td>
                            <td class="px-4 py-4"><button class="text-cyber-400 hover:text-cyber-300"><i data-lucide="activity" class="w-4 h-4"></i></button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    
    <script src="../js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_heartbeat_monitor.html');
        lucide.createIcons();
        
        // Chart.js 範例
        const ctx = document.getElementById('heartbeatChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['00:00', '04:00', '08:00', '12:00', '16:00', '20:00', '24:00'],
                datasets: [{
                    label: '平均心跳延遲 (ms)',
                    data: [45, 42, 48, 55, 40, 38, 45],
                    borderColor: '#8b5cf6',
                    backgroundColor: 'rgba(139, 92, 246, 0.1)',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: 'rgba(255, 255, 255, 0.1)' }, ticks: { color: '#9ca3af' } },
                    x: { grid: { display: false }, ticks: { color: '#9ca3af' } }
                }
            }
        });
    </script>
</body>
</html>
