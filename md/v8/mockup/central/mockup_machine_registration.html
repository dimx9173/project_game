<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機台註冊 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="../css/mockup-common.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 500: '#8b5cf6', 600: '#7c3aed' },
                        dark: { bg: '#0a0a0f', card: '#12121a', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9), rgba(30, 30, 46, 0.6)); border: 1px solid rgba(168, 85, 247, 0.15); }
    </style>
</head>
<body class="min-h-screen flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div class="flex-1 overflow-y-auto p-6">
            <div class="max-w-3xl mx-auto">
                <div class="text-center mb-8">
                    <div class="w-16 h-16 mx-auto rounded-2xl bg-gradient-to-br from-purple-600 to-indigo-600 flex items-center justify-center mb-4">
                        <i data-lucide="monitor-check" class="w-8 h-8 text-white"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-white">機台註冊</h1>
                    <p class="text-gray-400 mt-2">註冊新機台到系統</p>
                </div>
                <div class="glass-card rounded-2xl p-8">
                    <form class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">機台名稱 *</label>
                            <input type="text" placeholder="例如: 旗艦店 A-01" class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-purple-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">MAC 位址 *</label>
                            <input type="text" placeholder="AA:BB:CC:DD:EE:FF" class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 font-mono">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">硬體型號 *</label>
                            <select class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-3 text-white focus:outline-none focus:border-purple-500">
                                <option>選擇硬體型號</option>
                                <option>旗艦版 Pro</option>
                                <option>標準版 Standard</option>
                                <option>精簡版 Lite</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">註冊金鑰 *</label>
                            <input type="text" placeholder="12碼註冊金鑰" class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 font-mono uppercase">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">所屬門市</label>
                            <select class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-3 text-white focus:outline-none focus:border-purple-500">
                                <option>選擇門市</option>
                                <option>旗艦店</option>
                                <option>標準店 A</option>
                                <option>標準店 B</option>
                            </select>
                        </div>
                        <button type="submit" class="w-full py-4 bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-semibold rounded-xl shadow-glow hover:opacity-90 transition-opacity">
                            <i data-lucide="plus" class="w-5 h-5 inline mr-2"></i>註冊機台
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <script src="../js/sidebar.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
