<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多人遊戲管理 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="../css/mockup-common.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .glass-card:hover { border-color: rgba(168, 85, 247, 0.4); }
        
        
        
        
        .table-row-hover:hover { background: linear-gradient(90deg, rgba(124, 58, 237, 0.1), transparent); }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3), 0 0 20px rgba(168, 85, 247, 0.2); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        .badge-local { background: #10b981; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
        
        
        
        
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <h2 class="text-lg font-semibold text-white">多人遊戲管理</h2>
            <a href="mockup_std_multiplayer_add.html" class="px-4 py-2 gradient-purple rounded-lg text-sm text-white font-medium shadow-glow-sm">
                <i data-lucide="plus" class="w-4 h-4 mr-2"></i>新增牌桌
            </a>
        </header>
        <div class="flex-1 overflow-y-auto p-6">
            <div class="grid grid-cols-4 gap-4 mb-6">
                <div class="glass-card rounded-xl p-4">
                    <p class="text-xs text-gray-500">在線牌桌</p>
                    <p class="text-2xl font-bold text-white mt-1">28</p>
                </div>
                <div class="glass-card rounded-xl p-4">
                    <p class="text-xs text-gray-500">在線玩家</p>
                    <p class="text-2xl font-bold text-white mt-1">156</p>
                </div>
                <div class="glass-card rounded-xl p-4">
                    <p class="text-xs text-gray-500">今日局數</p>
                    <p class="text-2xl font-bold text-white mt-1">2,847</p>
                </div>
                <div class="glass-card rounded-xl p-4">
                    <p class="text-xs text-gray-500">今日營收</p>
                    <p class="text-2xl font-bold text-emerald-400 mt-1">$89,500</p>
                </div>
            </div>
            <div class="glass-card rounded-xl overflow-hidden">
                <div class="px-6 py-4 border-b border-dark-border flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <select class="px-4 py-2 bg-dark-bg border border-dark-border rounded-lg text-sm text-white">
                            <option>全部遊戲</option>
                            <option>百家樂</option>
                            <option>21點</option>
                            <option>德州撲克</option>
                        </select>
                        <select class="px-4 py-2 bg-dark-bg border border-dark-border rounded-lg text-sm text-white">
                            <option>全部狀態</option>
                            <option>進行中</option>
                            <option>等待中</option>
                            <option>已關閉</option>
                        </select>
                    </div>
                    <input type="text" placeholder="搜尋牌桌..." class="bg-dark-bg border border-dark-border rounded-lg px-4 py-2 text-sm text-white placeholder-gray-500 focus:outline-none input-focus">
                </div>
                <table class="min-w-full">
                    <thead class="bg-dark-bg">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">牌桌 ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">遊戲類型</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">玩家數</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">最低額</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">狀態</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">局數</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-400 uppercase">操作</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-dark-border">
                        <tr class="table-row-hover">
                            <td class="px-6 py-4 text-white font-mono font-bold">TABLE-001</td>
                            <td class="px-6 py-4 text-gray-300">百家樂</td>
                            <td class="px-6 py-4 text-white">6/8</td>
                            <td class="px-6 py-4 text-gray-300 font-mono">$100</td>
                            <td class="px-6 py-4"><span class="px-2 py-1 rounded text-xs bg-emerald-500/20 text-emerald-400">進行中</span></td>
                            <td class="px-6 py-4 text-gray-300">247</td>
                            <td class="px-6 py-4 text-right">
                                <a href="mockup_multiplayer_history.html" class="text-gray-400 hover:text-white mr-3"><i data-lucide="eye" class="w-4 h-4"></i></a>
                                <a href="mockup_multiplayer_config.html" class="text-gray-400 hover:text-white"><i data-lucide="settings" class="w-4 h-4"></i></a>
                            </td>
                        </tr>
                        <tr class="table-row-hover">
                            <td class="px-6 py-4 text-white font-mono font-bold">TABLE-002</td>
                            <td class="px-6 py-4 text-gray-300">21點</td>
                            <td class="px-6 py-4 text-white">4/6</td>
                            <td class="px-6 py-4 text-gray-300 font-mono">$50</td>
                            <td class="px-6 py-4"><span class="px-2 py-1 rounded text-xs bg-amber-500/20 text-amber-400">等待中</span></td>
                            <td class="px-6 py-4 text-gray-300">89</td>
                            <td class="px-6 py-4 text-right">
                                <a href="mockup_multiplayer_history.html" class="text-gray-400 hover:text-white mr-3"><i data-lucide="eye" class="w-4 h-4"></i></a>
                                <a href="mockup_multiplayer_config.html" class="text-gray-400 hover:text-white"><i data-lucide="settings" class="w-4 h-4"></i></a>
                            </td>
                        </tr>
                        <tr class="table-row-hover">
                            <td class="px-6 py-4 text-white font-mono font-bold">TABLE-003</td>
                            <td class="px-6 py-4 text-gray-300">德州撲克</td>
                            <td class="px-6 py-4 text-white">2/9</td>
                            <td class="px-6 py-4 text-gray-300 font-mono">$200</td>
                            <td class="px-6 py-4"><span class="px-2 py-1 rounded text-xs bg-gray-500/20 text-gray-400">等待中</span></td>
                            <td class="px-6 py-4 text-gray-300">0</td>
                            <td class="px-6 py-4 text-right">
                                <a href="mockup_multiplayer_history.html" class="text-gray-400 hover:text-white mr-3"><i data-lucide="eye" class="w-4 h-4"></i></a>
                                <a href="mockup_multiplayer_config.html" class="text-gray-400 hover:text-white"><i data-lucide="settings" class="w-4 h-4"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <script>
        lucide.createIcons();

        function toggleSidebarGroup(header) {
            const group = header.parentElement;
            const submenu = group.querySelector('.sidebar-submenu');
            if (group.classList.contains('open')) {
                group.classList.remove('open');
                submenu.classList.remove('open');
            } else {
                group.classList.add('open');
                submenu.classList.add('open');
            }
        }
    </script>
<script src="../js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_std_multiplayer.html');
    </script>
</body>
</html>
