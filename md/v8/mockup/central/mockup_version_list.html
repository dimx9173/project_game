<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>版本列表管理 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="../css/mockup-common.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        .table-row-hover:hover { background: linear-gradient(90deg, rgba(124, 58, 237, 0.1), transparent); }
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <h2 class="text-lg font-semibold text-white">版本列表管理</h2>
            <div class="flex items-center space-x-3">
                <button class="px-4 py-2 gradient-purple rounded-lg text-white font-medium shadow-glow-sm flex items-center">
                    <i data-lucide="upload" class="w-4 h-4 mr-2"></i>上傳新版本
                </button>
            </div>
        </header>
        <div class="flex-1 overflow-y-auto p-6">
            <!-- 統計卡片 -->
            <div class="grid grid-cols-4 gap-4 mb-6">
                <div class="glass-card rounded-xl p-4">
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="text-gray-400 text-sm">總版本數</div>
                            <div class="text-2xl font-bold text-white">12</div>
                        </div>
                        <div class="w-10 h-10 rounded-lg bg-purple-500/20 flex items-center justify-center">
                            <i data-lucide="layers" class="w-5 h-5 text-purple-400"></i>
                        </div>
                    </div>
                </div>
                <div class="glass-card rounded-xl p-4">
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="text-gray-400 text-sm">已發佈</div>
                            <div class="text-2xl font-bold text-emerald-400">8</div>
                        </div>
                        <div class="w-10 h-10 rounded-lg bg-emerald-500/20 flex items-center justify-center">
                            <i data-lucide="check-circle" class="w-5 h-5 text-emerald-400"></i>
                        </div>
                    </div>
                </div>
                <div class="glass-card rounded-xl p-4">
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="text-gray-400 text-sm">測試中</div>
                            <div class="text-2xl font-bold text-yellow-400">2</div>
                        </div>
                        <div class="w-10 h-10 rounded-lg bg-yellow-500/20 flex items-center justify-center">
                            <i data-lucide="test-tube" class="w-5 h-5 text-yellow-400"></i>
                        </div>
                    </div>
                </div>
                <div class="glass-card rounded-xl p-4">
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="text-gray-400 text-sm">已封存</div>
                            <div class="text-2xl font-bold text-gray-400">2</div>
                        </div>
                        <div class="w-10 h-10 rounded-lg bg-gray-500/20 flex items-center justify-center">
                            <i data-lucide="archive" class="w-5 h-5 text-gray-400"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 篩選 -->
            <div class="glass-card rounded-xl p-4 mb-6">
                <div class="flex items-center space-x-4">
                    <div class="flex items-center space-x-2">
                        <i data-lucide="filter" class="w-4 h-4 text-gray-400"></i>
                        <span class="text-gray-400 text-sm">狀態：</span>
                    </div>
                    <select class="bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-sm">
                        <option>全部</option>
                        <option>已發佈</option>
                        <option>測試中</option>
                        <option>已封存</option>
                    </select>
                    <div class="flex-1"></div>
                    <div class="relative">
                        <i data-lucide="search" class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2"></i>
                        <input type="text" placeholder="搜尋版本號..." class="bg-dark-bg border border-dark-border rounded-lg pl-10 pr-4 py-2 text-white text-sm w-64">
                    </div>
                </div>
            </div>

            <!-- 版本列表 -->
            <div class="glass-card rounded-2xl overflow-hidden">
                <table class="min-w-full">
                    <thead class="bg-dark-bg">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">版本號</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">上傳時間</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">檔案大小</th>
                            <th class="px-6 py-3 text-center text-xs font-medium text-gray-400 uppercase">狀態</th>
                            <th class="px-6 py-3 text-center text-xs font-medium text-gray-400 uppercase">機台覆蓋率</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-400 uppercase">操作</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-dark-border">
                        <tr class="table-row-hover">
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex items-center">
                                    <span class="text-white font-mono font-bold">v2.1.0</span>
                                    <span class="ml-2 px-2 py-0.5 bg-cyan-500/20 text-cyan-400 text-xs rounded">最新</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-400">2026/03/05 14:00</td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-400">256 MB</td>
                            <td class="px-6 py-4 whitespace-nowrap text-center"><span class="px-2 py-1 rounded-full text-xs bg-emerald-500/20 text-emerald-400">已發佈</span></td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex items-center justify-center">
                                    <div class="w-20 bg-dark-bg rounded-full h-2 mr-2">
                                        <div class="gradient-purple h-2 rounded-full" style="width: 90%"></div>
                                    </div>
                                    <span class="text-sm text-white">45/50</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right space-x-2">
                                <button class="text-purple-400 hover:text-purple-300"><i data-lucide="send" class="w-4 h-4"></i></button>
                                <button class="text-cyan-400 hover:text-cyan-300"><i data-lucide="eye" class="w-4 h-4"></i></button>
                                <button class="text-gray-400 hover:text-gray-300"><i data-lucide="more-vertical" class="w-4 h-4"></i></button>
                            </td>
                        </tr>
                        <tr class="table-row-hover">
                            <td class="px-6 py-4 whitespace-nowrap text-white font-mono font-bold">v2.0.5</td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-400">2026/02/28 09:30</td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-400">248 MB</td>
                            <td class="px-6 py-4 whitespace-nowrap text-center"><span class="px-2 py-1 rounded-full text-xs bg-emerald-500/20 text-emerald-400">已發佈</span></td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex items-center justify-center">
                                    <div class="w-20 bg-dark-bg rounded-full h-2 mr-2">
                                        <div class="bg-emerald-500 h-2 rounded-full" style="width: 100%"></div>
                                    </div>
                                    <span class="text-sm text-white">50/50</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right space-x-2">
                                <button class="text-cyan-400 hover:text-cyan-300"><i data-lucide="eye" class="w-4 h-4"></i></button>
                                <button class="text-gray-400 hover:text-gray-300"><i data-lucide="more-vertical" class="w-4 h-4"></i></button>
                            </td>
                        </tr>
                        <tr class="table-row-hover">
                            <td class="px-6 py-4 whitespace-nowrap text-white font-mono font-bold">v2.1.0-beta.2</td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-400">2026/03/04 16:20</td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-400">260 MB</td>
                            <td class="px-6 py-4 whitespace-nowrap text-center"><span class="px-2 py-1 rounded-full text-xs bg-yellow-500/20 text-yellow-400">測試中</span></td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex items-center justify-center">
                                    <div class="w-20 bg-dark-bg rounded-full h-2 mr-2">
                                        <div class="bg-yellow-500 h-2 rounded-full" style="width: 10%"></div>
                                    </div>
                                    <span class="text-sm text-white">5/50</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right space-x-2">
                                <button class="text-purple-400 hover:text-purple-300"><i data-lucide="send" class="w-4 h-4"></i></button>
                                <button class="text-cyan-400 hover:text-cyan-300"><i data-lucide="eye" class="w-4 h-4"></i></button>
                                <button class="text-gray-400 hover:text-gray-300"><i data-lucide="more-vertical" class="w-4 h-4"></i></button>
                            </td>
                        </tr>
                        <tr class="table-row-hover">
                            <td class="px-6 py-4 whitespace-nowrap text-white font-mono font-bold">v2.0.4</td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-400">2026/02/20 11:00</td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-400">245 MB</td>
                            <td class="px-6 py-4 whitespace-nowrap text-center"><span class="px-2 py-1 rounded-full text-xs bg-gray-500/20 text-gray-400">已封存</span></td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex items-center justify-center text-gray-500">-</div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right space-x-2">
                                <button class="text-cyan-400 hover:text-cyan-300"><i data-lucide="eye" class="w-4 h-4"></i></button>
                                <button class="text-gray-400 hover:text-gray-300"><i data-lucide="more-vertical" class="w-4 h-4"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <script src="../js/sidebar.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
