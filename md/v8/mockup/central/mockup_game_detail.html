<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲詳情 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="css/mockup-common.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .glass-card:hover { border-color: rgba(168, 85, 247, 0.4); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 30px rgba(168, 85, 247, 0.2); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3), 0 0 20px rgba(168, 85, 247, 0.2); }
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <div class="flex items-center">
                <a href="mockup_mvp_data_list.html" class="text-gray-400 hover:text-white mr-4"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
                <h2 class="text-lg font-semibold text-white">遊戲詳情</h2>
            </div>
            <div class="flex items-center space-x-3">
                <button class="px-4 py-2 bg-dark-hover border border-dark-border rounded-lg text-gray-300 hover:text-white flex items-center">
                    <i data-lucide="edit-3" class="w-4 h-4 mr-2"></i>編輯
                </button>
                <button class="px-4 py-2 gradient-purple rounded-lg text-white font-medium shadow-glow-sm flex items-center">
                    <i data-lucide="save" class="w-4 h-4 mr-2"></i>儲存
                </button>
            </div>
        </header>
        <div class="flex-1 overflow-y-auto p-6">
            <!-- 遊戲基本資訊 -->
            <div class="grid grid-cols-3 gap-6 mb-6">
                <div class="glass-card col-span-2 rounded-2xl p-6">
                    <h3 class="font-semibold text-white mb-4 flex items-center"><i data-lucide="gamepad-2" class="w-5 h-5 mr-2 text-cyber-400"></i>基本資訊</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div><p class="text-xs text-gray-500 mb-1">遊戲 ID</p><p class="font-mono text-white">GAME_001</p></div>
                        <div><p class="text-xs text-gray-500 mb-1">遊戲名稱</p><p class="text-white font-medium">超級拉霸 Deluxe</p></div>
                        <div><p class="text-xs text-gray-500 mb-1">供應商</p><p class="text-white">PlayTech Gaming</p></div>
                        <div><p class="text-xs text-gray-500 mb-1">遊戲類型</p><span class="px-2 py-1 bg-cyber-600/20 text-cyber-400 text-xs rounded">電子老虎機</span></div>
                        <div><p class="text-xs text-gray-500 mb-1"> RTP</p><p class="font-mono text-green-400">96.8%</p></div>
                        <div><p class="text-xs text-gray-500 mb-1"> volatility</p><span class="px-2 py-1 bg-yellow-600/20 text-yellow-400 text-xs rounded">中</span></div>
                    </div>
                </div>
                <div class="glass-card rounded-2xl p-6">
                    <h3 class="font-semibold text-white mb-4 flex items-center"><i data-lucide="image" class="w-5 h-5 mr-2 text-cyber-400"></i>遊戲縮圖</h3>
                    <div class="aspect-video bg-dark-bg rounded-lg flex items-center justify-center border border-dark-border">
                        <i data-lucide="image" class="w-12 h-12 text-gray-600"></i>
                    </div>
                    <button class="mt-3 w-full py-2 border border-dashed border-gray-600 text-gray-400 rounded-lg text-sm hover:border-cyber-500 hover:text-cyber-400">更換圖片</button>
                </div>
            </div>
            <!-- 遊戲配置 -->
            <div class="glass-card rounded-2xl p-6 mb-6">
                <h3 class="font-semibold text-white mb-4 flex items-center"><i data-lucide="settings" class="w-5 h-5 mr-2 text-cyber-400"></i>遊戲配置</h3>
                <div class="grid grid-cols-4 gap-4">
                    <div><p class="text-xs text-gray-500 mb-1">最低投注</p><p class="font-mono text-white">$1.00</p></div>
                    <div><p class="text-xs text-gray-500 mb-1">最高投注</p><p class="font-mono text-white">$100.00</p></div>
                    <div><p class="text-xs text-gray-500 mb-1">獎池類型</p><p class="text-white">固定彩池</p></div>
                    <div><p class="text-xs text-gray-500 mb-1">顯示順序</p><p class="font-mono text-white">1</p></div>
                    <div><p class="text-xs text-gray-500 mb-1">狀態</p><span class="px-2 py-1 bg-green-600/20 text-green-400 text-xs rounded">啟用</span></div>
                    <div><p class="text-xs text-gray-500 mb-1">熱門推薦</p><span class="px-2 py-1 bg-cyber-600/20 text-cyber-400 text-xs rounded">是</span></div>
                    <div><p class="text-xs text-gray-500 mb-1">版本</p><p class="font-mono text-white">v2.5.1</p></div>
                    <div><p class="text-xs text-gray-500 mb-1">建立日期</p><p class="text-white">2025-08-15</p></div>
                </div>
            </div>
            <!-- 統計數據 -->
            <div class="glass-card rounded-2xl p-6">
                <h3 class="font-semibold text-white mb-4 flex items-center"><i data-lucide="bar-chart-3" class="w-5 h-5 mr-2 text-cyber-400"></i>30日統計數據</h3>
                <div class="grid grid-cols-4 gap-4">
                    <div class="bg-dark-bg rounded-lg p-4"><p class="text-xs text-gray-500 mb-1">總投注</p><p class="font-mono text-lg text-white">$2,456,789</p></div>
                    <div class="bg-dark-bg rounded-lg p-4"><p class="text-xs text-gray-500 mb-1">總派彩</p><p class="font-mono text-lg text-green-400">$2,123,456</p></div>
                    <div class="bg-dark-bg rounded-lg p-4"><p class="text-xs text-gray-500 mb-1">營收</p><p class="font-mono text-lg text-cyber-400">$333,333</p></div>
                    <div class="bg-dark-bg rounded-lg p-4"><p class="text-xs text-gray-500 mb-1">遊戲次數</p><p class="font-mono text-lg text-white">89,432</p></div>
                </div>
            </div>
        </div>
    </main>
    <script src="js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_game_detail.html');
        lucide.createIcons();
    </script>
</body>
</html>
