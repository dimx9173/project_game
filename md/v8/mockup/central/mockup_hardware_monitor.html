<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>硬體監控 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link href="../css/mockup-common.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 600: '#7c3aed', 400: '#a78bfa', 500: '#8b5cf6' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    
    <main class="flex-1 p-6">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold">硬體監控</h1>
                <p class="text-gray-400">本機硬體設備即時監控</p>
            </div>
        </div>
        
        <div class="grid grid-cols-4 gap-4 mb-6">
            <div class="glass-card rounded-xl p-4">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-lg bg-emerald-500/20 flex items-center justify-center">
                        <i data-lucide="cpu" class="w-5 h-5 text-emerald-400"></i>
                    </div>
                    <div>
                        <p class="text-xs text-gray-400">CPU</p>
                        <p class="font-bold font-mono">35°C</p>
                    </div>
                </div>
            </div>
            
            <div class="glass-card rounded-xl p-4">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-lg bg-emerald-500/20 flex items-center justify-center">
                        <i data-lucide="gpu" class="w-5 h-5 text-emerald-400"></i>
                    </div>
                    <div>
                        <p class="text-xs text-gray-400">GPU</p>
                        <p class="font-bold font-mono">42°C</p>
                    </div>
                </div>
            </div>
            
            <div class="glass-card rounded-xl p-4">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-lg bg-amber-500/20 flex items-center justify-center">
                        <i data-lucide="thermometer" class="w-5 h-5 text-amber-400"></i>
                    </div>
                    <div>
                        <p class="text-xs text-gray-400">環境溫度</p>
                        <p class="font-bold font-mono">28°C</p>
                    </div>
                </div>
            </div>
            
            <div class="glass-card rounded-xl p-4">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-lg bg-emerald-500/20 flex items-center justify-center">
                        <i data-lucide="fan" class="w-5 h-5 text-emerald-400"></i>
                    </div>
                    <div>
                        <p class="text-xs text-gray-400">風扇轉速</p>
                        <p class="font-bold font-mono">1200 RPM</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- 硬體設備列表 -->
            <div class="glass-card rounded-2xl p-6">
                <h3 class="font-semibold mb-4">硬體設備狀態</h3>
                <div class="space-y-3">
                    <div class="glass rounded-xl p-4">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-3">
                                <div class="w-10 h-10 rounded-lg bg-cyber-500/20 flex items-center justify-center">
                                    <i data-lucide="monitor" class="w-5 h-5 text-cyber-400"></i>
                                </div>
                                <div>
                                    <p class="font-medium">主螢幕</p>
                                    <p class="text-xs text-gray-400">HDMI-1</p>
                                </div>
                            </div>
                            <span class="px-2 py-1 bg-emerald-500/20 text-emerald-400 text-xs rounded">正常</span>
                        </div>
                    </div>
                    
                    <div class="glass rounded-xl p-4">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-3">
                                <div class="w-10 h-10 rounded-lg bg-cyber-500/20 flex items-center justify-center">
                                    <i data-lucide="hard-drive" class="w-5 h-5 text-cyber-400"></i>
                                </div>
                                <div>
                                    <p class="font-medium">SSD 系統碟</p>
                                    <p class="text-xs text-gray-400">Samsung 1TB</p>
                                </div>
                            </div>
                            <span class="px-2 py-1 bg-emerald-500/20 text-emerald-400 text-xs rounded">正常</span>
                        </div>
                    </div>
                    
                    <div class="glass rounded-xl p-4">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-3">
                                <div class="w-10 h-10 rounded-lg bg-cyber-500/20 flex items-center justify-center">
                                    <i data-lucide="wifi" class="w-5 h-5 text-cyber-400"></i>
                                </div>
                                <div>
                                    <p class="font-medium">Wi-Fi 網卡</p>
                                    <p class="text-xs text-gray-400">Intel AX200</p>
                                </div>
                            </div>
                            <span class="px-2 py-1 bg-emerald-500/20 text-emerald-400 text-xs rounded">正常</span>
                        </div>
                    </div>
                    
                    <div class="glass rounded-xl p-4">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-3">
                                <div class="w-10 h-10 rounded-lg bg-amber-500/20 flex items-center justify-center">
                                    <i data-lucide="usb" class="w-5 h-5 text-amber-400"></i>
                                </div>
                                <div>
                                    <p class="font-medium">USB 集線器</p>
                                    <p class="text-xs text-gray-400">供電不穩定</p>
                                </div>
                            </div>
                            <span class="px-2 py-1 bg-amber-500/20 text-amber-400 text-xs rounded">警告</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 詳細監控數據 -->
            <div class="glass-card rounded-2xl p-6">
                <h3 class="font-semibold mb-4">詳細監控數據</h3>
                <div class="space-y-4">
                    <div>
                        <div class="flex justify-between mb-2">
                            <span class="text-sm text-gray-400">CPU 使用率</span>
                            <span class="font-mono">35%</span>
                        </div>
                        <div class="h-2 bg-dark-bg rounded-full">
                            <div class="h-2 bg-emerald-400 rounded-full" style="width: 35%"></div>
                        </div>
                    </div>
                    
                    <div>
                        <div class="flex justify-between mb-2">
                            <span class="text-sm text-gray-400">記憶體使用</span>
                            <span class="font-mono">75%</span>
                        </div>
                        <div class="h-2 bg-dark-bg rounded-full">
                            <div class="h-2 bg-amber-400 rounded-full" style="width: 75%"></div>
                        </div>
                    </div>
                    
                    <div>
                        <div class="flex justify-between mb-2">
                            <span class="text-sm text-gray-400">磁碟使用</span>
                            <span class="font-mono">45%</span>
                        </div>
                        <div class="h-2 bg-dark-bg rounded-full">
                            <div class="h-2 bg-emerald-400 rounded-full" style="width: 45%"></div>
                        </div>
                    </div>
                    
                    <div class="pt-4 border-t border-dark-border">
                        <h4 class="text-sm font-medium mb-3">電壓監控</h4>
                        <div class="grid grid-cols-3 gap-4 text-center">
                            <div class="glass rounded-lg p-3">
                                <p class="text-xs text-gray-400">12V</p>
                                <p class="font-mono text-emerald-400">12.1V</p>
                            </div>
                            <div class="glass rounded-lg p-3">
                                <p class="text-xs text-gray-400">5V</p>
                                <p class="font-mono text-emerald-400">5.02V</p>
                            </div>
                            <div class="glass rounded-lg p-3">
                                <p class="text-xs text-gray-400">3.3V</p>
                                <p class="font-mono text-emerald-400">3.31V</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <script src="../js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_hardware_monitor.html');
        lucide.createIcons();
    </script>
</body>
</html>
