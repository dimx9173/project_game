<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網路監控 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link href="../css/mockup-common.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 600: '#7c3aed', 400: '#a78bfa', 500: '#8b5cf6' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    
    <main class="flex-1 p-6">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold">網路監控</h1>
                <p class="text-gray-400">本機網路連線狀態與延遲監控</p>
            </div>
        </div>
        
        <div class="grid grid-cols-4 gap-4 mb-6">
            <div class="glass-card rounded-xl p-4">
                <p class="text-sm text-gray-400">網路狀態</p>
                <p class="text-xl font-bold text-emerald-400">已連線</p>
                <p class="text-xs text-gray-500">Wi-Fi 5G</p>
            </div>
            
            <div class="glass-card rounded-xl p-4">
                <p class="text-sm text-gray-400">下載速度</p>
                <p class="text-xl font-bold text-cyber-400 font-mono">85.2 Mbps</p>
            </div>
            
            <div class="glass-card rounded-xl p-4">
                <p class="text-sm text-gray-400">上傳速度</p>
                <p class="text-xl font-bold text-cyber-400 font-mono">42.1 Mbps</p>
            </div>
            
            <div class="glass-card rounded-xl p-4">
                <p class="text-sm text-gray-400">API 延遲</p>
                <p class="text-xl font-bold text-emerald-400 font-mono">45ms</p>
            </div>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="glass-card rounded-2xl p-6">
                <h3 class="font-semibold mb-4">網路速度趨勢（24小時）</h3>
                <div class="h-64">
                    <canvas id="networkChart"></canvas>
                </div>
            </div>
            
            <div class="glass-card rounded-2xl p-6">
                <h3 class="font-semibold mb-4">API 延遲趨勢（24小時）</h3>
                <div class="h-64">
                    <canvas id="latencyChart"></canvas>
                </div>
            </div>
            
            <div class="glass-card rounded-2xl p-6">
                <h3 class="font-semibold mb-4">網路設定資訊</h3>
                <div class="space-y-3">
                    <div class="flex justify-between py-2 border-b border-dark-border">
                        <span class="text-gray-400">連線方式</span>
                        <span>Wi-Fi (802.11ac)</span>
                    </div>
                    <div class="flex justify-between py-2 border-b border-dark-border">
                        <span class="text-gray-400">SSID</span>
                        <span>GameCenter_5G</span>
                    </div>
                    <div class="flex justify-between py-2 border-b border-dark-border">
                        <span class="text-gray-400">訊號強度</span>
                        <span class="text-emerald-400">-42 dBm (優良)</span>
                    </div>
                    <div class="flex justify-between py-2 border-b border-dark-border">
                        <span class="text-gray-400">IP 位址</span>
                        <span class="font-mono">192.168.1.100</span>
                    </div>
                    <div class="flex justify-between py-2">
                        <span class="text-gray-400">MAC 位址</span>
                        <span class="font-mono">AA:BB:CC:DD:EE:FF</span>
                    </div>
                </div>
            </div>
            
            <div class="glass-card rounded-2xl p-6">
                <h3 class="font-semibold mb-4">連線品質檢測</h3>
                <div class="space-y-4">
                    <div>
                        <div class="flex justify-between mb-2">
                            <span class="text-sm">DNS 解析</span>
                            <span class="text-sm text-emerald-400">✓ 正常 (12ms)</span>
                        </div>
                        <div class="h-1.5 bg-dark-bg rounded-full">
                            <div class="h-full bg-emerald-400 rounded-full" style="width: 95%"></div>
                        </div>
                    </div>
                    
                    <div>
                        <div class="flex justify-between mb-2">
                            <span class="text-sm">閘道連線</span>
                            <span class="text-sm text-emerald-400">✓ 正常 (1ms)</span>
                        </div>
                        <div class="h-1.5 bg-dark-bg rounded-full">
                            <div class="h-full bg-emerald-400 rounded-full" style="width: 100%"></div>
                        </div>
                    </div>
                    
                    <div>
                        <div class="flex justify-between mb-2">
                            <span class="text-sm">雲端 API 連線</span>
                            <span class="text-sm text-emerald-400">✓ 正常 (45ms)</span>
                        </div>
                        <div class="h-1.5 bg-dark-bg rounded-full">
                            <div class="h-full bg-emerald-400 rounded-full" style="width: 90%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <script src="../js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_network_monitor.html');
        lucide.createIcons();
        
        // Network Speed Chart
        new Chart(document.getElementById('networkChart'), {
            type: 'line',
            data: {
                labels: ['00:00', '04:00', '08:00', '12:00', '16:00', '20:00', '24:00'],
                datasets: [{
                    label: '下載 (Mbps)',
                    data: [90, 85, 88, 92, 87, 90, 85],
                    borderColor: '#8b5cf6',
                    backgroundColor: 'rgba(139, 92, 246, 0.1)',
                    fill: true,
                    tension: 0.4
                }, {
                    label: '上傳 (Mbps)',
                    data: [40, 38, 42, 45, 41, 43, 42],
                    borderColor: '#06b6d4',
                    backgroundColor: 'rgba(6, 182, 212, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#9ca3af' } } },
                scales: {
                    y: { grid: { color: 'rgba(255, 255, 255, 0.1)' }, ticks: { color: '#9ca3af' } },
                    x: { grid: { display: false }, ticks: { color: '#9ca3af' } }
                }
            }
        });
        
        // Latency Chart
        new Chart(document.getElementById('latencyChart'), {
            type: 'line',
            data: {
                labels: ['00:00', '04:00', '08:00', '12:00', '16:00', '20:00', '24:00'],
                datasets: [{
                    label: '延遲 (ms)',
                    data: [42, 38, 45, 52, 48, 44, 45],
                    borderColor: '#10b981',
                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: 'rgba(255, 255, 255, 0.1)' }, ticks: { color: '#9ca3af' } },
                    x: { grid: { display: false }, ticks: { color: '#9ca3af' } }
                }
            }
        });
    </script>
</body>
</html>
