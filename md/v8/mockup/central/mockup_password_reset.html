<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密碼重設 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .glass-card:hover { border-color: rgba(168, 85, 247, 0.4); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 30px rgba(168, 85, 247, 0.2); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3), 0 0 20px rgba(168, 85, 247, 0.2); }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="glass-card rounded-2xl p-8">
            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-full gradient-purple flex items-center justify-center mx-auto mb-4 shadow-glow">
                    <i data-lucide="key" class="w-8 h-8 text-white"></i>
                </div>
                <h2 class="text-xl font-semibold text-white">密碼重設</h2>
                <p class="text-gray-400 text-sm mt-2">請輸入新密碼並確認</p>
            </div>
            <form class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">玩家帳號</label>
                    <input type="text" value="john_player" readonly class="w-full bg-dark-bg border border-dark-border rounded-lg py-3 px-4 text-white">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">新密碼</label>
                    <input type="password" placeholder="請輸入新密碼" class="w-full bg-dark-bg border border-dark-border rounded-lg py-3 px-4 text-white placeholder-gray-500 focus:outline-none input-focus">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">確認密碼</label>
                    <input type="password" placeholder="請再次輸入密碼" class="w-full bg-dark-bg border border-dark-border rounded-lg py-3 px-4 text-white placeholder-gray-500 focus:outline-none input-focus">
                </div>
                <div class="bg-cyber-900/30 border border-cyber-700/50 rounded-lg p-3">
                    <p class="text-xs text-gray-400">密碼強度要求：</p>
                    <ul class="text-xs text-gray-500 mt-1 space-y-1">
                        <li class="flex items-center"><i data-lucide="check" class="w-3 h-3 mr-1 text-green-400"></i>至少 8 個字元</li>
                        <li class="flex items-center"><i data-lucide="check" class="w-3 h-3 mr-1 text-green-400"></i>包含大小寫字母</li>
                        <li class="flex items-center"><i data-lucide="x" class="w-3 h-3 mr-1 text-gray-500"></i>包含數字</li>
                        <li class="flex items-center"><i data-lucide="x" class="w-3 h-3 mr-1 text-gray-500"></i>包含特殊符號</li>
                    </ul>
                </div>
                <button type="submit" class="w-full py-3 gradient-purple rounded-lg text-white font-medium shadow-glow-sm">
                    確認重設
                </button>
                <a href="mockup_user_permission.html" class="block text-center text-gray-400 hover:text-white text-sm">
                    返回列表
                </a>
            </form>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
