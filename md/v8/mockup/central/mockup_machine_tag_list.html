<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag 管理 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link href="../css/mockup-common.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
</head>

<body class="gradient-bg min-h-screen flex text-gray-200">
    <div id="sidebar-container"></div>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <div class="flex items-center space-x-3">
                <i data-lucide="tag" class="w-6 h-6 text-cyber-400"></i>
                <h2 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">
                    機台 Tag 管理系統
                </h2>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="toggleModal('tagModal')"
                    class="px-4 py-2 gradient-purple rounded-lg text-white font-medium shadow-glow-sm flex items-center transition-all hover:scale-105">
                    <i data-lucide="plus" class="w-4 h-4 mr-2"></i>建立新 Tag
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 space-y-6">
            <!-- 統計快照 -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="glass-card rounded-2xl p-4 border border-cyber-500/10">
                    <p class="text-sm text-gray-400">總標籤數</p>
                    <p class="text-2xl font-bold text-white mt-1">12</p>
                </div>
                <div class="glass-card rounded-2xl p-4 border border-emerald-500/10">
                    <p class="text-sm text-gray-400">使用中標籤</p>
                    <p class="text-2xl font-bold text-emerald-400 mt-1">8</p>
                </div>
                <div class="glass-card rounded-2xl p-4 border border-gray-500/10">
                    <p class="text-sm text-gray-400">未使用標籤</p>
                    <p class="text-2xl font-bold text-gray-400 mt-1">4</p>
                </div>
                <div class="glass-card rounded-2xl p-4 border border-amber-500/10">
                    <p class="text-sm text-gray-400">標籤覆蓋率</p>
                    <p class="text-2xl font-bold text-amber-500 mt-1">85%</p>
                </div>
            </div>

            <!-- 管理列表 -->
            <div class="glass-card rounded-2xl overflow-hidden border border-cyber-500/10">
                <div class="p-6 border-b border-dark-border flex items-center justify-between">
                    <h3 class="font-semibold text-white flex items-center">
                        <i data-lucide="list" class="w-4 h-4 mr-2 text-cyber-400"></i>標籤列表
                    </h3>
                    <div class="flex items-center space-x-3">
                        <div class="relative">
                            <input type="text" placeholder="搜尋標籤..."
                                class="bg-dark-bg border border-dark-border rounded-lg py-2 px-4 pl-10 text-sm text-white placeholder-gray-500 focus:outline-none input-focus w-64 text-xs">
                            <i data-lucide="search"
                                class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-500"></i>
                        </div>
                    </div>
                </div>

                <div class="p-0">
                    <table class="min-w-full">
                        <thead class="bg-dark-bg/50">
                            <tr>
                                <th
                                    class="px-6 py-4 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">
                                    標籤名稱
                                </th>
                                <th
                                    class="px-6 py-4 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">
                                    預覽樣式
                                </th>
                                <th
                                    class="px-6 py-4 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">
                                    關聯機台數
                                </th>
                                <th
                                    class="px-6 py-4 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">
                                    建立時間
                                </th>
                                <th
                                    class="px-6 py-4 text-right text-xs font-semibold text-gray-400 uppercase tracking-wider">
                                    管理操作
                                </th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-dark-border">
                            <!-- VIP -->
                            <tr class="table-row-hover">
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="flex items-center">
                                        <div class="w-2 h-2 rounded-full bg-[#f59e0b] mr-3"></div>
                                        <span class="text-white font-medium">VIP 客戶</span>
                                    </div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span class="px-2.5 py-1 rounded-full text-[10px] font-bold"
                                        style="background: rgba(245, 158, 11, 0.2); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3);">
                                        VIP 客戶
                                    </span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-gray-300 font-mono text-sm">
                                    12 台
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-gray-500 text-xs">
                                    2026-03-01 14:30
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-right">
                                    <button class="text-cyber-400 hover:text-cyber-300 transition-colors mx-1"
                                        title="編輯">
                                        <i data-lucide="edit-3" class="w-4 h-4"></i>
                                    </button>
                                    <button class="text-red-400 hover:text-red-300 transition-colors mx-1" title="刪除">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </td>
                            </tr>
                            <!-- 旗艦店 -->
                            <tr class="table-row-hover">
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="flex items-center">
                                        <div class="w-2 h-2 rounded-full bg-[#8b5cf6] mr-3"></div>
                                        <span class="text-white font-medium">旗艦店</span>
                                    </div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span class="px-2.5 py-1 rounded-full text-[10px] font-bold"
                                        style="background: rgba(139, 92, 246, 0.2); color: #8b5cf6; border: 1px solid rgba(139, 92, 246, 0.3);">
                                        旗艦店
                                    </span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-gray-300 font-mono text-sm">
                                    8 台
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-gray-500 text-xs">
                                    2024-03-05 09:15
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-right">
                                    <button class="text-cyber-400 hover:text-cyber-300 transition-colors mx-1">
                                        <i data-lucide="edit-3" class="w-4 h-4"></i>
                                    </button>
                                    <button class="text-red-400 hover:text-red-300 transition-colors mx-1">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </td>
                            </tr>
                            <!-- 熱門 -->
                            <tr class="table-row-hover">
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="flex items-center">
                                        <div class="w-2 h-2 rounded-full bg-[#10b981] mr-3"></div>
                                        <span class="text-white font-medium">熱門</span>
                                    </div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span class="px-2.5 py-1 rounded-full text-[10px] font-bold"
                                        style="background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3);">
                                        熱門
                                    </span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-gray-300 font-mono text-sm">
                                    25 台
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-gray-500 text-xs">
                                    2026-03-06 11:20
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-right">
                                    <button class="text-cyber-400 hover:text-cyber-300 transition-colors mx-1">
                                        <i data-lucide="edit-3" class="w-4 h-4"></i>
                                    </button>
                                    <button class="text-red-400 hover:text-red-300 transition-colors mx-1">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="px-6 py-4 border-t border-dark-border flex items-center justify-between bg-dark-bg/30">
                    <span class="text-xs text-gray-400">顯示 3 之 12 條 標籤</span>
                    <div class="flex space-x-2">
                        <button
                            class="px-3 py-1 rounded bg-dark-bg border border-dark-border text-xs text-gray-400 disabled:opacity-50"
                            disabled>上一頁</button>
                        <button class="px-3 py-1 rounded gradient-purple text-xs text-white shadow-glow-sm">1</button>
                        <button
                            class="px-3 py-1 rounded bg-dark-bg border border-dark-border text-xs text-gray-300">2</button>
                        <button
                            class="px-3 py-1 rounded bg-dark-bg border border-dark-border text-xs text-gray-300">下一頁</button>
                    </div>
                </div>
            </div>

            <!-- 批量派發介面 (示意) -->
            <div class="glass-card rounded-2xl p-6 border border-cyber-500/10">
                <div class="flex items-center justify-between mb-6">
                    <div>
                        <h3 class="text-lg font-bold text-white flex items-center">
                            <i data-lucide="layers" class="w-5 h-5 mr-2 text-cyber-400"></i>批量標籤派發
                        </h3>
                        <p class="text-sm text-gray-400 mt-1">選取多台機台並一次性套用或移除標籤</p>
                    </div>
                    <button
                        class="px-6 py-2 bg-cyber-600/20 border border-cyber-500/30 rounded-lg text-cyber-400 font-medium hover:bg-cyber-600/30 transition-all">
                        開始選取機台
                    </button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="p-4 border border-dark-border rounded-xl bg-dark-bg/50">
                        <label class="block text-sm font-medium text-gray-400 mb-2">步驟 1：選取標籤</label>
                        <div class="flex flex-wrap gap-2">
                            <button
                                class="px-3 py-1.5 rounded-full border border-cyber-500/50 bg-cyber-500/10 text-cyber-400 text-xs">VIP
                                客戶</button>
                            <button
                                class="px-3 py-1.5 rounded-full border border-dark-border bg-dark-bg text-gray-500 text-xs hover:border-gray-500">旗艦店</button>
                            <button
                                class="px-3 py-1.5 rounded-full border border-dark-border bg-dark-bg text-gray-500 text-xs hover:border-gray-500">標準店</button>
                            <button
                                class="px-3 py-1.5 rounded-full border border-dark-border bg-dark-bg text-gray-500 text-xs hover:border-gray-500">熱門</button>
                            <button
                                class="px-3 py-1.5 rounded-full border border-dark-border bg-dark-bg text-gray-500 text-xs hover:border-gray-500">二樓</button>
                        </div>
                    </div>
                    <div class="p-4 border border-dark-border rounded-xl bg-dark-bg/50">
                        <label class="block text-sm font-medium text-gray-400 mb-2">步驟 2：執行操作</label>
                        <div class="flex space-x-3">
                            <button
                                class="flex-1 py-2 bg-emerald-600/20 border border-emerald-500/30 rounded text-emerald-400 text-sm font-bold hover:bg-emerald-600/30">套用標籤</button>
                            <button
                                class="flex-1 py-2 bg-red-600/20 border border-red-500/30 rounded text-red-400 text-sm font-bold hover:bg-red-600/30">移除標籤</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal: 新增/編輯 Tag -->
    <div id="tagModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="toggleModal('tagModal')"></div>
        <div
            class="glass-card relative w-full max-w-lg rounded-2xl border border-cyber-500/30 shadow-glow overflow-hidden">
            <div class="p-6 border-b border-dark-border flex items-center justify-between">
                <h3 class="text-xl font-bold text-white">建立新標籤</h3>
                <button onclick="toggleModal('tagModal')" class="text-gray-500 hover:text-white transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <div class="p-6 space-y-6">
                <!-- 名稱 -->
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">標籤名稱</label>
                    <input type="text" placeholder="例如：VIP、新款機台..."
                        class="w-full bg-dark-bg border border-dark-border rounded-xl py-3 px-4 text-white focus:outline-none input-focus">
                    <p class="text-[10px] text-gray-500 mt-1.5">名稱長度限制為 2-10 個字元。</p>
                </div>

                <!-- 顏色 -->
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">標籤顏色</label>
                    <div class="flex items-center space-x-4">
                        <input type="color" class="w-12 h-12 bg-transparent border-none cursor-pointer p-0"
                            value="#8b5cf6">
                        <div class="flex-1 grid grid-cols-6 gap-2">
                            <button
                                class="w-8 h-8 rounded-full bg-[#ef4444] border-2 border-transparent hover:border-white"></button>
                            <button
                                class="w-8 h-8 rounded-full bg-[#f59e0b] border-2 border-white shadow-glow-sm"></button>
                            <button
                                class="w-8 h-8 rounded-full bg-[#10b981] border-2 border-transparent hover:border-white"></button>
                            <button
                                class="w-8 h-8 rounded-full bg-[#3b82f6] border-2 border-transparent hover:border-white"></button>
                            <button
                                class="w-8 h-8 rounded-full bg-[#8b5cf6] border-2 border-transparent hover:border-white"></button>
                            <button
                                class="w-8 h-8 rounded-full bg-[#6b7280] border-2 border-transparent hover:border-white"></button>
                        </div>
                    </div>
                </div>

                <!-- 預覽 -->
                <div class="p-4 bg-dark-bg/80 rounded-xl border border-dark-border">
                    <label class="block text-xs font-medium text-gray-500 mb-2">即時預覽</label>
                    <div class="flex justify-center py-4 bg-dark-bg/50 rounded-lg">
                        <span class="px-4 py-1.5 rounded-full text-sm font-bold shadow-lg"
                            style="background: rgba(245, 158, 11, 0.2); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3);">
                            預覽標籤名稱
                        </span>
                    </div>
                </div>
            </div>

            <div class="p-6 border-t border-dark-border bg-dark-bg/30 flex justify-end space-x-3">
                <button onclick="toggleModal('tagModal')"
                    class="px-6 py-2 rounded-lg border border-dark-border text-gray-400 font-medium hover:bg-dark-hover transition-colors">
                    取消
                </button>
                <button onclick="saveTag()"
                    class="px-8 py-2 gradient-purple rounded-lg text-white font-bold shadow-glow-sm hover:scale-105 transition-all">
                    儲存標籤
                </button>
            </div>
        </div>
    </div>

    <script src="../js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_machine_tag_list.html');
        lucide.createIcons();

        function toggleModal(id) {
            const el = document.getElementById(id);
            if (el) el.classList.toggle('hidden');
        }

        function saveTag() {
            // 示意儲存
            toggleModal('tagModal');
            alert('標籤已成功儲存！');
        }
    </script>
</body>

</html>
