<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>錢包交易 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="../css/mockup-common.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .glass-card:hover { border-color: rgba(168, 85, 247, 0.4); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 30px rgba(168, 85, 247, 0.2); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        .sidebar-link { position: relative; transition: all 0.3s ease; }
        .sidebar-link::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 0; background: linear-gradient(180deg, #7c3aed, #c084fc); border-radius: 0 2px 2px 0; transition: height 0.3s ease; }
        .sidebar-link:hover::before, .sidebar-link.active::before { height: 60%; }
        .sidebar-link.active { background: linear-gradient(90deg, rgba(124, 58, 237, 0.2), transparent); }
        .table-row-hover:hover { background: linear-gradient(90deg, rgba(124, 58, 237, 0.1), transparent); }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3), 0 0 20px rgba(168, 85, 247, 0.2); }
        .badge-local { background: #10b981; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
        .badge-central { background: #8b5cf6; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
        .sidebar-group { margin-bottom: 4px; }
        .sidebar-group-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; color: #9ca3af; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; }
        .sidebar-submenu { display: none; padding-left: 8px; }
        .sidebar-submenu.open { display: block; }
        .sidebar-has-submenu::after { content: ''; width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 4px solid #6b7280; transition: transform 0.2s; }
        .sidebar-has-submenu.open::after { transform: rotate(180deg); }
        /* 側邊欄折疊樣式 */
        .sidebar-collapsed { width: 72px; }
        .sidebar-collapsed .sidebar-text,
        .sidebar-collapsed .sidebar-group-header span { display: none; }
        .sidebar-collapsed .sidebar-link { justify-content: center; padding: 10px; }
        .sidebar-collapsed .sidebar-link i { margin-right: 0; }
</style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <h2 class="text-lg font-semibold text-white">錢包交易 <span class="badge-local ml-2">本地</span> <span class="badge-central ml-1">集中</span></h2>
            <div class="flex items-center space-x-4">
                <select class="bg-dark-bg border border-dark-border rounded-lg py-2 px-4 text-sm text-white focus:outline-none input-focus">
                    <option>所有類型</option><option>儲值</option><option>提領</option><option>遊戲</option>
                </select>
                <button class="px-4 py-2 gradient-purple rounded-lg text-white font-medium shadow-glow-sm">匯出</button>
            </div>
        </header>
        <div class="flex-1 overflow-y-auto p-6">
            <div class="glass-card rounded-2xl overflow-hidden">
                <table class="min-w-full">
                    <thead class="bg-dark-bg">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">交易ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">類型</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">玩家</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">金額</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">狀態</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">時間</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-dark-border">
                        <tr class="table-row-hover">
                            <td class="px-6 py-4 whitespace-nowrap text-white font-mono">TXN001</td>
                            <td class="px-6 py-4 whitespace-nowrap"><span class="px-2 py-1 rounded text-xs bg-emerald-500/20 text-emerald-400">儲值</span></td>
                            <td class="px-6 py-4 whitespace-nowrap text-white">王大明</td>
                            <td class="px-6 py-4 whitespace-nowrap text-emerald-400 font-mono">+$5,000</td>
                            <td class="px-6 py-4 whitespace-nowrap"><span class="px-2 py-1 rounded-full text-xs bg-emerald-500/20 text-emerald-400">完成</span></td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-400">2026-03-02 14:30</td>
                        </tr>
                        <tr class="table-row-hover">
                            <td class="px-6 py-4 whitespace-nowrap text-white font-mono">TXN002</td>
                            <td class="px-6 py-4 whitespace-nowrap"><span class="px-2 py-1 rounded text-xs bg-amber-500/20 text-amber-400">遊戲</span></td>
                            <td class="px-6 py-4 whitespace-nowrap text-white">李小美</td>
                            <td class="px-6 py-4 whitespace-nowrap text-red-400 font-mono">-$1,200</td>
                            <td class="px-6 py-4 whitespace-nowrap"><span class="px-2 py-1 rounded-full text-xs bg-emerald-500/20 text-emerald-400">完成</span></td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-400">2026-03-02 14:25</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <script src="../js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_std_wallet.html');
        lucide.createIcons();
    </script>
</body>
</html>
