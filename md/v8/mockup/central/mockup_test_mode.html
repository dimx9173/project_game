<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>測試模式 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="../css/mockup-common.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        .test-mode-active { animation: pulse-border 2s infinite; }
        @keyframes pulse-border { 0%, 100% { border-color: rgba(245, 158, 11, 0.5); } 50% { border-color: rgba(245, 158, 11, 1); } }
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    
    <main class="flex-1 flex flex-col overflow-hidden">
        <!-- Header -->
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <div class="flex items-center">
                <h2 class="text-lg font-semibold text-white">測試模式</h2>
                <span class="ml-3 px-2 py-0.5 bg-amber-500/20 text-amber-400 text-xs rounded-full flex items-center">
                    <span class="w-1.5 h-1.5 rounded-full bg-amber-400 mr-1.5 animate-pulse"></span>
                    3 台測試中
                </span>
            </div>
            <div class="flex items-center space-x-3">
                <button onclick="toggleTestMode()" class="px-4 py-2 bg-amber-500/20 border border-amber-500/30 rounded-lg text-amber-400 text-sm hover:bg-amber-500/30">
                    <i data-lucide="power" class="w-4 h-4 inline mr-1"></i>啟用測試模式
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6">
            <div class="max-w-6xl mx-auto space-y-6">

                <!-- Alert Banner -->
                <div class="glass-card rounded-xl p-4 border-l-4 border-amber-500 test-mode-active">
                    <div class="flex items-start">
                        <i data-lucide="alert-triangle" class="w-5 h-5 text-amber-400 mr-3 mt-0.5"></i>
                        <div class="flex-1">
                            <div class="text-amber-400 font-medium mb-1">⚠️ 測試模式注意事項</div>
                            <ul class="text-sm text-gray-400 space-y-1 list-disc list-inside">
                                <li>測試模式下所有交易為虛擬資料，不影響真實帳務</li>
                                <li>測試資料會標記為測試類型，不計入正式營收統計</li>
                                <li>離開測試模式後測試資料將被清除</li>
                            </ul>
                        </div>
                    </div>
                </div>

                <!-- Test Mode Machines -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    
                    <!-- Test Machine 1 -->
                    <div class="glass-card rounded-2xl p-5 border-2 border-amber-500/50">
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex items-center">
                                <div class="w-12 h-12 rounded-xl bg-amber-500/20 flex items-center justify-center mr-3">
                                    <i data-lucide="flask-conical" class="w-6 h-6 text-amber-400"></i>
                                </div>
                                <div>
                                    <div class="font-semibold text-white">A-001</div>
                                    <div class="text-xs text-amber-400">🧪 測試模式中</div>
                                </div>
                            </div>
                            
                            <div class="relative">
                                <button class="w-10 h-10 rounded-lg bg-amber-500 flex items-center justify-center">
                                    <i data-lucide="pause" class="w-5 h-5 text-white"></i>
                                </button>
                                <span class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-dark-bg"></span>
                            </div>
                        </div>

                        <div class="space-y-3">
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500">測試餘額</span>
                                <span class="text-amber-400 font-mono font-semibold">$10,000</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500">今日測試交易</span>
                                <span class="text-white font-mono">156 筆</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500">測試時長</span>
                                <span class="text-white font-mono">2小時 15分</span>
                            </div>
                        </div>

                        <div class="mt-4 pt-4 border-t border-dark-border space-y-2">
                            <button class="w-full py-2 bg-amber-500/20 text-amber-400 rounded-lg text-sm hover:bg-amber-500/30">
                                <i data-lucide="plus" class="w-4 h-4 inline mr-1"></i>重置測試餘額
                            </button>
                            <button class="w-full py-2 bg-red-500/20 text-red-400 rounded-lg text-sm hover:bg-red-500/30">
                                <i data-lucide="square" class="w-4 h-4 inline mr-1"></i>結束測試模式
                            </button>
                        </div>
                    </div>

                    <!-- Test Machine 2 -->
                    <div class="glass-card rounded-2xl p-5 border-2 border-amber-500/50">
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex items-center">
                                <div class="w-12 h-12 rounded-xl bg-amber-500/20 flex items-center justify-center mr-3">
                                    <i data-lucide="flask-conical" class="w-6 h-6 text-amber-400"></i>
                                </div>
                                <div>
                                    <div class="font-semibold text-white">A-002</div>
                                    <div class="text-xs text-amber-400">🧪 測試模式中</div>
                                </div>
                            </div>
                            
                            <button class="w-10 h-10 rounded-lg bg-amber-500 flex items-center justify-center">
                                <i data-lucide="pause" class="w-5 h-5 text-white"></i>
                            </button>
                        </div>

                        <div class="space-y-3">
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500">測試餘額</span>
                                <span class="text-amber-400 font-mono font-semibold">$5,500</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500">今日測試交易</span>
                                <span class="text-white font-mono">89 筆</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500">測試時長</span>
                                <span class="text-white font-mono">1小時 30分</span>
                            </div>
                        </div>

                        <div class="mt-4 pt-4 border-t border-dark-border space-y-2">
                            <button class="w-full py-2 bg-amber-500/20 text-amber-400 rounded-lg text-sm hover:bg-amber-500/30">
                                <i data-lucide="plus" class="w-4 h-4 inline mr-1"></i>重置測試餘額
                            </button>
                            <button class="w-full py-2 bg-red-500/20 text-red-400 rounded-lg text-sm hover:bg-red-500/30">
                                <i data-lucide="square" class="w-4 h-4 inline mr-1"></i>結束測試模式
                            </button>
                        </div>
                    </div>

                    <!-- Normal Machine -->
                    <div class="glass-card rounded-2xl p-5 border border-dark-border opacity-60">
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex items-center">
                                <div class="w-12 h-12 rounded-xl bg-gray-500/20 flex items-center justify-center mr-3">
                                    <i data-lucide="monitor" class="w-6 h-6 text-gray-400"></i>
                                </div>
                                <div>
                                    <div class="font-semibold text-white">A-003</div>
                                    <div class="text-xs text-gray-500">正常運作中</div>
                                </div>
                            </div>
                            
                            <button class="w-10 h-10 rounded-lg bg-gray-600 flex items-center justify-center hover:bg-amber-500 transition-colors">
                                <i data-lucide="play" class="w-5 h-5 text-white"></i>
                            </button>
                        </div>

                        <div class="space-y-3">
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500">測試餘額</span>
                                <span class="text-gray-400 font-mono">--</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500">今日測試交易</span>
                                <span class="text-gray-400 font-mono">--</span>
                            </div>
                        </div>

                        <div class="mt-4 pt-4 border-t border-dark-border">
                            <button class="w-full py-2 bg-gray-600 text-gray-400 rounded-lg text-sm cursor-not-allowed">
                                啟用測試模式
                            </button>
                        </div>
                    </div>

                </div>

                <!-- Test Mode Settings -->
                <div class="glass-card rounded-2xl p-6">
                    <h3 class="text-lg font-semibold text-white mb-4">測試模式設定</h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">預設測試餘額</label>
                                <select class="w-full bg-dark-bg border border-dark-border rounded-lg py-2 px-4 text-white">
                                    <option>$10,000</option>
                                    <option>$50,000</option>
                                    <option>$100,000</option>
                                    <option>自訂...</option>
                                </select>
                            </div>
                            
                            <div class="flex items-center justify-between py-3">
                                <div>
                                    <div class="text-white">啟用測試音效</div>
                                    <div class="text-xs text-gray-500">測試模式下播放特殊音效</div>
                                </div>
                                <button class="w-12 h-6 rounded-full bg-cyber-500 relative">
                                    <span class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full"></span>
                                </button>
                            </div>
                        </div>
                        
                        <div class="space-y-4">
                            <div class="flex items-center justify-between py-3">
                                <div>
                                    <div class="text-white">顯示測試浮水印</div>
                                    <div class="text-xs text-gray-500">畫面顯示測試模式標記</div>
                                </div>
                                <button class="w-12 h-6 rounded-full bg-cyber-500 relative">
                                    <span class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full"></span>
                                </button>
                            </div>
                            
                            <div class="flex items-center justify-between py-3">
                                <div>
                                    <div class="text-white">自動結束測試</div>
                                    <div class="text-xs text-gray-500">閒置 30 分鐘自動結束</div>
                                </div>
                                <button class="w-12 h-6 rounded-full bg-dark-bg border border-dark-border relative">
                                    <span class="absolute left-1 top-1 w-4 h-4 bg-gray-400 rounded-full"></span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="../js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_test_mode.html');
        lucide.createIcons();

        function toggleTestMode() {
            alert('測試模式切換功能');
        }
    </script>
</body>
</html>
