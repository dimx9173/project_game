<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>告警通知 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link href="../css/mockup-common.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 600: '#7c3aed', 400: '#a78bfa', 500: '#8b5cf6' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3), 0 0 20px rgba(168, 85, 247, 0.2); }
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    
    <main class="flex-1 p-6">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold">告警通知</h1>
                <p class="text-gray-400">接收雲端推播的告警訊息</p>
            </div>
            <div class="flex items-center space-x-3">
                <button class="p-2 glass rounded-lg text-gray-400 hover:text-white">
                    <i data-lucide="check-check" class="w-5 h-5"></i>
                </button>
                <button class="p-2 glass rounded-lg text-gray-400 hover:text-white">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
        
        <div class="grid grid-cols-4 gap-4 mb-6">
            <div class="glass-card rounded-xl p-4">
                <p class="text-sm text-gray-400">未讀告警</p>
                <p class="text-2xl font-bold text-red-400 font-mono">3</p>
            </div>
            <div class="glass-card rounded-xl p-4">
                <p class="text-sm text-gray-400">今日告警</p>
                <p class="text-2xl font-bold text-amber-400 font-mono">12</p>
            </div>
            <div class="glass-card rounded-xl p-4">
                <p class="text-sm text-gray-400">嚴重告警</p>
                <p class="text-2xl font-bold text-red-400 font-mono">1</p>
            </div>
            <div class="glass-card rounded-xl p-4">
                <p class="text-sm text-gray-400">已處理</p>
                <p class="text-2xl font-bold text-emerald-400 font-mono">8</p>
            </div>
        </div>
        
        <div class="glass-card rounded-2xl p-6">
            <div class="flex items-center justify-between mb-4">
                <div class="flex space-x-2">
                    <button class="px-3 py-1.5 text-sm bg-cyber-500/20 text-cyber-400 rounded-lg">全部</button>
                    <button class="px-3 py-1.5 text-sm text-gray-400 hover:text-white rounded-lg">嚴重</button>
                    <button class="px-3 py-1.5 text-sm text-gray-400 hover:text-white rounded-lg">警告</button>
                    <button class="px-3 py-1.5 text-sm text-gray-400 hover:text-white rounded-lg">資訊</button>
                </div>
                <select class="bg-dark-bg border border-dark-border rounded-lg py-1.5 px-3 text-sm text-white">
                    <option>最近 24 小時</option>
                    <option>最近 7 天</option>
                    <option>最近 30 天</option>
                </select>
            </div>
            
            <div class="space-y-3">
                <div class="glass rounded-xl p-4 border-l-4 border-red-400">
                    <div class="flex items-start justify-between">
                        <div class="flex items-start space-x-3">
                            <div class="w-10 h-10 rounded-lg bg-red-500/20 flex items-center justify-center">
                                <i data-lucide="server-off" class="w-5 h-5 text-red-400"></i>
                            </div>
                            <div>
                                <div class="flex items-center space-x-2">
                                    <span class="px-2 py-0.5 bg-red-500/20 text-red-400 text-xs rounded">嚴重</span>
                                    <span class="text-xs text-gray-400">10分鐘前</span>
                                </div>
                                <p class="font-medium mt-1">機台 A-003 離線超過 15 分鐘</p>
                                <p class="text-sm text-gray-400 mt-1">心跳檢測失敗，請檢查機台連線狀態</p>
                                <div class="flex space-x-2 mt-2">
                                    <button class="px-3 py-1 text-sm bg-cyber-500/20 text-cyber-400 rounded">查看詳情</button>
                                    <button class="px-3 py-1 text-sm text-gray-400 hover:text-white rounded">標記已讀</button>
                                </div>
                            </div>
                        </div>
                        <div class="w-2 h-2 bg-red-400 rounded-full"></div>
                    </div>
                </div>
                
                <div class="glass rounded-xl p-4 border-l-4 border-amber-400">
                    <div class="flex items-start justify-between">
                        <div class="flex items-start space-x-3">
                            <div class="w-10 h-10 rounded-lg bg-amber-500/20 flex items-center justify-center">
                                <i data-lucide="alert-triangle" class="w-5 h-5 text-amber-400"></i>
                            </div>
                            <div>
                                <div class="flex items-center space-x-2">
                                    <span class="px-2 py-0.5 bg-amber-500/20 text-amber-400 text-xs rounded">警告</span>
                                    <span class="text-xs text-gray-400">30分鐘前</span>
                                </div>
                                <p class="font-medium mt-1">API 延遲超過閾值（300ms）</p>
                                <p class="text-sm text-gray-400 mt-1">遊戲商 Provider-A 回應過慢</p>
                                <div class="flex space-x-2 mt-2">
                                    <button class="px-3 py-1 text-sm bg-cyber-500/20 text-cyber-400 rounded">查看詳情</button>
                                    <button class="px-3 py-1 text-sm text-gray-400 hover:text-white rounded">標記已讀</button>
                                </div>
                            </div>
                        </div>
                        <div class="w-2 h-2 bg-amber-400 rounded-full"></div>
                    </div>
                </div>
                
                <div class="glass rounded-xl p-4 border-l-4 border-blue-400 opacity-60">
                    <div class="flex items-start justify-between">
                        <div class="flex items-start space-x-3">
                            <div class="w-10 h-10 rounded-lg bg-blue-500/20 flex items-center justify-center">
                                <i data-lucide="info" class="w-5 h-5 text-blue-400"></i>
                            </div>
                            <div>
                                <div class="flex items-center space-x-2">
                                    <span class="px-2 py-0.5 bg-blue-500/20 text-blue-400 text-xs rounded">資訊</span>
                                    <span class="text-xs text-gray-400">2小時前</span>
                                </div>
                                <p class="font-medium mt-1">系統備份完成</p>
                                <p class="text-sm text-gray-400 mt-1">每日自動備份已成功完成</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <script src="../js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_alert_notifications.html');
        lucide.createIcons();
    </script>
</body>
</html>
