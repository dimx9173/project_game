<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新進度監控 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="../css/mockup-common.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <h2 class="text-lg font-semibold text-white">更新進度監控</h2>
            <div class="flex items-center space-x-3">
                <span class="text-gray-400 text-sm">任務: v2.1.0 全量更新</span>
                <button class="px-4 py-2 bg-red-500/20 text-red-400 rounded-lg hover:bg-red-500/30 flex items-center">
                    <i data-lucide="square" class="w-4 h-4 mr-2"></i>停止任務
                </button>
            </div>
        </header>
        <div class="flex-1 overflow-y-auto p-6">
            <!-- 總體進度 -->
            <div class="glass-card rounded-2xl p-6 mb-6">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center">
                        <div class="w-16 h-16 rounded-2xl bg-purple-500/20 flex items-center justify-center mr-4">
                            <i data-lucide="download-cloud" class="w-8 h-8 text-purple-400"></i>
                        </div>
                        <div>
                            <div class="text-xl font-semibold text-white">v2.1.0 更新進度</div>
                            <div class="text-gray-400">開始時間: 2026-03-09 10:00:00</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-3xl font-bold text-white">72%</div>
                        <div class="text-gray-400">預計剩餘 15 分鐘</div>
                    </div>
                </div>
                <div class="w-full bg-dark-bg rounded-full h-4 mb-4">
                    <div class="gradient-purple h-4 rounded-full transition-all" style="width: 72%"></div>
                </div>
                <div class="grid grid-cols-4 gap-4">
                    <div class="p-3 bg-dark-bg rounded-xl text-center">
                        <div class="text-emerald-400 text-lg font-bold">36</div>
                        <div class="text-gray-400 text-sm">已完成</div>
                    </div>
                    <div class="p-3 bg-dark-bg rounded-xl text-center">
                        <div class="text-yellow-400 text-lg font-bold">8</div>
                        <div class="text-gray-400 text-sm">進行中</div>
                    </div>
                    <div class="p-3 bg-dark-bg rounded-xl text-center">
                        <div class="text-gray-400 text-lg font-bold">6</div>
                        <div class="text-gray-400 text-sm">等待中</div>
                    </div>
                    <div class="p-3 bg-dark-bg rounded-xl text-center">
                        <div class="text-red-400 text-lg font-bold">0</div>
                        <div class="text-gray-400 text-sm">失敗</div>
                    </div>
                </div>
            </div>

            <!-- 機台列表 -->
            <div class="glass-card rounded-2xl overflow-hidden">
                <div class="p-4 border-b border-dark-border flex items-center justify-between">
                    <h3 class="text-white font-semibold">機台更新狀態</h3>
                    <div class="flex items-center space-x-2">
                        <select class="bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-sm">
                            <option>全部狀態</option>
                            <option>已完成</option>
                            <option>進行中</option>
                            <option>等待中</option>
                            <option>失敗</option>
                        </select>
                    </div>
                </div>
                <table class="min-w-full">
                    <thead class="bg-dark-bg">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">機台ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">位置</th>
                            <th class="px-6 py-3 text-center text-xs font-medium text-gray-400 uppercase">狀態</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">進度</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">目前步驟</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-400 uppercase">操作</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-dark-border">
                        <tr class="hover:bg-dark-hover/50">
                            <td class="px-6 py-4 whitespace-nowrap text-white font-mono">A-001</td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-400">台北門市A</td>
                            <td class="px-6 py-4 whitespace-nowrap text-center"><span class="px-2 py-1 rounded-full text-xs bg-emerald-500/20 text-emerald-400">已完成</span></td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="w-24 bg-dark-bg rounded-full h-2">
                                    <div class="bg-emerald-500 h-2 rounded-full" style="width: 100%"></div>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-emerald-400">更新完成</td>
                            <td class="px-6 py-4 whitespace-nowrap text-right">
                                <button class="text-cyan-400 hover:text-cyan-300 text-sm">詳情</button>
                            </td>
                        </tr>
                        <tr class="hover:bg-dark-hover/50">
                            <td class="px-6 py-4 whitespace-nowrap text-white font-mono">A-002</td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-400">台北門市A</td>
                            <td class="px-6 py-4 whitespace-nowrap text-center"><span class="px-2 py-1 rounded-full text-xs bg-yellow-500/20 text-yellow-400">進行中</span></td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="w-24 bg-dark-bg rounded-full h-2">
                                    <div class="gradient-purple h-2 rounded-full" style="width: 65%"></div>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-yellow-400">正在下載...</td>
                            <td class="px-6 py-4 whitespace-nowrap text-right">
                                <button class="text-cyan-400 hover:text-cyan-300 text-sm">詳情</button>
                            </td>
                        </tr>
                        <tr class="hover:bg-dark-hover/50">
                            <td class="px-6 py-4 whitespace-nowrap text-white font-mono">B-001</td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-400">台中門市</td>
                            <td class="px-6 py-4 whitespace-nowrap text-center"><span class="px-2 py-1 rounded-full text-xs bg-yellow-500/20 text-yellow-400">進行中</span></td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="w-24 bg-dark-bg rounded-full h-2">
                                    <div class="gradient-purple h-2 rounded-full" style="width: 30%"></div>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-yellow-400">校驗檔案...</td>
                            <td class="px-6 py-4 whitespace-nowrap text-right">
                                <button class="text-cyan-400 hover:text-cyan-300 text-sm">詳情</button>
                            </td>
                        </tr>
                        <tr class="hover:bg-dark-hover/50">
                            <td class="px-6 py-4 whitespace-nowrap text-white font-mono">C-001</td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-400">高雄門市</td>
                            <td class="px-6 py-4 whitespace-nowrap text-center"><span class="px-2 py-1 rounded-full text-xs bg-gray-500/20 text-gray-400">等待中</span></td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="w-24 bg-dark-bg rounded-full h-2">
                                    <div class="bg-gray-600 h-2 rounded-full" style="width: 0%"></div>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-400">排隊中 (第3位)</td>
                            <td class="px-6 py-4 whitespace-nowrap text-right">
                                <button class="text-cyan-400 hover:text-cyan-300 text-sm">詳情</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <script src="../js/sidebar.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
