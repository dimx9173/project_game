<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快速操作 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="../css/mockup-common.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .glass-card:hover { border-color: rgba(168, 85, 247, 0.4); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        .action-btn { transition: all 0.2s ease; }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(168, 85, 247, 0.3); }
        .action-btn:active { transform: translateY(0); }
        @keyframes pulse-ring { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        .pulse-ring { animation: pulse-ring 2s infinite; }
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    
    <main class="flex-1 flex flex-col overflow-hidden">
        <!-- Header -->
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <div class="flex items-center">
                <h2 class="text-lg font-semibold text-white">快速操作</h2>
                <span class="ml-3 px-2 py-0.5 bg-cyber-500/20 text-cyber-400 text-xs rounded-full">遠端控制</span>
            </div>
            <div class="text-sm text-gray-400">
                <i data-lucide="info" class="w-4 h-4 inline mr-1"></i>
                操作將透過雲端 API 執行
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6">
            <div class="max-w-6xl mx-auto space-y-6">

                <!-- Status Banner -->
                <div class="glass-card rounded-xl p-4 border-l-4 border-cyber-500">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <div class="relative mr-4">
                                <div class="w-3 h-3 rounded-full bg-emerald-400"></div>
                                <div class="absolute inset-0 w-3 h-3 rounded-full bg-emerald-400 pulse-ring"></div>
                            </div>
                            <div>
                                <div class="text-white font-medium">遠端控制已就緒</div>
                                <div class="text-sm text-gray-400">已連線至中央伺服器，可執行遠端操作</div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-sm text-gray-400">連線延遲</div>
                            <div class="text-lg font-mono text-emerald-400">12ms</div>
                        </div>
                    </div>
                </div>

                <!-- Quick Actions Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    
                    <!-- Action: Open Points -->
                    <button onclick="executeAction('開分')" class="action-btn glass-card rounded-2xl p-6 text-left">
                        <div class="w-14 h-14 rounded-2xl bg-emerald-500/20 flex items-center justify-center mb-4">
                            <i data-lucide="arrow-down-circle" class="w-7 h-7 text-emerald-400"></i>
                        </div>
                        <h3 class="text-lg font-semibold text-white mb-2">快速開分</h3>
                        <p class="text-sm text-gray-400 mb-4">為指定機台進行開分操作</p>
                        
                        <div class="flex items-center text-xs text-emerald-400">
                            <span>立即執行 →</span>
                        </div>
                    </button>

                    <!-- Action: Close Points -->
                    <button onclick="executeAction('洗分')" class="action-btn glass-card rounded-2xl p-6 text-left">
                        <div class="w-14 h-14 rounded-2xl bg-red-500/20 flex items-center justify-center mb-4">
                            <i data-lucide="arrow-up-circle" class="w-7 h-7 text-red-400"></i>
                        </div>
                        <h3 class="text-lg font-semibold text-white mb-2">快速洗分</h3>
                        <p class="text-sm text-gray-400 mb-4">為指定機台進行洗分結算</p>
                        
                        <div class="flex items-center text-xs text-red-400">
                            <span>立即執行 →</span>
                        </div>
                    </button>

                    <!-- Action: Restart Machine -->
                    <button onclick="executeAction('重啟機台')" class="action-btn glass-card rounded-2xl p-6 text-left">
                        <div class="w-14 h-14 rounded-2xl bg-amber-500/20 flex items-center justify-center mb-4">
                            <i data-lucide="refresh-cw" class="w-7 h-7 text-amber-400"></i>
                        </div>
                        <h3 class="text-lg font-semibold text-white mb-2">重啟機台</h3>
                        <p class="text-sm text-gray-400 mb-4">遠端重啟指定機台</p>
                        
                        <div class="flex items-center text-xs text-amber-400">
                            <span>需確認 →</span>
                        </div>
                    </button>

                    <!-- Action: Test Mode -->
                    <button onclick="executeAction('測試模式')" class="action-btn glass-card rounded-2xl p-6 text-left">
                        <div class="w-14 h-14 rounded-2xl bg-cyber-500/20 flex items-center justify-center mb-4">
                            <i data-lucide="flask-conical" class="w-7 h-7 text-cyber-400"></i>
                        </div>
                        <h3 class="text-lg font-semibold text-white mb-2">測試模式</h3>
                        <p class="text-sm text-gray-400 mb-4">啟用/停用機台測試模式</p>
                        
                        <div class="flex items-center text-xs text-cyber-400">
                            <span>切換狀態 →</span>
                        </div>
                    </button>

                    <!-- Action: Deploy Config -->
                    <button onclick="executeAction('配置下發')" class="action-btn glass-card rounded-2xl p-6 text-left">
                        <div class="w-14 h-14 rounded-2xl bg-blue-500/20 flex items-center justify-center mb-4">
                            <i data-lucide="send" class="w-7 h-7 text-blue-400"></i>
                        </div>
                        <h3 class="text-lg font-semibold text-white mb-2">配置下發</h3>
                        <p class="text-sm text-gray-400 mb-4">下發最新配置至指定機台</p>
                        
                        <div class="flex items-center text-xs text-blue-400">
                            <span>選擇配置 →</span>
                        </div>
                    </button>

                    <!-- Action: Sync Data -->
                    <button onclick="executeAction('強制同步')" class="action-btn glass-card rounded-2xl p-6 text-left">
                        <div class="w-14 h-14 rounded-2xl bg-cyan-500/20 flex items-center justify-center mb-4">
                            <i data-lucide="sync" class="w-7 h-7 text-cyan-400"></i>
                        </div>
                        <h3 class="text-lg font-semibold text-white mb-2">強制同步</h3>
                        <p class="text-sm text-gray-400 mb-4">立即同步資料至雲端</p>
                        
                        <div class="flex items-center text-xs text-cyan-400">
                            <span>立即執行 →</span>
                        </div>
                    </button>

                    <!-- Action: Lock Machine -->
                    <button onclick="executeAction('鎖定機台')" class="action-btn glass-card rounded-2xl p-6 text-left">
                        <div class="w-14 h-14 rounded-2xl bg-purple-500/20 flex items-center justify-center mb-4">
                            <i data-lucide="lock" class="w-7 h-7 text-purple-400"></i>
                        </div>
                        <h3 class="text-lg font-semibold text-white mb-2">鎖定機台</h3>
                        <p class="text-sm text-gray-400 mb-4">暫時鎖定指定機台</p>
                        
                        <div class="flex items-center text-xs text-purple-400">
                            <span>切換狀態 →</span>
                        </div>
                    </button>

                    <!-- Action: Emergency Stop -->
                    <button onclick="executeAction('緊急停用')" class="action-btn glass-card rounded-2xl p-6 text-left border-red-500/30 hover:border-red-500">
                        <div class="w-14 h-14 rounded-2xl bg-red-500/20 flex items-center justify-center mb-4">
                            <i data-lucide="octagon" class="w-7 h-7 text-red-400"></i>
                        </div>
                        <h3 class="text-lg font-semibold text-white mb-2">緊急停用</h3>
                        <p class="text-sm text-gray-400 mb-4">立即停用機台所有功能</p>
                        
                        
                        <div class="flex items-center text-xs text-red-400">
                            <span>⚠️ 需雙重確認 →</span>
                        </div>
                    </button>
                </div>

                <!-- Recent Operations -->
                <div class="glass-card rounded-2xl p-6">
                    <h3 class="text-lg font-semibold text-white mb-4">最近操作紀錄</h3>
                    
                    <div class="space-y-3">
                        <div class="flex items-center justify-between p-3 bg-dark-bg rounded-lg">
                            <div class="flex items-center">
                                <div class="w-8 h-8 rounded-lg bg-emerald-500/20 flex items-center justify-center mr-3">
                                    <i data-lucide="arrow-down-circle" class="w-4 h-4 text-emerald-400"></i>
                                </div>
                                <div>
                                    <div class="text-sm text-white">開分 - 機台 A-001</div>
                                    <div class="text-xs text-gray-500">$1,000 | 操作者: admin</div>
                                </div>
                            </div>
                            <span class="text-xs text-gray-500">5 分鐘前</span>
                        </div>

                        <div class="flex items-center justify-between p-3 bg-dark-bg rounded-lg">
                            <div class="flex items-center">
                                <div class="w-8 h-8 rounded-lg bg-amber-500/20 flex items-center justify-center mr-3">
                                    <i data-lucide="refresh-cw" class="w-4 h-4 text-amber-400"></i>
                                </div>
                                <div>
                                    <div class="text-sm text-white">重啟 - 機台 A-003</div>
                                    <div class="text-xs text-gray-500">操作者: admin</div>
                                </div>
                            </div>
                            <span class="text-xs text-gray-500">15 分鐘前</span>
                        </div>

                        <div class="flex items-center justify-between p-3 bg-dark-bg rounded-lg">
                            <div class="flex items-center">
                                <div class="w-8 h-8 rounded-lg bg-blue-500/20 flex items-center justify-center mr-3">
                                    <i data-lucide="send" class="w-4 h-4 text-blue-400"></i>
                                </div>
                                <div>
                                    <div class="text-sm text-white">配置下發 - 全部機台</div>
                                    <div class="text-xs text-gray-500">配置版本: v2.5.1</div>
                                </div>
                            </div>
                            <span class="text-xs text-gray-500">1 小時前</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="../js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_quick_actions.html');
        lucide.createIcons();

        function executeAction(action) {
            if (action === '緊急停用' || action === '重啟機台') {
                if (confirm(`確定要執行「${action}」嗎？此操作將影響機台運作。`)) {
                    alert(`${action} 指令已發送，請稍候...`);
                }
            } else {
                alert(`${action} 功能將開啟操作介面`);
            }
        }
    </script>
</body>
</html>
