<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>告警通知 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="../css/mockup-common.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <h2 class="text-lg font-semibold text-white">告警通知</h2>
            <div class="flex items-center space-x-3">
                <button class="px-4 py-2 bg-gray-500/20 text-gray-400 rounded-lg hover:bg-gray-500/30 flex items-center">
                    <i data-lucide="check-check" class="w-4 h-4 mr-2"></i>全部已讀
                </button>
                <button class="px-4 py-2 gradient-purple rounded-lg text-white font-medium shadow-glow-sm flex items-center">
                    <i data-lucide="settings" class="w-4 h-4 mr-2"></i>通知設定
                </button>
            </div>
        </header>
        <div class="flex-1 overflow-y-auto p-6">
            <!-- 統計 -->
            <div class="grid grid-cols-4 gap-4 mb-6">
                <div class="glass-card rounded-xl p-4">
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="text-gray-400 text-sm">未讀通知</div>
                            <div class="text-2xl font-bold text-red-400">12</div>
                        </div>
                        <div class="w-10 h-10 rounded-lg bg-red-500/20 flex items-center justify-center">
                            <i data-lucide="bell" class="w-5 h-5 text-red-400"></i>
                        </div>
                    </div>
                </div>
                <div class="glass-card rounded-xl p-4">
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="text-gray-400 text-sm">緊急告警</div>
                            <div class="text-2xl font-bold text-red-500">3</div>
                        </div>
                        <div class="w-10 h-10 rounded-lg bg-red-500/20 flex items-center justify-center">
                            <i data-lucide="alert-triangle" class="w-5 h-5 text-red-500"></i>
                        </div>
                    </div>
                </div>
                <div class="glass-card rounded-xl p-4">
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="text-gray-400 text-sm">警告</div>
                            <div class="text-2xl font-bold text-yellow-400">5</div>
                        </div>
                        <div class="w-10 h-10 rounded-lg bg-yellow-500/20 flex items-center justify-center">
                            <i data-lucide="alert-circle" class="w-5 h-5 text-yellow-400"></i>
                        </div>
                    </div>
                </div>
                <div class="glass-card rounded-xl p-4">
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="text-gray-400 text-sm">一般通知</div>
                            <div class="text-2xl font-bold text-blue-400">4</div>
                        </div>
                        <div class="w-10 h-10 rounded-lg bg-blue-500/20 flex items-center justify-center">
                            <i data-lucide="info" class="w-5 h-5 text-blue-400"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 通知列表 -->
            <div class="glass-card rounded-2xl overflow-hidden">
                <div class="p-4 border-b border-dark-border flex items-center space-x-4">
                    <select class="bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-sm">
                        <option>全部類型</option>
                        <option>緊急告警</option>
                        <option>警告</option>
                        <option>一般通知</option>
                    </select>
                    <select class="bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-sm">
                        <option>全部狀態</option>
                        <option>未讀</option>
                        <option>已讀</option>
                    </select>
                </div>
                <div class="divide-y divide-dark-border">
                    <!-- 緊急告警 -->
                    <div class="p-4 hover:bg-dark-hover/50 bg-red-500/5">
                        <div class="flex items-start">
                            <div class="w-10 h-10 rounded-lg bg-red-500/20 flex items-center justify-center mr-4 flex-shrink-0">
                                <i data-lucide="alert-triangle" class="w-5 h-5 text-red-500"></i>
                            </div>
                            <div class="flex-1">
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center">
                                        <span class="px-2 py-0.5 bg-red-500/20 text-red-400 text-xs rounded mr-2">緊急</span>
                                        <span class="text-white font-medium">機台 A-003 離線超過 10 分鐘</span>
                                    </div>
                                    <span class="text-gray-500 text-sm">2 分鐘前</span>
                                </div>
                                <p class="text-gray-400 text-sm mt-1">機台 A-003 (台北門市B) 已離線 12 分鐘，請立即處理。</p>
                                <div class="flex items-center space-x-3 mt-2">
                                    <button class="text-cyan-400 hover:text-cyan-300 text-sm">查看詳情</button>
                                    <button class="text-gray-400 hover:text-gray-300 text-sm">標記已讀</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- 警告 -->
                    <div class="p-4 hover:bg-dark-hover/50 bg-yellow-500/5">
                        <div class="flex items-start">
                            <div class="w-10 h-10 rounded-lg bg-yellow-500/20 flex items-center justify-center mr-4 flex-shrink-0">
                                <i data-lucide="alert-circle" class="w-5 h-5 text-yellow-400"></i>
                            </div>
                            <div class="flex-1">
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center">
                                        <span class="px-2 py-0.5 bg-yellow-500/20 text-yellow-400 text-xs rounded mr-2">警告</span>
                                        <span class="text-white font-medium">API 連線延遲過高</span>
                                    </div>
                                    <span class="text-gray-500 text-sm">15 分鐘前</span>
                                </div>
                                <p class="text-gray-400 text-sm mt-1">遊戲商 SA Gaming API 平均延遲達 850ms，已超過閾值 500ms。</p>
                                <div class="flex items-center space-x-3 mt-2">
                                    <button class="text-cyan-400 hover:text-cyan-300 text-sm">查看詳情</button>
                                    <button class="text-gray-400 hover:text-gray-300 text-sm">標記已讀</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- 一般通知 -->
                    <div class="p-4 hover:bg-dark-hover/50">
                        <div class="flex items-start">
                            <div class="w-10 h-10 rounded-lg bg-blue-500/20 flex items-center justify-center mr-4 flex-shrink-0">
                                <i data-lucide="info" class="w-5 h-5 text-blue-400"></i>
                            </div>
                            <div class="flex-1">
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center">
                                        <span class="px-2 py-0.5 bg-blue-500/20 text-blue-400 text-xs rounded mr-2">通知</span>
                                        <span class="text-white font-medium">版本 v2.1.0 發佈成功</span>
                                    </div>
                                    <span class="text-gray-500 text-sm">1 小時前</span>
                                </div>
                                <p class="text-gray-400 text-sm mt-1">版本 v2.1.0 已成功發佈至 45 台機台，覆蓋率 90%。</p>
                                <div class="flex items-center space-x-3 mt-2">
                                    <button class="text-cyan-400 hover:text-cyan-300 text-sm">查看詳情</button>
                                    <button class="text-gray-400 hover:text-gray-300 text-sm">標記已讀</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- 已讀通知 -->
                    <div class="p-4 hover:bg-dark-hover/50 opacity-60">
                        <div class="flex items-start">
                            <div class="w-10 h-10 rounded-lg bg-emerald-500/20 flex items-center justify-center mr-4 flex-shrink-0">
                                <i data-lucide="check-circle" class="w-5 h-5 text-emerald-400"></i>
                            </div>
                            <div class="flex-1">
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center">
                                        <span class="px-2 py-0.5 bg-emerald-500/20 text-emerald-400 text-xs rounded mr-2">完成</span>
                                        <span class="text-gray-300 font-medium">機台 B-002 恢復連線</span>
                                    </div>
                                    <span class="text-gray-500 text-sm">2 小時前</span>
                                </div>
                                <p class="text-gray-500 text-sm mt-1">機台 B-002 已恢復連線，目前運作正常。</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="../js/sidebar.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
