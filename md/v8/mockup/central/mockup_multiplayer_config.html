<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>牌桌詳細配置 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="css/mockup-common.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .glass-card:hover { border-color: rgba(168, 85, 247, 0.4); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        
        
        
        
        .table-row-hover:hover { background: linear-gradient(90deg, rgba(124, 58, 237, 0.1), transparent); }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3); outline: none; }
        .badge-local { background: #10b981; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
        
        
        
        
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <div class="flex items-center">
                <a href="mockup_std_multiplayer.html" class="text-gray-400 hover:text-white mr-4"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
                <h2 class="text-lg font-semibold text-white">牌桌詳細配置</h2>
            </div>
            <button class="px-4 py-2 gradient-purple rounded-lg text-sm text-white font-medium shadow-glow-sm">
                <i data-lucide="save" class="w-4 h-4 mr-2"></i>儲存配置
            </button>
        </header>
        <div class="flex-1 overflow-y-auto p-6">
            <div class="grid grid-cols-3 gap-6">
                <div class="glass-card rounded-xl p-6 col-span-2">
                    <h3 class="text-lg font-semibold text-white mb-6 flex items-center">
                        <i data-lucide="settings-2" class="w-5 h-5 mr-2 text-purple-400"></i>牌桌基本設定
                    </h3>
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">牌桌 ID</label>
                            <input type="text" value="TABLE-001" readonly class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-gray-500">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">牌桌名稱</label>
                            <input type="text" value="VIP 百家樂 #1" class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">遊戲類型</label>
                            <select class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                                <option selected>百家樂</option>
                                <option>21點</option>
                                <option>德州撲克</option>
                                <option>輪盤</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">牌桌狀態</label>
                            <select class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                                <option selected>開放中</option>
                                <option>維護中</option>
                                <option>已關閉</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">最小投注額</label>
                            <input type="number" value="100" class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">最大投注額</label>
                            <input type="number" value="50000" class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">最高玩家數</label>
                            <input type="number" value="8" class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">VIP 等級需求</label>
                            <select class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                                <option>無限制</option>
                                <option selected>VIP 3</option>
                                <option>VIP 5</option>
                                <option>VIP 10</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="glass-card rounded-xl p-6">
                    <h3 class="text-lg font-semibold text-white mb-6 flex items-center">
                        <i data-lucide="user-cog" class="w-5 h-5 mr-2 text-purple-400"></i>荷官設定
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">指定荷官</label>
                            <select class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                                <option>自動分配</option>
                                <option selected>荷官 A01 - 小王</option>
                                <option>荷官 A02 - 小美</option>
                                <option>荷官 A03 - 大華</option>
                            </select>
                        </div>
                        <div>
                            <label class="flex items-center">
                                <input type="checkbox" checked class="w-5 h-5 rounded border-dark-border bg-dark-bg text-purple-500 mr-3">
                                <span class="text-gray-300">自動換靴</span>
                            </label>
                        </div>
                        <div>
                            <label class="flex items-center">
                                <input type="checkbox" checked class="w-5 h-5 rounded border-dark-border bg-dark-bg text-purple-500 mr-3">
                                <span class="text-gray-300">自動換牌</span>
                            </label>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">每靴牌數</label>
                            <input type="number" value="8" class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                        </div>
                    </div>
                </div>
                <div class="glass-card rounded-xl p-6 col-span-2">
                    <h3 class="text-lg font-semibold text-white mb-6 flex items-center">
                        <i data-lucide="percent" class="w-5 h-5 mr-2 text-purple-400"></i>費率與抽水
                    </h3>
                    <div class="grid grid-cols-4 gap-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">莊家抽水 %</label>
                            <input type="number" value="5" step="0.1" class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">閒家抽水 %</label>
                            <input type="number" value="0" step="0.1" class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">和局抽水 %</label>
                            <input type="number" value="14" step="0.1" class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">對子抽水 %</label>
                            <input type="number" value="10" step="0.1" class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                        </div>
                    </div>
                </div>
                <div class="glass-card rounded-xl p-6">
                    <h3 class="text-lg font-semibold text-white mb-6 flex items-center">
                        <i data-lucide="video" class="w-5 h-5 mr-2 text-purple-400"></i>直播設定
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">串流品質</label>
                            <select class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                                <option>480p</option>
                                <option selected>720p</option>
                                <option>1080p</option>
                            </select>
                        </div>
                        <div>
                            <label class="flex items-center">
                                <input type="checkbox" checked class="w-5 h-5 rounded border-dark-border bg-dark-bg text-purple-500 mr-3">
                                <span class="text-gray-300">啟用重播功能</span>
                            </label>
                        </div>
                        <div>
                            <label class="flex items-center">
                                <input type="checkbox" checked class="w-5 h-5 rounded border-dark-border bg-dark-bg text-purple-500 mr-3">
                                <span class="text-gray-300">啟用多角度</span>
                            </label>
                        </div>
                    </div>
                </div>
                <div class="glass-card rounded-xl p-6 col-span-3">
                    <h3 class="text-lg font-semibold text-white mb-6 flex items-center">
                        <i data-lucide="clock" class="w-5 h-5 mr-2 text-purple-400"></i>遊戲時間設定
                    </h3>
                    <div class="grid grid-cols-6 gap-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">下注時間 (秒)</label>
                            <input type="number" value="20" class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">補牌時間 (秒)</label>
                            <input type="number" value="10" class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">開牌時間 (秒)</label>
                            <input type="number" value="5" class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">結算時間 (秒)</label>
                            <input type="number" value="5" class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">換靴時間 (分)</label>
                            <input type="number" value="3" class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">清理時間 (秒)</label>
                            <input type="number" value="3" class="w-full px-4 py-2.5 bg-dark-bg border border-dark-border rounded-lg text-white input-focus">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        lucide.createIcons();

        function toggleSidebarGroup(header) {
            const group = header.parentElement;
            const submenu = group.querySelector('.sidebar-submenu');
            if (group.classList.contains('open')) {
                group.classList.remove('open');
                submenu.classList.remove('open');
            } else {
                group.classList.add('open');
                submenu.classList.add('open');
            }
        }
    </script>
<script src="js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_multiplayer_config.html');
    </script>
</body>
</html>
