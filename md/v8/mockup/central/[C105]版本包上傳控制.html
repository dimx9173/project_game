<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>版本控制 OTA - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="../css/mockup-common.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #6d28d9 #0a0a0f; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7c3aed, #a855f7); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .glass-card:hover { border-color: rgba(168, 85, 247, 0.4); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 30px rgba(168, 85, 247, 0.2); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        .table-row-hover:hover { background: linear-gradient(90deg, rgba(124, 58, 237, 0.1), transparent); }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3), 0 0 20px rgba(168, 85, 247, 0.2); }
        .badge-local { background: #10b981; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
        .badge-central { background: #8b5cf6; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <h2 class="text-lg font-semibold text-white">版本控制 OTA <span class="badge-local ml-2">本地</span> <span class="badge-central ml-1">集中</span></h2>
            <button class="px-4 py-2 gradient-purple rounded-lg text-white font-medium shadow-glow-sm flex items-center">
                <i data-lucide="upload" class="w-4 h-4 mr-2"></i>上傳新版本
            </button>
        </header>
        <div class="flex-1 overflow-y-auto p-6">
            <div class="glass-card rounded-2xl overflow-hidden">
                <table class="min-w-full">
                    <thead class="bg-dark-bg">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">版本號</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">上傳時間</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">MD5校驗碼</th>
                            <th class="px-6 py-3 text-center text-xs font-medium text-gray-400 uppercase">狀態</th>
                            <th class="px-6 py-3 text-center text-xs font-medium text-gray-400 uppercase">機台覆蓋率</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-400 uppercase">操作</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-dark-border">
                        <tr class="table-row-hover">
                            <td class="px-6 py-4 whitespace-nowrap text-white font-mono font-bold">v2.1.0</td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-400">2026/02/20 14:00</td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-500 font-mono text-xs">d41d8cd98f00b204e98...</td>
                            <td class="px-6 py-4 whitespace-nowrap text-center"><span class="px-2 py-1 rounded-full text-xs bg-emerald-500/20 text-emerald-400">已發佈</span></td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex items-center justify-center">
                                    <div class="w-24 bg-dark-bg rounded-full h-2.5 mr-2">
                                        <div class="gradient-purple h-2.5 rounded-full" style="width: 90%"></div>
                                    </div>
                                    <span class="text-base font-medium text-white">45/50</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right">
                                <button class="text-purple-400 hover:text-purple-300 mx-1"><i data-lucide="send" class="w-4 h-4"></i></button>
                                <button class="text-cyan-400 hover:text-cyan-300 mx-1"><i data-lucide="eye" class="w-4 h-4"></i></button>
                            </td>
                        </tr>
                        <tr class="table-row-hover">
                            <td class="px-6 py-4 whitespace-nowrap text-white font-mono font-bold">v2.0.5</td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-400">2026/02/15 09:30</td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-500 font-mono text-xs">e0d123e5f316bef78...</td>
                            <td class="px-6 py-4 whitespace-nowrap text-center"><span class="px-2 py-1 rounded-full text-xs bg-emerald-500/20 text-emerald-400">已發佈</span></td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex items-center justify-center">
                                    <div class="w-24 bg-dark-bg rounded-full h-2.5 mr-2">
                                        <div class="bg-emerald-500 h-2.5 rounded-full" style="width: 100%"></div>
                                    </div>
                                    <span class="text-base font-medium text-white">50/50</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right">
                                <button class="text-cyan-400 hover:text-cyan-300 mx-1"><i data-lucide="eye" class="w-4 h-4"></i></button>
                            </td>
                        </tr>
                        <tr class="table-row-hover">
                            <td class="px-6 py-4 whitespace-nowrap text-gray-500 font-mono font-bold line-through">v2.0.4</td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-500">2026/02/10 11:20</td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-400 font-mono text-xs">b89d5f78c4331...</td>
                            <td class="px-6 py-4 whitespace-nowrap text-center"><span class="px-2 py-1 rounded-full text-xs bg-red-500/20 text-red-400">已撤回</span></td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-500 text-center">-</td>
                            <td class="px-6 py-4 whitespace-nowrap text-right">
                                <button class="text-purple-400 hover:text-purple-300 text-base">重新發布</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <script src="../js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_flg_ota.html');
        lucide.createIcons();
    </script>
</body>
</html>
