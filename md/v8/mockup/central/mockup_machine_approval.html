<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機台審核 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="../css/mockup-common.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' },
                        amber: { 400: '#fbbf24', 500: '#f59e0b' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        .status-badge { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 9999px; font-size: 12px; font-weight: 500; }
        .status-pending { background: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }
        .status-approved { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
        .status-rejected { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .version-ok { color: #34d399; }
        .version-update { color: #fbbf24; }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 15px rgba(245, 158, 11, 0.3); } 50% { box-shadow: 0 0 25px rgba(245, 158, 11, 0.5); } }
        .pending-glow { animation: pulse-glow 2s infinite; }
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    
    <main class="flex-1 flex flex-col overflow-hidden">
        <!-- 頂部 Header -->
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <div class="flex items-center">
                <h2 class="text-lg font-semibold text-white">機台審核</h2>
                <span class="ml-3 status-badge status-pending pending-glow">
                    <i data-lucide="clock" class="w-3 h-3 mr-1"></i>
                    2 台待審核
                </span>
            </div>
            <div class="flex items-center space-x-4">
                <div class="relative">
                    <input type="text" placeholder="搜尋機台..." class="bg-dark-bg border border-dark-border rounded-lg py-2 px-4 pl-10 text-sm text-white placeholder-gray-500 focus:outline-none input-focus w-64">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
                </div>
                <button class="px-4 py-2 glass rounded-lg text-sm text-gray-300 border border-dark-border flex items-center">
                    <i data-lucide="filter" class="w-4 h-4 mr-2"></i>篩選
                </button>
            </div>
        </header>

        <!-- 主要內容 -->
        <div class="flex-1 overflow-y-auto p-6">
            
            <!-- 分頁標籤 -->
            <div class="flex space-x-1 bg-dark-bg rounded-lg p-1 w-fit mb-6 border border-dark-border">
                <button class="px-4 py-2 rounded-md text-sm font-medium bg-purple-600 text-white">待審核 (2)</button>
                <button class="px-4 py-2 rounded-md text-sm font-medium text-gray-400 hover:text-white">已審核 (15)</button>
                <button class="px-4 py-2 rounded-md text-sm font-medium text-gray-400 hover:text-white">已拒絕 (3)</button>
            </div>

            <!-- 待審核機台列表 -->
            <div class="space-y-4">
                
                <!-- 機台卡片 1 -->
                <div class="glass-card rounded-2xl p-6">
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex items-center">
                            <div class="w-12 h-12 rounded-xl bg-amber-500/20 flex items-center justify-center mr-4">
                                <i data-lucide="monitor" class="w-6 h-6 text-amber-400"></i>
                            </div>
                            <div>
                                <h3 class="text-lg font-semibold text-white">旗艦店 A-01</h3>
                                <div class="flex items-center space-x-3 mt-1">
                                    <span class="status-badge status-pending">待審核</span>
                                    <span class="text-xs text-gray-500">提交於 2026-03-06 10:30:00</span>
                                </div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-xs text-gray-500 mb-1">暫時 ID</div>
                            <div class="font-mono text-sm text-gray-300">TEMP-550e8400</div>
                        </div>
                    </div>

                    <!-- 機台詳細資訊 -->
                    <div class="grid grid-cols-4 gap-4 mb-6 bg-dark-bg/50 rounded-xl p-4">
                        <div>
                            <div class="text-xs text-gray-500 mb-1">MAC 位址</div>
                            <div class="font-mono text-sm text-gray-300">AA:BB:CC:DD:EE:FF</div>
                        </div>
                        <div>
                            <div class="text-xs text-gray-500 mb-1">硬體型號</div>
                            <div class="text-sm text-gray-300">旗艦版 Pro</div>
                        </div>
                        <div>
                            <div class="text-xs text-gray-500 mb-1">目前版本</div>
                            <div class="text-sm version-update flex items-center">
                                <i data-lucide="alert-triangle" class="w-3 h-3 mr-1"></i>
                                v2.1.0
                            </div>
                        </div>
                        <div>
                            <div class="text-xs text-gray-500 mb-1">最新版本</div>
                            <div class="text-sm text-gray-300">v2.5.1</div>
                        </div>
                    </div>

                    <!-- 版本狀態提示 -->
                    <div class="flex items-center p-3 bg-amber-500/10 border border-amber-500/20 rounded-xl mb-6">
                        <i data-lucide="alert-triangle" class="w-5 h-5 text-amber-400 mr-3"></i>
                        <div class="flex-1">
                            <div class="text-sm text-amber-400">版本過舊</div>
                            <div class="text-xs text-gray-500">建議審核後立即執行 OTA 更新</div>
                        </div>
                        <button class="px-3 py-1.5 bg-amber-500/20 text-amber-400 rounded-lg text-xs font-medium hover:bg-amber-500/30 transition-colors">
                            查看更新內容
                        </button>
                    </div>

                    <!-- 所屬門市選擇 -->
                    <div class="flex items-center mb-6">
                        <label class="text-sm text-gray-400 mr-4">所屬門市：</label>
                        <select class="bg-dark-bg border border-dark-border rounded-lg py-2 px-4 text-sm text-white focus:outline-none input-focus">
                            <option value="">請選擇門市</option>
                            <option value="flagship" selected>旗艦店</option>
                            <option value="standard1">標準店 A</option>
                            <option value="standard2">標準店 B</option>
                            <option value="express">快速店</option>
                        </select>
                    </div>

                    <!-- 操作按鈕 -->
                    <div class="flex items-center justify-end space-x-3">
                        <button onclick="rejectMachine('TEMP-550e8400')" class="px-6 py-2.5 bg-red-900/20 border border-red-700/30 text-red-400 rounded-lg font-medium hover:bg-red-900/30 transition-colors flex items-center">
                            <i data-lucide="x" class="w-4 h-4 mr-2"></i>
                            Reject
                        </button>
                        <button onclick="approveMachine('TEMP-550e8400')" class="px-6 py-2.5 gradient-purple text-white rounded-lg font-medium shadow-glow-sm hover:opacity-90 transition-opacity flex items-center">
                            <i data-lucide="check" class="w-4 h-4 mr-2"></i>
                            Approved
                        </button>
                    </div>
                </div>

                <!-- 機台卡片 2 -->
                <div class="glass-card rounded-2xl p-6">
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex items-center">
                            <div class="w-12 h-12 rounded-xl bg-amber-500/20 flex items-center justify-center mr-4">
                                <i data-lucide="monitor" class="w-6 h-6 text-amber-400"></i>
                            </div>
                            <div>
                                <h3 class="text-lg font-semibold text-white">標準店 B-03</h3>
                                <div class="flex items-center space-x-3 mt-1">
                                    <span class="status-badge status-pending">待審核</span>
                                    <span class="text-xs text-gray-500">提交於 2026-03-06 09:15:00</span>
                                </div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-xs text-gray-500 mb-1">暫時 ID</div>
                            <div class="font-mono text-sm text-gray-300">TEMP-7c4a8d9e</div>
                        </div>
                    </div>

                    <!-- 機台詳細資訊 -->
                    <div class="grid grid-cols-4 gap-4 mb-6 bg-dark-bg/50 rounded-xl p-4">
                        <div>
                            <div class="text-xs text-gray-500 mb-1">MAC 位址</div>
                            <div class="font-mono text-sm text-gray-300">11:22:33:44:55:66</div>
                        </div>
                        <div>
                            <div class="text-xs text-gray-500 mb-1">硬體型號</div>
                            <div class="text-sm text-gray-300">標準版 Standard</div>
                        </div>
                        <div>
                            <div class="text-xs text-gray-500 mb-1">目前版本</div>
                            <div class="text-sm version-ok flex items-center">
                                <i data-lucide="check-circle" class="w-3 h-3 mr-1"></i>
                                v2.5.1
                            </div>
                        </div>
                        <div>
                            <div class="text-xs text-gray-500 mb-1">最新版本</div>
                            <div class="text-sm text-gray-300">v2.5.1</div>
                        </div>
                    </div>

                    <!-- 版本狀態提示 -->
                    <div class="flex items-center p-3 bg-emerald-500/10 border border-emerald-500/20 rounded-xl mb-6">
                        <i data-lucide="check-circle" class="w-5 h-5 text-emerald-400 mr-3"></i>
                        <div class="flex-1">
                            <div class="text-sm text-emerald-400">版本正常</div>
                            <div class="text-xs text-gray-500">機台已安裝最新版本</div>
                        </div>
                    </div>

                    <!-- 所屬門市選擇 -->
                    <div class="flex items-center mb-6">
                        <label class="text-sm text-gray-400 mr-4">所屬門市：</label>
                        <select class="bg-dark-bg border border-dark-border rounded-lg py-2 px-4 text-sm text-white focus:outline-none input-focus">
                            <option value="">請選擇門市</option>
                            <option value="flagship">旗艦店</option>
                            <option value="standard1">標準店 A</option>
                            <option value="standard2" selected>標準店 B</option>
                            <option value="express">快速店</option>
                        </select>
                    </div>

                    <!-- 操作按鈕 -->
                    <div class="flex items-center justify-end space-x-3">
                        <button onclick="rejectMachine('TEMP-7c4a8d9e')" class="px-6 py-2.5 bg-red-900/20 border border-red-700/30 text-red-400 rounded-lg font-medium hover:bg-red-900/30 transition-colors flex items-center">
                            <i data-lucide="x" class="w-4 h-4 mr-2"></i>
                            Reject
                        </button>
                        <button onclick="approveMachine('TEMP-7c4a8d9e')" class="px-6 py-2.5 gradient-purple text-white rounded-lg font-medium shadow-glow-sm hover:opacity-90 transition-opacity flex items-center">
                            <i data-lucide="check" class="w-4 h-4 mr-2"></i>
                            Approved
                        </button>
                    </div>
                </div>

            </div>

        </div>
    </main>

    <script>
        lucide.createIcons();

        function approveMachine(tempId) {
            if (confirm(`確定要核准機台 ${tempId} 嗎？`)) {
                alert(`機台 ${tempId} 已核准\n\n正在建立安全通訊通道...`);
                // 實際應呼叫 API 核准機台
            }
        }

        function rejectMachine(tempId) {
            const reason = prompt(`拒絕機台 ${tempId}\n\n請輸入拒絕原因：`, '資訊有誤');
            if (reason) {
                alert(`機台 ${tempId} 已拒絕\n原因：${reason}`);
                // 實際應呼叫 API 拒絕機台
            }
        }
    </script>
    <script src="../js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_machine_approval.html');
    </script>
</body>
</html>
