<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新任務下發 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="../css/mockup-common.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' },
                        amber: { 400: '#fbbf24', 500: '#f59e0b' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
    <style>
        .machine-checkbox:checked + .machine-label {
            background: rgba(139, 92, 246, 0.1);
            border-color: rgba(139, 92, 246, 0.5);
        }
        .deploy-mode-btn.active {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            color: white;
            border-color: transparent;
        }
        .deploy-mode-btn:not(.active) {
            background: rgba(30, 30, 46, 0.5);
            color: #9ca3af;
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    
    <main class="flex-1 flex flex-col overflow-hidden">
        <!-- 頂部 Header -->
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <div class="flex items-center">
                <a href="mockup_flg_ota.html" class="mr-4 p-2 hover:bg-dark-hover rounded-lg transition-colors">
                    <i data-lucide="arrow-left" class="w-5 h-5 text-gray-400"></i>
                </a>
                <h2 class="text-lg font-semibold text-white">任務下發</h2>
                <span class="ml-3 text-xs text-gray-400">C74</span>
            </div>
            <div class="flex items-center space-x-4">
                <div class="text-sm text-gray-400">
                    已選擇 <span class="text-purple-400 font-medium">3</span> 台機台
                </div>
                <button class="px-4 py-2 glass rounded-lg text-sm text-gray-300 border border-dark-border flex items-center hover:bg-dark-hover transition-colors">
                    <i data-lucide="filter" class="w-4 h-4 mr-2"></i>篩選
                </button>
            </div>
        </header>

        <!-- 主要內容 -->
        <div class="flex-1 overflow-y-auto p-6">
            
            <div class="grid grid-cols-12 gap-6">
                <!-- 左側：機台選擇 -->
                <div class="col-span-5">
                    <div class="glass-card rounded-2xl p-6">
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex items-center">
                                <div class="w-10 h-10 rounded-xl bg-blue-500/20 flex items-center justify-center mr-3">
                                    <i data-lucide="monitor" class="w-5 h-5 text-blue-400"></i>
                                </div>
                                <h3 class="text-lg font-semibold text-white">選擇目標機台</h3>
                                <button onclick="openFilterModal()" class="ml-3 px-3 py-1.5 rounded-lg text-xs bg-purple-500/20 text-purple-400 border border-purple-500/30 flex items-center hover:bg-purple-500/30 transition-colors">
                                    <i data-lucide="filter" class="w-3 h-3 mr-1"></i>篩選
                                </button>
                            </div>
                            <div class="flex items-center space-x-2">
                                <button onclick="selectAll()" class="text-xs text-purple-400 hover:text-purple-300 transition-colors">全選</button>
                                <span class="text-gray-600">|</span>
                                <button onclick="clearAll()" class="text-xs text-gray-400 hover:text-gray-300 transition-colors">清除</button>
                            </div>
                        </div>

                        <!-- 搜尋 -->
                        <div class="relative mb-4">
                            <input type="text" id="mainSearch" oninput="mainSearchFilter()" placeholder="搜尋機台名稱..." class="w-full bg-dark-bg border border-dark-border rounded-lg py-2 px-4 pl-10 text-sm text-white placeholder-gray-500 focus:outline-none input-focus">
                            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
                        </div>

                        <!-- 已選 Tag 顯示 -->
                        <div id="selectedTags" class="flex items-center gap-2 mb-3 min-h-6 flex-wrap">
                        </div>

                        <!-- 機台列表 -->
                        <div class="space-y-2 max-h-96 overflow-y-auto pr-2">
                            <!-- 機台 1 -->
                            <label class="block machine-item" data-tags="旗艦店,大廳">
                                <input type="checkbox" class="machine-checkbox hidden" checked>
                                <div class="machine-label flex items-center p-3 bg-dark-bg/50 rounded-xl border border-transparent cursor-pointer hover:bg-dark-hover transition-colors">
                                    <div class="w-8 h-8 rounded-lg bg-emerald-500/20 flex items-center justify-center mr-3">
                                        <i data-lucide="monitor" class="w-4 h-4 text-emerald-400"></i>
                                    </div>
                                    <div class="flex-1">
                                        <div class="text-sm text-white">旗艦店 A-01</div>
                                        <div class="flex items-center gap-1 mt-1">
                                            <span class="px-1.5 py-0.5 rounded text-[10px] bg-purple-500/20 text-purple-400">旗艦店</span>
                                            <span class="px-1.5 py-0.5 rounded text-[10px] bg-blue-500/20 text-blue-400">大廳</span>
                                        </div>
                                    </div>
                                    <i data-lucide="check-circle" class="w-5 h-5 text-purple-400"></i>
                                </div>
                            </label>

                            <!-- 機台 2 -->
                            <label class="block machine-item" data-tags="旗艦店,包廂">
                                <input type="checkbox" class="machine-checkbox hidden" checked>
                                <div class="machine-label flex items-center p-3 bg-dark-bg/50 rounded-xl border border-transparent cursor-pointer hover:bg-dark-hover transition-colors">
                                    <div class="w-8 h-8 rounded-lg bg-emerald-500/20 flex items-center justify-center mr-3">
                                        <i data-lucide="monitor" class="w-4 h-4 text-emerald-400"></i>
                                    </div>
                                    <div class="flex-1">
                                        <div class="text-sm text-white">旗艦店 A-02</div>
                                        <div class="flex items-center gap-1 mt-1">
                                            <span class="px-1.5 py-0.5 rounded text-[10px] bg-purple-500/20 text-purple-400">旗艦店</span>
                                            <span class="px-1.5 py-0.5 rounded text-[10px] bg-amber-500/20 text-amber-400">包廂</span>
                                        </div>
                                    </div>
                                    <i data-lucide="check-circle" class="w-5 h-5 text-purple-400"></i>
                                </div>
                            </label>

                            <!-- 機台 3 -->
                            <label class="block machine-item" data-tags="標準店,VIP區">
                                <input type="checkbox" class="machine-checkbox hidden" checked>
                                <div class="machine-label flex items-center p-3 bg-dark-bg/50 rounded-xl border border-transparent cursor-pointer hover:bg-dark-hover transition-colors">
                                    <div class="w-8 h-8 rounded-lg bg-amber-500/20 flex items-center justify-center mr-3">
                                        <i data-lucide="monitor" class="w-4 h-4 text-amber-400"></i>
                                    </div>
                                    <div class="flex-1">
                                        <div class="text-sm text-white">標準店 B-01</div>
                                        <div class="flex items-center gap-1 mt-1">
                                            <span class="px-1.5 py-0.5 rounded text-[10px] bg-gray-500/20 text-gray-400">標準店</span>
                                            <span class="px-1.5 py-0.5 rounded text-[10px] bg-rose-500/20 text-rose-400">VIP區</span>
                                        </div>
                                    </div>
                                    <i data-lucide="check-circle" class="w-5 h-5 text-purple-400"></i>
                                </div>
                            </label>

                            <!-- 機台 4 -->
                            <label class="block machine-item" data-tags="標準店">
                                <input type="checkbox" class="machine-checkbox hidden">
                                <div class="machine-label flex items-center p-3 bg-dark-bg/50 rounded-xl border border-transparent cursor-pointer hover:bg-dark-hover transition-colors">
                                    <div class="w-8 h-8 rounded-lg bg-gray-500/20 flex items-center justify-center mr-3">
                                        <i data-lucide="monitor" class="w-4 h-4 text-gray-400"></i>
                                    </div>
                                    <div class="flex-1">
                                        <div class="text-sm text-white">標準店 B-02</div>
                                        <div class="flex items-center gap-1 mt-1">
                                            <span class="px-1.5 py-0.5 rounded text-[10px] bg-gray-500/20 text-gray-400">標準店</span>
                                        </div>
                                    </div>
                                    <i data-lucide="circle" class="w-5 h-5 text-gray-600"></i>
                                </div>
                            </label>

                            <!-- 機台 5 -->
                            <label class="block machine-item" data-tags="標準店,大廳">
                                <input type="checkbox" class="machine-checkbox hidden">
                                <div class="machine-label flex items-center p-3 bg-dark-bg/50 rounded-xl border border-transparent cursor-pointer hover:bg-dark-hover transition-colors">
                                    <div class="w-8 h-8 rounded-lg bg-gray-500/20 flex items-center justify-center mr-3">
                                        <i data-lucide="monitor" class="w-4 h-4 text-gray-400"></i>
                                    </div>
                                    <div class="flex-1">
                                        <div class="text-sm text-white">標準店 C-01</div>
                                        <div class="flex items-center gap-1 mt-1">
                                            <span class="px-1.5 py-0.5 rounded text-[10px] bg-gray-500/20 text-gray-400">標準店</span>
                                            <span class="px-1.5 py-0.5 rounded text-[10px] bg-blue-500/20 text-blue-400">大廳</span>
                                        </div>
                                    </div>
                                    <i data-lucide="circle" class="w-5 h-5 text-gray-600"></i>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- 右側：派發設定 -->
                <div class="col-span-7">
                    <!-- 派發時間選擇 -->
                    <div class="glass-card rounded-2xl p-6 mb-6">
                        <div class="flex items-center mb-4">
                            <div class="w-10 h-10 rounded-xl bg-purple-500/20 flex items-center justify-center mr-3">
                                <i data-lucide="clock" class="w-5 h-5 text-purple-400"></i>
                            </div>
                            <h3 class="text-lg font-semibold text-white">派發時間</h3>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <button id="btn-immediate" class="deploy-mode-btn active px-4 py-4 rounded-xl text-sm font-medium border-2 border-purple-500 bg-purple-500/10 flex flex-col items-center transition-all" onclick="setDeployMode(this, 'immediate')">
                                <i data-lucide="zap" class="w-6 h-6 mb-2 text-purple-400"></i>
                                <span class="text-white font-semibold">立刻執行</span>
                                <span class="text-gray-500 text-xs mt-1">立即開始更新</span>
                            </button>
                            <button id="btn-scheduled" class="deploy-mode-btn px-4 py-4 rounded-xl text-sm font-medium border-2 border-dark-border bg-dark-bg/50 flex flex-col items-center transition-all hover:border-purple-500/50" onclick="setDeployMode(this, 'scheduled')">
                                <i data-lucide="calendar" class="w-6 h-6 mb-2 text-gray-400"></i>
                                <span class="text-gray-300">排程執行</span>
                                <span class="text-gray-500 text-xs mt-1">設定執行時間</span>
                            </button>
                        </div>

                        <!-- 排程時間輸入 (預設隱藏) -->
                        <div id="scheduleInput" class="mt-4 p-4 bg-dark-bg/50 rounded-xl border border-dark-border hidden">
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs text-gray-400 mb-2">日期</label>
                                    <input type="date" class="w-full bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-purple-500">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-400 mb-2">時間</label>
                                    <input type="time" class="w-full bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-purple-500">
                                </div>
                            </div>
                            <p class="text-gray-500 text-xs mt-2">系統會在指定時間自動執行更新任務</p>
                        </div>
                    </div>

                    <!-- 更新版本資訊 -->
                    <div class="glass-card rounded-2xl p-6 mb-6">
                        <div class="flex items-center mb-4">
                            <div class="w-10 h-10 rounded-xl bg-amber-500/20 flex items-center justify-center mr-3">
                                <i data-lucide="package" class="w-5 h-5 text-amber-400"></i>
                            </div>
                            <h3 class="text-lg font-semibold text-white">更新版本</h3>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-dark-bg/50 rounded-xl p-4">
                                <div class="text-xs text-gray-500 mb-1">目標版本</div>
                                <div class="text-lg font-semibold text-white">v2.5.1</div>
                                <div class="text-xs text-gray-400 mt-1">2026-03-01 發布</div>
                            </div>
                            <div class="bg-dark-bg/50 rounded-xl p-4">
                                <div class="text-xs text-gray-500 mb-1">更新大小</div>
                                <div class="text-lg font-semibold text-white">45.2 MB</div>
                                <div class="text-xs text-gray-400 mt-1">預估 3-5 分鐘</div>
                            </div>
                        </div>

                        <div class="mt-4 p-3 bg-emerald-500/10 border border-emerald-500/20 rounded-xl">
                            <div class="flex items-start">
                                <i data-lucide="file-text" class="w-4 h-4 text-emerald-400 mr-2 mt-0.5"></i>
                                <div class="text-sm text-emerald-400">
                                    更新內容：修復多項已知問題、優化遊戲載入速度、新增支付功能模組
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 操作按鈕 -->
                    <div class="flex items-center justify-between">
                        <button onclick="preview()" class="px-6 py-3 glass rounded-lg text-sm text-gray-300 border border-dark-border flex items-center hover:bg-dark-hover transition-colors">
                            <i data-lucide="eye" class="w-4 h-4 mr-2"></i>
                            預覽
                        </button>
                        <div class="flex items-center space-x-3">
                            <button onclick="saveDraft()" class="px-6 py-3 bg-dark-bg border border-dark-border rounded-lg text-sm text-gray-300 hover:bg-dark-hover transition-colors">
                                儲存草稿
                            </button>
                            <button onclick="executeDeploy()" class="px-6 py-3 gradient-purple text-white rounded-lg font-medium shadow-glow-sm hover:opacity-90 transition-opacity flex items-center">
                                <i data-lucide="rocket" class="w-4 h-4 mr-2"></i>
                                執行下發
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        lucide.createIcons();

        function selectAll() {
            document.querySelectorAll('.machine-checkbox').forEach(cb => cb.checked = true);
            alert('已全選所有機台');
        }

        function clearAll() {
            document.querySelectorAll('.machine-checkbox').forEach(cb => cb.checked = false);
            alert('已清除所有選擇');
        }

        function setDeployMode(btn, mode) {
            // Reset all buttons
            document.getElementById('btn-immediate').classList.remove('active', 'border-purple-500', 'bg-purple-500/10');
            document.getElementById('btn-immediate').classList.add('border-dark-border', 'bg-dark-bg/50');
            document.getElementById('btn-immediate').querySelector('i').classList.remove('text-purple-400');
            document.getElementById('btn-immediate').querySelector('i').classList.add('text-gray-400');
            document.getElementById('btn-immediate').querySelector('span:first-of-type').classList.remove('text-white', 'font-semibold');
            document.getElementById('btn-immediate').querySelector('span:first-of-type').classList.add('text-gray-300');
            
            document.getElementById('btn-scheduled').classList.remove('active', 'border-purple-500', 'bg-purple-500/10');
            document.getElementById('btn-scheduled').classList.add('border-dark-border', 'bg-dark-bg/50');
            document.getElementById('btn-scheduled').querySelector('i').classList.remove('text-purple-400');
            document.getElementById('btn-scheduled').querySelector('i').classList.add('text-gray-400');
            document.getElementById('btn-scheduled').querySelector('span:first-of-type').classList.remove('text-white', 'font-semibold');
            document.getElementById('btn-scheduled').querySelector('span:first-of-type').classList.add('text-gray-300');
            
            // Activate selected button
            btn.classList.add('active', 'border-purple-500', 'bg-purple-500/10');
            btn.classList.remove('border-dark-border', 'bg-dark-bg/50');
            btn.querySelector('i').classList.add('text-purple-400');
            btn.querySelector('i').classList.remove('text-gray-400');
            btn.querySelector('span:first-of-type').classList.add('text-white', 'font-semibold');
            btn.querySelector('span:first-of-type').classList.remove('text-gray-300');
            
            // Show/hide schedule input
            const scheduleInput = document.getElementById('scheduleInput');
            if (mode === 'scheduled') {
                scheduleInput.classList.remove('hidden');
            } else {
                scheduleInput.classList.add('hidden');
            }
            lucide.createIcons();
        }

        function preview() {
            const mode = document.querySelector('.deploy-mode-btn.active').id === 'btn-immediate' ? '立刻執行' : '排程執行';
            alert('預覽更新任務：\n\n目標機台：3 台\n派發時間：' + mode + '\n版本：v2.5.1\n預估時間：約 15 分鐘');
        }

        function saveDraft() {
            alert('草稿已儲存');
        }

        function executeDeploy() {
            if (confirm('確定要執行更新任務下發嗎？\n\n將對 3 台機台進行更新')) {
                alert('更新任務已開始執行\n\n您可以在「OTA版本更新」頁面查看進度');
            }
        }

        // 主要搜尋功能
        function mainSearchFilter() {
            const searchTerm = document.getElementById('mainSearch').value.toLowerCase();
            const machines = document.querySelectorAll('.machine-item');
            
            machines.forEach(machine => {
                const name = machine.querySelector('.text-sm.text-white').textContent.toLowerCase();
                if (searchTerm === '' || name.includes(searchTerm)) {
                    machine.style.display = 'block';
                } else {
                    machine.style.display = 'none';
                }
            });
        }

        // Tag 篩選功能
        let selectedTags = [];

        function filterByTag(btn) {
            const tag = btn.textContent.trim();
            
            if (btn.classList.contains('bg-purple-500/20')) {
                // 取消選擇
                btn.classList.remove('bg-purple-500/20', 'text-purple-400', 'border-purple-500/30');
                btn.classList.add('bg-dark-bg', 'text-gray-400', 'border-dark-border');
                selectedTags = selectedTags.filter(t => t !== tag);
            } else {
                // 選擇
                btn.classList.remove('bg-dark-bg', 'text-gray-400', 'border-dark-border');
                btn.classList.add('bg-purple-500/20', 'text-purple-400', 'border-purple-500/30');
                selectedTags.push(tag);
            }
            
            updateSelectedTagsDisplay();
            filterMachines();
        }

        function updateSelectedTagsDisplay() {
            const container = document.getElementById('selectedTags');
            if (selectedTags.length === 0) {
                container.innerHTML = '';
                return;
            }
            
            container.innerHTML = `
                <span class="text-xs text-gray-400 mr-1">已選:</span>
                ${selectedTags.map(tag => `
                    <span class="inline-flex items-center px-2 py-1 rounded-full text-xs bg-purple-500/20 text-purple-400">
                        ${tag}
                        <button onclick="removeTag('${tag}')" class="ml-1 hover:text-white">
                            <i data-lucide="x" class="w-3 h-3"></i>
                        </button>
                    </span>
                `).join('')}
            `;
            lucide.createIcons();
        }

        function clearAllTags() {
            selectedTags = [];
            document.querySelectorAll('[onclick^="filterByTag"]').forEach(btn => {
                btn.classList.remove('bg-purple-500/20', 'text-purple-400', 'border-purple-500/30');
                btn.classList.add('bg-dark-bg', 'text-gray-400', 'border-dark-border');
            });
            updateSelectedTagsDisplay();
            filterMachines();
        }

        function removeTag(tag) {
            selectedTags = selectedTags.filter(t => t !== tag);
            
            // 更新按鈕狀態
            document.querySelectorAll('[onclick^="filterByTag"]').forEach(btn => {
                if (btn.textContent.trim().includes(tag)) {
                    btn.classList.remove('bg-purple-500/20', 'text-purple-400', 'border-purple-500/30');
                    btn.classList.add('bg-dark-bg', 'text-gray-400', 'border-dark-border');
                }
            });
            
            updateSelectedTagsDisplay();
            filterMachines();
        }

        function filterMachines() {
            const machines = document.querySelectorAll('.machine-item');
            machines.forEach(machine => {
                const tags = machine.getAttribute('data-tags') || '';
                if (selectedTags.length === 0) {
                    machine.style.display = 'block';
                } else {
                    const hasAllTags = selectedTags.every(tag => tags.includes(tag));
                    machine.style.display = hasAllTags ? 'block' : 'none';
                }
            });
        }

        // 篩選 Modal
        function openFilterModal() {
            document.getElementById('filterModal').classList.remove('hidden');
        }

        function applyFilters() {
            const nameFilter = document.getElementById('filterName').value.toLowerCase();
            
            const machines = document.querySelectorAll('.machine-item');
            machines.forEach(machine => {
                const name = machine.querySelector('.text-sm.text-white').textContent.toLowerCase();
                const tags = machine.getAttribute('data-tags') || '';
                
                let visible = true;
                
                if (nameFilter && !name.includes(nameFilter)) {
                    visible = false;
                }
                
                if (filterSelectedTags.length > 0) {
                    const hasAllTags = filterSelectedTags.every(tag => tags.includes(tag));
                    if (!hasAllTags) visible = false;
                }
                
                machine.style.display = visible ? 'block' : 'none';
            });
            
            // Update selected tags display
            updateSelectedTagsDisplay();
            
            // Don't close modal automatically
            lucide.createIcons();
        }
    </script>

    <!-- 篩選 Modal -->
    <div id="filterModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden flex items-center justify-center">
        <div class="glass-card rounded-2xl p-6 w-full max-w-md mx-4">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-semibold text-white">篩選機台</h3>
                <button onclick="closeFilterModal()" class="p-2 hover:bg-dark-hover rounded-lg transition-colors">
                    <i data-lucide="x" class="w-5 h-5 text-gray-400"></i>
                </button>
            </div>
            
            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-300 mb-2">機台名稱</label>
                <input type="text" id="filterName" placeholder="輸入機台名稱搜尋..." class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2.5 text-white text-sm placeholder-gray-500 focus:outline-none focus:border-purple-500">
            </div>

            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-300 mb-2">Tag</label>
                <div class="relative">
                    <input type="text" id="filterTag" autocomplete="off" placeholder="輸入 Tag..." class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2.5 text-white text-sm placeholder-gray-500 focus:outline-none focus:border-purple-500">
                    <div id="tagSuggestions" class="hidden absolute z-10 w-full mt-1 bg-dark-card border border-dark-border rounded-lg shadow-lg max-h-40 overflow-y-auto">
                        <div onclick="selectTag('旗艦店')" class="px-4 py-2 hover:bg-dark-hover cursor-pointer text-white text-sm">旗艦店</div>
                        <div onclick="selectTag('標準店')" class="px-4 py-2 hover:bg-dark-hover cursor-pointer text-white text-sm">標準店</div>
                        <div onclick="selectTag('VIP區')" class="px-4 py-2 hover:bg-dark-hover cursor-pointer text-white text-sm">VIP區</div>
                        <div onclick="selectTag('大廳')" class="px-4 py-2 hover:bg-dark-hover cursor-pointer text-white text-sm">大廳</div>
                        <div onclick="selectTag('包廂')" class="px-4 py-2 hover:bg-dark-hover cursor-pointer text-white text-sm">包廂</div>
                    </div>
                </div>
                <div id="selectedTagsList" class="flex flex-wrap gap-2 mt-2"></div>
            </div>

            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-300 mb-2">機台狀態</label>
                <select id="filterStatus" class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:border-purple-500">
                    <option value="">全部</option>
                    <option value="online">線上</option>
                    <option value="offline">離線</option>
                    <option value="pending">待更新</option>
                </select>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-300 mb-2">版本狀態</label>
                <select id="filterVersion" class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:border-purple-500">
                    <option value="">全部</option>
                    <option value="latest">最新版本</option>
                    <option value="needs-update">需更新</option>
                </select>
            </div>

            <div class="flex items-center justify-between pt-4 border-t border-dark-border">
                <button onclick="clearAllFilters()" class="text-sm text-gray-400 hover:text-white">清除全部</button>
                <div class="flex items-center space-x-3">
                    <button onclick="closeFilterModal()" class="px-4 py-2 bg-dark-bg border border-dark-border rounded-lg text-sm text-gray-300 hover:bg-dark-hover">
                        取消
                    </button>
                    <button onclick="doApplyFilters()" class="px-4 py-2 gradient-purple rounded-lg text-sm text-white font-medium">
                        套用篩選
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

    <script src="../js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_ota_task_deploy.html');

        let filterSelectedTags = [];

        // Tag 輸入自動完成
        document.getElementById('filterTag').addEventListener('input', function(e) {
            const val = e.target.value.toLowerCase();
            const suggestions = document.getElementById('tagSuggestions');
            if (val.length > 0) {
                suggestions.classList.remove('hidden');
            } else {
                suggestions.classList.add('hidden');
            }
        });

        document.getElementById('filterTag').addEventListener('focus', function(e) {
            document.getElementById('tagSuggestions').classList.remove('hidden');
        });

        document.addEventListener('click', function(e) {
            if (!e.target.closest('#filterTag') && !e.target.closest('#tagSuggestions')) {
                document.getElementById('tagSuggestions').classList.add('hidden');
            }
        });

        function selectTag(tag) {
            if (!filterSelectedTags.includes(tag)) {
                filterSelectedTags.push(tag);
            }
            document.getElementById('filterTag').value = '';
            document.getElementById('tagSuggestions').classList.add('hidden');
            renderFilterTags();
        }

        function removeFilterTag(tag) {
            filterSelectedTags = filterSelectedTags.filter(t => t !== tag);
            renderFilterTags();
            applyFilters();
        }

        function renderFilterTags() {
            const container = document.getElementById('selectedTagsList');
            container.innerHTML = filterSelectedTags.map(tag => `
                <span class="inline-flex items-center px-2 py-1 rounded-full text-xs bg-purple-500/20 text-purple-400">
                    ${tag}
                    <button onclick="removeFilterTag('${tag}')" class="ml-1 hover:text-white">
                        <i data-lucide="x" class="w-3 h-3"></i>
                    </button>
                </span>
            `).join('');
            lucide.createIcons();
        }

        // 套用篩選時才篩選
        function doApplyFilters() {
            applyFilters();
            closeFilterModal();
        }

        // 清除全部
        function clearAllFilters() {
            document.getElementById('filterName').value = '';
            document.getElementById('filterTag').value = '';
            document.getElementById('filterStatus').value = '';
            document.getElementById('filterVersion').value = '';
            filterSelectedTags = [];
            renderFilterTags();
        }

        function closeFilterModal() {
            document.getElementById('filterModal').classList.add('hidden');
        }
    </script>
</body>
</html>
