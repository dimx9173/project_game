<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>本地儀表板 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' },
                        local: { 50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7', 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857', 800: '#065f46', 900: '#064e3b' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(16, 185, 129, 0.3)', 'glow-sm': '0 0 15px rgba(16, 185, 129, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #059669 #0a0a0f; -webkit-tap-highlight-color: transparent; }
        *::-webkit-scrollbar { width: 4px; height: 4px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #10b981, #34d399); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; touch-action: manipulation; }
        .glass { background: rgba(18, 18, 26, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.95) 0%, rgba(30, 30, 46, 0.7) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.2); box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5); }
        .glass-card:active { transform: scale(0.98); border-color: rgba(16, 185, 129, 0.5); }
        .gradient-bg { background: linear-gradient(180deg, #0a0a0f 0%, #0a1a14 50%, #0a0a0f 100%); }
        .gradient-local { background: linear-gradient(135deg, #10b981 0%, #34d399 50%, #6ee7b7 100%); }
        .btn-touch { min-height: 56px; min-width: 56px; touch-action: manipulation; }
        .btn-touch:active { transform: scale(0.95); opacity: 0.9; }
        .badge-local { background: #10b981; color: white; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.3), 0 0 20px rgba(16, 185, 129, 0.2); }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); } 50% { box-shadow: 0 0 25px rgba(16, 185, 129, 0.5); } }
        .status-online { animation: pulse-glow 2s infinite; }
        .progress-bar { background: linear-gradient(90deg, #10b981 0%, #34d399 100%); }
    </style>
</head>
<body class="gradient-bg min-h-screen pb-24">
    <!-- 頂部 Header -->
    <header class="glass sticky top-0 z-30 border-b border-dark-border">
        <div class="flex items-center justify-center px-4 py-3">
            <div class="absolute left-4">
                <button class="btn-touch p-2 rounded-xl bg-dark-bg/50 text-white">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="text-center">
                <h1 class="text-lg font-bold text-white">本地儀表板</h1>
                <div class="flex items-center justify-center text-xs text-emerald-400 mt-1">
                    <span class="w-2 h-2 rounded-full bg-emerald-400 mr-1.5 animate-pulse"></span>
                    已連線
                </div>
            </div>
            <div class="absolute right-4">
                <span class="badge-local">A-01</span>
            </div>
        </div>
    </header>

    <!-- 內容區 -->
    <div class="flex-1 p-4 space-y-4">
        <!-- 本機資訊卡片 -->
        <div class="glass-card rounded-2xl p-4">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center">
                    <div class="w-12 h-12 rounded-xl gradient-local flex items-center justify-center mr-3">
                        <i data-lucide="monitor" class="w-6 h-6 text-white"></i>
                    </div>
                    <div>
                        <div class="text-lg font-bold text-white">旗艦店 A-01</div>
                        <div class="text-xs text-gray-400">機台編號: MCH-0001</div>
                    </div>
                </div>
                <div class="px-3 py-1.5 bg-emerald-500/20 text-emerald-400 rounded-full border border-emerald-500/30 text-xs font-medium">
                    營運中
                </div>
            </div>
            <div class="grid grid-cols-3 gap-3 text-center">
                <div class="p-3 bg-dark-bg/50 rounded-xl">
                    <div class="text-lg font-bold text-white font-mono">$12.5K</div>
                    <div class="text-xs text-gray-500">今日營收</div>
                </div>
                <div class="p-3 bg-dark-bg/50 rounded-xl">
                    <div class="text-lg font-bold text-white font-mono">856</div>
                    <div class="text-xs text-gray-500">今日局數</div>
                </div>
                <div class="p-3 bg-dark-bg/50 rounded-xl">
                    <div class="text-lg font-bold text-emerald-400 font-mono">94.2%</div>
                    <div class="text-xs text-gray-500"> RTP</div>
                </div>
            </div>
        </div>

        <!-- 硬體狀態 -->
        <div class="glass-card rounded-2xl p-4">
            <h3 class="font-semibold text-white flex items-center mb-4">
                <i data-lucide="cpu" class="w-5 h-5 mr-2 text-emerald-400"></i>
                硬體狀態
                <span class="badge-local ml-2">本機</span>
            </h3>
            <div class="space-y-4">
                <!-- CPU -->
                <div>
                    <div class="flex justify-between text-sm mb-2">
                        <span class="text-gray-400">CPU 使用率</span>
                        <span class="text-white font-mono">45%</span>
                    </div>
                    <div class="h-2 bg-dark-bg rounded-full overflow-hidden">
                        <div class="progress-bar h-full rounded-full" style="width: 45%"></div>
                    </div>
                </div>
                <!-- 記憶體 -->
                <div>
                    <div class="flex justify-between text-sm mb-2">
                        <span class="text-gray-400">記憶體</span>
                        <span class="text-white font-mono">6.2 / 16 GB</span>
                    </div>
                    <div class="h-2 bg-dark-bg rounded-full overflow-hidden">
                        <div class="progress-bar h-full rounded-full" style="width: 39%"></div>
                    </div>
                </div>
                <!-- 磁碟 -->
                <div>
                    <div class="flex justify-between text-sm mb-2">
                        <span class="text-gray-400">磁碟空間</span>
                        <span class="text-white font-mono">128 / 512 GB</span>
                    </div>
                    <div class="h-2 bg-dark-bg rounded-full overflow-hidden">
                        <div class="progress-bar h-full rounded-full" style="width: 25%"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 網路狀態 -->
        <div class="glass-card rounded-2xl p-4">
            <h3 class="font-semibold text-white flex items-center mb-4">
                <i data-lucide="wifi" class="w-5 h-5 mr-2 text-emerald-400"></i>
                網路狀態
            </h3>
            <div class="grid grid-cols-2 gap-4">
                <div class="p-3 bg-dark-bg/50 rounded-xl text-center">
                    <div class="text-2xl font-bold text-emerald-400 font-mono">12ms</div>
                    <div class="text-xs text-gray-500">延遲</div>
                </div>
                <div class="p-3 bg-dark-bg/50 rounded-xl text-center">
                    <div class="text-2xl font-bold text-white font-mono">98.5%</div>
                    <div class="text-xs text-gray-500">連線穩定度</div>
                </div>
            </div>
            <div class="mt-4 flex items-center justify-between p-3 bg-dark-bg/50 rounded-xl">
                <div class="flex items-center">
                    <i data-lucide="server" class="w-5 h-5 text-emerald-400 mr-2"></i>
                    <span class="text-sm text-gray-400">中央伺服器</span>
                </div>
                <span class="text-xs text-emerald-400">● 已連線</span>
            </div>
        </div>

        <!-- 同步佇列 -->
        <div class="glass-card rounded-2xl p-4">
            <h3 class="font-semibold text-white flex items-center mb-4">
                <i data-lucide="refresh-cw" class="w-5 h-5 mr-2 text-emerald-400"></i>
                資料同步
            </h3>
            <div class="flex items-center justify-between mb-4">
                <div>
                    <div class="text-sm text-gray-400">待同步交易</div>
                    <div class="text-2xl font-bold text-white font-mono">0 筆</div>
                </div>
                <div class="w-12 h-12 rounded-full bg-emerald-500/20 flex items-center justify-center">
                    <i data-lucide="check" class="w-6 h-6 text-emerald-400"></i>
                </div>
            </div>
            <div class="flex items-center justify-between p-3 bg-dark-bg/50 rounded-xl">
                <span class="text-sm text-gray-400">上次同步</span>
                <span class="text-sm text-white">2 分鐘前</span>
            </div>
        </div>

        <!-- 系統資訊 -->
        <div class="glass-card rounded-2xl p-4">
            <h3 class="font-semibold text-white flex items-center mb-4">
                <i data-lucide="info" class="w-5 h-5 mr-2 text-emerald-400"></i>
                系統資訊
            </h3>
            <div class="space-y-3">
                <div class="flex justify-between">
                    <span class="text-sm text-gray-400">系統版本</span>
                    <span class="text-sm text-white font-mono">v2.1.0</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-sm text-gray-400">運行時間</span>
                    <span class="text-sm text-white font-mono">15 天 4 小時</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-sm text-gray-400">硬體型號</span>
                    <span class="text-sm text-white">旗艦版 Pro</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部導航欄 -->
    <nav class="fixed bottom-0 left-0 right-0 glass border-t border-dark-border z-40 pb-safe">
        <div class="flex justify-around items-center py-2 px-2">
            <a href="mockup_local_dashboard.html" class="flex flex-col items-center px-4 py-2 text-emerald-400 touch-manipulation">
                <i data-lucide="layout-dashboard" class="w-7 h-7"></i>
                <span class="text-xs mt-1">儀表板</span>
            </a>
            <a href="mockup_local_machine.html" class="flex flex-col items-center px-4 py-2 text-gray-400 touch-manipulation">
                <i data-lucide="monitor" class="w-7 h-7"></i>
                <span class="text-xs mt-1">機台</span>
            </a>
            <a href="mockup_local_cash.html" class="flex flex-col items-center px-4 py-2 text-gray-400 touch-manipulation">
                <i data-lucide="plus-circle" class="w-7 h-7"></i>
                <span class="text-xs mt-1">開分</span>
            </a>
            <a href="mockup_local_sync.html" class="flex flex-col items-center px-4 py-2 text-gray-400 touch-manipulation">
                <i data-lucide="refresh-cw" class="w-7 h-7"></i>
                <span class="text-xs mt-1">同步</span>
            </a>
            <a href="mockup_mvp_local_setup.html" class="flex flex-col items-center px-4 py-2 text-gray-400 touch-manipulation">
                <i data-lucide="settings" class="w-7 h-7"></i>
                <span class="text-xs mt-1">設定</span>
            </a>
        </div>
    </nav>

    <script>
        lucide.createIcons();
    </script>
    <style>
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0); }
    </style>
</body>
</html>
