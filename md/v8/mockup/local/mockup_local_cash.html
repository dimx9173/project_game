<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>開分/洗分與交易查詢 - 本地後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' },
                        local: { 50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7', 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857', 800: '#065f46', 900: '#064e3b' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(16, 185, 129, 0.3)', 'glow-sm': '0 0 15px rgba(16, 185, 129, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #059669 #0a0a0f; -webkit-tap-highlight-color: transparent; }
        *::-webkit-scrollbar { width: 4px; height: 4px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #10b981, #34d399); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; touch-action: manipulation; }
        .glass { background: rgba(18, 18, 26, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.95) 0%, rgba(30, 30, 46, 0.7) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.2); box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5); }
        .glass-card:active { transform: scale(0.98); border-color: rgba(16, 185, 129, 0.5); }
        .gradient-bg { background: linear-gradient(180deg, #0a0a0f 0%, #0a1a14 50%, #0a0a0f 100%); }
        .gradient-local { background: linear-gradient(135deg, #10b981 0%, #34d399 50%, #6ee7b7 100%); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        .btn-touch { min-height: 56px; min-width: 56px; touch-action: manipulation; }
        .btn-touch:active { transform: scale(0.95); opacity: 0.9; }
        .badge-local { background: #10b981; color: white; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
        .badge-queue { background: #f59e0b; color: white; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
        .badge-syncing { background: #3b82f6; color: white; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 500; animation: pulse 2s infinite; }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.3), 0 0 20px rgba(16, 185, 129, 0.2); }
        .menu-slide { transform: translateX(-100%); transition: transform 0.3s ease; }
        .menu-slide.active { transform: translateX(0); }
        .overlay { opacity: 0; visibility: hidden; transition: opacity 0.3s ease; }
        .overlay.active { opacity: 1; visibility: visible; }
        .keypad-btn { display: flex; align-items: center; justify-content: center; min-height: 64px; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 12px; font-size: 1.5rem; font-family: monospace; font-weight: bold; color: white; transition: all 0.2s; cursor: pointer; }
        .keypad-btn:active { background: rgba(16, 185, 129, 0.3); transform: scale(0.95); }
        .keypad-btn.danger { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3); }
        .keypad-btn.danger:active { background: rgba(239, 68, 68, 0.3); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); } 50% { box-shadow: 0 0 25px rgba(16, 185, 129, 0.5); } }
        .status-online { animation: pulse-glow 2s infinite; }
        .tab-active { background: linear-gradient(135deg, #10b981 0%, #34d399 100%); color: white; }
        .tab-inactive { background: transparent; color: #9ca3af; }
        .section-transition { transition: all 0.3s ease; }
    </style>
</head>
<body class="gradient-bg min-h-screen pb-24">
    <div id="sidebar-container"></div>

    <!-- 頂部導航 -->
    <header class="glass fixed top-0 left-0 right-0 z-30 h-16 flex items-center justify-center px-4 border-b border-dark-border">
        <div class="flex flex-col items-center">
            <h1 class="text-lg font-bold text-white">開分/洗分</h1>
            <div class="flex items-center space-x-2">
                <span class="badge-queue"><i data-lucide="database" class="w-3 h-3 inline mr-1"></i>📝 佇列</span>
                <span id="syncStatus" class="badge-syncing hidden"><i data-lucide="cloud-upload" class="w-3 h-3 inline mr-1"></i>⚠️ 同步中</span>
            </div>
        </div>
    </header>

    <!-- 主要內容 -->
    <main class="pt-20 pb-4 px-4 space-y-4">
        
        <!-- 同步狀態提示 -->
        <div id="queueAlert" class="glass-card rounded-xl p-3 border-l-4 border-amber-500">
            <div class="flex items-center justify-center">
                <div class="flex items-center">
                    <i data-lucide="info" class="w-5 h-5 text-amber-400 mr-2"></i>
                    <div class="text-sm">
                        <span class="text-amber-400 font-medium">離線模式</span>
                        <span class="text-gray-400"> - 交易將暫存於本地，連線後自動上傳</span>
                    </div>
                </div>
                <span class="badge-queue">3 筆待同步</span>
            </div>
        </div>

        <!-- 頁籤切換 -->
        <div class="flex space-x-2 bg-dark-bg rounded-xl p-1 border border-dark-border">
            <button id="tab-cash" class="flex-1 py-3 rounded-lg text-base font-medium tab-active transition-all" onclick="switchTab('cash')">
                <i data-lucide="dollar-sign" class="w-4 h-4 inline mr-1"></i>開分/洗分
            
            <button id="tab-query" class="flex-1 py-3 rounded-lg text-base font-medium tab-inactive transition-all" onclick="switchTab('query')">
                <i data-lucide="list" class="w-4 h-4 inline mr-1"></i>交易查詢
            
        </div>

        <!-- ========== 區塊1: 開分/洗分操作 ========== -->
        <div id="section-cash" class="section-transition">
            
            <!-- 今日摘要 -->
            <div class="glass-card rounded-2xl p-4">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-base font-semibold text-white">今日摘要</h2>
                    <span class="text-xs text-gray-500"><i data-lucide="clock" class="w-3 h-3 inline mr-1"></i>即時更新</span>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <div class="text-center">
                        <div class="text-xs text-gray-500 mb-1">總淨收</div>
                        <div class="text-xl font-mono font-bold text-emerald-400">$12,500</div>
                    </div>
                    <div class="text-center">
                        <div class="text-xs text-gray-500 mb-1">下注</div>
                        <div class="text-lg font-mono font-bold text-gray-400">$45K</div>
                    </div>
                    <div class="text-center">
                        <div class="text-xs text-gray-500 mb-1">派彩</div>
                        <div class="text-lg font-mono font-bold text-gray-400">$32.5K</div>
                    </div>
                </div>
            </div>

            <!-- 模式切換 -->
            <div class="flex space-x-2 bg-dark-bg rounded-xl p-1 border border-dark-border">
                <button id="mode-in" class="flex-1 py-3 rounded-lg text-sm font-medium tab-active" onclick="switchMode('in')">
                    <i data-lucide="arrow-down-circle" class="w-4 h-4 inline mr-1"></i>開分 (注資)
                
                <button id="mode-out" class="flex-1 py-3 rounded-lg text-sm font-medium tab-inactive" onclick="switchMode('out')">
                    <i data-lucide="arrow-up-circle" class="w-4 h-4 inline mr-1"></i>洗分 (結算)
                
            </div>

            <!-- 開分/洗分面板 -->
            <div class="glass-card rounded-2xl p-4 space-y-4">
                <!-- 金額顯示 -->
                <div class="bg-dark-bg rounded-xl p-4 text-center border border-dark-border">
                    <div class="text-sm text-gray-500 mb-2">輸入金額</div>
                    <div id="amount-display" class="text-4xl font-mono font-bold text-white tracking-wider">$0</div>
                </div>

                <!-- 數字鍵盤 -->
                <div class="grid grid-cols-3 gap-2">
                    <button class="keypad-btn" onclick="addDigit('1')">1
                    <button class="keypad-btn" onclick="addDigit('2')">2
                    <button class="keypad-btn" onclick="addDigit('3')">3
                    <button class="keypad-btn" onclick="addDigit('4')">4
                    <button class="keypad-btn" onclick="addDigit('5')">5
                    <button class="keypad-btn" onclick="addDigit('6')">6
                    <button class="keypad-btn" onclick="addDigit('7')">7
                    <button class="keypad-btn" onclick="addDigit('8')">8
                    <button class="keypad-btn" onclick="addDigit('9')">9
                    <button class="keypad-btn" onclick="clearAmount()">C
                    <button class="keypad-btn" onclick="addDigit('0')">0
                    <button class="keypad-btn" onclick="backspace()"><i data-lucide="delete" class="w-6 h-6"></i>
                </div>

                <!-- 確認按鈕 -->
                <button id="btn-confirm" onclick="confirmTransaction()" class="w-full py-4 gradient-local rounded-xl text-white font-bold text-lg btn-touch">
                    <i data-lucide="check-circle" class="w-5 h-5 inline mr-2"></i>確認開分
                

                <!-- 佇列提示 -->
                <div class="flex items-center justify-center text-xs text-gray-500">
                    <i data-lucide="info" class="w-3 h-3 mr-1"></i>
                    交易將寫入本地佇列，連線後自動同步至雲端
                </div>
            </div>
        </div>

        <!-- ========== 區塊2: 交易查詢 (唯讀) ========== -->
        <div id="section-query" class="section-transition hidden">
            
            <!-- 篩選 -->
            <div class="glass-card rounded-2xl p-3">
                <div class="flex space-x-2">
                    <select class="flex-1 bg-dark-bg border border-dark-border rounded-lg py-2 px-3 text-sm text-white">
                        <option>全部類型</option>
                        <option>開分</option>
                        <option>洗分</option>
                    </select>
                    <select class="flex-1 bg-dark-bg border border-dark-border rounded-lg py-2 px-3 text-sm text-white">
                        <option>今日</option>
                        <option>昨日</option>
                        <option>近7天</option>
                    </select>
                </div>
            </div>

            <!-- 唯讀標示 -->
            <div class="flex items-center justify-center text-xs text-gray-500 py-2">
                <i data-lucide="eye" class="w-3 h-3 mr-1"></i>
                ⚠️ 唯讀 - 資料來自本地快取
            </div>

            <!-- 交易列表 -->
            <div class="space-y-3">
                <!-- 交易項目 1 -->
                <div class="glass-card rounded-xl p-4">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex items-center">
                            <div class="w-10 h-10 rounded-lg bg-emerald-500/20 flex items-center justify-center mr-3">
                                <i data-lucide="arrow-down" class="w-5 h-5 text-emerald-400"></i>
                            </div>
                            <div>
                                <div class="text-white font-medium">開分</div>
                                <div class="text-xs text-gray-500">14:32:18</div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-xl font-mono font-bold text-emerald-400">+$1,000</div>
                            <span class="badge-syncing text-xs"><i data-lucide="check" class="w-3 h-3 inline"></i>已同步</span>
                        </div>
                    </div>
                    <div class="text-xs text-gray-500 pt-2 border-t border-dark-border">
                        交易 ID: TXN-20240305-001
                    </div>
                </div>

                <!-- 交易項目 2 -->
                <div class="glass-card rounded-xl p-4">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex items-center">
                            <div class="w-10 h-10 rounded-lg bg-red-500/20 flex items-center justify-center mr-3">
                                <i data-lucide="arrow-up" class="w-5 h-5 text-red-400"></i>
                            </div>
                            <div>
                                <div class="text-white font-medium">洗分</div>
                                <div class="text-xs text-gray-500">14:15:42</div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-xl font-mono font-bold text-red-400">-$500</div>
                            <span class="badge-queue text-xs">📝 待同步</span>
                        </div>
                    </div>
                    <div class="text-xs text-gray-500 pt-2 border-t border-dark-border">
                        交易 ID: TXN-20240305-002
                    </div>
                </div>

                <!-- 交易項目 3 -->
                <div class="glass-card rounded-xl p-4">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex items-center">
                            <div class="w-10 h-10 rounded-lg bg-emerald-500/20 flex items-center justify-center mr-3">
                                <i data-lucide="arrow-down" class="w-5 h-5 text-emerald-400"></i>
                            </div>
                            <div>
                                <div class="text-white font-medium">開分</div>
                                <div class="text-xs text-gray-500">13:58:07</div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-xl font-mono font-bold text-emerald-400">+$2,000</div>
                            <span class="badge-syncing text-xs"><i data-lucide="check" class="w-3 h-3 inline"></i>已同步</span>
                        </div>
                    </div>
                    <div class="text-xs text-gray-500 pt-2 border-t border-dark-border">
                        交易 ID: TXN-20240305-003
                    </div>
                </div>
            </div>

            <!-- 載入更多 -->
            <button class="w-full py-3 glass border border-dark-border rounded-xl text-gray-400 text-sm">
                載入更多...
            
        </div>

    </main>

    <script src="../js/sidebar.js"></script>
    <script>
        // MockupSidebar.render('mockup_local_cash.html');
        lucide.createIcons();

        let currentAmount = 0;
        let currentMode = 'in'; // 'in' = 開分, 'out' = 洗分
        let currentTab = 'cash'; // 'cash' = 開分/洗分, 'query' = 交易查詢

        function switchTab(tab) {
            currentTab = tab;
            const cashSection = document.getElementById('section-cash');
            const querySection = document.getElementById('section-query');
            const cashTab = document.getElementById('tab-cash');
            const queryTab = document.getElementById('tab-query');

            if (tab === 'cash') {
                cashSection.classList.remove('hidden');
                querySection.classList.add('hidden');
                cashTab.className = 'flex-1 py-3 rounded-lg text-base font-medium tab-active transition-all';
                queryTab.className = 'flex-1 py-3 rounded-lg text-base font-medium tab-inactive transition-all';
            } else {
                cashSection.classList.add('hidden');
                querySection.classList.remove('hidden');
                cashTab.className = 'flex-1 py-3 rounded-lg text-base font-medium tab-inactive transition-all';
                queryTab.className = 'flex-1 py-3 rounded-lg text-base font-medium tab-active transition-all';
            }
            lucide.createIcons();
        }

        function switchMode(mode) {
            currentMode = mode;
            const inBtn = document.getElementById('mode-in');
            const outBtn = document.getElementById('mode-out');
            const confirmBtn = document.getElementById('btn-confirm');

            if (mode === 'in') {
                inBtn.className = 'flex-1 py-3 rounded-lg text-sm font-medium tab-active';
                outBtn.className = 'flex-1 py-3 rounded-lg text-sm font-medium tab-inactive';
                confirmBtn.innerHTML = '<i data-lucide="check-circle" class="w-5 h-5 inline mr-2"></i>確認開分';
                confirmBtn.className = 'w-full py-4 gradient-local rounded-xl text-white font-bold text-lg btn-touch';
            } else {
                inBtn.className = 'flex-1 py-3 rounded-lg text-sm font-medium tab-inactive';
                outBtn.className = 'flex-1 py-3 rounded-lg text-sm font-medium tab-active';
                confirmBtn.innerHTML = '<i data-lucide="check-circle" class="w-5 h-5 inline mr-2"></i>確認洗分';
                confirmBtn.className = 'w-full py-4 bg-red-500 rounded-xl text-white font-bold text-lg btn-touch';
            }
            lucide.createIcons();
        }

        function addDigit(digit) {
            if (currentAmount === 0 && digit !== '0') {
                currentAmount = parseInt(digit);
            } else if (currentAmount > 0 || digit !== '0') {
                currentAmount = parseInt(currentAmount.toString() + digit);
            }
            updateDisplay();
        }

        function clearAmount() {
            currentAmount = 0;
            updateDisplay();
        }

        function backspace() {
            currentAmount = Math.floor(currentAmount / 10);
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('amount-display').textContent = '$' + currentAmount.toLocaleString();
        }

        function confirmTransaction() {
            if (currentAmount === 0) {
                alert('請輸入金額');
                return;
            }
            const modeText = currentMode === 'in' ? '開分' : '洗分';
            alert(`${modeText} $${currentAmount.toLocaleString()} 已暫存至佇列`);
            clearAmount();
        }

        function toggleMenu() {
            // Placeholder for menu toggle
            console.log('Toggle menu');
        }

        // Simulate sync status toggle for demo
        setInterval(() => {
            const syncBadge = document.getElementById('syncStatus');
            if (Math.random() > 0.7) {
                syncBadge.classList.toggle('hidden');
            }
        }, 5000);
    </script>

    <!-- 底部導航欄 -->
    <nav class="fixed bottom-0 left-0 right-0 glass border-t border-dark-border z-40 pb-safe">
        <div class="flex justify-around items-center py-2 px-2">
            <a href="mockup_local_dashboard.html" class="flex flex-col items-center px-4 py-2 text-gray-400 touch-manipulation">
                <i data-lucide="layout-dashboard" class="w-7 h-7"></i>
                <span class="text-xs mt-1">儀表板</span>
            </a>
            <a href="mockup_local_machine.html" class="flex flex-col items-center px-4 py-2 text-gray-400 touch-manipulation">
                <i data-lucide="monitor" class="w-7 h-7"></i>
                <span class="text-xs mt-1">機台</span>
            </a>
            <a href="mockup_local_cash.html" class="flex flex-col items-center px-4 py-2 text-emerald-400 touch-manipulation">
                <i data-lucide="plus-circle" class="w-7 h-7"></i>
                <span class="text-xs mt-1">開分</span>
            </a>
            <a href="mockup_local_sync.html" class="flex flex-col items-center px-4 py-2 text-gray-400 touch-manipulation">
                <i data-lucide="refresh-cw" class="w-7 h-7"></i>
                <span class="text-xs mt-1">同步</span>
            </a>
            <a href="mockup_mvp_local_setup.html" class="flex flex-col items-center px-4 py-2 text-gray-400 touch-manipulation">
                <i data-lucide="settings" class="w-7 h-7"></i>
                <span class="text-xs mt-1">設定</span>
            </a>
        </div>
    </nav>

    <style>
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0); }
    </style>

</body>
</html>
