<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>本地後台登入 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' },
                        local: { 50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7', 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857', 800: '#065f46', 900: '#064e3b' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(16, 185, 129, 0.3)', 'glow-sm': '0 0 15px rgba(16, 185, 129, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #059669 #0a0a0f; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; touch-action: manipulation; }
        .glass { background: rgba(18, 18, 26, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.95) 0%, rgba(30, 30, 46, 0.7) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.2); }
        .gradient-bg { background: linear-gradient(180deg, #0a0a0f 0%, #0a1a14 50%, #0a0a0f 100%); }
        .gradient-local { background: linear-gradient(135deg, #10b981 0%, #34d399 50%, #6ee7b7 100%); }
        .btn-touch { min-height: 56px; touch-action: manipulation; }
        .btn-touch:active { transform: scale(0.95); opacity: 0.9; }
        .keypad-btn { display: flex; align-items: center; justify-content: center; min-height: 64px; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 12px; font-size: 1.5rem; font-family: monospace; font-weight: bold; color: white; }
        .keypad-btn:active { background: rgba(16, 185, 129, 0.3); }
        .pin-box { width: 36px; height: 48px; border: 2px solid #374151; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; font-weight: 600; font-family: monospace; color: #10b981; transition: all 0.2s; }
        .pin-box.active { border-color: #10b981; box-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }
        .pin-box.filled { border-color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .mode-tab { transition: all 0.3s; }
        .mode-tab.active { background: rgba(16, 185, 129, 0.2); border-color: #10b981; }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); } 50% { box-shadow: 0 0 25px rgba(16, 185, 129, 0.5); } }
        .status-online { animation: pulse-glow 2s infinite; }
    </style>
</head>
<body class="gradient-bg min-h-screen flex flex-col">
    
    <!-- 連線狀態 -->
    <div class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50">
        <div class="glass rounded-full px-4 py-2 flex items-center space-x-2">
            <div class="w-2 h-2 rounded-full bg-emerald-400 status-online"></div>
            <span class="text-xs font-medium text-emerald-400">● 已連線</span>
        </div>
    </div>

    <main class="flex-1 flex flex-col items-center justify-center px-5 py-6">
        
        <!-- Logo -->
        <div class="text-center mb-6">
            <div class="w-16 h-16 rounded-xl gradient-local flex items-center justify-center mx-auto mb-3">
                <i data-lucide="gamepad-2" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="text-xl font-bold text-white mb-1">本地後台登入</h1>
            <p class="text-xs text-gray-500">機台編號: <span class="font-mono text-emerald-400">A-01</span></p>
        </div>

        <!-- 模式選擇 -->
        <div class="w-full max-w-xs mb-6">
            <div class="glass-card rounded-xl p-1 flex">
                <button id="modeOnline" class="flex-1 py-3 px-2 rounded-lg text-sm font-medium mode-tab active border border-emerald-500 text-white" onclick="switchMode('online')">
                    <div class="flex items-center justify-center">
                        <div class="w-2 h-2 rounded-full bg-emerald-400 mr-2"></div>
                        <span>線上認證</span>
                    </div>
                </button>
                <button id="modeOffline" class="flex-1 py-3 px-2 rounded-lg text-sm font-medium mode-tab border border-transparent text-gray-400" onclick="switchMode('offline')">
                    <div class="flex items-center justify-center">
                        <div class="w-2 h-2 rounded-full bg-gray-500 mr-2"></div>
                        <span>本地維護</span>
                    </div>
                </button>
            </div>
        </div>

        <!-- 線上認證內容 -->
        <div id="contentOnline" class="w-full max-w-xs">
            <div class="glass-card rounded-2xl p-5">
                <p class="text-center text-sm text-gray-400 mb-4">請輸入 8 位值班 PIN</p>
                
                <!-- 8位 PIN -->
                <div class="flex justify-center space-x-1.5 mb-5">
                    <div class="pin-box" data-online="0"></div>
                    <div class="pin-box" data-online="1"></div>
                    <div class="pin-box" data-online="2"></div>
                    <div class="pin-box" data-online="3"></div>
                    <div class="pin-box" data-online="4"></div>
                    <div class="pin-box" data-online="5"></div>
                    <div class="pin-box" data-online="6"></div>
                    <div class="pin-box" data-online="7"></div>
                </div>

                <!-- 權限說明 -->
                <div class="space-y-2 mb-5">
                    <div class="flex items-center text-xs text-emerald-400">
                        <i data-lucide="check" class="w-4 h-4 mr-2"></i>
                        可執行開分/洗分
                    </div>
                    <div class="flex items-center text-xs text-emerald-400">
                        <i data-lucide="check" class="w-4 h-4 mr-2"></i>
                        所有功能開啟
                    </div>
                    <div class="flex items-center text-xs text-gray-500">
                        <i data-lucide="clock" class="w-4 h-4 mr-2"></i>
                        PIN 有效期 12 小時
                    </div>
                </div>

                <button class="w-full py-3.5 gradient-local rounded-xl text-white font-semibold btn-touch">
                    登入
                </button>
            </div>
        </div>

        <!-- 本地維護內容 -->
        <div id="contentOffline" class="w-full max-w-xs hidden">
            <div class="glass-card rounded-2xl p-5">
                <p class="text-center text-sm text-gray-400 mb-4">請輸入 7 位機台 PIN</p>
                
                <!-- 7位 PIN -->
                <div class="flex justify-center space-x-1.5 mb-5">
                    <div class="pin-box" data-offline="0"></div>
                    <div class="pin-box" data-offline="1"></div>
                    <div class="pin-box" data-offline="2"></div>
                    <div class="pin-box" data-offline="3"></div>
                    <div class="pin-box" data-offline="4"></div>
                    <div class="pin-box" data-offline="5"></div>
                    <div class="pin-box" data-offline="6"></div>
                </div>

                <!-- 權限說明 -->
                <div class="space-y-2 mb-5">
                    <div class="flex items-center text-xs text-amber-400">
                        <i data-lucide="alert-triangle" class="w-4 h-4 mr-2"></i>
                        僅可設定與瀏覽
                    </div>
                    <div class="flex items-center text-xs text-red-400">
                        <i data-lucide="x" class="w-4 h-4 mr-2"></i>
                        開分/洗分功能已鎖定
                    </div>
                    <div class="flex items-center text-xs text-gray-500">
                        <i data-lucide="info" class="w-4 h-4 mr-2"></i>
                        用於機台離線維護
                    </div>
                </div>

                <button class="w-full py-3.5 bg-gray-700 rounded-xl text-white font-semibold btn-touch">
                    登入
                </button>
            </div>
        </div>

        <!-- 數字鍵盤 -->
        <div class="w-full max-w-xs mt-6">
            <div class="grid grid-cols-3 gap-2">
                <button class="keypad-btn btn-touch" onclick="inputDigit('1')">1</button>
                <button class="keypad-btn btn-touch" onclick="inputDigit('2')">2</button>
                <button class="keypad-btn btn-touch" onclick="inputDigit('3')">3</button>
                <button class="keypad-btn btn-touch" onclick="inputDigit('4')">4</button>
                <button class="keypad-btn btn-touch" onclick="inputDigit('5')">5</button>
                <button class="keypad-btn btn-touch" onclick="inputDigit('6')">6</button>
                <button class="keypad-btn btn-touch" onclick="inputDigit('7')">7</button>
                <button class="keypad-btn btn-touch" onclick="inputDigit('8')">8</button>
                <button class="keypad-btn btn-touch" onclick="inputDigit('9')">9</button>
                <button class="keypad-btn btn-touch bg-gray-800" onclick="clearPin()">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
                <button class="keypad-btn btn-touch" onclick="inputDigit('0')">0</button>
                <button class="keypad-btn btn-touch bg-red-900/30 border-red-700/50" onclick="deleteDigit()">
                    <i data-lucide="delete" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <!-- 底部 -->
        <div class="mt-6 text-center">
            <p class="text-xs text-gray-500">值班 PIN 由集中式後台產生，12hr 有效</p>
        </div>
    </main>

    <script>
        let currentMode = 'online';
        let onlinePin = '';
        let offlinePin = '';

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('modeOnline').classList.toggle('active', mode === 'online');
            document.getElementById('modeOnline').classList.toggle('border-emerald-500', mode === 'online');
            document.getElementById('modeOnline').classList.toggle('border-transparent', mode !== 'online');
            document.getElementById('modeOnline').classList.toggle('text-white', mode === 'online');
            document.getElementById('modeOnline').classList.toggle('text-gray-400', mode !== 'online');
            
            document.getElementById('modeOffline').classList.toggle('active', mode === 'offline');
            document.getElementById('modeOffline').classList.toggle('border-emerald-500', mode === 'offline');
            document.getElementById('modeOffline').classList.toggle('border-transparent', mode !== 'offline');
            document.getElementById('modeOffline').classList.toggle('text-white', mode === 'offline');
            document.getElementById('modeOffline').classList.toggle('text-gray-400', mode !== 'offline');
            
            document.getElementById('contentOnline').classList.toggle('hidden', mode !== 'online');
            document.getElementById('contentOffline').classList.toggle('hidden', mode !== 'offline');
        }

        function inputDigit(digit) {
            if (currentMode === 'online' && onlinePin.length < 8) {
                onlinePin += digit;
                updatePinDisplay('online');
            } else if (currentMode === 'offline' && offlinePin.length < 7) {
                offlinePin += digit;
                updatePinDisplay('offline');
            }
        }

        function deleteDigit() {
            if (currentMode === 'online') {
                onlinePin = onlinePin.slice(0, -1);
                updatePinDisplay('online');
            } else {
                offlinePin = offlinePin.slice(0, -1);
                updatePinDisplay('offline');
            }
        }

        function clearPin() {
            if (currentMode === 'online') {
                onlinePin = '';
                updatePinDisplay('online');
            } else {
                offlinePin = '';
                updatePinDisplay('offline');
            }
        }

        function updatePinDisplay(mode) {
            const pin = mode === 'online' ? onlinePin : offlinePin;
            const length = mode === 'online' ? 8 : 7;
            const boxes = document.querySelectorAll(`[data-${mode}]`);
            
            boxes.forEach((box, index) => {
                if (index < pin.length) {
                    box.textContent = '●';
                    box.classList.add('filled');
                } else {
                    box.textContent = '';
                    box.classList.remove('filled');
                }
                box.classList.toggle('active', index === pin.length);
            });
        }

        lucide.createIcons();
    </script>
</body>
</html>
