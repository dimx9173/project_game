<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>本機設定 - 本地後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' },
                        local: { 50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7', 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857', 800: '#065f46', 900: '#064e3b' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(16, 185, 129, 0.3)', 'glow-sm': '0 0 15px rgba(16, 185, 129, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #059669 #0a0a0f; -webkit-tap-highlight-color: transparent; }
        *::-webkit-scrollbar { width: 4px; height: 4px; }
        *::-webkit-scrollbar-track { background: #0a0a0f; }
        *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #10b981, #34d399); border-radius: 4px; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0f; touch-action: manipulation; }
        .glass { background: rgba(18, 18, 26, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.95) 0%, rgba(30, 30, 46, 0.7) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.2); box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5); }
        .glass-card:active { transform: scale(0.98); border-color: rgba(16, 185, 129, 0.5); }
        .gradient-bg { background: linear-gradient(180deg, #0a0a0f 0%, #0a1a14 50%, #0a0a0f 100%); }
        .gradient-local { background: linear-gradient(135deg, #10b981 0%, #34d399 50%, #6ee7b7 100%); }
        .btn-touch { min-height: 56px; min-width: 56px; touch-action: manipulation; }
        .btn-touch:active { transform: scale(0.95); opacity: 0.9; }
        .badge-local { background: #10b981; color: white; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
        .badge-central { background: #8b5cf6; color: white; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.3), 0 0 20px rgba(16, 185, 129, 0.2); }
        .menu-slide { transform: translateX(-100%); transition: transform 0.3s ease; }
        .menu-slide.active { transform: translateX(0); }
        .overlay { opacity: 0; visibility: hidden; transition: opacity 0.3s ease; }
        .overlay.active { opacity: 1; visibility: visible; }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); } 50% { box-shadow: 0 0 25px rgba(16, 185, 129, 0.5); } }
        .status-online { animation: pulse-glow 2s infinite; }
        .sidebar-group-header { cursor: pointer; display: flex; align-items: center; padding: 0.75rem; color: #9ca3af; border-radius: 0.5rem; }
        .sidebar-group-header:hover { color: #fff; background: rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="gradient-bg min-h-screen pb-24">
    <div id="sidebar-container"></div>

    <!-- 頂部導航 -->
    <header class="glass fixed top-0 left-0 right-0 z-30 h-16 flex items-center justify-between px-4 border-b border-dark-border">
        <button onclick="toggleMenu()" class="btn-touch p-3 rounded-xl hover:bg-dark-hover">
            <i data-lucide="menu" class="w-7 h-7 text-white"></i>
        </button>
        <div class="flex items-center space-x-3">
            <div class="flex items-center px-3 py-1.5 bg-emerald-500/20 text-emerald-400 rounded-full border border-emerald-500/30">
                <div class="w-2 h-2 rounded-full bg-emerald-400 mr-2 animate-pulse"></div>
                <span class="text-xs font-medium">已連線</span>
            </div>
            <div class="text-sm font-mono text-gray-400">A-01</div>
        </div>
        <div class="w-12"></div>
    </header>

    <!-- 主要內容 -->
    <main class="pt-20 pb-4 px-4 space-y-4">
        <!-- 頁面標題 -->
        <div class="text-center">
            <h1 class="text-xl font-bold text-white">本機設定</h1>
            <p class="text-xs text-gray-500">工程師權限操作</p>
        </div>

        <!-- 中央伺服器設定 -->
        <div class="glass-card rounded-2xl p-4">
            <h2 class="text-base font-semibold text-white mb-4 pb-2 border-b border-dark-border flex items-center">
                <i data-lucide="server" class="w-5 h-5 mr-2 text-emerald-400"></i>中央伺服器設定
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">API 位址</label>
                    <input type="text" value="https://api.gameplatform.com" class="w-full px-4 py-3 bg-dark-bg border border-dark-border rounded-xl text-sm font-mono text-white focus:outline-none input-focus">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">API 金鑰</label>
                    <input type="password" value="••••••••••••••••" class="w-full px-4 py-3 bg-dark-bg border border-dark-border rounded-xl text-sm font-mono text-gray-400 focus:outline-none input-focus">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">同步間隔</label>
                    <select class="w-full px-4 py-3 bg-dark-bg border border-dark-border rounded-xl text-sm text-white focus:outline-none input-focus">
                        <option>30 秒</option>
                        <option selected>1 分鐘</option>
                        <option>5 分鐘</option>
                        <option>10 分鐘</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 機台基本設定 -->
        <div class="glass-card rounded-2xl p-4">
            <h2 class="text-base font-semibold text-white mb-4 pb-2 border-b border-dark-border flex items-center">
                <i data-lucide="monitor" class="w-5 h-5 mr-2 text-emerald-400"></i>機台基本設定
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">機台名稱</label>
                    <input type="text" value="旗艦店 A-01" class="w-full px-4 py-3 bg-dark-bg border border-dark-border rounded-xl text-sm text-white focus:outline-none input-focus">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">機台編號</label>
                    <input type="text" value="MCH-0001" readonly class="w-full px-4 py-3 bg-dark-bg/50 border border-dark-border rounded-xl text-sm font-mono text-gray-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">硬體型號</label>
                    <select class="w-full px-4 py-3 bg-dark-bg border border-dark-border rounded-xl text-sm text-white focus:outline-none input-focus">
                        <option selected>旗艦版 Pro</option>
                        <option>標準版 Standard</option>
                        <option>精簡版 Lite</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 安全設定 -->
        <div class="glass-card rounded-2xl p-4">
            <h2 class="text-base font-semibold text-white mb-4 pb-2 border-b border-dark-border flex items-center">
                <i data-lucide="shield" class="w-5 h-5 mr-2 text-emerald-400"></i>安全設定
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">本地 PIN 碼</label>
                    <div class="flex gap-2 mb-2">
                        <div class="w-10 h-10 text-center text-xl rounded-xl border-2 border-emerald-500 bg-emerald-500/10 flex items-center justify-center text-emerald-400 font-bold">●</div>
                        <div class="w-10 h-10 text-center text-xl rounded-xl border-2 border-emerald-500 bg-emerald-500/10 flex items-center justify-center text-emerald-400 font-bold">●</div>
                        <div class="w-10 h-10 text-center text-xl rounded-xl border-2 border-emerald-500 bg-emerald-500/10 flex items-center justify-center text-emerald-400 font-bold">●</div>
                        <div class="w-10 h-10 text-center text-xl border-2 border-dark-border rounded-xl bg-dark-bg"></div>
                    </div>
                    <button class="text-xs text-gray-500 hover:text-white underline">變更 PIN 碼</button>
                </div>
                <div class="flex items-center justify-between">
                    <div>
                        <div class="text-sm font-medium text-white">遠端遙控開分</div>
                        <div class="text-xs text-gray-500">允許中央遠端執行開分/洗分</div>
                    </div>
                    <button class="w-12 h-7 bg-emerald-600 rounded-full relative">
                        <div class="w-5 h-5 bg-white rounded-full absolute right-0.5 top-0.5"></div>
                    </button>
                </div>
            </div>
        </div>

        <!-- 警示閾值設定 -->
        <div class="glass-card rounded-2xl p-4">
            <h2 class="text-base font-semibold text-white mb-4 pb-2 border-b border-dark-border flex items-center">
                <i data-lucide="alert-triangle" class="w-5 h-5 mr-2 text-emerald-400"></i>警示閾值設定
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">CPU 使用率告警 (%)</label>
                    <input type="number" value="80" class="w-full px-4 py-3 bg-dark-bg border border-dark-border rounded-xl text-sm font-mono text-white focus:outline-none input-focus">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">記憶體使用告警 (%)</label>
                    <input type="number" value="80" class="w-full px-4 py-3 bg-dark-bg border border-dark-border rounded-xl text-sm font-mono text-white focus:outline-none input-focus">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">網路延遲告警 (ms)</label>
                    <input type="number" value="100" class="w-full px-4 py-3 bg-dark-bg border border-dark-border rounded-xl text-sm font-mono text-white focus:outline-none input-focus">
                </div>
            </div>
        </div>

        <!-- 資料管理 -->
        <div class="glass-card rounded-2xl p-4">
            <h2 class="text-base font-semibold text-white mb-4 pb-2 border-b border-dark-border flex items-center">
                <i data-lucide="database" class="w-5 h-5 mr-2 text-emerald-400"></i>資料管理
            </h2>
            <div class="space-y-3">
                <button class="w-full btn-touch py-3 glass rounded-xl text-sm font-medium text-gray-300 border border-dark-border flex items-center justify-center">
                    <i data-lucide="trash-2" class="w-4 h-4 mr-2"></i>清除本地快取
                </button>
                <button class="w-full btn-touch py-3 glass rounded-xl text-sm font-medium text-gray-300 border border-dark-border flex items-center justify-center">
                    <i data-lucide="download" class="w-4 h-4 mr-2"></i>匯出本地資料
                </button>
                <button class="w-full btn-touch py-3 glass rounded-xl text-sm font-medium text-gray-300 border border-dark-border flex items-center justify-center">
                    <i data-lucide="upload" class="w-4 h-4 mr-2"></i>匯入設定
                </button>
            </div>
        </div>

        <!-- 儲存按鈕 -->
        <button class="w-full btn-touch py-4 gradient-local text-white rounded-xl text-lg font-bold shadow-glow transition-all flex justify-center items-center">
            <i data-lucide="save" class="w-5 h-5 mr-2"></i>
            儲存設定
        </button>
    </main>

    <!-- 底部導航 -->
    <nav class="glass fixed bottom-0 left-0 right-0 z-30 h-20 flex items-center justify-around border-t border-dark-border px-2 pb-2">
        <a href="mockup_local_dashboard.html" class="flex flex-col items-center justify-center flex-1 py-2">
            <i data-lucide="layout-dashboard" class="w-6 h-6 mb-1 text-gray-500"></i>
            <span class="text-xs text-gray-500">儀表板</span>
        </a>
        <a href="mockup_local_machine.html" class="flex flex-col items-center justify-center flex-1 py-2">
            <i data-lucide="monitor" class="w-6 h-6 mb-1 text-gray-500"></i>
            <span class="text-xs text-gray-500">機台</span>
        </a>
        <a href="mockup_local_cash.html" class="flex flex-col items-center justify-center flex-1 py-2">
            <i data-lucide="plus-circle" class="w-6 h-6 mb-1 text-gray-500"></i>
            <span class="text-xs text-gray-500">開洗分</span>
        </a>
        <a href="mockup_local_sync.html" class="flex flex-col items-center justify-center flex-1 py-2">
            <i data-lucide="refresh-cw" class="w-6 h-6 mb-1 text-gray-500"></i>
            <span class="text-xs text-gray-500">同步</span>
        </a>
        <a href="mockup_mvp_local_setup.html" class="flex flex-col items-center justify-center flex-1 py-2">
            <div class="w-12 h-12 -mt-6 rounded-full gradient-local flex items-center justify-center shadow-glow">
                <i data-lucide="settings" class="w-6 h-6 text-white"></i>
            </div>
            <span class="text-xs text-emerald-500 mt-1 font-medium">設定</span>
        </a>
    </nav>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
