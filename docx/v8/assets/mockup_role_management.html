<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色權限管理 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 600: '#7c3aed', 400: '#a78bfa', 500: '#8b5cf6' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%); }
        .glass { background: rgba(18, 18, 26, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(135deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); }
        .gradient-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%); }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3), 0 0 20px rgba(168, 85, 247, 0.2); }
    </style>
</head>
<body class="min-h-screen text-white">
    <div class="flex">
        <aside class="w-64 bg-dark-sidebar border-r border-dark-border min-h-screen p-4">
            <div class="flex items-center mb-8">
                <div class="w-10 h-10 rounded-xl gradient-purple flex items-center justify-center mr-3"><i data-lucide="gamepad-2" class="w-5 h-5"></i></div>
                <div><span class="font-bold">遊戲平台</span><span class="text-xs text-gray-500 block">管理中心</span></div>
            </div>
            <nav class="space-y-2">
                <a href="mockup_dashboard.html" class="flex items-center px-3 py-2.5 text-gray-300 hover:text-white rounded-lg"><i data-lucide="layout-dashboard" class="w-5 h-5 mr-3"></i>儀表板</a>
                <a href="mockup_user_permission.html" class="flex items-center px-3 py-2.5 text-cyber-400 rounded-lg bg-purple-500/20"><i data-lucide="shield-user" class="w-5 h-5 mr-3"></i>使用者權限</a>
                <a href="#" class="flex items-center px-3 py-2.5 text-cyber-400 rounded-lg ml-4"><i data-lucide="users" class="w-5 h-5 mr-3"></i>角色管理</a>
            </nav>
        </aside>
        
        <main class="flex-1 p-6">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h1 class="text-2xl font-bold">角色權限管理</h1>
                    <p class="text-gray-400">動態 RBAC 角色設定</p>
                </div>
                <button class="px-4 py-2 gradient-purple rounded-lg font-medium flex items-center">
                    <i data-lucide="plus" class="w-4 h-4 mr-2"></i>新增角色
                </button>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- 角色列表 -->
                <div class="glass-card rounded-2xl p-6">
                    <h3 class="font-semibold mb-4">角色列表</h3>
                    <div class="space-y-2">
                        <div class="p-4 glass rounded-xl bg-purple-500/20 border border-cyber-500 cursor-pointer">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center space-x-3">
                                    <div class="w-10 h-10 rounded-lg gradient-purple flex items-center justify-center"><i data-lucide="crown" class="w-5 h-5"></i></div>
                                    <div><p class="font-medium">系統管理員</p><p class="text-xs text-gray-400">Admin</p></div>
                                </div>
                                <span class="px-2 py-1 bg-cyber-500/20 text-cyber-400 text-xs rounded">預設</span>
                            </div>
                        </div>
                        <div class="p-4 glass rounded-xl cursor-pointer hover:bg-purple-500/10">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center space-x-3">
                                    <div class="w-10 h-10 rounded-lg bg-emerald-500/20 flex items-center justify-center"><i data-lucide="store" class="w-5 h-5 text-emerald-400"></i></div>
                                    <div><p class="font-medium">站長</p><p class="text-xs text-gray-400">Site Manager</p></div>
                                </div>
                                <span class="text-sm text-gray-400">5 人</span>
                            </div>
                        </div>
                        <div class="p-4 glass rounded-xl cursor-pointer hover:bg-purple-500/10">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center space-x-3">
                                    <div class="w-10 h-10 rounded-lg bg-blue-500/20 flex items-center justify-center"><i data-lucide="headphones" class="w-5 h-5 text-blue-400"></i></div>
                                    <div><p class="font-medium">客服</p><p class="text-xs text-gray-400">Customer Service</p></div>
                                </div>
                                <span class="text-sm text-gray-400">12 人</span>
                            </div>
                        </div>
                        <div class="p-4 glass rounded-xl cursor-pointer hover:bg-purple-500/10">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center space-x-3">
                                    <div class="w-10 h-10 rounded-lg bg-amber-500/20 flex items-center justify-center"><i data-lucide="file-search" class="w-5 h-5 text-amber-400"></i></div>
                                    <div><p class="font-medium">稽核員</p><p class="text-xs text-gray-400">Auditor</p></div>
                                </div>
                                <span class="text-sm text-gray-400">3 人</span>
                            </div>
                        </div>
                        <div class="p-4 glass rounded-xl cursor-pointer hover:bg-purple-500/10">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center space-x-3">
                                    <div class="w-10 h-10 rounded-lg bg-pink-500/20 flex items-center justify-center"><i data-lucide="megaphone" class="w-5 h-5 text-pink-400"></i></div>
                                    <div><p class="font-medium">行銷</p><p class="text-xs text-gray-400">Marketing</p></div>
                                </div>
                                <span class="text-sm text-gray-400">4 人</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 權限設定 -->
                <div class="lg:col-span-2 glass-card rounded-2xl p-6">
                    <div class="flex items-center justify-between mb-6">
                        <div>
                            <h3 class="font-semibold">系統管理員權限</h3>
                            <p class="text-sm text-gray-400">擁有所有功能的完整權限</p>
                        </div>
                        <div class="flex space-x-2">
                            <button class="px-3 py-1.5 bg-dark-bg border border-dark-border rounded-lg text-sm text-gray-300 hover:text-white"><i data-lucide="copy" class="w-4 h-4 mr-1 inline"></i>複製</button>
                            <button class="px-3 py-1.5 bg-dark-bg border border-dark-border rounded-lg text-sm text-gray-300 hover:text-white"><i data-lucide="edit" class="w-4 h-4 mr-1 inline"></i>編輯</button>
                        </div>
                    </div>
                    
                    <div class="space-y-6">
                        <!-- 儀表板 -->
                        <div>
                            <div class="flex items-center justify-between mb-3">
                                <span class="font-medium"><i data-lucide="layout-dashboard" class="w-4 h-4 mr-2 inline text-cyber-400"></i>儀表板</span>
                                <label class="flex items-center space-x-2">
                                    <input type="checkbox" checked class="w-4 h-4 rounded border-dark-border bg-dark-bg text-cyber-600 focus:ring-cyber-500">
                                    <span class="text-sm text-gray-300">全選</span>
                                </label>
                            </div>
                            <div class="grid grid-cols-4 gap-3 ml-6">
                                <label class="flex items-center space-x-2 text-sm text-gray-300"><input type="checkbox" checked class="w-4 h-4 rounded border-dark-border bg-dark-bg text-cyber-600">檢視</label>
                                <label class="flex items-center space-x-2 text-sm text-gray-300"><input type="checkbox" checked class="w-4 h-4 rounded border-dark-border bg-dark-bg text-cyber-600">匯出</label>
                            </div>
                        </div>
                        
                        <!-- 機台管理 -->
                        <div>
                            <div class="flex items-center justify-between mb-3">
                                <span class="font-medium"><i data-lucide="monitor" class="w-4 h-4 mr-2 inline text-cyber-400"></i>機台管理</span>
                                <label class="flex items-center space-x-2">
                                    <input type="checkbox" checked class="w-4 h-4 rounded border-dark-border bg-dark-bg text-cyber-600">
                                    <span class="text-sm text-gray-300">全選</span>
                                </label>
                            </div>
                            <div class="grid grid-cols-4 gap-3 ml-6">
                                <label class="flex items-center space-x-2 text-sm text-gray-300"><input type="checkbox" checked class="w-4 h-4 rounded border-dark-border bg-dark-bg text-cyber-600">檢視</label>
                                <label class="flex items-center space-x-2 text-sm text-gray-300"><input type="checkbox" checked class="w-4 h-4 rounded border-dark-border bg-dark-bg text-cyber-600">新增</label>
                                <label class="flex items-center space-x-2 text-sm text-gray-300"><input type="checkbox" checked class="w-4 h-4 rounded border-dark-border bg-dark-bg text-cyber-600">編輯</label>
                                <label class="flex items-center space-x-2 text-sm text-gray-300"><input type="checkbox" checked class="w-4 h-4 rounded border-dark-border bg-dark-bg text-cyber-600">刪除</label>
                                <label class="flex items-center space-x-2 text-sm text-gray-300"><input type="checkbox" checked class="w-4 h-4 rounded border-dark-border bg-dark-bg text-cyber-600">遠端控制</label>
                                <label class="flex items-center space-x-2 text-sm text-gray-300"><input type="checkbox" checked class="w-4 h-4 rounded border-dark-border bg-dark-bg text-cyber-600">匯出</label>
                            </div>
                        </div>
                        
                        <!-- 遊戲管理 -->
                        <div>
                            <div class="flex items-center justify-between mb-3">
                                <span class="font-medium"><i data-lucide="gamepad-2" class="w-4 h-4 mr-2 inline text-cyber-400"></i>遊戲管理</span>
                                <label class="flex items-center space-x-2">
                                    <input type="checkbox" checked class="w-4 h-4 rounded border-dark-border bg-dark-bg text-cyber-600">
                                    <span class="text-sm text-gray-300">全選</span>
                                </label>
                            </div>
                            <div class="grid grid-cols-4 gap-3 ml-6">
                                <label class="flex items-center space-x-2 text-sm text-gray-300"><input type="checkbox" checked class="w-4 h-4 rounded border-dark-border bg-dark-bg text-cyber-600">檢視</label>
                                <label class="flex items-center space-x-2 text-sm text-gray-300"><input type="checkbox" checked class="w-4 h-4 rounded border-dark-border bg-dark-bg text-cyber-600">新增</label>
                                <label class="flex items-center space-x-2 text-sm text-gray-300"><input type="checkbox" checked class="w-4 h-4 rounded border-dark-border bg-dark-bg text-cyber-600">編輯</label>
                                <label class="flex items-center space-x-2 text-sm text-gray-300"><input type="checkbox" checked class="w-4 h-4 rounded border-dark-border bg-dark-bg text-cyber-600">刪除</label>
                            </div>
                        </div>
                        
                        <!-- 玩家管理 -->
                        <div>
                            <div class="flex items-center justify-between mb-3">
                                <span class="font-medium"><i data-lucide="users" class="w-4 h-4 mr-2 inline text-cyber-400"></i>玩家管理</span>
                                <label class="flex items-center space-x-2">
                                    <input type="checkbox" checked class="w-4 h-4 rounded border-dark-border bg-dark-bg text-cyber-600">
                                    <span class="text-sm text-gray-300">全選</span>
                                </label>
                            </div>
                            <div class="grid grid-cols-4 gap-3 ml-6">
                                <label class="flex items-center space-x-2 text-sm text-gray-300"><input type="checkbox" checked class="w-4 h-4 rounded border-dark-border bg-dark-bg text-cyber-600">檢視</label>
                                <label class="flex items-center space-x-2 text-sm text-gray-300"><input type="checkbox" checked class="w-4 h-4 rounded border-dark-border bg-dark-bg text-cyber-600">新增</label>
                                <label class="flex items-center space-x-2 text-sm text-gray-300"><input type="checkbox" checked class="w-4 h-4 rounded border-dark-border bg-dark-bg text-cyber-600">編輯</label>
                                <label class="flex items-center space-x-2 text-sm text-gray-300"><input type="checkbox" checked class="w-4 h-4 rounded border-dark-border bg-dark-bg text-cyber-600">餘額調整</label>
                            </div>
                        </div>
                        
                        <!-- 交易管理 -->
                        <div>
                            <div class="flex items-center justify-between mb-3">
                                <span class="font-medium"><i data-lucide="wallet" class="w-4 h-4 mr-2 inline text-cyber-400"></i>交易管理</span>
                                <label class="flex items-center space-x-2">
                                    <input type="checkbox" checked class="w-4 h-4 rounded border-dark-border bg-dark-bg text-cyber-600">
                                    <span class="text-sm text-gray-300">全選</span>
                                </label>
                            </div>
                            <div class="grid grid-cols-4 gap-3 ml-6">
                                <label class="flex items-center space-x-2 text-sm text-gray-300"><input type="checkbox" checked class="w-4 h-4 rounded border-dark-border bg-dark-bg text-cyber-600">檢視</label>
                                <label class="flex items-center space-x-2 text-sm text-gray-300"><input type="checkbox" checked class="w-4 h-4 rounded border-dark-border bg-dark-bg text-cyber-600">沖銷</label>
                                <label class="flex items-center space-x-2 text-sm text-gray-300"><input type="checkbox" checked class="w-4 h-4 rounded border-dark-border bg-dark-bg text-cyber-600">匯出</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-6 pt-6 border-t border-dark-border flex justify-end space-x-3">
                        <button class="px-4 py-2 bg-dark-bg border border-dark-border rounded-lg text-gray-300 hover:text-white">取消</button>
                        <button class="px-4 py-2 gradient-purple rounded-lg font-medium">儲存權限</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
