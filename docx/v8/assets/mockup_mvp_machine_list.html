<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機台管理 - 遊戲平台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="css/mockup-common.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065' },
                        dark: { bg: '#0a0a0f', card: '#12121a', sidebar: '#0d0d14', border: '#1e1e2e', hover: '#1a1a28' }
                    },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    boxShadow: { glow: '0 0 30px rgba(168, 85, 247, 0.3)', 'glow-sm': '0 0 15px rgba(168, 85, 247, 0.2)' }
                }
            }
        }
    </script>
</head>
<body class="gradient-bg min-h-screen flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 glass border-b border-dark-border flex items-center justify-between px-6">
            <h2 class="text-lg font-semibold text-white">機台管理 <span class="badge-local ml-2">本地</span> <span class="badge-central ml-1">集中</span></h2>
            <div class="flex items-center space-x-4">
                <div class="relative">
                    <input type="text" placeholder="搜尋機台..." class="bg-dark-bg border border-dark-border rounded-lg py-2 px-4 pl-10 text-sm text-white placeholder-gray-500 focus:outline-none input-focus">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
                </div>
                <a href="mockup_mvp_machine_add.html" class="px-4 py-2 gradient-purple rounded-lg text-white font-medium shadow-glow-sm flex items-center">
                    <i data-lucide="plus" class="w-4 h-4 mr-2"></i>新增機台
                </a>
            </div>
        </header>
        <div class="flex-1 overflow-y-auto p-6">
            <div class="glass-card rounded-2xl p-6 mb-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-semibold text-white">機台列表</h3>
                    <div class="flex space-x-2">
                        <span class="text-xs flex items-center text-gray-400"><span class="badge-local mr-1">本地</span>本地機台管理</span>
                        <span class="text-xs flex items-center text-gray-400"><span class="badge-central mr-1">集中</span>遠端監控</span>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="glass bg-dark-bg/50 rounded-xl p-4"><p class="text-sm text-gray-400">全部機台</p><p class="text-2xl font-bold text-white mt-1">50</p></div>
                    <div class="glass bg-dark-bg/50 rounded-xl p-4"><p class="text-sm text-emerald-400">線上運行</p><p class="text-2xl font-bold text-emerald-400 mt-1">45</p></div>
                    <div class="glass bg-dark-bg/50 rounded-xl p-4"><p class="text-sm text-gray-400">離線待機</p><p class="text-2xl font-bold text-gray-400 mt-1">3</p></div>
                    <div class="glass bg-dark-bg/50 rounded-xl p-4"><p class="text-sm text-red-400">異常</p><p class="text-2xl font-bold text-red-400 mt-1">2</p></div>
                </div>
            </div>
            <div class="glass-card rounded-2xl overflow-hidden">
                <table class="min-w-full">
                    <thead class="bg-dark-bg">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">機台ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">版本</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">狀態</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">地點</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">遊戲</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">營收</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">CPU</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">記憶體</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-400 uppercase">操作</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-dark-border">
                        <tr class="table-row-hover">
                            <td class="px-6 py-4 whitespace-nowrap text-white font-mono">A-001</td>
                            <td class="px-6 py-4 whitespace-nowrap"><span class="px-2 py-1 rounded text-xs bg-purple-500/20 text-purple-400">v2.5.1</span></td>
                            <td class="px-6 py-4 whitespace-nowrap"><span class="px-2 py-1 rounded-full text-xs bg-emerald-500/20 text-emerald-400">線上</span></td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-400">台北門市A</td>
                            <td class="px-6 py-4 whitespace-nowrap text-white">經典拉霸王</td>
                            <td class="px-6 py-4 whitespace-nowrap text-white font-mono">$12,500</td>
                            <td class="px-6 py-4 whitespace-nowrap"><div class="w-16 bg-dark-bg rounded-full h-2"><div class="bg-gradient-to-r from-green-400 to-emerald-500 h-2 rounded-full" style="width: 45%"></div></div><span class="text-xs text-gray-400 mt-1 block">45%</span></td>
                            <td class="px-6 py-4 whitespace-nowrap"><div class="w-16 bg-dark-bg rounded-full h-2"><div class="bg-gradient-to-r from-blue-400 to-cyan-500 h-2 rounded-full" style="width: 62%"></div></div><span class="text-xs text-gray-400 mt-1 block">62%</span></td>
                            <td class="px-6 py-4 whitespace-nowrap text-right">
                                <a href="mockup_machine_remote_control.html" class="text-purple-400 hover:text-purple-300 mx-1"><i data-lucide="eye" class="w-4 h-4"></i></a>
                                <a href="mockup_mvp_machine_add.html" class="text-cyan-400 hover:text-cyan-300 mx-1"><i data-lucide="settings" class="w-4 h-4"></i></a>
                                <button class="text-red-400 hover:text-red-300 mx-1"><i data-lucide="power" class="w-4 h-4"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <script src="js/sidebar.js"></script>
    <script>
        MockupSidebar.render('mockup_mvp_machine_list.html');
        lucide.createIcons();
    </script>
</body>
</html>
